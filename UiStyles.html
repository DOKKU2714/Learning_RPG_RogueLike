<style>
  :root {
    --bg: #141414;
    --bg-soft: #1c1c1c;
    --panel: #202020;
    --panel-2: #292929;
    --text: #ededed;
    --muted: #a9a9a9;
    --line: #777;
    --line-dark: #3c3c3c;
    --accent: #d8d8d8;
    --danger: #b94a48;
    --ok: #5f9b6e;
    --warn: #bda76a;
    --shadow: rgba(0, 0, 0, 0.58);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    margin: 0;
    color: var(--text);
    background: var(--bg);
    font-family: Georgia, "Times New Roman", "Noto Serif KR", serif;
    letter-spacing: 0;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 0;
    padding: 10px 16px;
    color: var(--text);
    background: #242424;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px #111;
  }

  button:hover:not(:disabled),
  button:focus-visible {
    background: #333;
    outline: 1px solid var(--accent);
  }

  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  button.secondary {
    color: var(--text);
    background: #181818;
  }

  input,
  select,
  textarea {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 0;
    padding: 10px;
    color: var(--text);
    background: #101010;
  }

  textarea {
    min-height: 112px;
    resize: vertical;
  }

  label {
    display: block;
    margin: 0 0 8px;
    color: var(--accent);
    font-weight: 700;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .app-shell {
    min-height: 100vh;
    padding: 24px;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,0.05), transparent 34%),
      var(--bg);
  }

  .menu-shell {
    width: min(520px, 100%);
    min-height: 100vh;
    margin: 0 auto;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .rpg-panel {
    width: 100%;
    border: 1px solid var(--line);
    background: rgba(28, 28, 28, 0.96);
    box-shadow: 0 12px 40px var(--shadow), inset 0 0 0 1px #080808;
    padding: 20px;
  }

  .rpg-title {
    margin: 0 0 18px;
    text-align: center;
    font-size: 28px;
    font-weight: 700;
  }

  .muted {
    color: var(--muted);
  }

  .message {
    min-height: 24px;
    margin-top: 12px;
    font-weight: 700;
  }

  .message.error {
    color: #e18b87;
  }

  .message.ok {
    color: #9bc9a6;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .vertical-menu {
    display: grid;
    gap: 12px;
    margin: 18px auto 0;
    width: min(340px, 100%);
  }

  .vertical-menu button {
    width: 100%;
    text-align: center;
  }

  .inline-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .hidden {
    display: none !important;
  }

  .intro-screen {
    min-height: 100vh;
    display: none;
    place-items: center;
    padding: 24px;
    text-align: center;
    color: var(--text);
    background: #151515;
    cursor: pointer;
  }

  .intro-screen.active {
    display: grid;
  }

  .intro-logo {
    width: min(520px, 88vw);
    min-height: 160px;
    display: grid;
    place-items: center;
    border: 2px solid var(--line);
    background: #1c1c1c;
    box-shadow: inset 0 0 0 2px #0c0c0c, 0 18px 50px var(--shadow);
    margin-bottom: 28px;
    font-size: 34px;
    font-weight: 700;
  }

  .blink-text {
    animation: slowBlink 2.4s ease-in-out infinite;
    color: var(--muted);
  }

  @keyframes slowBlink {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 1; }
  }

  .fade-in {
    animation: fadeIn 180ms ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .battle-shell {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    padding: 18px;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.78)),
      #151515;
  }

  .battle-topbar {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    color: var(--muted);
  }

  .battle-stage {
    position: relative;
    min-height: 430px;
    border: 1px solid var(--line-dark);
    background:
      radial-gradient(ellipse at center, rgba(110,110,110,0.13), transparent 34%),
      linear-gradient(to bottom, #202020, #121212 64%, #0d0d0d);
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
    padding: 18px;
  }

  .monster-hud {
    width: min(480px, 88%);
    margin: 0 auto;
    display: grid;
    gap: 8px;
  }

  .thin-hp-bar {
    position: relative;
    height: 10px;
    border: 1px solid #bfbfbf;
    background: #080808;
    overflow: hidden;
  }

  .thin-hp-bar > span,
  .meter-fill {
    display: block;
    height: 100%;
    width: 0%;
    background: #bdbdbd;
    transition: width 420ms ease-out, left 420ms ease-out;
  }

  .status-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    min-height: 28px;
  }

  .status-icon {
    width: 26px;
    height: 26px;
    display: inline-grid;
    place-items: center;
    border: 1px solid var(--line);
    color: var(--accent);
    background: #111;
    font-size: 15px;
    line-height: 1;
  }

  .status-icon.buff {
    border-color: #43c46f;
    color: #7ee29a;
    box-shadow: 0 0 10px rgba(67, 196, 111, 0.2);
  }

  .status-icon.debuff {
    border-color: #d94b4b;
    color: #ff8b8b;
    box-shadow: 0 0 10px rgba(217, 75, 75, 0.2);
  }

  .monster-area {
    display: grid;
    place-items: center;
    padding: 24px 0 12px;
  }

  .monster-sprite-placeholder {
    width: min(300px, 62vw);
    aspect-ratio: 1 / 1.05;
    border: 2px solid var(--line);
    background:
      radial-gradient(circle at 50% 35%, #2e2e2e, #181818 62%, #101010);
    display: grid;
    place-items: center;
    color: var(--muted);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  }

  .monster-name {
    margin-top: 12px;
    text-align: center;
    color: var(--accent);
    font-size: 20px;
  }

  .intent-box {
    position: absolute;
    right: 18px;
    top: 78px;
    min-width: 120px;
    border: 1px solid var(--line);
    background: rgba(15, 15, 15, 0.88);
    padding: 8px;
    color: var(--muted);
  }

  .battle-bottom {
    display: grid;
    grid-template-columns: minmax(220px, 0.8fr) minmax(280px, 1.6fr);
    gap: 14px;
  }

  .action-panel,
  .log-panel,
  .player-panel {
    border: 1px solid var(--line);
    background: rgba(20, 20, 20, 0.96);
    box-shadow: inset 0 0 0 1px #090909;
    padding: 14px;
  }

  .action-panel {
    display: grid;
    gap: 8px;
  }

  .log-panel {
    min-height: 132px;
  }

  .battle-log {
    min-height: 82px;
    line-height: 1.7;
    color: var(--accent);
  }

  .player-panel {
    grid-column: 1 / -1;
  }

  .player-status-line {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }

  .meter {
    height: 12px;
    border: 1px solid var(--line);
    background: #080808;
  }

  .meter-fill.hp {
    background: #a7a7a7;
  }

  .question-modal-overlay,
  .loading-overlay {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.76);
    z-index: 20;
  }

  .question-modal-overlay.active,
  .loading-overlay.active {
    display: grid;
  }

  .question-modal,
  .loading-box {
    width: min(720px, 100%);
    border: 1px solid var(--line);
    background: #1a1a1a;
    box-shadow: 0 22px 80px rgba(0,0,0,0.7), inset 0 0 0 1px #080808;
    padding: 18px;
  }

  .modal-topline {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .creator-badge {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    border: 1px solid var(--warn);
    color: #f0dfaa;
    background: #332b16;
    padding: 4px 10px;
    white-space: nowrap;
  }

  .modal-meta-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .meta-box {
    border: 1px solid var(--line-dark);
    background: #101010;
    padding: 8px;
  }

  .efficiency-meter {
    height: 8px;
    border: 1px solid var(--line);
    background: #080808;
    margin-top: 6px;
  }

  .question-choice {
    display: block;
    border: 1px solid var(--line-dark);
    background: #101010;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .question-choice.selected {
    border-color: var(--accent);
  }

  .question-choice.disabled-choice {
    opacity: 0.7;
    cursor: default;
  }

  .question-choice.answer-correct {
    border-color: var(--ok);
    background: rgba(95, 155, 110, 0.22);
  }

  .question-choice.answer-wrong {
    border-color: var(--danger);
    background: rgba(185, 74, 72, 0.22);
  }

  .spinner {
    width: 42px;
    height: 42px;
    border: 3px solid #565656;
    border-top-color: #d0d0d0;
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 900ms linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .question-form-shell {
    width: min(980px, 100%);
    margin: 0 auto;
    padding: 24px;
  }

  .question-item {
    border-top: 1px solid var(--line-dark);
    padding: 12px 0;
  }

  @media (max-width: 760px) {
    .app-shell,
    .battle-shell,
    .question-form-shell {
      padding: 14px;
    }

    .battle-stage {
      min-height: 360px;
      padding: 12px;
    }

    .battle-bottom,
    .form-grid,
    .choice-grid,
    .modal-meta-grid {
      grid-template-columns: 1fr;
    }

    .intent-box {
      position: static;
      margin: 10px auto 0;
      width: min(240px, 100%);
    }

    .intro-logo {
      font-size: 26px;
      min-height: 130px;
    }
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .intro-screen.screen.active,
  .menu-shell.screen.active {
    display: grid;
  }

  @media (max-width: 760px) {
    .battle-topbar {
      align-items: stretch;
      flex-direction: column;
    }

    .battle-topbar .inline-actions button {
      flex: 1 1 130px;
    }
  }

  .battle-video-shell {
    position: relative;
    min-height: 100vh;
    display: block;
    overflow: hidden;
    padding: 0;
    background: #060606;
  }

  .battle-scene {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: #050505;
  }

  .battle-background-video,
  .battle-background-fallback {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .battle-background-fallback {
    background:
      radial-gradient(circle at 50% 38%, rgba(120, 120, 120, 0.16), transparent 28%),
      linear-gradient(to bottom, #181818 0%, #101010 58%, #050505 100%);
  }

  .battle-scene::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(0, 0, 0, 0.18), transparent 42%, rgba(0, 0, 0, 0.68)),
      radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.38));
  }

  .monster-layer {
    position: absolute;
    left: 50%;
    top: 15vh;
    z-index: 2;
    width: min(760px, 92vw);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(10px, 3vw, 34px);
    transform: translateX(-50%);
  }

  .monster-slot {
    position: relative;
    width: min(190px, 28vw);
    min-width: 92px;
    display: grid;
    justify-items: center;
    gap: 4px;
  }

  .monster-hp-text {
    font-size: 12px;
    color: #e8e8e8;
    text-shadow: 0 1px 3px #000;
  }

  .monster-hp-bar {
    width: 100%;
    height: 7px;
    border-color: #ddd;
    background: #120000;
  }

  .monster-hp-bar > span,
  .thin-hp-bar > span {
    background: #b30000;
  }

  .monster-hp-bar > .hp-lag {
    position: absolute;
    inset: 0 auto 0 0;
    background: #f2f2f2;
    transition: width 760ms ease-out;
  }

  .monster-hp-bar > .hp-current {
    position: absolute;
    inset: 0 auto 0 0;
    background: #b30000;
    transition: width 300ms ease-out;
  }

  .monster-hp-bar > .monster-shield-fill {
    position: absolute;
    inset: 0 auto 0 0;
    background: #f3f3f3;
    transition: width 420ms ease-out, left 420ms ease-out;
  }

  .monster-status-row {
    justify-content: center;
    min-height: 0;
    margin: 2px 0 0;
    flex-wrap: wrap;
  }

  .monster-status-row .status-icon {
    width: 20px;
    height: 20px;
    font-size: 11px;
  }

  .monster-status-row .buff {
    border-color: #43c46f;
    color: #7ee29a;
  }

  .monster-status-row .shield-status {
    border-color: #43c46f;
    color: #b8f7ff;
    box-shadow: 0 0 10px rgba(67, 196, 111, 0.32);
  }

  .monster-status-row .debuff {
    border-color: #d94b4b;
    color: #ff8b8b;
  }

  .monster-intent {
    display: grid;
    justify-items: center;
    gap: 2px;
    margin: 4px auto 6px;
    max-width: 140px;
    color: #efefef;
    text-align: center;
  }

  .monster-intent-icon {
    min-width: 34px;
    border: 1px solid rgba(235, 235, 235, 0.72);
    background: rgba(0, 0, 0, 0.72);
    padding: 2px 5px;
    font-size: 10px;
    letter-spacing: 0.04em;
  }

  .monster-intent-text {
    width: 100%;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.25;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .compact-monster {
    width: min(150px, 24vw);
    max-width: 150px;
    border: 0;
    background:
      radial-gradient(circle at 50% 34%, #333, #171717 62%, #090909);
  }

  .monster-slot-2 .compact-monster,
  .monster-slot-3 .compact-monster {
    width: min(132px, 22vw);
  }

  .battle-hud {
    position: absolute;
    left: 50%;
    bottom: 12px;
    z-index: 4;
    width: min(860px, calc(100vw - 24px));
    display: grid;
    grid-template-columns: minmax(180px, 1fr) auto minmax(220px, 0.8fr);
    gap: 8px;
    align-items: stretch;
    transform: translateX(-50%);
  }

  .battle-log-compact,
  .compact-actions,
  .player-compact-panel {
    border: 1px solid rgba(180, 180, 180, 0.68);
    background: rgba(10, 10, 10, 0.78);
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.78);
    padding: 8px;
  }

  .battle-log-compact {
    min-height: 112px;
    display: flex;
    align-items: stretch;
  }

  .battle-log-compact .battle-log {
    min-height: auto;
    width: 100%;
    font-size: 14px;
    line-height: 1.45;
  }

  .compact-actions {
    display: grid;
    grid-template-columns: repeat(3, minmax(64px, 1fr));
    gap: 6px;
  }

  .compact-actions button {
    min-height: 34px;
    padding: 6px 10px;
  }

  .skill-panel {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
    margin-top: 2px;
  }

  .action-panel.skill-select-mode > button {
    display: none;
  }

  .action-panel.skill-select-mode .skill-panel {
    display: grid;
  }

  .disabled-actions {
    opacity: 0.72;
  }

  .skill-button {
    display: grid;
    gap: 2px;
    min-height: 40px;
    padding: 5px 8px;
    text-align: left;
  }

  .skill-button small,
  .skill-empty {
    color: var(--muted);
    font-size: 11px;
  }

  .skill-preview {
    color: #f0f0f0;
  }

  .skill-empty {
    grid-column: 1 / -1;
    padding: 4px 2px;
    text-align: center;
  }

  .skill-cancel-button {
    grid-column: 1 / -1;
  }

  .player-compact-panel {
    position: relative;
    min-height: 112px;
    display: grid;
    align-items: center;
    border: 1px solid transparent;
    transition: border-color 240ms ease, box-shadow 240ms ease;
  }

  .player-compact-panel.player-shielded {
    border-color: rgba(255, 255, 255, 0.62);
    box-shadow: 0 0 18px rgba(255, 255, 255, 0.18);
  }

  .player-hp-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    font-size: 13px;
  }

  .player-hp-track {
    position: relative;
    height: 12px;
    border: 1px solid #d8d8d8;
    background: #130000;
    overflow: hidden;
  }

  .player-hp-lag,
  .player-hp-fill,
  .player-shield-fill {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    display: block;
    transition: width 420ms ease-out, left 420ms ease-out;
  }

  .player-hp-lag {
    background: #f2f2f2;
    transition: width 760ms ease-out, left 760ms ease-out;
  }

  .player-hp-fill {
    background: #b30000;
  }

  .player-shield-fill {
    background: #f3f3f3;
  }

  .player-damage-anchor {
    position: absolute;
    left: 50%;
    top: 0;
    width: 1px;
    height: 1px;
  }

  .battle-debug-controls {
    position: absolute;
    right: 10px;
    top: 10px;
    z-index: 5;
    display: none;
    gap: 4px;
    opacity: 0.42;
  }

  .battle-debug-controls.active {
    display: flex;
  }

  .battle-debug-controls:hover {
    opacity: 1;
  }

  .battle-debug-controls button {
    min-height: 28px;
    padding: 4px 8px;
    font-size: 12px;
  }

  .floating-layer,
  .screen-damage-flash {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
  }

  .screen-damage-flash {
    z-index: 3;
    opacity: 0;
    background: rgba(180, 0, 0, 0.34);
  }

  .floating-damage {
    position: absolute;
    font-weight: 900;
    font-size: 34px;
    text-shadow: 0 2px 0 #000, 0 0 10px rgba(255,255,255,0.58), 0 0 16px rgba(0,0,0,0.9);
    transform: translate(-50%, 0);
    animation: floatDamage 1800ms ease-out forwards;
  }

  .damage-white {
    color: #fff;
  }

  .damage-red {
    color: #d00000;
  }

  .effect-float {
    color: #f2f2f2;
    font-size: 18px;
    letter-spacing: 0.04em;
  }

  .monster-hit {
    animation: monsterHit 420ms ease-out;
  }

  .incoming-slash {
    position: relative;
  }

  .incoming-slash::after {
    content: "";
    position: absolute;
    left: -12%;
    top: 8%;
    width: 124%;
    height: 84%;
    background: linear-gradient(135deg, transparent 42%, rgba(255,255,255,0.95) 48%, rgba(255,255,255,0.3) 54%, transparent 62%);
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
    pointer-events: none;
    animation: slashCut 300ms ease-out forwards;
  }

  .monster-lunge {
    animation: monsterLunge 360ms ease-out;
  }

  .monster-effect {
    animation: monsterEffect 520ms ease-out;
  }

  .player-hit {
    animation: playerShake 420ms ease-out;
  }

  .player-hit .screen-damage-flash {
    animation: redFlash 420ms ease-out;
  }

  .screen-damage-flash.damage-flash-red {
    animation: redFlash 520ms ease-out;
  }

  .player-shield-block {
    animation: playerShieldBlock 520ms ease-out;
  }

  .player-shield-block .screen-damage-flash {
