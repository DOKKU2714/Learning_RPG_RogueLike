<style>
  @import url("https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css");

  :root {
    --bg: #141414;
    --bg-soft: #1c1c1c;
    --panel: #202020;
    --panel-2: #292929;
    --text: #ededed;
    --muted: #a9a9a9;
    --line: #777;
    --line-dark: #3c3c3c;
    --accent: #d8d8d8;
    --danger: #b94a48;
    --ok: #5f9b6e;
    --warn: #bda76a;
    --shadow: rgba(0, 0, 0, 0.58);
    --font-pixel: "Galmuri11", "DungGeunMo", "NeoDunggeunmo", "Apple SD Gothic Neo", "Malgun Gothic", monospace;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    margin: 0;
    color: var(--text);
    background: var(--bg);
    font-family: var(--font-pixel);
    font-size: 15px;
    line-height: 1.55;
    letter-spacing: 0;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 0;
    padding: 10px 16px;
    color: var(--text);
    background: #242424;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px #111;
  }

  button:hover:not(:disabled),
  button:focus-visible {
    background: #333;
    outline: 1px solid var(--accent);
  }

  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  button.secondary {
    color: var(--text);
    background: #181818;
  }

  button.danger {
    color: #fff;
    border-color: #6c1d1d;
    background: #8f1d1d;
  }

  button.danger:hover:not(:disabled),
  button.danger:focus-visible {
    background: #a52a2a;
  }

  input,
  select,
  textarea {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 0;
    padding: 10px;
    color: var(--text);
    background: #101010;
  }

  textarea {
    min-height: 112px;
    resize: vertical;
  }

  label {
    display: block;
    margin: 0 0 8px;
    color: var(--accent);
    font-weight: 700;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .app-shell {
    min-height: 100vh;
    padding: 24px;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,0.05), transparent 34%),
      var(--bg);
  }

  .menu-shell {
    width: min(520px, 100%);
    min-height: 100vh;
    margin: 0 auto;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .rpg-panel {
    width: 100%;
    border: 1px solid var(--line);
    background: rgba(28, 28, 28, 0.96);
    box-shadow: 0 12px 40px var(--shadow), inset 0 0 0 1px #080808;
    padding: 20px;
  }

  .rpg-title {
    margin: 0 0 18px;
    text-align: center;
    font-size: 28px;
    font-weight: 700;
  }

  .muted {
    color: var(--muted);
  }

  .message {
    min-height: 24px;
    margin-top: 12px;
    font-weight: 700;
  }

  .message.error {
    color: #e18b87;
  }

  .message.ok {
    color: #9bc9a6;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .vertical-menu {
    display: grid;
    gap: 12px;
    margin: 18px auto 0;
    width: min(340px, 100%);
  }

  .vertical-menu button {
    width: 100%;
    text-align: center;
  }

  .inline-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .hidden {
    display: none !important;
  }

  .intro-screen {
    min-height: 100vh;
    display: none;
    place-items: center;
    padding: 24px;
    text-align: center;
    color: var(--text);
    background: #151515;
    cursor: pointer;
  }

  .intro-screen.active {
    display: grid;
  }

  .intro-logo {
    width: min(760px, 94vw);
    min-height: 240px;
    display: grid;
    place-items: center;
    border: 0;
    background: transparent;
    box-shadow: none;
    margin-bottom: 28px;
    font-size: 34px;
    font-weight: 700;
  }

  .intro-logo.intro-logo-image {
    position: relative;
    overflow: hidden;
    background: transparent;
  }

  .intro-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .intro-logo #introLogoFallback {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    white-space: normal;
  }

  .intro-logo.logo-loaded #introLogoFallback {
    display: none;
  }

  .main-menu-logo {
    width: min(360px, 92%);
    min-height: 92px;
    display: grid;
    place-items: center;
    margin: 0 auto 16px;
  }

  .main-menu-logo img {
    width: 100%;
    max-height: 140px;
    object-fit: contain;
    display: block;
    filter: drop-shadow(0 4px 0 #000);
  }

  .blink-text {
    animation: slowBlink 2.4s ease-in-out infinite;
    color: var(--muted);
  }

  @keyframes slowBlink {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 1; }
  }

  .fade-in {
    animation: fadeIn 180ms ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .battle-shell {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    padding: 18px;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.78)),
      #151515;
  }

  .battle-topbar {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    color: var(--muted);
  }

  .battle-stage {
    position: relative;
    min-height: 430px;
    border: 1px solid var(--line-dark);
    background:
      radial-gradient(ellipse at center, rgba(110,110,110,0.13), transparent 34%),
      linear-gradient(to bottom, #202020, #121212 64%, #0d0d0d);
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
    padding: 18px;
  }

  .monster-hud {
    width: min(480px, 88%);
    margin: 0 auto;
    display: grid;
    gap: 8px;
  }

  .thin-hp-bar {
    position: relative;
    height: 10px;
    border: 1px solid #bfbfbf;
    background: #080808;
    overflow: hidden;
  }

  .thin-hp-bar > span,
  .meter-fill {
    display: block;
    height: 100%;
    width: 0%;
    background: #bdbdbd;
    transition: width 420ms ease-out, left 420ms ease-out;
  }

  .status-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    min-height: 28px;
  }

  .status-icon {
    position: relative;
    min-width: 26px;
    height: 26px;
    padding: 0 4px;
    display: inline-grid;
    place-items: center;
    border: 2px solid var(--line);
    color: var(--accent);
    background: #111;
    font-family: var(--font-pixel);
    font-size: 10px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.04em;
    box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.55);
  }

  .status-turns {
    position: absolute;
    right: -4px;
    bottom: -5px;
    min-width: 12px;
    height: 12px;
    display: grid;
    place-items: center;
    border: 1px solid #080808;
    background: #e8e8e8;
    color: #050505;
    font-family: Arial, sans-serif;
    font-style: normal;
    font-size: 8px;
    font-weight: 800;
    line-height: 1;
  }

  .status-icon.buff {
    border-color: #43c46f;
    color: #7ee29a;
    box-shadow: 0 0 10px rgba(67, 196, 111, 0.2);
  }

  .status-icon.debuff {
    border-color: #d94b4b;
    color: #ff8b8b;
    box-shadow: 0 0 10px rgba(217, 75, 75, 0.2);
  }

  .monster-area {
    display: grid;
    place-items: center;
    padding: 24px 0 12px;
  }

  .monster-sprite-placeholder {
    width: min(300px, 62vw);
    aspect-ratio: 1 / 1.05;
    border: 2px solid var(--line);
    background:
      radial-gradient(circle at 50% 35%, #2e2e2e, #181818 62%, #101010);
    display: grid;
    place-items: center;
    color: var(--muted);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
  }

  .monster-name {
    margin-top: 12px;
    text-align: center;
    color: var(--accent);
    font-size: 20px;
  }

  .intent-box {
    position: absolute;
    right: 18px;
    top: 78px;
    min-width: 120px;
    border: 1px solid var(--line);
    background: rgba(15, 15, 15, 0.88);
    padding: 8px;
    color: var(--muted);
  }

  .battle-bottom {
    display: grid;
    grid-template-columns: minmax(220px, 0.8fr) minmax(280px, 1.6fr);
    gap: 14px;
  }

  .action-panel,
  .log-panel,
  .player-panel {
    border: 1px solid var(--line);
    background: rgba(20, 20, 20, 0.96);
    box-shadow: inset 0 0 0 1px #090909;
    padding: 14px;
  }

  .action-panel {
    display: grid;
    gap: 8px;
  }

  .log-panel {
    min-height: 132px;
  }

  .battle-log {
    min-height: 82px;
    line-height: 1.7;
    color: var(--accent);
  }

  .player-panel {
    grid-column: 1 / -1;
  }

  .player-status-line {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }

  .meter {
    height: 12px;
    border: 1px solid var(--line);
    background: #080808;
  }

  .meter-fill.hp {
    background: #a7a7a7;
  }

  .question-modal-overlay,
  .loading-overlay {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.76);
    z-index: 20;
    transition: background 650ms ease, opacity 650ms ease;
  }

  .question-modal-overlay.active,
  .loading-overlay.active {
    display: grid;
  }

  .question-modal,
  .loading-box {
    width: min(720px, 100%);
    border: 1px solid var(--line);
    background: #1a1a1a;
    box-shadow: 0 22px 80px rgba(0,0,0,0.7), inset 0 0 0 1px #080808;
    padding: 18px;
    transition: opacity 520ms ease, transform 520ms ease;
  }

  .question-modal {
    width: min(880px, 100%);
    padding: 20px 22px 18px;
  }

  .loading-overlay.page-transition {
    background: #000;
  }

  .loading-overlay.page-transition .loading-box {
    opacity: 0;
    transform: translateY(12px) scale(0.98);
  }

  .modal-topline {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .creator-badge {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    border: 1px solid var(--warn);
    color: #f0dfaa;
    background: #332b16;
    padding: 4px 10px;
    white-space: nowrap;
  }

  .question-frame {
    position: relative;
    border: 2px solid var(--line);
    background: #111;
  }

  .question-prompt-panel {
    min-height: 190px;
    display: grid;
    place-items: center;
    padding: 52px 42px 34px;
    margin-bottom: 12px;
  }

  .question-prompt-panel h2 {
    margin: 0 0 22px;
    font-size: clamp(30px, 5vw, 44px);
    line-height: 1.05;
    text-align: center;
  }

  .question-prompt-panel p {
    margin: 0;
    width: 100%;
    line-height: 1.65;
    text-align: center;
    font-size: 17px;
  }

  .question-answer-panel {
    min-height: 230px;
    display: grid;
    place-items: center;
    padding: 28px 36px;
  }

  .question-answer-panel #questionAnswerArea {
    width: min(620px, 100%);
  }

  .question-corner-badge {
    position: absolute;
    top: -2px;
    min-height: 36px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 2px solid var(--line);
    background: #1a1a1a;
    padding: 4px 14px;
    font-size: 18px;
    line-height: 1;
    z-index: 2;
  }

  .question-difficulty-badge {
    left: -2px;
  }

  .question-difficulty-badge span {
    font-weight: 900;
  }

  .question-prompt-panel .creator-badge {
    right: -2px;
    color: #f0dfaa;
  }

  .question-efficiency-panel {
    display: grid;
    gap: 6px;
    margin-top: 12px;
    justify-items: end;
  }

  .question-max-time {
    display: none;
  }

  .modal-meta-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .meta-box {
    border: 1px solid var(--line-dark);
    background: #101010;
    padding: 8px;
  }

  .efficiency-meter {
    position: relative;
    width: min(260px, 42vw);
    height: 22px;
    border: 1px solid var(--line);
    background: #080808;
    overflow: hidden;
  }

  .efficiency-meter .meter-fill {
    position: absolute;
    inset: 0 auto 0 0;
  }

  .efficiency-meter .efficiency-high {
    background: #42d66b;
  }

  .efficiency-meter .efficiency-mid {
    background: #d6c64a;
  }

  .efficiency-meter .efficiency-low {
    background: #d94848;
  }

  .question-efficiency-text {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: grid;
    place-items: center;
    color: #fff;
    font-weight: 900;
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    pointer-events: none;
  }

  .question-time-left {
    font-size: 18px;
    font-weight: 800;
    color: #f2f2f2;
    line-height: 1.1;
  }

  .question-result-hold {
    height: 10px;
    border: 1px solid #bdbdbd;
    background: #080808;
    margin-top: 12px;
    overflow: hidden;
  }

  .question-result-hold span {
    display: block;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #8d8d8d, #d2d2d2);
    box-shadow: 0 0 10px rgba(220, 220, 220, 0.28);
  }

  .question-choice {
    display: block;
    border: 1px solid var(--line-dark);
    background: #101010;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 15px;
  }

  .question-choice input[type="radio"] {
    width: 14px;
    height: 14px;
    margin: 0 8px 0 0;
    vertical-align: -2px;
    accent-color: var(--accent);
  }

  .question-choice.selected {
    border-color: var(--accent);
  }

  .question-choice.disabled-choice {
    opacity: 0.7;
    cursor: default;
  }

  .question-choice.answer-correct {
    border-color: var(--ok);
    background: rgba(95, 155, 110, 0.22);
  }

  .question-choice.answer-wrong {
    border-color: var(--danger);
    background: rgba(185, 74, 72, 0.22);
  }

  .spinner {
    width: 42px;
    height: 42px;
    border: 3px solid #565656;
    border-top-color: #d0d0d0;
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 900ms linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .question-form-shell {
    width: min(980px, 100%);
    margin: 0 auto;
    padding: 24px;
  }

  .question-item {
    border-top: 1px solid var(--line-dark);
    padding: 12px 0;
  }

  @media (max-width: 760px) {
    .app-shell,
    .battle-shell,
    .question-form-shell {
      padding: 14px;
    }

    .battle-stage {
      min-height: 360px;
      padding: 12px;
    }

    .battle-bottom,
    .form-grid,
    .choice-grid,
    .modal-meta-grid {
      grid-template-columns: 1fr;
    }

    .question-modal {
      padding: 14px;
    }

    .question-prompt-panel {
      min-height: 170px;
      padding: 52px 18px 26px;
    }

    .question-answer-panel {
      min-height: 210px;
      padding: 22px 16px;
    }

    .question-corner-badge {
      min-height: 32px;
      padding: 4px 10px;
      font-size: 14px;
    }

    .efficiency-meter {
      width: min(220px, 58vw);
    }

    .intent-box {
      position: static;
      margin: 10px auto 0;
      width: min(240px, 100%);
    }

    .intro-logo {
      font-size: 26px;
      width: min(94vw, 560px);
      min-height: 190px;
    }

    .main-menu-logo {
      width: min(310px, 92%);
      min-height: 78px;
    }
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .intro-screen.screen.active,
  .menu-shell.screen.active {
    display: grid;
  }

  @media (max-width: 760px) {
    .battle-topbar {
      align-items: stretch;
      flex-direction: column;
    }

    .battle-topbar .inline-actions button {
      flex: 1 1 130px;
    }
  }

  .battle-video-shell {
    position: relative;
    min-height: 100vh;
    display: block;
    overflow: hidden;
    padding: 0;
    background: #060606;
  }

  .battle-scene {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: #050505;
  }

  .battle-background-video,
  .battle-background-fallback {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .battle-background-fallback {
    background: #050505;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
  }

  .battle-background-fallback.has-battle-image {
    background-color: #050505;
  }

  .battle-scene::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(0, 0, 0, 0.18), transparent 42%, rgba(0, 0, 0, 0.68)),
      radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.38));
  }

  .monster-layer {
    position: absolute;
    left: 50%;
    top: 27vh;
    z-index: 2;
    width: min(980px, 92vw);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(12px, 2.4vw, 28px);
    transform: translateX(-50%);
  }

  .battle-menu-button {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 7;
    min-height: 34px;
    padding: 6px 12px;
    border: 1px solid rgba(220, 220, 220, 0.72);
    background: rgba(8, 8, 8, 0.78);
    color: #f0f0f0;
    box-shadow: inset -2px -2px 0 rgba(0, 0, 0, 0.62);
  }

  .battle-menu-panel {
    position: absolute;
    top: 54px;
    right: 14px;
    z-index: 8;
    width: min(260px, calc(100vw - 28px));
    display: grid;
    gap: 8px;
    border: 1px solid rgba(220, 220, 220, 0.7);
    background: rgba(8, 8, 8, 0.92);
    padding: 10px;
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.68), inset -2px -2px 0 rgba(0, 0, 0, 0.62);
  }

  .battle-menu-panel button {
    min-height: 34px;
    padding: 7px 10px;
  }

  .battle-menu-panel button:disabled {
    cursor: not-allowed;
    opacity: 0.45;
  }

  .battle-stats-panel {
    display: grid;
    gap: 6px;
    margin-top: 4px;
    border-top: 1px solid rgba(220, 220, 220, 0.24);
    padding-top: 8px;
    color: #efefef;
    font-size: 13px;
  }

  .battle-stat-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    border-bottom: 1px solid rgba(180, 180, 180, 0.14);
    padding: 4px 0;
  }

  .battle-stat-row span {
    color: var(--muted);
  }

  .monster-slot {
    position: relative;
    width: 280px;
    height: 325px;
    min-width: 92px;
    flex: 0 0 280px;
    display: flex;
    justify-content: center;
    align-items: flex-end;
  }

  .monster-slot.target-selectable {
    cursor: pointer;
  }

  .monster-slot.target-selectable .compact-monster {
    filter: drop-shadow(0 0 12px rgba(255, 216, 74, 0.65));
  }

  .monster-slot.target-selectable::before {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 6px;
    width: 82%;
    height: 70%;
    transform: translateX(-50%);
    border: 2px solid rgba(255, 216, 74, 0.82);
    border-radius: 8px;
    box-shadow: 0 0 18px rgba(255, 216, 74, 0.34);
    pointer-events: none;
    animation: targetSelectPulse 920ms ease-in-out infinite alternate;
  }

  .monster-slot.target-selectable:hover .compact-monster {
    transform: translateY(-4px) scale(1.04);
  }

  .monster-hp-text {
    position: absolute;
    left: 0;
    right: 0;
    top: 8px;
    z-index: 3;
    font-size: 13px;

  @keyframes monsterHit {
    0% { filter: brightness(1); transform: translateX(0); }

    26% { transform: translateX(9px) rotate(1deg); }

  @keyframes monsterRedFlash {
    0% { opacity: 0; transform: translateX(-12%) skewX(-16deg); }
    18% { opacity: 1; }
    54% { opacity: 0.38; }
    100% { opacity: 0; transform: translateX(12%) skewX(-16deg); }

  @keyframes monsterEntrance {
    0% {
      opacity: 0;
      filter: blur(8px) brightness(0.45);
      transform: translateY(18px) scale(0.92);

    65% {
      opacity: 1;
      filter: blur(1px) brightness(1.18);
      transform: translateY(0) scale(1.02);
    }
    100% {
      opacity: 1;
      filter: blur(0) brightness(1);
      transform: translateY(0) scale(1);
    }

  @keyframes slashCut {
    0% { opacity: 0; transform: translate(-44px, 36px) rotate(-28deg) scaleX(0.58); }
    22% { opacity: 1; }
    100% { opacity: 0; transform: translate(44px, -36px) rotate(-28deg) scaleX(1.08); }

  @keyframes slashTrail {
    0% { opacity: 0; transform: translate(-54px, 46px) rotate(-28deg) scaleX(0.4); }

    100% { opacity: 0; transform: translate(36px, -30px) rotate(-28deg) scaleX(1); }

  @keyframes monsterEffect {

    20% { transform: translate(8px, -2px); }

  @keyframes redFlash {
    0% { opacity: 0; }
    18% { opacity: 1; }
    100% { opacity: 0; }

  @keyframes whiteFlash {

    22% { opacity: 1; background: rgba(255,255,255,0.52); }

    54% { transform: translate(-3px, 0); }

  @keyframes shieldFade {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.72); }
    18% { opacity: 1; transform: translate(-50%, -58%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -84%) scale(1.16); }

  @keyframes shieldBlockBounce {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.52) rotate(-8deg); }
    18% { opacity: 1; transform: translate(-50%, -56%) scale(1.16) rotate(6deg); }
    42% { transform: translate(-50%, -48%) scale(0.94) rotate(-4deg); }
    64% { opacity: 1; transform: translate(-50%, -54%) scale(1.04) rotate(2deg); }
    100% { opacity: 0; transform: translate(-50%, -72%) scale(0.82) rotate(0deg); }
