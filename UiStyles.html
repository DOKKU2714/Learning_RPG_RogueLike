<style>
  :root {
    --bg: #141414;
    --bg-soft: #1c1c1c;
    --panel: #202020;
    --panel-2: #292929;
    --text: #ededed;
    --muted: #a9a9a9;
    --line: #777;
    --line-dark: #3c3c3c;
    --accent: #d8d8d8;
    --danger: #b94a48;
    --ok: #5f9b6e;

    --shadow: rgba(0, 0, 0, 0.58);

  * {
    box-sizing: border-box;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    margin: 0;
    color: var(--text);
    background: var(--bg);
    font-family: Georgia, "Times New Roman", "Noto Serif KR", serif;
    letter-spacing: 0;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 0;
    padding: 10px 16px;
    color: var(--text);
    background: #242424;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px #111;
  }

  button:hover:not(:disabled),
  button:focus-visible {
    background: #333;
    outline: 1px solid var(--accent);
  }

  button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  button.secondary {
    color: var(--text);
    background: #181818;
  }

  input,
  select,
  textarea {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 0;
    padding: 10px;
    color: var(--text);
    background: #101010;
  }

  textarea {
    min-height: 112px;
    resize: vertical;
  }

  label {
    display: block;
    margin: 0 0 8px;
    color: var(--accent);
    font-weight: 700;
  }

  h1,
  h2,
  h3,
  p {
    margin-top: 0;
  }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .app-shell {
    min-height: 100vh;
    padding: 24px;
    background:
      radial-gradient(circle at 50% 30%, rgba(255,255,255,0.05), transparent 34%),
      var(--bg);

  .menu-shell {
    width: min(520px, 100%);

    margin: 0 auto;
    display: grid;
    place-items: center;
    padding: 24px;

  .rpg-panel {

    font-size: 28px;

    margin-top: 12px;
    font-weight: 700;

  .message.error {

  }

  .message.ok {

    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .choice-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;

  .vertical-menu {
    display: grid;
    gap: 12px;
    margin: 18px auto 0;
    width: min(340px, 100%);

  }

  .inline-actions {

    flex-wrap: wrap;
    align-items: center;
  }

  .hidden {

  }

    font-size: 34px;

    display: grid;
    grid-template-rows: auto 1fr;
    padding: 18px;

    gap: 8px;

    min-height: 28px;

  .status-icon {

    place-items: center;
    color: var(--muted);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);

    padding: 8px;
    color: var(--muted);

  .battle-bottom {
    display: grid;
    grid-template-columns: minmax(220px, 0.8fr) minmax(280px, 1.6fr);
    gap: 14px;

  .log-panel,
  .player-panel {
    border: 1px solid var(--line);
    background: rgba(20, 20, 20, 0.96);

    padding: 14px;

    display: grid;
    gap: 8px;
  }

  .log-panel {
    min-height: 132px;

  .battle-log {
    min-height: 82px;
    line-height: 1.7;
    color: var(--accent);

    grid-column: 1 / -1;
  }

  .player-status-line {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
  }

    height: 12px;
    border: 1px solid var(--line);
    background: #080808;
  }

  .meter-fill.hp {
    background: #a7a7a7;
  }

  .question-modal-overlay,
  .loading-overlay {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.76);
    z-index: 20;
  }

  .question-modal-overlay.active,
  .loading-overlay.active {
    display: grid;
  }

  .loading-box {
    width: min(720px, 100%);
    border: 1px solid var(--line);
    background: #1a1a1a;

    padding: 18px;
  }

    justify-content: space-between;

    background: #332b16;
    padding: 4px 10px;
    white-space: nowrap;
  }

    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .meta-box {
    border: 1px solid var(--line-dark);
    background: #101010;
    padding: 8px;
  }

  .efficiency-meter {
    height: 8px;
    border: 1px solid var(--line);
    background: #080808;
    margin-top: 6px;
  }

  .question-choice {
    display: block;
    border: 1px solid var(--line-dark);
    background: #101010;
    padding: 10px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .question-choice.selected {
    border-color: var(--accent);
  }

  .question-choice.answer-correct {
    border-color: var(--ok);
    background: rgba(95, 155, 110, 0.22);
  }

  .question-choice.answer-wrong {
    border-color: var(--danger);
    background: rgba(185, 74, 72, 0.22);
  }

  .spinner {
    width: 42px;
    height: 42px;
    border: 3px solid #565656;
    border-top-color: #d0d0d0;
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 900ms linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .question-form-shell {
    width: min(980px, 100%);
    margin: 0 auto;
    padding: 24px;
  }

  .question-item {
    border-top: 1px solid var(--line-dark);
    padding: 12px 0;
  }

      padding: 12px;
    }

    .battle-bottom,
    .form-grid,
    .choice-grid,
    .modal-meta-grid {
      grid-template-columns: 1fr;
    }

    .intent-box {
      position: static;
      margin: 10px auto 0;
      width: min(240px, 100%);
    }

    .intro-logo {
      font-size: 26px;
      min-height: 130px;
    }

  .screen {
    display: none;
  }

  .screen.active {
    display: block;
  }

  .intro-screen.screen.active,
  .menu-shell.screen.active {
    display: grid;
  }

  @media (max-width: 760px) {
    .battle-topbar {
      align-items: stretch;
      flex-direction: column;
    }

    .battle-topbar .inline-actions button {
      flex: 1 1 130px;
    }
  }

  .battle-video-shell {
    position: relative;
    min-height: 100vh;
    display: block;
    overflow: hidden;
    padding: 0;
    background: #060606;
  }

  .battle-scene {
    position: absolute;
    inset: 0;
    overflow: hidden;
    background: #050505;
  }

  .battle-background-video,
  .battle-background-fallback {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .battle-background-fallback {
    background:
      radial-gradient(circle at 50% 38%, rgba(120, 120, 120, 0.16), transparent 28%),
      linear-gradient(to bottom, #181818 0%, #101010 58%, #050505 100%);

  .battle-scene::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(to bottom, rgba(0, 0, 0, 0.18), transparent 42%, rgba(0, 0, 0, 0.68)),
      radial-gradient(circle at center, transparent 42%, rgba(0, 0, 0, 0.38));
  }

  .monster-layer {
    position: absolute;
    left: 50%;
    top: 15vh;
    z-index: 2;
    width: min(760px, 92vw);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(10px, 3vw, 34px);
    transform: translateX(-50%);
  }

  .monster-slot {
    position: relative;
    width: min(190px, 28vw);
    min-width: 92px;
    display: grid;
    justify-items: center;
    gap: 4px;

    font-size: 12px;
    color: #e8e8e8;
    text-shadow: 0 1px 3px #000;
  }

  .monster-hp-bar {

    height: 7px;
    border-color: #ddd;
    background: #120000;
  }

  .monster-hp-bar > span,
  .thin-hp-bar > span {
    background: #b30000;
  }

  .monster-status-row {
    justify-content: center;
    min-height: 0;
    margin: 2px 0 0;
    flex-wrap: wrap;
  }

  .monster-status-row .status-icon {
    width: 20px;
    height: 20px;
    font-size: 11px;
  }

  .monster-status-row .buff {
    border-color: #d8d8d8;
  }

  .monster-status-row .debuff {
    border-color: #8d2f2f;
  }

  .compact-monster {
    width: min(150px, 24vw);
    max-width: 150px;
    border-color: rgba(220, 220, 220, 0.72);
    background:
      radial-gradient(circle at 50% 34%, #333, #171717 62%, #090909);
  }

  .monster-slot-2 .compact-monster,
  .monster-slot-3 .compact-monster {
    width: min(132px, 22vw);
  }

  .battle-hud {
    position: absolute;
    left: 50%;
    bottom: 12px;
    z-index: 4;
    width: min(860px, calc(100vw - 24px));
    display: grid;
    grid-template-columns: minmax(180px, 1fr) auto minmax(220px, 0.8fr);
    gap: 8px;
    align-items: end;
    transform: translateX(-50%);
  }

  .battle-log-compact,
  .compact-actions,
  .player-compact-panel {
    border: 1px solid rgba(180, 180, 180, 0.68);
    background: rgba(10, 10, 10, 0.78);
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.78);
    padding: 8px;
  }

  .battle-log-compact {
    min-height: 54px;
  }

  .battle-log-compact .battle-log {
    min-height: auto;
    font-size: 14px;
    line-height: 1.45;
  }

  .compact-actions {
    display: grid;
    grid-template-columns: repeat(2, minmax(72px, 1fr));
    gap: 6px;

  .compact-actions button {
    min-height: 34px;
    padding: 6px 10px;
  }

    position: relative;
    min-height: 52px;
  }

  .player-hp-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    align-items: center;
    font-size: 13px;
  }

  .player-hp-track {
    position: relative;
    height: 12px;
    border: 1px solid #d8d8d8;
    background: #130000;
    overflow: hidden;
  }

  .player-hp-fill,
  .player-shield-fill {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    display: block;
  }

  .player-hp-fill {
    background: #b30000;
  }

  .player-shield-fill {
    background: #f3f3f3;
  }

  .player-damage-anchor {
    position: absolute;
    left: 50%;
    top: 0;
    width: 1px;
    height: 1px;
  }

  .battle-debug-controls {

    right: 10px;
    top: 10px;
    z-index: 5;
    display: none;
    gap: 4px;
    opacity: 0.42;
  }

  .battle-debug-controls.active {
    display: flex;
  }

  .battle-debug-controls:hover {
    opacity: 1;
  }

  .battle-debug-controls button {
    min-height: 28px;
    padding: 4px 8px;
    font-size: 12px;
  }

  .floating-layer,
  .screen-damage-flash {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
  }

  .screen-damage-flash {
    z-index: 3;
    opacity: 0;
    background: rgba(180, 0, 0, 0.34);
  }

  .floating-damage {
    position: absolute;
    font-weight: 700;
    font-size: 22px;
    text-shadow: 0 2px 4px #000;
    transform: translate(-50%, 0);
    animation: floatDamage 1050ms ease-out forwards;
  }

  .damage-white {
    color: #fff;
  }

  .damage-red {
    color: #d00000;
  }

  .monster-hit {
    animation: monsterHit 420ms ease-out;
  }

  .player-hit {
    animation: playerShake 420ms ease-out;
  }

  .player-hit .screen-damage-flash {
    animation: redFlash 420ms ease-out;
  }

  @keyframes monsterHit {
    0% { filter: brightness(1); transform: translateX(0); }
    18% { filter: brightness(3); transform: translateX(-7px); }
    36% { transform: translateX(7px); }
    54% { transform: translateX(-4px); }
    72% { transform: translateX(3px); }
    100% { filter: brightness(1); transform: translateX(0); }
  }

  @keyframes playerShake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(8px, -2px); }
    40% { transform: translate(-7px, 2px); }
    60% { transform: translate(5px, 1px); }
    80% { transform: translate(-3px, -1px); }
  }

  @keyframes redFlash {
    0% { opacity: 0; }
    18% { opacity: 1; }
    100% { opacity: 0; }
  }

  @keyframes floatDamage {
    0% { opacity: 0; transform: translate(-50%, 8px); }
    16% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -52px); }
  }

  .reward-choice-grid {

    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 14px;
  }

    align-content: center;
    gap: 8px;
    text-align: left;
  }

    font-size: 13px;
  }

    }

    .compact-actions {
      grid-row: 2;
    }

    .reward-choice-grid {
      grid-template-columns: 1fr;
    }
  }
