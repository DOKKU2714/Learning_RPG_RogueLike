  <base target="_top">

  <style>
    .question-batch {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .question-card-form {
      border: 1px solid var(--line);
      background: rgba(15, 15, 15, 0.78);
      padding: 14px;
    }

    .question-card-top,
    .question-item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .question-item-top strong {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .type-radio-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .type-radio-row label {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: var(--accent);
      font-size: 14px;
      line-height: 1.2;
      margin: 0;
    }

    .type-radio-row input[type="radio"] {
      width: 14px;
      height: 14px;
      margin: 0;
    }

    .choice-answer-grid {
      display: grid;
      gap: 8px;
    }

    .choice-answer-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      color: var(--text);
    }

    .choice-answer-row input[type="radio"] {
      width: 16px;
      height: 16px;
      margin: 0;
    }

    .field-limit-hint {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .workbook-current-badge {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      color: var(--accent);
      background: rgba(8, 8, 8, 0.45);
    }

    .remove-question,
    .edit-my-question,
    .delete-my-question {
      min-height: 32px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .question-item-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .question-import-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: end;
      margin-top: 12px;
    }

    .question-import-row input[type="file"] {
      min-height: 42px;
      border: 1px solid var(--line);
      background: rgba(8, 8, 8, 0.52);
      color: var(--text);
      padding: 8px;
    }

    .registration-option {
      position: relative;
      border-color: rgba(217, 166, 66, 0.5);
    }

    .registration-option-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .registration-option-label {
      display: inline-block;
      margin-bottom: 7px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .registration-option-description {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .registration-option-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .registration-option-divider::before,
    .registration-option-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .import-preview {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .import-preview-list {
      margin: 6px 0 0;
      padding-left: 20px;
    }

    @media (max-width: 720px) {
      .question-import-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

      <div class="inline-actions" style="justify-content:space-between;">

        <button class="secondary" onclick="loadMyQuestions(true)">목록 새로고침</button>

  <?!= include_('UiLoadingModal'); ?>

  <script>
    var WEB_APP_URL = '<?= getWebAppUrl_() ?>';
    var formSeq = 0;
    var editingQuestionId = '';
    var myQuestionsCache = [];
    var SELECTED_WORKBOOK_ID_KEY = 'learningRpgSelectedWorkbookId';
    var SELECTED_WORKBOOK_NAME_KEY = 'learningRpgSelectedWorkbookName';
    var selectedWorkbookId = '';
    var selectedWorkbookName = '';
    var lastImportRows = null;
    var lastImportFileSignature = '';
    var QUESTION_LIMITS = {
      prompt: 200,
      choice: 60,
      answer: 80,
      answerAliases: 200,
      explanation: 300,
      subject: 40,
      unit: 40,
      tags: 80,
    };

    function init() {
      restoreSelectedWorkbook();
      resetQuestionForms();
      var cachedState = getCachedCurrentState();
      if (cachedState && cachedState.isRegistered) {
        renderUserState(cachedState);
        if (hasSelectedWorkbook()) {
          loadMyQuestions(false);
        }
        return;
      }

      showLoadingModal('로딩 중...', '문제 작성 화면을 준비하는 중...');
      google.script.run
        .withSuccessHandler(function(state) {
          hideLoadingModal();
          cacheCurrentState(state);
          renderUserState(state);
          if (state.isRegistered && hasSelectedWorkbook()) {
            loadMyQuestions(false);
          }
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          showError(error);
        })
        .getCurrentUser(getAuthToken());
    }

    function renderUserState(state) {
      syncSelectedWorkbookFromState(state);
      var unlocked = !!(state.isRegistered && hasSelectedWorkbook());
      document.getElementById('userSummary').textContent = state.isRegistered && state.player
        ? state.player.displayName + '의 문제를 등록할 수 있습니다.'
        : '로그인 정보가 없습니다.';
      renderCurrentWorkbookBadge();
      document.getElementById('formPanel').classList.toggle('hidden', !unlocked);
      document.getElementById('importPanel').classList.toggle('hidden', !unlocked);
      document.getElementById('manualEntryDivider').classList.toggle('hidden', !unlocked);
      document.getElementById('lockedPanel').classList.toggle('hidden', unlocked);
      if (state.isRegistered && !hasSelectedWorkbook()) {
        var lockedMessage = document.getElementById('lockedMessage');
        lockedMessage.textContent = '문제를 만들려면 메인 화면에서 문제집을 먼저 선택해 주세요.';
        lockedMessage.className = 'message error';
      }
    }

    function restoreSelectedWorkbook() {
      try {
        selectedWorkbookId = sessionStorage.getItem(SELECTED_WORKBOOK_ID_KEY) || '';
        selectedWorkbookName = sessionStorage.getItem(SELECTED_WORKBOOK_NAME_KEY) || '';
      } catch (error) {
        selectedWorkbookId = '';
        selectedWorkbookName = '';
      }
    }

    function syncSelectedWorkbookFromState(state) {
      restoreSelectedWorkbook();
      var workbook = state && state.selectedWorkbook || null;
      if (!selectedWorkbookId && workbook && workbook.workbookId) {
        selectedWorkbookId = String(workbook.workbookId || '').trim();
        selectedWorkbookName = String(workbook.workbookName || '').trim();
      }
      if (!selectedWorkbookName && state && state.activeWorkbooks && selectedWorkbookId) {
        var match = state.activeWorkbooks.filter(function(item) {
          return String(item.workbookId || '').trim() === selectedWorkbookId;
        })[0];
        selectedWorkbookName = match ? String(match.workbookName || '').trim() : selectedWorkbookName;
      }
    }

    function hasSelectedWorkbook() {
      return !!String(selectedWorkbookId || '').trim();
    }

    function requireSelectedWorkbookForQuestionAction() {
      restoreSelectedWorkbook();
      if (hasSelectedWorkbook()) {
        return true;
      }
      setFormMessage('문제집을 먼저 선택해 주세요.', 'error');
      showError({ message: '문제집을 먼저 선택해 주세요.' });
      return false;
    }

    function renderCurrentWorkbookBadge() {
      var badge = document.getElementById('currentWorkbookBadge');
      if (!badge) return;
      if (!hasSelectedWorkbook()) {
        badge.classList.add('hidden');
        badge.textContent = '';
        return;
      }
      badge.classList.remove('hidden');
      badge.textContent = '현재 문제집: ' + (selectedWorkbookName || selectedWorkbookId);
    }

    function addQuestionForm() {
      formSeq += 1;
      var id = 'questionForm-' + formSeq;
      var container = document.getElementById('questionForms');
      var card = document.createElement('article');
      card.className = 'question-card-form';
      card.id = id;
      card.innerHTML = renderQuestionFormHtml(id, formSeq, null);
      container.appendChild(card);
      updateChoiceVisibility(id);
    }

    function renderQuestionFormHtml(id, index, question) {
      question = question || {};
      var type = question.type === 'shortAnswer' ? 'shortAnswer' : 'multipleChoice';
      var isShortAnswer = type === 'shortAnswer';
      var choices = [question.choice1 || '', question.choice2 || '', question.choice3 || '', question.choice4 || ''];
      var answerIndex = normalizeMultipleChoiceAnswer(question.answer);
      return '' +
        '<div class="question-card-top">' +
          '<strong>문제 ' + index + '</strong>' +
          '<button class="secondary remove-question" onclick="removeQuestionForm(\'' + id + '\')">삭제</button>' +
        '</div>' +
        '<div class="type-radio-row">' +
          '<span class="muted">문제 유형</span>' +
          '<label><input type="radio" name="' + id + '-type" value="multipleChoice"' + (!isShortAnswer ? ' checked' : '') + ' onchange="updateChoiceVisibility(\'' + id + '\')"> 객관식</label>' +
          '<label><input type="radio" name="' + id + '-type" value="shortAnswer"' + (isShortAnswer ? ' checked' : '') + ' onchange="updateChoiceVisibility(\'' + id + '\')"> 주관식</label>' +
        '</div>' +
        '<div style="margin-top:12px;">' +
          '<label>문제 내용</label>' +
          '<textarea data-field="prompt" maxlength="' + QUESTION_LIMITS.prompt + '" placeholder="친구가 풀 문제를 입력하세요.">' + escapeHtml(question.prompt || '') + '</textarea>' +
          '<span class="field-limit-hint">최대 ' + QUESTION_LIMITS.prompt + '자</span>' +
        '</div>' +
        '<div data-area="choices" style="margin-top:12px;">' +
          '<label>객관식 보기 4개</label>' +
          '<div class="choice-answer-grid">' +
            renderChoiceAnswerRowHtml(id, 1, choices[0], answerIndex) +
            renderChoiceAnswerRowHtml(id, 2, choices[1], answerIndex) +
            renderChoiceAnswerRowHtml(id, 3, choices[2], answerIndex) +
            renderChoiceAnswerRowHtml(id, 4, choices[3], answerIndex) +
          '</div>' +
        '</div>' +
        '<div class="form-grid" style="margin-top:12px;">' +
          '<div data-area="shortAnswer"><label>정답</label><input data-field="answer" maxlength="' + QUESTION_LIMITS.answer + '" placeholder="주관식 정답 텍스트" value="' + escapeHtml(question.answer || '') + '"><span class="field-limit-hint">최대 ' + QUESTION_LIMITS.answer + '자</span></div>' +
          '<div data-area="aliases"><label>복수 정답 / 별칭</label><input data-field="answerAliases" maxlength="' + QUESTION_LIMITS.answerAliases + '" placeholder="쉼표 또는 줄바꿈으로 구분" value="' + escapeHtml(answerAliasesText(question)) + '"><span class="field-limit-hint">최대 ' + QUESTION_LIMITS.answerAliases + '자</span></div>' +
          '<div><label>과목</label><input data-field="subject" maxlength="' + QUESTION_LIMITS.subject + '" placeholder="예: 사회" value="' + escapeHtml(question.subject || '') + '"><span class="field-limit-hint">최대 ' + QUESTION_LIMITS.subject + '자</span></div>' +
          '<div><label>단원</label><input data-field="unit" maxlength="' + QUESTION_LIMITS.unit + '" placeholder="예: 조선 전기" value="' + escapeHtml(question.unit || '') + '"><span class="field-limit-hint">최대 ' + QUESTION_LIMITS.unit + '자</span></div>' +
          '<div><label>희망 난이도</label>' + difficultySelectHtml('data-field="difficulty"', question.difficulty || 1) + '</div>' +
          '<div style="grid-column:1 / -1;"><label>태그</label><input data-field="tags" maxlength="' + QUESTION_LIMITS.tags + '" placeholder="쉼표로 구분" value="' + escapeHtml(question.tags || '') + '"><span class="field-limit-hint">최대 ' + QUESTION_LIMITS.tags + '자</span></div>' +
        '</div>' +
        '<div style="margin-top:12px;">' +
          '<label>해설</label>' +
          '<textarea data-field="explanation" maxlength="' + QUESTION_LIMITS.explanation + '" placeholder="선택 사항">' + escapeHtml(question.explanation || '') + '</textarea>' +
          '<span class="field-limit-hint">최대 ' + QUESTION_LIMITS.explanation + '자</span>' +
        '</div>';
    }

    function renderChoiceAnswerRowHtml(id, index, value, answerIndex) {
      return '<div class="choice-answer-row">' +
        '<input type="radio" name="' + id + '-answer" value="' + index + '"' + (Number(answerIndex || 1) === index ? ' checked' : '') + ' aria-label="' + index + '번 선택지를 정답으로 지정">' +
        '<input data-field="choice' + index + '" maxlength="' + QUESTION_LIMITS.choice + '" placeholder="선택지 ' + index + ' (최대 ' + QUESTION_LIMITS.choice + '자)" value="' + escapeHtml(value || '') + '">' +
      '</div>';
    }

    function normalizeMultipleChoiceAnswer(answer) {
      var numberValue = Number(answer || 1);
      return numberValue >= 1 && numberValue <= 4 ? numberValue : 1;
    }

    function updateChoiceVisibility(id) {
      var card = document.getElementById(id);
      if (!card) return;
      var type = getQuestionType(card);
      card.querySelector('[data-area="choices"]').classList.toggle('hidden', type === 'shortAnswer');
      var shortAnswer = card.querySelector('[data-area="shortAnswer"]');
      if (shortAnswer) {
        shortAnswer.classList.toggle('hidden', type === 'multipleChoice');
      }
      var aliases = card.querySelector('[data-area="aliases"]');
      if (aliases) {
        aliases.classList.toggle('hidden', type === 'multipleChoice');
        if (type === 'multipleChoice') {
          var aliasesInput = aliases.querySelector('[data-field="answerAliases"]');
          if (aliasesInput) aliasesInput.value = '';
        }
      }
    }

    function removeQuestionForm(id) {
      var forms = document.querySelectorAll('.question-card-form');
      if (forms.length <= 1) {
        setFormMessage('최소 1개의 입력란이 필요합니다.', 'error');
        return;
      }
      var card = document.getElementById(id);
      if (card) card.remove();
    }

    function resetQuestionForms() {
      editingQuestionId = '';
      formSeq = 0;
      document.getElementById('questionForms').innerHTML = '';
      addQuestionForm();
      setEditingMode(false);
      setFormMessage('', '');
    }

    function submitQuestions() {
      if (!requireSelectedWorkbookForQuestionAction()) {
        return;
      }
      var payloads = Array.prototype.map.call(document.querySelectorAll('.question-card-form'), readQuestionPayload);
      setFormMessage('저장 중입니다.', 'ok');
      if (editingQuestionId) {
        showLoadingModal('수정 중...', '내가 만든 문제를 수정하는 중...');
        google.script.run
          .withSuccessHandler(function() {
            hideLoadingModal();
            syncCurrentStateAfterQuestionChange();
            setFormMessage('문제를 수정했습니다.', 'ok');
            resetQuestionForms();
            loadMyQuestions(true);
          })
          .withFailureHandler(function(error) {
            hideLoadingModal();
            setFormMessage(error.message, 'error');
          })
          .updateQuestion(editingQuestionId, payloads[0], getAuthToken(), selectedWorkbookId);
        return;
      }

      showLoadingModal('저장 중...', '문제를 바로 등록하는 중...');
      google.script.run
        .withSuccessHandler(function() {
          hideLoadingModal();
          syncCurrentStateAfterQuestionChange();
          setFormMessage('문제를 등록했습니다.', 'ok');
          resetQuestionForms();
          loadMyQuestions(true);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setFormMessage(error.message, 'error');
        })
        .createQuestions(payloads, getAuthToken(), selectedWorkbookId);
    }

    function previewImportFile() {
      var file = getQuestionImportFile();
      var preview = document.getElementById('importPreview');
      lastImportRows = null;
      lastImportFileSignature = '';
      setImportMessage('', '');
      if (!file) {
        preview.textContent = '';
        return;
      }
      preview.textContent = file.name + ' / ' + Math.ceil(file.size / 1024) + 'KB / 확인 중...';
      readQuestionImportRows(file, function(rows) {
        lastImportRows = rows;
        lastImportFileSignature = getImportFileSignature(file);
        renderImportPreview(file, rows);
      }, function(message) {
        lastImportRows = null;
        lastImportFileSignature = '';
        preview.textContent = file.name + ' / ' + Math.ceil(file.size / 1024) + 'KB';
        setImportMessage(message, 'error');
      });
    }

    function importQuestionFile() {
      if (!requireSelectedWorkbookForQuestionAction()) {
        return;
      }
      var file = getQuestionImportFile();
      if (!file) {
        setImportMessage('등록할 파일을 선택하세요.', 'error');
        return;
      }
      var cachedRows = lastImportFileSignature === getImportFileSignature(file) ? lastImportRows : null;
      setImportMessage(cachedRows ? cachedRows.length + '개 문제를 등록하는 중입니다.' : '파일을 읽는 중입니다.', 'ok');
      showLoadingModal(cachedRows ? '등록 중...' : '파일 읽는 중...', cachedRows ? '문제를 저장하는 중...' : '문제 데이터를 확인하는 중...');
      function submitImportRows(rows) {
        if (!rows.length) {
          hideLoadingModal();
          setImportMessage('가져올 문제가 없습니다.', 'error');
          return;
        }
        setImportMessage(rows.length + '개 문제를 등록하는 중입니다.', 'ok');
        google.script.run
          .withSuccessHandler(function(created) {
            hideLoadingModal();
            syncCurrentStateAfterQuestionChange();
            var count = created && created.length ? created.length : rows.length;
            setImportMessage(count + '개 문제를 등록했습니다.', 'ok');
            document.getElementById('questionImportFile').value = '';
            document.getElementById('importPreview').textContent = '';
            loadMyQuestions(true);
          })
          .withFailureHandler(function(error) {
            hideLoadingModal();
            setImportMessage(error.message, 'error');
          })
          .importQuestionsFromRows(rows, getAuthToken(), selectedWorkbookId);
      }
      if (cachedRows) {
        submitImportRows(cachedRows);
        return;
      }
      readQuestionImportRows(file, submitImportRows, function(message) {
        hideLoadingModal();
        setImportMessage(message, 'error');
      });
    }

    function getQuestionImportFile() {
      var input = document.getElementById('questionImportFile');
      return input && input.files && input.files[0] ? input.files[0] : null;
    }

    function downloadQuestionImportTemplate() {
      var headers = ['유형', '문제', '보기1', '보기2', '보기3', '보기4', '정답', '복수 정답', '해설', '난이도', '과목', '단원', '태그'];
      var rows = [
        headers,
        ['객관식', '다음 중 조선의 건국 연도는?', '1392', '1443', '1592', '1919', '1', '', '조선은 1392년에 건국되었습니다.', '1', '역사', '조선 전기', '조선,건국'],
        ['주관식', '훈민정음을 창제한 왕은?', '', '', '', '', '세종대왕', '세종, 세종 왕', '훈민정음은 세종대왕이 창제했습니다.', '1', '역사', '조선 전기', '훈민정음'],
      ];
      if (typeof XLSX !== 'undefined') {
        var worksheet = XLSX.utils.aoa_to_sheet(rows);
        var workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, 'Questions');
        XLSX.writeFile(workbook, 'question_import_template.xlsx');
        return;
      }
      downloadTextFile('question_import_template.csv', rows.map(function(row) {
        return row.map(escapeCsvCell).join(',');
      }).join('\n'));
    }

    function escapeCsvCell(value) {
      var text = String(value == null ? '' : value);
      return /[",\r\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
    }

    function downloadTextFile(filename, text) {
      var blob = new Blob([String(text || '')], { type: 'text/csv;charset=utf-8' });
      var url = URL.createObjectURL(blob);
      var link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function getImportFileSignature(file) {
      return file ? [file.name, file.size, file.lastModified].join(':') : '';
    }

    function renderImportPreview(file, rows) {
      var preview = document.getElementById('importPreview');
      rows = rows || [];
      if (!rows.length) {
        preview.innerHTML = escapeHtml(file.name) + ' / ' + Math.ceil(file.size / 1024) + 'KB<br>가져올 문제가 없습니다.';
        return;
      }
      var headers = getImportPreviewHeaders(rows);
      var sampleRows = rows.slice(0, 3).map(function(row, index) {
        return '<li>' + escapeHtml((index + 1) + '. ' + getImportPreviewRowText(row)) + '</li>';
      }).join('');
      preview.innerHTML =
        '<strong>' + escapeHtml(file.name) + '</strong> / ' + Math.ceil(file.size / 1024) + 'KB<br>' +
        '인식된 문제: ' + rows.length + '개<br>' +
        (headers.length ? '헤더: ' + escapeHtml(headers.join(', ')) + '<br>' : '') +
        '<ol class="import-preview-list">' + sampleRows + '</ol>';
    }

    function getImportPreviewHeaders(rows) {
      var first = rows && rows[0] || {};
      return Object.keys(first).filter(function(key) {
        return String(key || '').trim();
      });
    }

    function getImportPreviewRowText(row) {
      var keys = ['문제', '문제 내용', '질문', 'prompt', 'question', 'problem'];
      for (var i = 0; i < keys.length; i += 1) {
        var value = row && row[keys[i]];
        if (String(value || '').trim()) {
          return String(value).trim();
        }
      }
      return Object.keys(row || {}).map(function(key) {
        return String(row[key] || '').trim();
      }).filter(Boolean).slice(0, 3).join(' / ') || '내용 없음';
    }

    function readQuestionImportRows(file, onSuccess, onFailure) {
      var extension = getFileExtension(file.name);
      if (extension === 'csv' || extension === 'tsv') {
        readTextFile(file, function(text) {
          try {
            onSuccess(tableArrayToObjects(parseDelimitedText(text, extension === 'tsv' ? '\t' : ',')));
          } catch (error) {
            onFailure(error.message);
          }
        }, onFailure);
        return;
      }
      if (typeof XLSX === 'undefined') {
        onFailure('엑셀 파서가 아직 로드되지 않았습니다. 잠시 후 다시 시도하거나 CSV 파일을 사용해 주세요.');
        return;
      }
      var reader = new FileReader();
      reader.onload = function(event) {
        try {
          var workbook = XLSX.read(new Uint8Array(event.target.result), { type: 'array' });
          var firstSheetName = workbook.SheetNames[0];
          if (!firstSheetName) {
            throw new Error('첫 번째 시트를 찾을 수 없습니다.');
          }
          var table = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName], {
            header: 1,
            defval: '',
            raw: false,
          });
          onSuccess(tableArrayToObjects(table));
        } catch (error) {
          onFailure(error.message);
        }
      };
      reader.onerror = function() {
        onFailure('파일을 읽지 못했습니다.');
      };
      reader.readAsArrayBuffer(file);
    }

    function readTextFile(file, onSuccess, onFailure) {
      var reader = new FileReader();
      reader.onload = function(event) {
        onSuccess(String(event.target.result || ''));
      };
      reader.onerror = function() {
        onFailure('파일을 읽지 못했습니다.');
      };
      reader.readAsText(file, 'UTF-8');
    }

    function tableArrayToObjects(table) {
      table = (table || []).filter(function(row) {
        return (row || []).some(function(cell) {
          return String(cell || '').trim() !== '';
        });
      });
      if (table.length < 2) {
        return [];
      }
      var headers = table[0].map(function(header) {
        return String(header || '').trim();
      });
      return table.slice(1).map(function(row) {
        return headers.reduce(function(object, header, index) {
          if (header) {
            object[header] = row[index] === undefined || row[index] === null ? '' : String(row[index]).trim();
          }
          return object;
        }, {});
      }).filter(function(object) {
        return Object.keys(object).some(function(key) {
          return String(object[key] || '').trim() !== '';
        });
      });
    }

    function parseDelimitedText(text, delimiter) {
      var rows = [];
      var row = [];
      var cell = '';
      var inQuotes = false;
      var source = String(text || '').replace(/^\uFEFF/, '');
      for (var i = 0; i < source.length; i += 1) {
        var char = source.charAt(i);
        var next = source.charAt(i + 1);
        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === delimiter && !inQuotes) {
          row.push(cell);
          cell = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') {
            i += 1;
          }
          row.push(cell);
          rows.push(row);
          row = [];
          cell = '';
        } else {
          cell += char;
        }
      }
      row.push(cell);
      rows.push(row);
      return rows;
    }

    function getFileExtension(filename) {
      var parts = String(filename || '').toLowerCase().split('.');
      return parts.length > 1 ? parts.pop() : '';
    }

    function readQuestionPayload(card) {
      var type = getQuestionType(card);
      return {
        type: type,
        prompt: valueOf(card, 'prompt'),
        choices: [valueOf(card, 'choice1'), valueOf(card, 'choice2'), valueOf(card, 'choice3'), valueOf(card, 'choice4')],
        answer: type === 'multipleChoice' ? selectedMultipleChoiceAnswer(card) : valueOf(card, 'answer'),
        answerAliases: type === 'multipleChoice' ? '' : valueOf(card, 'answerAliases'),
        explanation: valueOf(card, 'explanation'),
        subject: valueOf(card, 'subject'),
        unit: valueOf(card, 'unit'),
        tags: valueOf(card, 'tags'),
        difficulty: valueOf(card, 'difficulty') || '1',
      };
    }

    function selectedMultipleChoiceAnswer(card) {
      var checked = card.querySelector('input[name="' + card.id + '-answer"]:checked');
      return checked ? checked.value : '';
    }

    function difficultySelectHtml(attributes, selectedValue) {
      var options = [];
      var selected = Math.max(1, Math.min(5, Number(selectedValue || 1)));
      for (var i = 1; i <= 5; i += 1) {
        options.push('<option value="' + i + '"' + (i === selected ? ' selected' : '') + '>' + difficultyStarsText(i) + '</option>');
      }
      return '<select class="difficulty-select" ' + (attributes || '') + '>' + options.join('') + '</select>';
    }

    function difficultyStarsText(value) {
      var count = Math.max(1, Math.min(5, Number(value || 1)));
      var text = '';
      for (var i = 0; i < count; i += 1) {
        text += '&#9733;';
      }
      return text;
    }

    function renderDifficultyStars(value) {
      var count = Math.max(1, Math.min(5, Number(value || 1)));
      var stars = '';
      for (var i = 0; i < count; i += 1) {
        stars += '<span class="difficulty-star">&#9733;</span>';
      }
      return '<span class="difficulty-stars" aria-label="난이도 ' + count + '">' + stars + '</span>';
    }

    function getQuestionType(card) {
      var checked = card.querySelector('input[type="radio"]:checked');
      return checked ? checked.value : 'multipleChoice';
    }

    function valueOf(card, field) {
      var input = card.querySelector('[data-field="' + field + '"]');
      return input ? input.value.trim() : '';
    }

    function loadMyQuestions(force) {
      if (!requireSelectedWorkbookForQuestionAction()) {
        renderMyQuestions([]);
        return;
      }
      if (!force) {
        var cached = getCachedMyQuestions();
        if (cached) {
          renderMyQuestions(cached);
          return;
        }
      }
      google.script.run
        .withSuccessHandler(function(questions) {
          cacheMyQuestions(questions);
          renderMyQuestions(questions);
        })
        .withFailureHandler(showError)
        .getMyQuestions(getAuthToken(), selectedWorkbookId);
    }

    function renderMyQuestions(questions) {
      questions = questions || [];
      myQuestionsCache = questions.slice();
      document.getElementById('questionCount').textContent = questions.length + '개 생성';
      var container = document.getElementById('myQuestions');
      if (!questions.length) {
        container.innerHTML = '<p class="muted">아직 만든 문제가 없습니다.</p>';
        return;
      }

      container.innerHTML = questions.map(function(question) {
        var questionId = String(question.questionId || '');
        return '<article class="question-item">' +
          '<div class="question-item-top">' +
            '<strong>' + escapeHtml(question.prompt) + '</strong>' +
            '<div class="question-item-actions">' +
              '<button class="secondary edit-my-question" type="button" onclick="startEditQuestion(\'' + escapeJsString(questionId) + '\')">수정</button>' +
              '<button class="danger delete-my-question" type="button" onclick="deleteMyQuestion(\'' + escapeJsString(questionId) + '\')">삭제</button>' +
            '</div>' +
          '</div>' +
          '<p class="muted">' + escapeHtml(typeLabel(question.type)) + ' | ' + escapeHtml(statusLabel(question.status)) + ' | ' + renderDifficultyStars(question.difficulty || 1) + '</p>' +
          '<p class="muted">좋아요 ' + Number(question.likeCount || 0) + ' | 싫어요 ' + Number(question.dislikeCount || 0) + '</p>' +
          '<p>정답: ' + escapeHtml(question.answer) + '</p>' +
        '</article>';
      }).join('');
    }

    function startEditQuestion(questionId) {
      var question = myQuestionsCache.filter(function(item) {
        return String(item.questionId || '') === String(questionId || '');
      })[0] || null;
      if (!question) {
        setFormMessage('수정할 문제를 찾을 수 없습니다. 목록을 새로고침해 주세요.', 'error');
        return;
      }

      editingQuestionId = questionId;
      formSeq = 1;
      var id = 'questionForm-edit';
      var container = document.getElementById('questionForms');
      container.innerHTML = '';
      var card = document.createElement('article');
      card.className = 'question-card-form';
      card.id = id;
      card.innerHTML = renderQuestionFormHtml(id, 1, question);
      container.appendChild(card);
      updateChoiceVisibility(id);
      setEditingMode(true);
      setFormMessage('수정할 내용을 바꾼 뒤 저장하세요.', 'ok');
      document.getElementById('formPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function setEditingMode(isEditing) {
      document.getElementById('formTitle').textContent = isEditing ? '문제 수정' : '문제 입력';
      document.getElementById('addQuestionButton').classList.toggle('hidden', isEditing);
      document.getElementById('resetQuestionButton').textContent = isEditing ? '수정 취소' : '전체 초기화';
      document.getElementById('submitQuestionButton').textContent = isEditing ? '수정 저장' : '저장';
      Array.prototype.forEach.call(document.querySelectorAll('.remove-question'), function(button) {
        button.classList.toggle('hidden', isEditing);
      });
    }

    function answerAliasesText(question) {
      var value = question && question.answerAliases;
      if (!value) return '';
      if (Array.isArray(value)) return value.join(', ');
      try {
        var parsed = JSON.parse(value);
        if (Array.isArray(parsed)) return parsed.join(', ');
      } catch (error) {}
      return String(value || '');
    }

    function deleteMyQuestion(questionId) {
      if (!questionId) {
        setFormMessage('삭제할 문제를 찾을 수 없습니다.', 'error');
        return;
      }
      if (!window.confirm('이 문제를 삭제할까요? 삭제하면 되돌릴 수 없습니다.')) {
        return;
      }
      setFormMessage('문제를 삭제하는 중입니다.', 'ok');
      showLoadingModal('삭제 중...', '내가 만든 문제를 삭제하는 중...');
      google.script.run
        .withSuccessHandler(function() {
          hideLoadingModal();
          syncCurrentStateAfterQuestionChange();
          setFormMessage('문제를 삭제했습니다.', 'ok');
          loadMyQuestions(true);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setFormMessage(error.message, 'error');
        })
        .deleteQuestion(questionId, getAuthToken(), selectedWorkbookId);
    }

    function typeLabel(type) {
      return type === 'shortAnswer' ? '주관식' : '객관식';
    }

    function statusLabel(status) {
      if (status === 'approved') return '승인됨';
      if (status === 'rejected') return '반려됨';
      return '승인 대기';
    }

    function setFormMessage(message, type) {
      var element = document.getElementById('formMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function setImportMessage(message, type) {
      var element = document.getElementById('importMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function showError(error) {
      var message = error && error.message ? error.message : String(error);
      setFormMessage(message, 'error');
      document.getElementById('lockedPanel').classList.remove('hidden');
      var lockedMessage = document.getElementById('lockedMessage');
      lockedMessage.textContent = message;
      lockedMessage.className = 'message error';
    }

    function goHome() {
      showLoadingModal('메인 화면으로 이동 중...', '잠시만 기다려 주세요.');
      navigateTop(WEB_APP_URL + '?skipIntro=1');
    }

    function navigateTop(url) {
      var link = document.createElement('a');
      link.href = url;
      link.target = '_top';
      link.rel = 'noopener';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function getAuthToken() {
      return sessionStorage.getItem('learningRpgAuthToken') || '';
    }

    function syncCurrentStateAfterQuestionChange() {
      invalidateCurrentStateCache();
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        return;
      }
      google.script.run
        .withSuccessHandler(cacheCurrentState)
        .withFailureHandler(function() {})
        .getCurrentUser(getAuthToken());
    }

    function invalidateCurrentStateCache() {
      try {
        sessionStorage.removeItem('learningRpgCurrentState');
      } catch (error) {
        // Ignore storage failures.
      }
    }

    function getCachedCurrentState() {
      try {
        return JSON.parse(sessionStorage.getItem('learningRpgCurrentState') || 'null');
      } catch (error) {
        return null;
      }
    }

    function cacheCurrentState(state) {
      try {
        sessionStorage.setItem('learningRpgCurrentState', JSON.stringify(state || null));
      } catch (error) {
        // Ignore storage failures.
      }
    }

    function getCachedMyQuestions() {
      try {
        return JSON.parse(sessionStorage.getItem(getMyQuestionsCacheKey()) || 'null');
      } catch (error) {
        return null;
      }
    }

    function cacheMyQuestions(questions) {
      try {
        sessionStorage.setItem(getMyQuestionsCacheKey(), JSON.stringify(questions || []));
      } catch (error) {
        // Ignore storage failures.
      }
    }

    function getMyQuestionsCacheKey() {
      return 'learningRpgMyQuestions:' + String(selectedWorkbookId || 'none');
    }

    function showLoadingModal(title, text) {
      document.getElementById('loadingTitle').textContent = title || '로딩 중...';
      document.getElementById('loadingText').textContent = text || '데이터를 불러오는 중...';
      document.getElementById('loadingModal').classList.add('active');
    }

    function hideLoadingModal() {
      document.getElementById('loadingModal').classList.remove('active');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeJsString(value) {
      return String(value == null ? '' : value)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\r/g, '\\r')
        .replace(/\n/g, '\\n');
    }

    init();
  </script>
</body>
