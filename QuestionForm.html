<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include_('UiStyles'); ?>
</head>
<body>
  <main class="question-form-shell fade-in">
    <section class="rpg-panel">
      <div class="inline-actions" style="justify-content:space-between;">
        <div>
          <h1 style="margin-bottom:6px;">문제 만들기</h1>
          <p id="userSummary" class="muted">사용자 정보를 확인 중입니다.</p>
        </div>
        <button class="secondary" onclick="goHome()">메인으로</button>
      </div>
    </section>

    <section id="formPanel" class="rpg-panel hidden" style="margin-top:14px;">
      <div class="form-grid">
        <div>
          <label for="type">문제 유형</label>
          <select id="type" onchange="renderTypeFields()">
            <option value="multipleChoice">객관식</option>
            <option value="shortAnswer">주관식</option>
          </select>
        </div>
        <div>
          <label for="subject">과목</label>
          <input id="subject" placeholder="예: 사회">
        </div>
        <div>
          <label for="unit">단원</label>
          <input id="unit" placeholder="예: 조선 전기">
        </div>
        <div>
          <label for="tags">태그</label>
          <input id="tags" placeholder="쉼표로 구분">
        </div>
      </div>

      <div style="margin-top:14px;">
        <label for="prompt">문제 내용</label>
        <textarea id="prompt" placeholder="친구가 풀 문제를 입력하세요."></textarea>
      </div>

      <div id="choicesArea" style="margin-top:14px;">
        <label>객관식 보기 4개</label>
        <div class="choice-grid">
          <input id="choice1" placeholder="선택지 1">
          <input id="choice2" placeholder="선택지 2">
          <input id="choice3" placeholder="선택지 3">
          <input id="choice4" placeholder="선택지 4">
        </div>
      </div>

      <div class="form-grid" style="margin-top:14px;">
        <div>
          <label for="answer">정답</label>
          <input id="answer" placeholder="객관식은 정답 번호, 주관식은 정답 텍스트">
        </div>
        <div>
          <label for="answerAliases">복수 정답 / 별칭</label>
          <input id="answerAliases" placeholder="쉼표 또는 줄바꿈으로 구분">
        </div>
      </div>

      <div style="margin-top:14px;">
        <label for="explanation">해설</label>
        <textarea id="explanation" placeholder="선택 사항"></textarea>
      </div>

      <div class="inline-actions" style="justify-content:flex-end; margin-top:16px;">
        <button class="secondary" onclick="clearQuestionFields()">입력 초기화</button>
        <button onclick="submitQuestion()">저장</button>
      </div>
      <div id="formMessage" class="message"></div>
    </section>

    <section id="lockedPanel" class="rpg-panel hidden" style="margin-top:14px;">
      <p>로그인 후 문제를 만들 수 있습니다.</p>
      <button onclick="goHome()">로그인하러 가기</button>
      <div id="lockedMessage" class="message"></div>
    </section>

    <section class="rpg-panel" style="margin-top:14px;">
      <div class="inline-actions" style="justify-content:space-between;">
        <h2 style="margin:0;">내가 만든 문제</h2>
        <button class="secondary" onclick="loadMyQuestions()">목록 새로고침</button>
      </div>
      <p id="questionCount" class="muted"></p>
      <div id="myQuestions"></div>
    </section>
  </main>

  <?!= include_('UiLoadingModal'); ?>

  <script>
    var WEB_APP_URL = '<?= getWebAppUrl_() ?>';

    function init() {
      renderTypeFields();
      showLoadingModal('로딩 중...', '문제 작성 화면을 준비하는 중...');
      google.script.run
        .withSuccessHandler(function(state) {
          hideLoadingModal();
          document.getElementById('userSummary').textContent = state.isRegistered
            ? state.player.displayName + '님, 문제를 등록할 수 있습니다.'
            : '로그인 정보가 없습니다.';
          document.getElementById('formPanel').classList.toggle('hidden', !state.isRegistered);
          document.getElementById('lockedPanel').classList.toggle('hidden', state.isRegistered);
          if (state.isRegistered) {
            loadMyQuestions();
          }
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          showError(error);
        })
        .getCurrentUser(getAuthToken());
    }

    function renderTypeFields() {
      var type = document.getElementById('type').value;
      document.getElementById('choicesArea').classList.toggle('hidden', type === 'shortAnswer');
    }

    function submitQuestion() {
      var payload = {
        type: valueOf('type'),
        prompt: valueOf('prompt'),
        choices: [valueOf('choice1'), valueOf('choice2'), valueOf('choice3'), valueOf('choice4')],
        answer: valueOf('answer'),
        answerAliases: valueOf('answerAliases'),
        explanation: valueOf('explanation'),
        subject: valueOf('subject'),
        unit: valueOf('unit'),
        tags: valueOf('tags'),
      };

      setFormMessage('저장 중입니다.', 'ok');
      showLoadingModal('저장 중...', '문제를 승인 대기 목록에 추가하는 중...');
      google.script.run
        .withSuccessHandler(function() {
          hideLoadingModal();
          setFormMessage('승인 대기 문제로 저장했습니다.', 'ok');
          clearQuestionFields();
          loadMyQuestions();
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setFormMessage(error.message, 'error');
        })
        .createQuestion(payload, getAuthToken());
    }

    function loadMyQuestions() {
      google.script.run
        .withSuccessHandler(renderMyQuestions)
        .withFailureHandler(showError)
        .getMyQuestions(getAuthToken());
    }

    function renderMyQuestions(questions) {
      document.getElementById('questionCount').textContent = questions.length + ' / 10개 생성';
      var container = document.getElementById('myQuestions');
      if (!questions.length) {
        container.innerHTML = '<p class="muted">아직 만든 문제가 없습니다.</p>';
        return;
      }

      container.innerHTML = questions.map(function(question) {
        return '<article class="question-item">' +
          '<strong>' + escapeHtml(question.prompt) + '</strong>' +
          '<p class="muted">' + escapeHtml(typeLabel(question.type)) + ' | ' + escapeHtml(statusLabel(question.status)) + ' | 난이도 ' + escapeHtml(question.difficulty || '-') + '</p>' +
          '<p>정답: ' + escapeHtml(question.answer) + '</p>' +
        '</article>';
      }).join('');
    }

    function clearQuestionFields() {
      ['prompt', 'choice1', 'choice2', 'choice3', 'choice4', 'answer', 'answerAliases', 'explanation'].forEach(function(id) {
        document.getElementById(id).value = '';
      });
    }

    function valueOf(id) {
      return document.getElementById(id).value.trim();
    }

    function typeLabel(type) {
      return type === 'shortAnswer' ? '주관식' : '객관식';
    }

    function statusLabel(status) {
      if (status === 'approved') return '승인됨';
      if (status === 'rejected') return '반려됨';
      return '승인 대기';
    }

    function setFormMessage(message, type) {
      var element = document.getElementById('formMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function showError(error) {
      setFormMessage(error.message, 'error');
      document.getElementById('lockedPanel').classList.remove('hidden');
      var lockedMessage = document.getElementById('lockedMessage');
      lockedMessage.textContent = error.message;
      lockedMessage.className = 'message error';
    }

    function goHome() {
      window.top.location.href = WEB_APP_URL;
    }

    function getAuthToken() {
      return sessionStorage.getItem('learningRpgAuthToken') || '';
    }

    function showLoadingModal(title, text) {
      document.getElementById('loadingTitle').textContent = title || '로딩 중...';
      document.getElementById('loadingText').textContent = text || '데이터를 불러오는 중...';
      document.getElementById('loadingModal').classList.add('active');
    }

    function hideLoadingModal() {
      document.getElementById('loadingModal').classList.remove('active');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    init();
  </script>
</body>
</html>
