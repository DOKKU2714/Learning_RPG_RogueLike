<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include_('UiStyles'); ?>
  <style>
    .mypage-shell {
      width: min(980px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .mypage-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .stat-box {
      border: 1px solid var(--line);
      background: rgba(15, 15, 15, 0.86);
      padding: 12px;
      min-height: 86px;
    }

    .stat-box strong {
      display: block;
      margin-top: 8px;
      color: var(--accent);
      font-size: 22px;
    }

    .question-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    .question-table th,
    .question-table td {
      border-bottom: 1px solid rgba(180, 180, 180, 0.24);
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }

    .question-table th {
      color: var(--muted);
      font-weight: 400;
    }

    .question-prompt {
      max-width: 420px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 760px) {
      .mypage-grid {
        grid-template-columns: 1fr 1fr;
      }

      .question-table {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="mypage-shell fade-in">
    <section class="rpg-panel">
      <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
        <div>
          <p class="muted">MY PAGE</p>
          <h1 id="playerName" class="rpg-title">내 정보</h1>
        </div>
        <div class="inline-actions">
          <button class="secondary" onclick="refreshMyInfo()">새로고침</button>
          <button class="secondary" onclick="goHome()">메인으로</button>
        </div>
      </div>
      <div id="mypageMessage" class="message"></div>
    </section>

    <section class="rpg-panel">
      <h2 class="rpg-title">요약</h2>
      <div class="mypage-grid">
        <div class="stat-box">
          <span class="muted">전체 정답률</span>
          <strong id="correctRate">-</strong>
        </div>
        <div class="stat-box">
          <span class="muted">평균 풀이 시간</span>
          <strong id="averageTime">-</strong>
        </div>
        <div class="stat-box">
          <span class="muted">최대 진행</span>
          <strong id="maxProgress">-</strong>
        </div>
        <div class="stat-box">
          <span class="muted">총 풀이 수</span>
          <strong id="totalAnswers">-</strong>
        </div>
      </div>
    </section>

    <section class="rpg-panel">
      <h2 class="rpg-title">내 문제 통계</h2>
      <div id="questionStats"><p class="muted">불러오는 중...</p></div>
    </section>
  </main>

  <?!= include_('UiLoadingModal'); ?>

  <script>
    var WEB_APP_URL = '<?= getWebAppUrl_() ?>';

    function init() {
      var cachedState = getCachedCurrentState();
      if (cachedState && cachedState.isRegistered && cachedState.player) {
        loadMyInfo(cachedState.player.playerId);
        return;
      }

      showLoadingModal('로딩 중...', '내 정보를 불러오는 중...');
      google.script.run
        .withSuccessHandler(function(state) {
          if (!state || !state.isRegistered || !state.player) {
            hideLoadingModal();
            setMessage('로그인 정보가 없습니다. 메인 화면에서 다시 로그인해 주세요.', 'error');
            document.getElementById('questionStats').innerHTML = '<p class="muted">로그인 후 확인할 수 있습니다.</p>';
            return;
          }
          loadMyInfo(state.player.playerId);
        })
        .withFailureHandler(showError)
        .getCurrentUser(getAuthToken());
    }

    function refreshMyInfo() {
      sessionStorage.removeItem('learningRpgMyInfo');
      init();
    }

    function loadMyInfo(playerId) {
      var cachedInfo = getCachedMyInfo();
      if (cachedInfo && cachedInfo.player && cachedInfo.player.playerId === playerId) {
        renderMyInfo(cachedInfo);
        return;
      }

      showLoadingModal('로딩 중...', '내 정보를 불러오는 중...');
      google.script.run
        .withSuccessHandler(function(info) {
          hideLoadingModal();
          cacheMyInfo(info);
          renderMyInfo(info);
        })
        .withFailureHandler(showError)
        .getMyInfo(playerId, getAuthToken());
    }

    function renderMyInfo(info) {
      if (!info) {
        setMessage('내 정보 응답이 비어 있습니다. 배포 버전과 서버 함수를 확인해 주세요.', 'error');
        document.getElementById('questionStats').innerHTML = '<p class="muted">정보를 표시할 수 없습니다.</p>';
        return;
      }

      var player = info.player || {};
      var summary = info.summary || {};
      document.getElementById('playerName').textContent = player.displayName || player.studentName || '내 정보';
      document.getElementById('correctRate').textContent = formatRate(summary.correctRate);
      document.getElementById('averageTime').textContent = formatTime(summary.averageAnswerTimeMs);
      document.getElementById('maxProgress').textContent = formatDisplayStage(summary.maxFloor, summary.maxStage);
      document.getElementById('totalAnswers').textContent = Number(summary.totalAnswerCount || 0) + '문제';
      renderQuestions(info.questionStats || []);
    }

    function renderQuestions(questions) {
      var container = document.getElementById('questionStats');
      if (!questions.length) {
        container.innerHTML = '<p class="muted">아직 만든 문제가 없습니다.</p>';
        return;
      }

      container.innerHTML =
        '<table class="question-table">' +
          '<thead><tr><th>문제</th><th>상태</th><th>난이도</th><th>풀이</th><th>정답률</th></tr></thead>' +
          '<tbody>' + questions.map(function(question) {
            return '<tr>' +
              '<td class="question-prompt" title="' + escapeHtml(question.prompt) + '">' + escapeHtml(question.prompt) + '</td>' +
              '<td>' + escapeHtml(question.status || '-') + '</td>' +
              '<td>' + renderDifficultyStars(question.difficulty || 1) + '</td>' +
              '<td>' + Number(question.correctCount || 0) + ' / ' + Number(question.totalCount || 0) + '</td>' +
              '<td>' + formatRate(question.correctRate) + '</td>' +
            '</tr>';
          }).join('') + '</tbody>' +
        '</table>';
    }

    function formatRate(rate) {
      return Number(rate || 0).toFixed(1).replace(/\.0$/, '') + '%';
    }

    function renderDifficultyStars(value) {
      var count = Math.max(1, Math.min(5, Number(value || 1)));
      var stars = '';
      for (var i = 0; i < count; i += 1) {
        stars += '<span class="difficulty-star">&#9733;</span>';
      }
      return '<span class="difficulty-stars" aria-label="난이도 ' + count + '">' + stars + '</span>';
    }

    function formatTime(ms) {
      var value = Number(ms || 0);
      return value > 0 ? (value / 1000).toFixed(1) + '초' : '-';
    }

    function formatDisplayStage(progressFloor, stage) {
      var displayFloor = Math.max(1, 6 - Number(progressFloor || 1));
      return displayFloor + '-' + Number(stage || 1);
    }

    function formatDisplayStageLegacy(progressFloor, stage) {
      var floorNames = {
        1: '5층 옥상',
        2: '4층 1학년 교실층',
        3: '3층 3학년 교실층',
        4: '2층 2학년 교실층',
        5: '1층 특별실/현관',
      };
      var floor = Number(progressFloor || 1);
      return (floorNames[floor] || (floor + '층')) + ' ' + Number(stage || 1) + '스테이지';
    }

    function getAuthToken() {
      return sessionStorage.getItem('learningRpgAuthToken') || '';
    }

    function getCachedCurrentState() {
      try {
        return JSON.parse(sessionStorage.getItem('learningRpgCurrentState') || 'null');
      } catch (error) {
        return null;
      }
    }

    function getCachedMyInfo() {
      try {
        return JSON.parse(sessionStorage.getItem('learningRpgMyInfo') || 'null');
      } catch (error) {
        return null;
      }
    }

    function cacheMyInfo(info) {
      try {
        sessionStorage.setItem('learningRpgMyInfo', JSON.stringify(info || null));
      } catch (error) {
        // Ignore storage failures.
      }
    }

    function goHome() {
      window.top.location.href = WEB_APP_URL + '?skipIntro=1';
    }

    function setMessage(message, type) {
      var element = document.getElementById('mypageMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function showError(error) {
      hideLoadingModal();
      setMessage((error && error.message) || String(error), 'error');
      document.getElementById('questionStats').innerHTML = '<p class="muted">정보를 불러오지 못했습니다.</p>';
    }

    function showLoadingModal(title, text) {
      document.getElementById('loadingTitle').textContent = title || '로딩 중...';
      document.getElementById('loadingText').textContent = text || '데이터를 불러오는 중...';
      document.getElementById('loadingModal').classList.add('active');
    }

    function hideLoadingModal() {
      document.getElementById('loadingModal').classList.remove('active');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    init();
  </script>
</body>
</html>
