<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #1d2433;
      --muted: #667085;
      --line: #d9e0ea;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #b42318;
      --danger-dark: #912018;
      --ok: #087443;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .panel,
    .question-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      align-items: start;
    }

    select,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      font: inherit;
      background: #ffffff;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      color: #ffffff;
      background: var(--primary);
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      color: var(--text);
      background: #edf2f7;
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: var(--danger-dark);
    }

    .muted {
      color: var(--muted);
    }

    .message {
      min-height: 24px;
      margin-top: 12px;
      font-weight: 700;
    }

    .message.error {
      color: var(--danger);
    }

    .message.ok {
      color: var(--ok);
    }

    .choices {
      margin: 8px 0;
      padding-left: 20px;
    }

    .actions {
      display: grid;
      grid-template-columns: 140px 1fr auto auto;
      gap: 10px;
      align-items: end;
      margin-top: 14px;
    }

    .hidden {
      display: none;
    }

    .stat-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .stat-table th,
    .stat-table td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    .stat-table th {
      color: var(--muted);
      font-weight: 700;
    }

    .stat-prompt {
      max-width: 360px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .check-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .check-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #ffffff;
    }

    .check-status {
      font-weight: 800;
      text-transform: uppercase;
    }

    .check-status.ok {
      color: var(--ok);
    }

    .check-status.warning {
      color: #b54708;
    }

    .check-status.error {
      color: var(--danger);
    }

    @media (max-width: 760px) {
      .shell {
        padding: 16px;
      }

      .grid,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="topline">
        <div>
          <h1>문제 승인 관리</h1>
          <p id="userSummary" class="muted">관리자 권한을 확인하고 있습니다.</p>
        </div>
        <button class="secondary" onclick="goHome()">메인으로</button>
      </div>
      <div id="adminMessage" class="message"></div>
    </section>

    <section id="deniedPanel" class="panel hidden">
      <p>허용된 관리자 계정만 관리자 화면에 접근할 수 있습니다.</p>
    </section>

    <section id="adminPanel" class="hidden">
      <div class="panel topline">
        <h2>가입 대기 계정</h2>
        <button class="secondary" onclick="loadPendingPlayerApprovals()">새로고침</button>
      </div>
      <div id="pendingPlayerList"></div>

      <div class="panel topline">
        <h2>승인 대기 문제</h2>
        <div style="min-width:240px;">
          <label for="adminWorkbookSelect">문제집</label>
          <select id="adminWorkbookSelect" onchange="handleAdminWorkbookChange()"></select>
        </div>
        <button class="secondary" onclick="loadPendingQuestions()">새로고침</button>
      </div>
      <div id="pendingList"></div>

      <div class="panel">
        <div class="topline">
          <div>
            <h2>게임 설정</h2>
            <p class="muted">게임 시작 조건을 관리합니다.</p>
          </div>
          <button onclick="saveAdminGameSettings()">저장</button>
        </div>
        <div class="check-list">
          <label style="display:flex; gap:10px; align-items:center;">
            <input id="settingGameEnabled" type="checkbox">
            <span>학생 게임 시작 허용</span>
          </label>
          <label style="display:flex; gap:10px; align-items:center;">
            <input id="settingRequireOwnQuestionForRunStart" type="checkbox">
            <span>새 게임 시작 전 문제 생성 필요</span>
          </label>
        </div>
        <div id="gameSettingsMessage" class="message"></div>
      </div>

      <div class="panel">
        <div class="topline">
          <div>
            <h2>Workbook System</h2>
            <p class="muted">Check workbook and question sheet settings.</p>
          </div>
          <div>
            <button class="secondary" onclick="loadWorkbookSystemCheck()">Check Settings</button>
          </div>
        </div>
        <div id="workbookSystemResult" class="check-list"></div>
      </div>

      <div class="panel topline">
        <h2>학생 통계</h2>
        <button class="secondary" onclick="loadAdminStats()">새로고침</button>
      </div>
      <div id="playerStatsList"></div>

      <div class="panel topline">
        <h2>문제별 통계</h2>
      </div>
      <div id="questionStatsList"></div>
    </section>
  </main>

  <script>
    var WEB_APP_URL = '<?= getWebAppUrl_() ?>';
    var MAX_QUESTION_DIFFICULTY = 5;
    var adminWorkbooks = [];
    var selectedAdminWorkbookId = '';

    function init() {
      google.script.run
        .withSuccessHandler(function(state) {
          document.getElementById('userSummary').textContent = state.email || '이메일을 확인할 수 없습니다.';
          document.getElementById('deniedPanel').classList.toggle('hidden', state.isAdmin);
          document.getElementById('adminPanel').classList.toggle('hidden', !state.isAdmin);
          if (state.isAdmin) {
            loadPendingPlayerApprovals();
            loadAdminQuestionWorkbooks();
            loadAdminStats();
            loadAdminGameSettings();
            loadWorkbookSystemCheck();
          }
        })
        .withFailureHandler(showAdminError)
        .getCurrentUser();
    }

    function loadPendingPlayerApprovals() {
      setAdminMessage('가입 대기 계정을 불러오는 중입니다.', 'ok');
      google.script.run
        .withSuccessHandler(renderPendingPlayerApprovals)
        .withFailureHandler(showAdminError)
        .getPendingPlayerApprovals();
    }

    function renderPendingPlayerApprovals(players) {
      var list = document.getElementById('pendingPlayerList');
      if (!players.length) {
        list.innerHTML = '<section class="panel"><p class="muted">가입 대기 계정이 없습니다.</p></section>';
        return;
      }

      list.innerHTML = players.map(function(player) {
        var playerId = escapeHtml(player.playerId);
        return '<article class="question-card" id="player-card-' + playerId + '">' +
          '<div class="grid">' +
            '<strong>이름</strong><span>' + escapeHtml(player.displayName || ((player.studentId || '') + ' ' + (player.studentName || ''))) + '</span>' +
            '<strong>학번</strong><span>' + escapeHtml(player.studentId || '-') + '</span>' +
            '<strong>역할</strong><span>' + escapeHtml(getRoleLabel(player.role)) + '</span>' +
            '<strong>상태</strong><span>' + escapeHtml(player.approvalStatus || '-') + '</span>' +
            '<strong>신청일</strong><span>' + escapeHtml(formatDateTime(player.createdAt)) + '</span>' +
          '</div>' +
          '<div class="actions">' +
            '<div></div>' +
            '<div><label for="reject-reason-' + playerId + '">반려 사유</label><textarea id="reject-reason-' + playerId + '" placeholder="반려 시 사유를 입력"></textarea></div>' +
            '<button onclick="approvePlayerItem(\'' + escapeJs(player.playerId) + '\')">승인</button>' +
            '<button class="danger" onclick="rejectPlayerItem(\'' + escapeJs(player.playerId) + '\')">반려</button>' +
          '</div>' +
        '</article>';
      }).join('');
    }

    function approvePlayerItem(playerId) {
      google.script.run
        .withSuccessHandler(loadPendingPlayerApprovals)
        .withFailureHandler(showAdminError)
        .approvePlayerRegistration(playerId);
    }

    function rejectPlayerItem(playerId) {
      var reasonInput = document.getElementById('reject-reason-' + playerId);
      var reason = reasonInput ? reasonInput.value : '';
      google.script.run
        .withSuccessHandler(loadPendingPlayerApprovals)
        .withFailureHandler(showAdminError)
        .rejectPlayerRegistration(playerId, reason);
    }

    function loadAdminQuestionWorkbooks() {
      setAdminMessage('문제집 목록을 불러오는 중입니다.', 'ok');
      google.script.run
        .withSuccessHandler(function(workbooks) {
          adminWorkbooks = Array.isArray(workbooks) ? workbooks : [];
          renderAdminWorkbookSelect();
          loadPendingQuestions();
        })
        .withFailureHandler(showAdminError)
        .getAdminQuestionWorkbooks();
    }

    function loadAdminGameSettings() {
      google.script.run
        .withSuccessHandler(renderAdminGameSettings)
        .withFailureHandler(showAdminError)
        .getAdminGameSettings();
    }

    function renderAdminGameSettings(settings) {
      document.getElementById('settingGameEnabled').checked = !!(settings && settings.gameEnabled);
      document.getElementById('settingRequireOwnQuestionForRunStart').checked = settings && settings.requireOwnQuestionForRunStart !== false;
      setGameSettingsMessage('', '');
    }

    function saveAdminGameSettings() {
      var payload = {
        gameEnabled: document.getElementById('settingGameEnabled').checked,
        requireOwnQuestionForRunStart: document.getElementById('settingRequireOwnQuestionForRunStart').checked,
      };
      setGameSettingsMessage('설정을 저장하는 중입니다.', 'ok');
      google.script.run
        .withSuccessHandler(function(settings) {
          renderAdminGameSettings(settings);
          setGameSettingsMessage('설정이 저장되었습니다.', 'ok');
        })
        .withFailureHandler(function(error) {
          setGameSettingsMessage(error && error.message ? error.message : '설정 저장에 실패했습니다.', 'error');
        })
        .updateAdminGameSettings(payload);
    }

    function loadWorkbookSystemCheck() {
      var container = document.getElementById('workbookSystemResult');
      if (container) {
        container.innerHTML = '<p class="muted">Checking workbook system settings...</p>';
      }
      google.script.run
        .withSuccessHandler(renderWorkbookSystemCheck)
        .withFailureHandler(showAdminError)
        .checkWorkbookSystemSettings();
    }

    function renderWorkbookSystemCheck(result) {
      var container = document.getElementById('workbookSystemResult');
      if (!container) return;
      var checks = result && Array.isArray(result.checks) ? result.checks : [];
      var summary = '<section class="panel">' +
        '<strong>Status: ' + escapeHtml(result && result.ok ? 'OK' : 'Needs attention') + '</strong>' +
        '<p class="muted">Active workbooks: ' + Number(result && result.activeWorkbookCount || 0) +
        ' / defaultWorkbookId: ' + escapeHtml(result && result.defaultWorkbookId || '-') + '</p>' +
      '</section>';
      if (!checks.length) {
        container.innerHTML = summary + '<p class="muted">No check result.</p>';
        return;
      }
      container.innerHTML = summary + checks.map(function(check) {
        var status = String(check.status || 'warning');
        return '<div class="check-row">' +
          '<span class="check-status ' + escapeHtml(status) + '">' + escapeHtml(status) + '</span>' +
          '<span><strong>' + escapeHtml(check.key || '-') + '</strong><br>' +
          escapeHtml(check.message || '') +
          (check.detail ? '<br><span class="muted">' + escapeHtml(check.detail) + '</span>' : '') +
          '</span>' +
        '</div>';
      }).join('');
    }

    function renderAdminWorkbookSelect() {
      var select = document.getElementById('adminWorkbookSelect');
      if (!select) return;
      select.innerHTML = '';
      adminWorkbooks.forEach(function(workbook) {
        var option = document.createElement('option');
        option.value = workbook.workbookId;
        option.textContent = workbook.workbookName + (workbook.subject ? ' (' + workbook.subject + ')' : '');
        select.appendChild(option);
      });
      if (!selectedAdminWorkbookId && adminWorkbooks.length) {
        selectedAdminWorkbookId = adminWorkbooks[0].workbookId;
      }
      if (selectedAdminWorkbookId) {
        select.value = selectedAdminWorkbookId;
      }
    }

    function handleAdminWorkbookChange() {
      var select = document.getElementById('adminWorkbookSelect');
      selectedAdminWorkbookId = select ? select.value : '';
      loadPendingQuestions();
    }

    function loadPendingQuestions() {
      var select = document.getElementById('adminWorkbookSelect');
      selectedAdminWorkbookId = select ? select.value : selectedAdminWorkbookId;
      if (!selectedAdminWorkbookId) {
        document.getElementById('pendingList').innerHTML = '<section class="panel"><p class="muted">문제집을 먼저 선택해 주세요.</p></section>';
        return;
      }
      setAdminMessage('목록을 불러오는 중입니다.', 'ok');
      google.script.run
        .withSuccessHandler(renderPendingQuestions)
        .withFailureHandler(showAdminError)
        .getPendingQuestions(selectedAdminWorkbookId);
    }

    function renderPendingQuestions(questions) {
      setAdminMessage(questions.length + '개의 승인 대기 문제가 있습니다.', 'ok');
      var list = document.getElementById('pendingList');
      if (!questions.length) {
        list.innerHTML = '<section class="panel"><p class="muted">승인 대기 문제가 없습니다.</p></section>';
        return;
      }

      list.innerHTML = questions.map(function(question) {
        return '<article class="question-card" id="card-' + escapeHtml(question.questionId) + '">' +
          '<div class="grid">' +
            '<strong>출제자</strong><span>' + escapeHtml(question.creatorName) + '</span>' +
            '<strong>문제집</strong><span>' + escapeHtml(question.workbookName || selectedAdminWorkbookId || '-') + '</span>' +
            '<strong>유형</strong><span>' + escapeHtml(question.type) + '</span>' +
            '<strong>문제</strong><span>' + escapeHtml(question.prompt) + '</span>' +
            '<strong>선택지</strong><span>' + renderChoices(question) + '</span>' +
            '<strong>정답</strong><span>' + escapeHtml(question.answer) + '</span>' +
            '<strong>복수 답안</strong><span>' + escapeHtml(question.answerAliases || '-') + '</span>' +
            '<strong>태그</strong><span>' + escapeHtml([question.subject, question.unit, question.tags].filter(Boolean).join(' · ') || '-') + '</span>' +
            '<strong>해설</strong><span>' + escapeHtml(question.explanation || '-') + '</span>' +
          '</div>' +
          '<div class="actions">' +
            '<div><label for="difficulty-' + escapeHtml(question.questionId) + '">난이도</label>' + difficultySelect(question.questionId, question.difficulty) + '</div>' +
            '<div><label for="comment-' + escapeHtml(question.questionId) + '">반려 사유</label><textarea id="comment-' + escapeHtml(question.questionId) + '" placeholder="반려할 때 입력"></textarea></div>' +
            '<button onclick="approve(\'' + escapeJs(question.questionId) + '\')">승인</button>' +
            '<button class="danger" onclick="rejectQuestionItem(\'' + escapeJs(question.questionId) + '\')">반려</button>' +
          '</div>' +
        '</article>';
      }).join('');
    }

    function renderChoices(question) {
      var choices = [question.choice1, question.choice2, question.choice3, question.choice4].filter(Boolean);
      if (!choices.length) {
        return '-';
      }
      return '<ol class="choices">' + choices.map(function(choice) {
        return '<li>' + escapeHtml(choice) + '</li>';
      }).join('') + '</ol>';
    }

    function difficultySelect(questionId, selectedDifficulty) {
      var options = [];
      var selected = Math.max(1, Math.min(MAX_QUESTION_DIFFICULTY, Number(selectedDifficulty || 1)));
      for (var i = 1; i <= MAX_QUESTION_DIFFICULTY; i += 1) {
        options.push('<option value="' + i + '"' + (i === selected ? ' selected' : '') + '>' + difficultyStarsText(i) + '</option>');
      }
      return '<select class="difficulty-select" id="difficulty-' + escapeHtml(questionId) + '">' + options.join('') + '</select>';
    }

    function difficultyStarsText(value) {
      var count = Math.max(1, Math.min(MAX_QUESTION_DIFFICULTY, Number(value || 1)));
      var text = '';
      for (var i = 0; i < count; i += 1) {
        text += '&#9733;';
      }
      return text;
    }

    function renderDifficultyStars(value) {
      var count = Math.max(1, Math.min(MAX_QUESTION_DIFFICULTY, Number(value || 1)));
      var stars = '';
      for (var i = 0; i < count; i += 1) {
        stars += '<span class="difficulty-star">&#9733;</span>';
      }
      return '<span class="difficulty-stars" aria-label="난이도 ' + count + '">' + stars + '</span>';
    }

    function approve(questionId) {
      var difficulty = document.getElementById('difficulty-' + questionId).value;
      google.script.run
        .withSuccessHandler(loadPendingQuestions)
        .withFailureHandler(showAdminError)
        .approveQuestion(questionId, difficulty, selectedAdminWorkbookId);
    }

    function rejectQuestionItem(questionId) {
      var comment = document.getElementById('comment-' + questionId).value;
      google.script.run
        .withSuccessHandler(loadPendingQuestions)
        .withFailureHandler(showAdminError)
        .rejectQuestion(questionId, comment, selectedAdminWorkbookId);
    }

    function loadAdminStats() {
      google.script.run
        .withSuccessHandler(renderAdminPlayerStats)
        .withFailureHandler(showAdminError)
        .getAdminPlayerStats();
      google.script.run
        .withSuccessHandler(renderAdminQuestionStats)
        .withFailureHandler(showAdminError)
        .getAdminQuestionStats();
    }

    function renderAdminPlayerStats(players) {
      var container = document.getElementById('playerStatsList');
      if (!players.length) {
        container.innerHTML = '<section class="panel"><p class="muted">학생 데이터가 없습니다.</p></section>';
        return;
      }
      container.innerHTML =
        '<table class="stat-table">' +
          '<thead><tr><th>학생</th><th>풀이 수</th><th>정답률</th><th>평균 시간</th><th>최대 진행</th><th>재화</th></tr></thead>' +
          '<tbody>' + players.map(function(player) {
            return '<tr>' +
              '<td>' + escapeHtml(player.displayName || ((player.studentId || '') + ' ' + (player.studentName || ''))) + '</td>' +
              '<td>' + Number(player.totalAnswerCount || 0) + '</td>' +
              '<td>' + formatRate(player.correctRate) + '</td>' +
              '<td>' + formatTime(player.averageAnswerTimeMs) + '</td>' +
              '<td>' + escapeHtml(formatDisplayStage(player.maxFloor, player.maxStage)) + '</td>' +
              '<td>' + Number(player.currency || 0) + '</td>' +
            '</tr>';
          }).join('') + '</tbody>' +
        '</table>';
    }

    function renderAdminQuestionStats(questions) {
      var container = document.getElementById('questionStatsList');
      if (!questions.length) {
        container.innerHTML = '<section class="panel"><p class="muted">문제 데이터가 없습니다.</p></section>';
        return;
      }
      container.innerHTML =
        '<table class="stat-table">' +
          '<thead><tr><th>문제</th><th>출제자</th><th>상태</th><th>난이도</th><th>풀이</th><th>정답률</th><th>반응</th></tr></thead>' +
          '<tbody>' + questions.map(function(question) {
            return '<tr>' +
              '<td class="stat-prompt" title="' + escapeHtml(question.prompt) + '">' + escapeHtml(question.prompt) + '</td>' +
              '<td>' + escapeHtml(question.creatorName || '-') + '</td>' +
              '<td>' + escapeHtml(question.status || '-') + '</td>' +
              '<td>' + renderDifficultyStars(question.difficulty || 1) + '</td>' +
              '<td>' + Number(question.correctCount || 0) + ' / ' + Number(question.totalCount || 0) + '</td>' +
              '<td>' + formatRate(question.correctRate) + '</td>' +
              '<td>좋아요 ' + Number(question.likeCount || 0) + ' / 싫어요 ' + Number(question.dislikeCount || 0) + '</td>' +
            '</tr>';
          }).join('') + '</tbody>' +
        '</table>';
    }

    function formatRate(rate) {
      return Number(rate || 0).toFixed(1).replace(/\.0$/, '') + '%';
    }

    function getRoleLabel(role) {
      return role === 'teacher' ? '교사' : '학생';
    }

    function formatDateTime(value) {
      if (!value) {
        return '-';
      }
      var date = new Date(value);
      if (isNaN(date.getTime())) {
        return String(value || '-');
      }
      return date.getFullYear() + '-' +
        String(date.getMonth() + 1).padStart(2, '0') + '-' +
        String(date.getDate()).padStart(2, '0') + ' ' +
        String(date.getHours()).padStart(2, '0') + ':' +
        String(date.getMinutes()).padStart(2, '0');
    }

    function formatDisplayStage(progressFloor, stage) {
      var floorNames = {
        1: '5층 옥상',
        2: '4층 1학년 교실층',
        3: '3층 3학년 교실층',
        4: '2층 2학년 교실층',
        5: '1층 특별실/현관',
      };
      var floor = Number(progressFloor || 1);
      return (floorNames[floor] || (floor + '층')) + ' ' + Number(stage || 1) + '스테이지';
    }

    function formatTime(ms) {
      var value = Number(ms || 0);
      return value > 0 ? (value / 1000).toFixed(1) + '초' : '-';
    }

    function setAdminMessage(message, type) {
      var element = document.getElementById('adminMessage');
      element.textContent = message;
      element.className = 'message ' + (type || '');
    }

    function setGameSettingsMessage(message, type) {
      var element = document.getElementById('gameSettingsMessage');
      if (!element) return;
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function showAdminError(error) {
      setAdminMessage(error.message, 'error');
    }

    function goHome() {
      navigateTop(WEB_APP_URL);
    }

    function navigateTop(url) {
      var link = document.createElement('a');
      link.href = url;
      link.target = '_top';
      link.rel = 'noopener';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeJs(value) {
      return String(value == null ? '' : value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    init();
  </script>
</body>
</html>
