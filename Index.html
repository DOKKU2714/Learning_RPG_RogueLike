  <script>
    var WEB_APP_URL = '<?= getWebAppUrl_() ?>';
    var ASSET_BASE_URL = '<?= getAssetBaseUrl_() ?>';
    var currentState = null;
    var authMode = 'login';
    var SKIP_INTRO = window.location.search.indexOf('skipIntro=1') !== -1;
    var INTRO_SEEN_KEY = 'learningRpgIntroSeen';
    var SOUND_ENABLED_KEY = 'learningRpgSoundEnabled';
    var SELECTED_WORKBOOK_ID_KEY = 'learningRpgSelectedWorkbookId';
    var SELECTED_WORKBOOK_NAME_KEY = 'learningRpgSelectedWorkbookName';
    var activeWorkbooks = [];
    var selectedWorkbookId = '';
    var selectedWorkbookName = '';
    var currentUserRequestTimer = null;
    var pendingResumeRun = null;
    var pendingGameStartAt = 0;
    var noticeRequestToken = '';
    var currentNoticeItems = [];
    var NOTICE_HIDE_PREFIX = 'learningRpgNoticeHiddenDate:';

    document.addEventListener('DOMContentLoaded', bootIndexPage);
    window.addEventListener('storage', function(event) {
      if (event.key === SOUND_ENABLED_KEY) {
        syncSoundToggleButton();
        applyGlobalSoundPreference();
      }
    });

    function bootIndexPage() {
      try {
        syncSoundToggleButton();
        applyGlobalSoundPreference();
        bindLoginEnterKey();
        showLoginForm();
        if (SKIP_INTRO || getAuthToken()) {
          enterApp();
        }
      } catch (error) {
        recoverIndexBoot(error);
      }
    }

    function isSoundEnabled() {
      try {
        return localStorage.getItem(SOUND_ENABLED_KEY) === '1';
      } catch (error) {
        return false;
      }
    }

    function setSoundEnabled(enabled, options) {
      options = options || {};
      try {
        localStorage.setItem(SOUND_ENABLED_KEY, enabled ? '1' : '0');
      } catch (error) {}
      syncSoundToggleButton();
      applyGlobalSoundPreference();
      notifySoundPreferenceChanged(options);
    }

    function toggleSoundEnabled(event) {
      if (event && event.stopPropagation) {
        event.stopPropagation();
      }
      setSoundEnabled(!isSoundEnabled(), { userInitiated: true });
    }

    function syncSoundToggleButton() {
      var enabled = isSoundEnabled();
      Array.prototype.forEach.call(document.querySelectorAll('.sound-toggle-button'), function(button) {
        button.classList.toggle('sound-muted', !enabled);
        button.setAttribute('aria-pressed', enabled ? 'true' : 'false');
        button.setAttribute('aria-label', enabled ? '\uC18C\uB9AC \uCF1C\uC9D0' : '\uC18C\uB9AC \uAEBC\uC9D0');
        button.title = enabled ? '\uC18C\uB9AC \uCF1C\uC9D0' : '\uC18C\uB9AC \uAEBC\uC9D0';
      });
    }

    function applyGlobalSoundPreference() {
      var enabled = isSoundEnabled();
      Array.prototype.forEach.call(document.querySelectorAll('audio, video'), function(media) {
        if (media.dataset.soundPreviousVolume === undefined) {
          media.dataset.soundPreviousVolume = String(media.volume);
        }
        media.muted = !enabled;
        media.volume = enabled ? Number(media.dataset.soundPreviousVolume || 1) : 0;
      });
    }

    function notifySoundPreferenceChanged(options) {
      options = options || {};
      try {
        window.dispatchEvent(new CustomEvent('learningRpgSoundPreferenceChanged', {
          detail: { enabled: isSoundEnabled(), userInitiated: !!options.userInitiated }
        }));
      } catch (error) {}
    }

    function recoverIndexBoot(error) {
      try {
        document.getElementById('introScreen').classList.remove('active');
        document.getElementById('appScreen').classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
        document.getElementById('mainPanel').classList.remove('active');
        document.getElementById('infoPanel').classList.remove('active');
        showLoginForm();
        setRegisterMessage('화면 초기화 중 문제가 발생했습니다. 다시 로그인해 주세요.', 'error');
      } catch (recoverError) {
        document.body.innerHTML = '<main class="menu-shell screen active"><section class="rpg-panel screen active"><h1 class="rpg-title">로그인</h1><p class="message error">화면을 초기화하지 못했습니다. 새로고침해 주세요.</p></section></main>';
      }
    }

    function hasSeenIntroScreen() {
      try {
        return localStorage.getItem(INTRO_SEEN_KEY) === '1';
      } catch (error) {
        return false;
      }
    }

    function markIntroScreenSeen() {
      try {
        localStorage.setItem(INTRO_SEEN_KEY, '1');
      } catch (error) {}
    }

    function markIntroLogoLoaded() {
      var logo = document.getElementById('introLogo');
      if (!logo) return;
      logo.classList.add('logo-loaded');
    }

    function getIntroLogoCandidates() {
      if (!ASSET_BASE_URL) return [];
      return [
        'Resources/Intro_logo.png',
        'Resources/intro_logo.png',
        'resources/Intro_logo.png',
        'resources/intro_logo.png',
        'Resource/Intro_logo.png',
        'Resource/intro_logo.png',
        'resource/Intro_logo.png',
        'resource/intro_logo.png',
      ].map(function(path) {
        return ASSET_BASE_URL + '/' + path;
      });
    }

    function handleIntroLogoError(image) {
      if (image && image.dataset) {
        var candidates = getIntroLogoCandidates();
        var index = Number(image.dataset.fallbackIndex || 0);
        while (index < candidates.length && image.src === candidates[index]) {
          index += 1;
        }
        if (index < candidates.length) {
          image.dataset.fallbackIndex = String(index + 1);
          image.src = candidates[index];
          return;
        }
      }
      var logo = document.getElementById('introLogo');
      if (logo) {
        logo.classList.remove('logo-loaded');
      }
      if (image) {
        image.style.display = 'none';
      }
    }

    function bindLoginEnterKey() {
      ['studentId', 'studentName', 'password'].forEach(function(id) {
        var input = document.getElementById(id);
        if (!input) return;
        input.addEventListener('keydown', function(event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            if (authMode === 'register') {
              register();
            } else {
              login();
            }
          }
        });
      });
    }

    function enterApp() {
      markIntroScreenSeen();
      document.getElementById('introScreen').classList.remove('active');
      document.getElementById('appScreen').classList.add('active');
      document.getElementById('registerPanel').classList.add('active');
      showLoginForm();
      refreshCurrentUser();
    }

    function warmupGameDataSilently() {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        return;
      }
      google.script.run
        .withFailureHandler(function() {})
        .warmupGameData(getAuthToken());
    }

    function refreshCurrentUser(force) {
      setMainMessage('');
      var authToken = getAuthToken();
      if (!authToken) {
        saveCurrentState(null);
        renderCurrentUser({ isRegistered: false });
        return;
      }
      var renderedCachedState = false;
      if (!force) {
        var cachedState = getCachedCurrentState();
        if (cachedState) {
          renderCurrentUser(cachedState);
          renderedCachedState = true;
        }
      }
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        document.getElementById('appScreen').classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
        showLoginForm();
        setRegisterMessage('앱 실행 환경을 불러오지 못했습니다. 배포 URL로 다시 접속해 주세요.', 'error');
        return;
      }
      if (!renderedCachedState) {
        showLoadingModal('로딩 중...', '사용자 정보를 확인하는 중...');
      }
      clearCurrentUserRequestTimer();
      currentUserRequestTimer = window.setTimeout(function() {
        if (renderedCachedState) {
          return;
        }
        hideLoadingModal();
        document.getElementById('appScreen').classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
        showLoginForm();
        setRegisterMessage('사용자 정보 확인이 지연되고 있습니다. 새로고침 후 다시 시도해 주세요.', 'error');
      }, 9000);
      google.script.run
        .withSuccessHandler(function(state) {
          clearCurrentUserRequestTimer();
          hideLoadingModal();
          saveCurrentState(state);
          renderCurrentUser(state);
        })
        .withFailureHandler(function(error) {
          clearCurrentUserRequestTimer();
          if (renderedCachedState) {
            return;
          }
          hideLoadingModal();
          document.getElementById('appScreen').classList.add('active');
          document.getElementById('registerPanel').classList.add('active');
          setRegisterMessage(error.message, 'error');
        })
        .getCurrentUser(authToken);
    }

    function reloadGameData() {
      setMainMessage('');
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        setMainMessage('서버 연결을 사용할 수 없습니다.', 'error');
        return;
      }
      showLoadingModal('데이터 다시 불러오는 중...', '시트 데이터 캐시를 비우는 중...');
      google.script.run
        .withSuccessHandler(function() {
          hideLoadingModal();
          setMainMessage('데이터를 다시 불러왔습니다.', 'ok');
          refreshCurrentUser(true);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setMainMessage(error && error.message ? error.message : '데이터 다시 불러오기에 실패했습니다.', 'error');
        })
        .clearRuntimeCaches();
    }

    function clearCurrentUserRequestTimer() {
      if (currentUserRequestTimer) {
        window.clearTimeout(currentUserRequestTimer);
        currentUserRequestTimer = null;
      }
    }

    function renderCurrentUser(state) {
      state = state || { isRegistered: false };
      if (state.isRegistered && !state.player) {
        state.isRegistered = false;
      }
      currentState = state;
      activeWorkbooks = normalizeWorkbookList(state.activeWorkbooks);
      restoreSelectedWorkbookToState();
      var hasWorkbookSelection = state.isRegistered && !!selectedWorkbookId;
      toggle('registerPanel', !state.isRegistered);
      toggle('mainPanel', hasWorkbookSelection);
      toggle('infoPanel', false);

      if (!state.isRegistered) {
        document.getElementById('userSummary').textContent = '학번, 이름, 비밀번호를 입력하세요.';
        showLoginForm();
        return;
      }
      renderPlayerBadge(state);
      renderCurrentWorkbookBadge();
      renderRoleButtons();
      document.getElementById('adminButton').style.display = state.isAdmin ? 'block' : 'none';
      renderWorkbookSelectOptions();
      scheduleNoticeModal();
      if (!hasWorkbookSelection) {
        showWorkbookSelectModal();
        return;
      }
      hideWorkbookSelectModal();
    }

    function renderPlayerBadge(state) {
      var player = state && state.player || {};
      var bonus = state && state.startingScoreBonus || {};
      var displayName = player.displayName || player.studentName || '플레이어';
      var startingScore = Number(bonus.startingScore || 0);
      var questionCount = Number(bonus.questionCount || 0);
      var likeCount = Number(bonus.likeCount || 0);
      document.getElementById('playerBadge').innerHTML =
        '<strong class="player-name-line">' + escapeHtml(displayName) + '</strong>' +
        '<div class="starting-score-bonus">' +
          '<span class="score-bonus-title">문제 기여 시작 점수</span>' +
          '<span class="score-bonus-value">+' + escapeHtml(formatScore(startingScore)) + '</span>' +
          '<span class="score-bonus-detail">문제 ' + escapeHtml(questionCount) + '개 · 좋아요 ' + escapeHtml(likeCount) + '개</span>' +
        '</div>';
      return;
      document.getElementById('playerBadge').innerHTML =
        '<strong>' + escapeHtml(displayName) + '</strong>' +
        '<div class="starting-score-bonus">문제 생성/좋아요로 인한 시작 점수 +' + escapeHtml(formatScore(startingScore)) +
          ' <span class="muted">(문제 ' + escapeHtml(questionCount) + '개, 좋아요 ' + escapeHtml(likeCount) + '개)</span></div>';
    }

    function normalizeWorkbookList(workbooks) {
      return (Array.isArray(workbooks) ? workbooks : []).filter(function(workbook) {
        return workbook && String(workbook.workbookId || '').trim();
      }).map(function(workbook) {
        return Object.assign({}, workbook, {
          workbookId: String(workbook.workbookId || '').trim(),
          workbookName: String(workbook.workbookName || '').trim(),
          subject: String(workbook.subject || '').trim(),
          description: String(workbook.description || '').trim(),
        });
      });
    }

    function restoreSelectedWorkbookToState() {
      var stored = getStoredWorkbookSelection();
      var workbook = stored.workbookId ? findActiveWorkbookById(stored.workbookId) : null;
      if (!workbook) {
        selectedWorkbookId = '';
        selectedWorkbookName = '';
        clearSelectedWorkbookStorage();
        if (currentState) {
          currentState.selectedWorkbookId = '';
          currentState.selectedWorkbookName = '';
          currentState.selectedWorkbook = null;
          saveCurrentState(currentState);
        }
        return;
      }
      applySelectedWorkbook(workbook, { keepModal: true });
    }

    function findActiveWorkbookById(workbookId) {
      var targetId = String(workbookId || '').trim();
      return activeWorkbooks.filter(function(workbook) {
        return workbook.workbookId === targetId;
      })[0] || null;
    }

    function getStoredWorkbookSelection() {
      try {
        return {
          workbookId: sessionStorage.getItem(SELECTED_WORKBOOK_ID_KEY) || '',
          workbookName: sessionStorage.getItem(SELECTED_WORKBOOK_NAME_KEY) || '',
        };
      } catch (error) {
        return { workbookId: '', workbookName: '' };
      }
    }

    function applySelectedWorkbook(workbook, options) {
      options = options || {};
      selectedWorkbookId = String(workbook && workbook.workbookId || '').trim();
      selectedWorkbookName = String(workbook && workbook.workbookName || '').trim();
      try {
        sessionStorage.setItem(SELECTED_WORKBOOK_ID_KEY, selectedWorkbookId);
        sessionStorage.setItem(SELECTED_WORKBOOK_NAME_KEY, selectedWorkbookName);
      } catch (error) {}
      if (currentState) {
        currentState.selectedWorkbookId = selectedWorkbookId;
        currentState.selectedWorkbookName = selectedWorkbookName;
        currentState.selectedWorkbook = workbook || null;
        currentState.activeWorkbooks = activeWorkbooks;
        saveCurrentState(currentState);
      }
      renderCurrentWorkbookBadge();
      if (!options.keepModal) {
        hideWorkbookSelectModal();
        toggle('mainPanel', !!(currentState && currentState.isRegistered && selectedWorkbookId));
        scheduleNoticeModal();
      }
    }

    function clearSelectedWorkbookStorage() {
      try {
        sessionStorage.removeItem(SELECTED_WORKBOOK_ID_KEY);
        sessionStorage.removeItem(SELECTED_WORKBOOK_NAME_KEY);
      } catch (error) {}
    }

    function canManageWorkbooks() {
      var player = currentState && currentState.player || {};
      return String(player.role || '').trim() === 'teacher';
    }

    function canCreateQuestions() {
      return !!(currentState && currentState.isRegistered && currentState.player);
    }

    function renderRoleButtons() {
      var questionButton = document.getElementById('questionCreateButton');
      if (questionButton) {
        var canCreate = canCreateQuestions();
        questionButton.classList.toggle('hidden', !canCreate);
        questionButton.disabled = !canCreate;
      }
    }

    function renderCurrentWorkbookBadge() {
      var element = document.getElementById('currentWorkbookBadge');
      if (!element) return;
      if (!selectedWorkbookId) {
        element.textContent = '';
        return;
      }
      element.textContent = '현재 문제집(수업): ' + (selectedWorkbookName || selectedWorkbookId);
    }

    function renderWorkbookSelectOptions() {
      var select = document.getElementById('workbookSelect');
      var confirmButton = document.getElementById('confirmWorkbookButton');
      var addButton = document.getElementById('addWorkbookButton');
      if (!select || !confirmButton || !addButton) return;

      select.innerHTML = '';
      activeWorkbooks.forEach(function(workbook) {
        var option = document.createElement('option');
        option.value = workbook.workbookId;
        option.textContent = workbook.workbookName + (workbook.subject ? ' (' + workbook.subject + ')' : '');
        select.appendChild(option);
      });
      select.disabled = activeWorkbooks.length === 0;
      confirmButton.disabled = activeWorkbooks.length === 0;
      var canManage = canManageWorkbooks();
      addButton.classList.toggle('hidden', !canManage);
      addButton.disabled = !canManage;
      addButton.setAttribute('aria-hidden', canManage ? 'false' : 'true');
      if (selectedWorkbookId && findActiveWorkbookById(selectedWorkbookId)) {
        select.value = selectedWorkbookId;
      }
      renderWorkbookArchiveButton();
      setWorkbookSelectMessage(activeWorkbooks.length ? '' : '활성 상태인 문제집(수업)이 없습니다.', activeWorkbooks.length ? '' : 'error');
    }

    function renderWorkbookArchiveButton() {
      var select = document.getElementById('workbookSelect');
      var archiveButton = document.getElementById('archiveWorkbookButton');
      if (!select || !archiveButton) return;

      var workbook = findActiveWorkbookById(select.value);
      var playerId = String(currentState && currentState.player && currentState.player.playerId || '').trim();
      var isOwner = !!workbook && !!playerId && String(workbook.createdBy || '').trim() === playerId;
      archiveButton.classList.toggle('hidden', !isOwner);
      archiveButton.disabled = !isOwner;
      archiveButton.setAttribute('aria-hidden', isOwner ? 'false' : 'true');
    }

    function showWorkbookSelectModal(options) {
      options = options || {};
      renderWorkbookSelectOptions();
      var modal = document.getElementById('workbookSelectModal');
      if (!modal) return;
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
      if (options.force) {
        refreshActiveWorkbooksForModal();
      }
    }

    function hideWorkbookSelectModal() {
      var modal = document.getElementById('workbookSelectModal');
      if (!modal) return;
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
    }

    function confirmWorkbookSelection() {
      var select = document.getElementById('workbookSelect');
      var workbook = select ? findActiveWorkbookById(select.value) : null;
      if (!workbook) {
        setWorkbookSelectMessage('문제집(수업)을 선택해 주세요.', 'error');
        return;
      }
      applySelectedWorkbook(workbook);
      setMainMessage('');
    }

    function archiveSelectedWorkbook() {
      var select = document.getElementById('workbookSelect');
      var workbook = select ? findActiveWorkbookById(select.value) : null;
      var playerId = String(currentState && currentState.player && currentState.player.playerId || '').trim();
      if (!workbook) {
        setWorkbookSelectMessage('삭제할 문제집(수업)을 선택해 주세요.', 'error');
        return;
      }
      if (!playerId || String(workbook.createdBy || '').trim() !== playerId) {
        setWorkbookSelectMessage('자신이 만든 문제집(수업)만 삭제할 수 있습니다.', 'error');
        renderWorkbookArchiveButton();
        return;
      }
      if (!window.confirm('"' + workbook.workbookName + '" 문제집(수업)을 목록에서 삭제할까요?\n문제와 기존 진행 기록은 보존됩니다.')) {
        return;
      }

      var archivedWorkbookId = workbook.workbookId;
      var archiveButton = document.getElementById('archiveWorkbookButton');
      archiveButton.disabled = true;
      setWorkbookSelectMessage('문제집(수업)을 삭제하는 중입니다.', 'ok');
      showLoadingModal('삭제 중...', '문제집(수업)을 목록에서 삭제하는 중...');
      google.script.run
        .withSuccessHandler(function(response) {
          hideLoadingModal();
          activeWorkbooks = normalizeWorkbookList(response && response.activeWorkbooks);
          if (selectedWorkbookId === archivedWorkbookId) {
            selectedWorkbookId = '';
            selectedWorkbookName = '';
            clearSelectedWorkbookStorage();
          }
          if (currentState) {
            currentState.activeWorkbooks = activeWorkbooks;
            if (currentState.selectedWorkbookId === archivedWorkbookId) {
              currentState.selectedWorkbookId = '';
              currentState.selectedWorkbookName = '';
              currentState.selectedWorkbook = null;
            }
            saveCurrentState(currentState);
          }
          renderCurrentWorkbookBadge();
          renderWorkbookSelectOptions();
          setWorkbookSelectMessage('문제집(수업)을 삭제했습니다. 문제와 기존 진행 기록은 보존됩니다.', 'ok');
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          renderWorkbookArchiveButton();
          setWorkbookSelectMessage(error && error.message ? error.message : '문제집(수업) 삭제에 실패했습니다.', 'error');
        })
        .archiveWorkbook(getAuthToken(), archivedWorkbookId);
    }

    function refreshActiveWorkbooksForModal() {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        return;
      }
      google.script.run
        .withSuccessHandler(function(workbooks) {
          activeWorkbooks = normalizeWorkbookList(workbooks);
          if (currentState) {
            currentState.activeWorkbooks = activeWorkbooks;
            saveCurrentState(currentState);
          }
          restoreSelectedWorkbookToState();
          renderWorkbookSelectOptions();
        })
        .withFailureHandler(function(error) {
          setWorkbookSelectMessage(error && error.message ? error.message : '문제집(수업) 목록을 불러오지 못했습니다.', 'error');
        })
        .getActiveWorkbooks(getAuthToken());
    }

    function showCreateWorkbookModal() {
      if (!canManageWorkbooks()) {
        setWorkbookSelectMessage('교사 또는 관리자만 문제집(수업)을 추가할 수 있습니다.', 'error');
        return;
      }
      document.getElementById('newWorkbookName').value = '';
      document.getElementById('newWorkbookSubject').value = '';
      document.getElementById('newWorkbookDescription').value = '';
      setCreateWorkbookMessage('', '');
      var modal = document.getElementById('createWorkbookModal');
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
      window.setTimeout(function() {
        document.getElementById('newWorkbookName').focus();
      }, 0);
    }

    function hideCreateWorkbookModal() {
      var modal = document.getElementById('createWorkbookModal');
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
    }

    function createWorkbookFromModal() {
      var payload = {
        workbookName: document.getElementById('newWorkbookName').value,
        subject: document.getElementById('newWorkbookSubject').value,
        description: document.getElementById('newWorkbookDescription').value,
      };
      if (!String(payload.workbookName || '').trim()) {
        setCreateWorkbookMessage('문제집(수업) 이름을 입력해 주세요.', 'error');
        return;
      }
      document.getElementById('createWorkbookButton').disabled = true;
      setCreateWorkbookMessage('문제집(수업)을 생성하는 중입니다.', 'ok');
      google.script.run
        .withSuccessHandler(function(response) {
          document.getElementById('createWorkbookButton').disabled = false;
          hideCreateWorkbookModal();
          activeWorkbooks = normalizeWorkbookList(response && response.activeWorkbooks);
          if (currentState) {
            currentState.activeWorkbooks = activeWorkbooks;
            saveCurrentState(currentState);
          }
          renderWorkbookSelectOptions();
          if (response && response.workbook && response.workbook.workbookId) {
            document.getElementById('workbookSelect').value = response.workbook.workbookId;
          }
          renderWorkbookArchiveButton();
          setWorkbookSelectMessage('문제집(수업)이 생성되었습니다. 확인을 누르면 이 문제집(수업)으로 입장합니다.', 'ok');
        })
        .withFailureHandler(function(error) {
          document.getElementById('createWorkbookButton').disabled = false;
          setCreateWorkbookMessage(error && error.message ? error.message : '문제집(수업) 생성에 실패했습니다.', 'error');
        })
        .createWorkbook(getAuthToken(), payload);
    }

    function setWorkbookSelectMessage(message, type) {
      var element = document.getElementById('workbookSelectMessage');
      if (!element) return;
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function setCreateWorkbookMessage(message, type) {
      var element = document.getElementById('createWorkbookMessage');
      if (!element) return;
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function scheduleNoticeModal() {
      var authToken = getAuthToken();
      if (!authToken || noticeRequestToken === authToken) {
        return;
      }
      noticeRequestToken = authToken;
      loadActiveNotices(authToken);
    }

    function loadActiveNotices(authToken) {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        return;
      }
      google.script.run
        .withSuccessHandler(function(notices) {
          var visible = (notices || []).filter(function(notice) {
            return !isNoticeHiddenToday(notice.noticeId);
          });
          if (visible.length) {
            showNoticeModal(visible);
          }
        })
        .withFailureHandler(function() {})
        .getActiveNotices(authToken);
    }

    function showNoticeModal(notices) {
      currentNoticeItems = notices || [];
      document.getElementById('noticeHideToday').checked = false;
      document.getElementById('noticeList').innerHTML = currentNoticeItems.map(function(notice) {
        return '<article class="notice-item">' +
          '<strong class="notice-item-title">' + escapeHtml(notice.title || '공지사항') + '</strong>' +
          '<p class="notice-item-body">' + escapeHtml(notice.body || '') + '</p>' +
        '</article>';
      }).join('');
      var modal = document.getElementById('noticeModal');
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
      window.requestAnimationFrame(function() {
        modal.classList.add('notice-visible');
      });
    }

    function confirmNoticeModal() {
      if (document.getElementById('noticeHideToday').checked) {
        hideNoticesForToday(currentNoticeItems);
      }
      closeNoticeModal();
    }

    function closeNoticeModal() {
      var modal = document.getElementById('noticeModal');
      modal.classList.remove('notice-visible');
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
      currentNoticeItems = [];
    }

    function hideNoticesForToday(notices) {
      var today = getNoticeTodayKey();
      (notices || []).forEach(function(notice) {
        if (!notice || !notice.noticeId) return;
        try {
          localStorage.setItem(NOTICE_HIDE_PREFIX + notice.noticeId, today);
        } catch (error) {}
      });
    }

    function isNoticeHiddenToday(noticeId) {
      if (!noticeId) return false;
      try {
        return localStorage.getItem(NOTICE_HIDE_PREFIX + noticeId) === getNoticeTodayKey();
      } catch (error) {
        return false;
      }
    }

    function getNoticeTodayKey() {
      var now = new Date();
      var month = String(now.getMonth() + 1).padStart(2, '0');
      var day = String(now.getDate()).padStart(2, '0');
      return now.getFullYear() + '-' + month + '-' + day;
    }

      authMode = 'login';
      document.getElementById('authTitle').textContent = '로그인';
      document.getElementById('userSummary').textContent = '학번과 비밀번호를 입력하세요.';

      document.getElementById('loginButton').classList.remove('hidden');
      document.getElementById('showRegisterButton').classList.remove('hidden');
      document.getElementById('registerButton').classList.add('hidden');

      setRegisterMessage('', '');

    function showRegisterForm() {
      authMode = 'register';
      document.getElementById('authTitle').textContent = '회원가입';
      document.getElementById('userSummary').textContent = '학번, 이름, 비밀번호와 프로필 사진을 입력하세요.';
      document.getElementById('studentIdField').style.gridColumn = '';
      document.getElementById('studentNameField').classList.remove('hidden');
      document.getElementById('avatarField').classList.remove('hidden');
      document.getElementById('roleField').classList.remove('hidden');
      document.getElementById('loginButton').classList.add('hidden');
      document.getElementById('showRegisterButton').classList.add('hidden');
      document.getElementById('registerButton').classList.remove('hidden');
      document.getElementById('backToLoginButton').classList.remove('hidden');

    function register() {
      setRegisterMessage('회원가입 중입니다.', 'ok');
      buildSignupPayload(function(payload) {
        showLoadingModal('회원가입 중...', '플레이어 데이터를 만드는 중...');
        google.script.run
          .withSuccessHandler(function(response) {
            hideLoadingModal();
            showLoginForm();
            setRegisterMessage((response && response.message) || '가입 신청이 완료되었습니다. 관리자 승인 후 로그인할 수 있습니다.', 'ok');
          })
          .withFailureHandler(function(error) {
            hideLoadingModal();
            setRegisterMessage(error.message, 'error');
          })
          .registerPlayer(payload);
      }, function(message) {
        setRegisterMessage(message, 'error');
      });
    }

    function login() {
      setRegisterMessage('로그인 중입니다.', 'ok');
      showLoadingModal('로그인 중...', '플레이어 정보를 확인하는 중...');
      google.script.run
        .withSuccessHandler(function(response) {
          hideLoadingModal();
          saveAuthToken(response.authToken);
          saveCurrentState(response.user);
          warmupGameDataSilently();
          setRegisterMessage('로그인되었습니다.', 'ok');
          renderCurrentUser(response.user);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setRegisterMessage(error.message, 'error');
        })
        .loginPlayer(getAuthFormPayload());
    }

    function logout() {
      var authToken = getAuthToken();
      showLoadingModal('로그아웃 중...', '세션을 정리하는 중...');
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        completeLogout();
        return;
      }
      google.script.run
        .withSuccessHandler(completeLogout)
        .withFailureHandler(function() {
          completeLogout();
        })
        .logoutPlayer(authToken);
    }

    function completeLogout() {
      clearLoginSessionStorage();
      currentState = null;
      activeWorkbooks = [];
      selectedWorkbookId = '';
      selectedWorkbookName = '';
      pendingResumeRun = null;
      pendingGameStartAt = 0;
      closeNoticeModal();
      hideWorkbookSelectModal();
      hideCreateWorkbookModal();
      hideResumeRunModal();
      hideLoadingModal();
      showLoginForm();
      toggle('registerPanel', true);
      toggle('mainPanel', false);
      toggle('infoPanel', false);
      setRegisterMessage('로그아웃되었습니다.', 'ok');
      setMainMessage('', '');
    }

    function clearLoginSessionStorage() {
      try {
        Object.keys(sessionStorage).forEach(function(key) {
          if (key.indexOf('learningRpg') === 0) {
            sessionStorage.removeItem(key);
          }
        });
      } catch (error) {}
      clearSelectedWorkbookStorage();
    }

    function showGameStartMessage() {
      if (!currentState || !currentState.player) {
        setMainMessage('먼저 로그인해 주세요.', 'error');
        return;
      }
      if (!selectedWorkbookId) {
        showWorkbookSelectModal();
        setMainMessage('게임을 시작하려면 문제집(수업)을 먼저 선택해 주세요.', 'error');
        return;
      }
      var startedAt = Date.now();
      pendingGameStartAt = startedAt;
      showLoadingModal('로딩 중...', '게임 시작 조건을 확인하는 중...');
      google.script.run
        .withSuccessHandler(function(summary) {
          if (summary && summary.hasActiveRun) {
            hideLoadingModal();
            showResumeRunModal(summary.run);
            return;
          }
          startRunFromMenu(startedAt, false);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setMainMessage(error && error.message ? error.message : '게임 시작 조건을 확인하지 못했습니다.', 'error');
        })
        .getActiveRunSummary(currentState.player.playerId, getAuthToken(), selectedWorkbookId);
    }

    function startRunFromMenu(startedAt, restart) {
      showLoadingModal(
        '로딩 중...',
        restart ? '이전 진행을 포기하고 처음부터 시작합니다.' : '전투 데이터를 불러오는 중...'
      );
      google.script.run
        .withSuccessHandler(function() {
          transitionToBattlePage(startedAt || Date.now());
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          hideResumeRunModal();
          setMainMessage(error && error.message ? error.message : '게임을 시작하지 못했습니다.', 'error');
        })[restart ? 'restartRun' : 'startRun'](currentState.player.playerId, getAuthToken(), selectedWorkbookId);
    }

    function showResumeRunModal(run) {
      pendingResumeRun = run || null;
      var modal = document.getElementById('resumeRunModal');
      var summary = document.getElementById('resumeRunSummary');
      var floor = Number(run && run.currentFloor || 1);
      var stage = Number(run && run.currentStage || 1);
      var displayParts = getDisplayFloorParts(floor);
      var displayFloor = displayParts.floorLabel;
      var stageName = getStageDisplayName(run && run.stageName);
      var hp = Number(run && run.currentHp || 0);
      var shield = Number(run && run.currentShield || 0);
      var workbookName = String(run && run.workbookName || selectedWorkbookName || '').trim();
      summary.innerHTML = [
        '<strong>' + escapeHtml(displayFloor + ' ' + (stageName || displayParts.areaLabel) + ' ' + stage + '스테이지') + '</strong>',
        (workbookName ? '<span>문제집(수업): ' + escapeHtml(workbookName) + '</span>' : ''),
        '<span>HP ' + escapeHtml(hp) + (shield > 0 ? ' / 보호막 ' + escapeHtml(shield) : '') + '</span>'
      ].filter(Boolean).join('<br>');
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
    }

    function getDisplayFloorParts(progressFloor) {
      var floor = Number(progressFloor || 1);
      var displays = {
        1: { floorLabel: '5층', areaLabel: '옥상' },
        2: { floorLabel: '4층', areaLabel: '1학년 교실층' },
        3: { floorLabel: '3층', areaLabel: '3학년 교실층' },
        4: { floorLabel: '2층', areaLabel: '2학년 교실층' },
        5: { floorLabel: '1층', areaLabel: '현관 앞' },
      };
      return displays[floor] || { floorLabel: floor + '층', areaLabel: '' };
    }

    function getStageDisplayName(stageName) {
      var name = String(stageName || '').trim();
      if (/^\d+층\s*\d+스테이지$/.test(name)) {
        return '';
      }
      return name;
    }

    function hideResumeRunModal() {
      var modal = document.getElementById('resumeRunModal');
      if (!modal) return;
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
    }

    function continuePreviousRun() {
      hideResumeRunModal();
      startRunFromMenu(pendingGameStartAt || Date.now(), false);
    }

    function abandonPreviousRunAndStart() {
      hideResumeRunModal();
      startRunFromMenu(pendingGameStartAt || Date.now(), true);
    }

    function transitionToBattlePage(startedAt) {
      var elapsed = Date.now() - Number(startedAt || Date.now());
      var waitMs = Math.max(0, 650 - elapsed);
      window.setTimeout(function() {
        var modal = document.getElementById('loadingModal');
        document.getElementById('loadingTitle').textContent = '로딩 중...';
        document.getElementById('loadingText').textContent = '잠시 후 전투가 시작됩니다.';
        modal.classList.add('page-transition');
        window.setTimeout(function() {
          goToPage('battle', { loading: false });
        }, 720);
        window.setTimeout(function() {
          if (document.visibilityState !== 'hidden') {
            modal.classList.remove('page-transition');
            document.getElementById('loadingTitle').textContent = '로딩 중...';
            document.getElementById('loadingText').textContent = '이동이 지연되면 새로고침 후 다시 시도해 주세요.';
          }
        }, 2200);
      }, waitMs);
    }

    function showLeaderboardMessage() {
      goToPage('leaderboard');
    }

    function showMyInfo() {
      goToPage('mypage');
    }

    function goToPage(page, options) {
      options = options || {};
      if (page === 'question' && !canCreateQuestions()) {
        hideLoadingModal();
        setMainMessage('교사 또는 관리자만 문제를 만들 수 있습니다.', 'error');
        return;
      }
      if (options.loading !== false) {
        showNavigationLoading(page, options);
      }
      var baseUrl = getNavigationBaseUrl();
      if (!baseUrl) {
        hideLoadingModal();
        setMainMessage('웹앱 이동 주소를 확인하지 못했습니다. 현재 배포 URL로 다시 접속해 주세요.', 'error');
        return;
      }
      var separator = baseUrl.indexOf('?') === -1 ? '?' : '&';
      var nextUrl = baseUrl + separator + 'page=' + encodeURIComponent(page);
      navigateTop(nextUrl);
    }

    function showNavigationLoading(page, options) {
      var labels = {
        question: '문제 만들기 화면으로 이동 중...',
        leaderboard: '리더보드 화면으로 이동 중...',
        mypage: '내 정보 화면으로 이동 중...',
        admin: '관리자 화면으로 이동 중...',
        battle: '로딩 중...',
      };
      showLoadingModal(options.title || labels[page] || '화면 이동 중...', options.text || '잠시만 기다려 주세요.');
    }

    function navigateTop(url) {
      var targetUrl = String(url || '');
      try {
        window.location.assign(targetUrl);
        return;
      } catch (error) {}
      window.setTimeout(function() {
        showNavigationFallback(targetUrl);
      }, 1200);
    }

    function showNavigationFallback(url) {
      var modal = document.getElementById('loadingModal');
      var text = document.getElementById('loadingText');
      if (!modal || !text || !modal.classList.contains('active')) {
        return;
      }
      text.innerHTML = '자동 이동이 막혔습니다. <a href="' + escapeHtml(url) + '" target="_top" rel="noopener">여기를 눌러 이동</a>해 주세요.';
    }

    function getNavigationBaseUrl() {
      var candidates = [
        String(WEB_APP_URL || ''),
        String(document.referrer || ''),
        String(window.location && window.location.href || ''),
      ];
      try {
        candidates.unshift(String(window.top && window.top.location && window.top.location.href || ''));
      } catch (error) {}

      for (var i = 0; i < candidates.length; i += 1) {
        var cleanUrl = sanitizeWebAppBaseUrl(candidates[i]);
        if (cleanUrl) {
          return cleanUrl;
        }
      }
      return '';
    }

    function sanitizeWebAppBaseUrl(url) {
      var cleanUrl = String(url || '').split('#')[0].split('?')[0].replace(/\/+$/, '');
      if (/^https:\/\/script\.google\.com\/(?:macros\/s|a\/macros\/[^/]+\/s)\/[^/]+\/(?:exec|dev)$/.test(cleanUrl)) {
        return cleanUrl;
      }
      return '';
    }

    function getAuthFormPayload() {
      return {
        studentId: document.getElementById('studentId').value,
        studentName: document.getElementById('studentName').value,
        password: document.getElementById('password').value,
        role: getSelectedAccountRole(),
      };
    }

    function getSelectedAccountRole() {
      var selected = document.querySelector('input[name="accountRole"]:checked');
      return selected && selected.value === 'teacher' ? 'teacher' : 'student';
    }

    function buildSignupPayload(onSuccess, onFailure) {
      var payload = getAuthFormPayload();
      var input = document.getElementById('avatarFile');
      var file = input && input.files && input.files[0];
      if (!file) {
        onSuccess(payload);
        return;
      }
      if (!/^image\/(png|jpeg|webp)$/.test(file.type)) {
        onFailure('지원하지 않는 이미지 형식입니다.');
        return;
      }
      resizeImageFile(file, 240, function(dataUrl) {
        payload.avatarDataUrl = dataUrl;
        onSuccess(payload);
      }, onFailure);
    }

    function resizeImageFile(file, maxSize, onSuccess, onFailure) {
      var reader = new FileReader();
      reader.onerror = function() {
        onFailure('프로필 사진을 읽지 못했습니다.');
      };
      reader.onload = function(event) {
        var image = new Image();
        image.onerror = function() {
          onFailure('프로필 사진을 불러오지 못했습니다.');
        };
        image.onload = function() {
          var scale = Math.min(1, maxSize / Math.max(image.width, image.height));
          var width = Math.max(1, Math.round(image.width * scale));
          var height = Math.max(1, Math.round(image.height * scale));
          var canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          var context = canvas.getContext('2d');
          context.drawImage(image, 0, 0, width, height);
          onSuccess(canvas.toDataURL('image/jpeg', 0.78));
        };
        image.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    function getAuthToken() {
      try {
        return sessionStorage.getItem('learningRpgAuthToken') || '';
      } catch (error) {
        return '';
      }
    }

    function saveAuthToken(authToken) {
      try {
        sessionStorage.setItem('learningRpgAuthToken', authToken);
      } catch (error) {}
    }

    function saveCurrentState(state) {
      try {
        sessionStorage.setItem('learningRpgCurrentState', JSON.stringify(state || null));
      } catch (error) {
        // Ignore storage failures.
      }
    }

    function getCachedCurrentState() {
      try {
        return JSON.parse(sessionStorage.getItem('learningRpgCurrentState') || 'null');
      } catch (error) {
        return null;
      }
    }

    function toggle(id, show) {
      document.getElementById(id).classList.toggle('active', show);
    }

    function setMainMessage(message, type) {
      var element = document.getElementById('mainMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function setRegisterMessage(message, type) {
      var element = document.getElementById('registerMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function formatScore(score) {
      return Number(score || 0).toLocaleString('ko-KR') + '점';
    }

    function showLoadingModal(title, text) {
      document.getElementById('loadingModal').classList.remove('page-transition');
      document.getElementById('loadingTitle').textContent = title || '로딩 중...';
      document.getElementById('loadingText').textContent = text || '데이터를 불러오는 중...';
      document.getElementById('loadingModal').classList.add('active');
    }

    function hideLoadingModal() {
      document.getElementById('loadingModal').classList.remove('active', 'page-transition');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
