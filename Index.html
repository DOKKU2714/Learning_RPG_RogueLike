<!DOCTYPE html>

  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include_('UiStyles'); ?>

      width: min(520px, 100%);

<body>
  <? var skipIntroOnLoad = requestParams && requestParams.skipIntro === '1'; ?>
  <section id="introScreen" class="intro-screen screen <?= skipIntroOnLoad ? '' : 'active' ?>" onclick="enterApp()">
    <div>
      <div id="introLogo" class="intro-logo intro-logo-image">
        <img
          id="introLogoImage"
          src="<?= getAssetUrl_('Resources/Intro_logo.png') ?>"
          alt="Learning Roguelike"
          onload="markIntroLogoLoaded()"
          onerror="handleIntroLogoError(this)"
        >
        <span id="introLogoFallback">LEARNING<br>ROGUELIKE</span>
      </div>
      <p class="blink-text">아무 곳이나 클릭하세요</p>
    </div>
  </section>

  <main id="appScreen" class="menu-shell screen fade-in <?= skipIntroOnLoad ? 'active' : '' ?>">
    <section id="registerPanel" class="rpg-panel screen <?= skipIntroOnLoad ? 'active' : '' ?>">
      <h1 id="authTitle" class="rpg-title">로그인</h1>
      <p id="userSummary" class="muted" style="text-align:center;">학번, 이름, 비밀번호를 입력하세요.</p>

      <div class="form-grid" style="margin-top:18px;">
        <div id="studentIdField">
          <label for="studentId">학번</label>
          <input id="studentId" maxlength="30" autocomplete="username" placeholder="예: 202601">
        </div>
        <div id="studentNameField">
          <label for="studentName">이름</label>
          <input id="studentName" maxlength="20" placeholder="예: 김디지털">
        </div>
        <div style="grid-column:1 / -1;">
          <label for="password">비밀번호</label>
          <input id="password" type="password" maxlength="40" autocomplete="current-password" placeholder="4자 이상">
        </div>
        <div id="avatarField" style="grid-column:1 / -1;">
          <label for="avatarFile">프로필 사진</label>
          <input id="avatarFile" type="file" accept="image/png,image/jpeg,image/webp">
        </div>
      </div>

      <div class="vertical-menu">
        <button id="loginButton" onclick="login()">로그인</button>
        <button id="showRegisterButton" class="secondary" onclick="showRegisterForm()">회원가입</button>
        <button id="registerButton" onclick="register()">회원가입 완료</button>
        <button id="backToLoginButton" class="secondary" onclick="showLoginForm()">뒤로</button>
        <button class="secondary" onclick="goToPage('admin')">관리자 접속</button>
      </div>
      <div id="registerMessage" class="message"></div>
    </section>

    <section id="mainPanel" class="rpg-panel screen">
      <div class="main-menu-logo" aria-hidden="true">
        <img src="<?= getAssetUrl_('Resources/Intro_logo.png') ?>" alt="" onerror="this.style.display='none'">
      </div>
      <div id="playerBadge" style="text-align:center;"></div>
      <div class="vertical-menu">
        <button onclick="showGameStartMessage()">게임 시작</button>
        <button onclick="goToPage('question')">문제 만들기</button>
        <button class="secondary" onclick="showMyInfo()">내 정보</button>
        <button class="secondary" onclick="goToPage('leaderboard')">리더보드</button>
        <button class="secondary" onclick="refreshCurrentUser(true)">새로고침</button>
        <button id="adminButton" class="secondary" onclick="goToPage('admin')" style="display:none;">관리자</button>
      </div>
      <div id="mainMessage" class="message"></div>
    </section>

    <section id="infoPanel" class="rpg-panel screen">
      <h2 class="rpg-title">내 정보</h2>
      <div id="infoContent"></div>
      <button class="secondary" onclick="toggle('infoPanel', false)">닫기</button>
    </section>
  </main>

  <div id="resumeRunModal" class="question-modal-overlay" aria-hidden="true">
    <section class="question-modal resume-run-modal" role="dialog" aria-modal="true" aria-labelledby="resumeRunTitle">
      <h2 id="resumeRunTitle" class="rpg-title">이전 진행 발견</h2>
      <p class="muted" style="text-align:center;">이전에 하던 플레이를 이어 하시겠습니까?</p>
      <div id="resumeRunSummary" class="resume-run-summary"></div>
      <div class="resume-run-actions">
        <button class="secondary" onclick="abandonPreviousRunAndStart()">포기</button>
        <button onclick="continuePreviousRun()">이어하기</button>
      </div>
    </section>
  </div>

  <?!= include_('UiLoadingModal'); ?>

  <script>
    var WEB_APP_URL = '<?= getWebAppUrl_() ?>';
    var ASSET_BASE_URL = '<?= getAssetBaseUrl_() ?>';
    var currentState = null;
    var authMode = 'login';
    var SKIP_INTRO = window.location.search.indexOf('skipIntro=1') !== -1;
    var INTRO_SEEN_KEY = 'learningRpgIntroSeen';
    var currentUserRequestTimer = null;
    var pendingResumeRun = null;
    var pendingGameStartAt = 0;

    document.addEventListener('DOMContentLoaded', bootIndexPage);

    function bootIndexPage() {
      try {
        bindLoginEnterKey();
        showLoginForm();
        if (SKIP_INTRO || getAuthToken()) {
          enterApp();
        }
      } catch (error) {
        recoverIndexBoot(error);
      }
    }

    function recoverIndexBoot(error) {
      try {
        document.getElementById('introScreen').classList.remove('active');
        document.getElementById('appScreen').classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
        document.getElementById('mainPanel').classList.remove('active');
        document.getElementById('infoPanel').classList.remove('active');
        showLoginForm();
        setRegisterMessage('화면 초기화 중 문제가 발생했습니다. 다시 로그인해 주세요.', 'error');
      } catch (recoverError) {
        document.body.innerHTML = '<main class="menu-shell screen active"><section class="rpg-panel screen active"><h1 class="rpg-title">로그인</h1><p class="message error">화면을 초기화하지 못했습니다. 새로고침해 주세요.</p></section></main>';
      }
    }

    function hasSeenIntroScreen() {
      try {
        return localStorage.getItem(INTRO_SEEN_KEY) === '1';
      } catch (error) {
        return false;
      }
    }

    function markIntroScreenSeen() {
      try {
        localStorage.setItem(INTRO_SEEN_KEY, '1');
      } catch (error) {}
    }

    function markIntroLogoLoaded() {
      var logo = document.getElementById('introLogo');
      if (!logo) return;
      logo.classList.add('logo-loaded');
    }

    function getIntroLogoCandidates() {
      if (!ASSET_BASE_URL) return [];
      return [
        'Resources/Intro_logo.png',
        'Resources/intro_logo.png',
        'resources/Intro_logo.png',
        'resources/intro_logo.png',
        'Resource/Intro_logo.png',
        'Resource/intro_logo.png',
        'resource/Intro_logo.png',
        'resource/intro_logo.png',
      ].map(function(path) {
        return ASSET_BASE_URL + '/' + path;
      });
    }

    function handleIntroLogoError(image) {
      if (image && image.dataset) {
        var candidates = getIntroLogoCandidates();
        var index = Number(image.dataset.fallbackIndex || 0);
        while (index < candidates.length && image.src === candidates[index]) {
          index += 1;
        }
        if (index < candidates.length) {
          image.dataset.fallbackIndex = String(index + 1);
          image.src = candidates[index];
          return;
        }
      }
      var logo = document.getElementById('introLogo');
      if (logo) {
        logo.classList.remove('logo-loaded');
      }
      if (image) {
        image.style.display = 'none';
      }
    }

    function bindLoginEnterKey() {
      ['studentId', 'studentName', 'password'].forEach(function(id) {
        var input = document.getElementById(id);
        if (!input) return;
        input.addEventListener('keydown', function(event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            if (authMode === 'register') {
              register();
            } else {
              login();
            }
          }
        });
      });
    }

    function enterApp() {
      markIntroScreenSeen();
      document.getElementById('introScreen').classList.remove('active');
      document.getElementById('appScreen').classList.add('active');
      document.getElementById('registerPanel').classList.add('active');
      showLoginForm();
      refreshCurrentUser();
    }

    function warmupGameDataSilently() {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        return;
      }
      google.script.run
        .withFailureHandler(function() {})
        .warmupGameData(getAuthToken());
    }

    function refreshCurrentUser(force) {
      setMainMessage('');
      var authToken = getAuthToken();
      if (!authToken) {
        saveCurrentState(null);
        renderCurrentUser({ isRegistered: false });
        return;
      }
      if (!force) {
        var cachedState = getCachedCurrentState();
        if (cachedState) {
          renderCurrentUser(cachedState);
          return;
        }
      }
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        document.getElementById('appScreen').classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
        showLoginForm();
        setRegisterMessage('앱 실행 환경을 불러오지 못했습니다. 배포 URL로 다시 접속해 주세요.', 'error');
        return;
      }
      showLoadingModal('로딩 중...', '사용자 정보를 확인하는 중...');
      clearCurrentUserRequestTimer();
      currentUserRequestTimer = window.setTimeout(function() {
        hideLoadingModal();
        document.getElementById('appScreen').classList.add('active');
        document.getElementById('registerPanel').classList.add('active');
        showLoginForm();
        setRegisterMessage('사용자 정보 확인이 지연되고 있습니다. 새로고침 후 다시 시도해 주세요.', 'error');
      }, 9000);
      google.script.run
        .withSuccessHandler(function(state) {
          clearCurrentUserRequestTimer();
          hideLoadingModal();
          saveCurrentState(state);
          renderCurrentUser(state);
        })
        .withFailureHandler(function(error) {
          clearCurrentUserRequestTimer();
          hideLoadingModal();
          document.getElementById('appScreen').classList.add('active');
          document.getElementById('registerPanel').classList.add('active');
          setRegisterMessage(error.message, 'error');
        })
        .getCurrentUser(authToken);
    }

    function clearCurrentUserRequestTimer() {
      if (currentUserRequestTimer) {
        window.clearTimeout(currentUserRequestTimer);
        currentUserRequestTimer = null;
      }
    }

    function renderCurrentUser(state) {
      state = state || { isRegistered: false };
      if (state.isRegistered && !state.player) {
        state.isRegistered = false;
      }
      currentState = state;
      toggle('registerPanel', !state.isRegistered);
      toggle('mainPanel', state.isRegistered);
      toggle('infoPanel', false);

      if (!state.isRegistered) {
        document.getElementById('userSummary').textContent = '학번, 이름, 비밀번호를 입력하세요.';
        showLoginForm();
        return;
      }
      document.getElementById('playerBadge').innerHTML = '';
      document.getElementById('adminButton').style.display = state.isAdmin ? 'block' : 'none';
    }

    function showLoginForm() {
      authMode = 'login';
      document.getElementById('authTitle').textContent = '로그인';
      document.getElementById('userSummary').textContent = '학번과 비밀번호를 입력하세요.';
      document.getElementById('studentIdField').style.gridColumn = '1 / -1';
      document.getElementById('studentNameField').classList.add('hidden');
      document.getElementById('avatarField').classList.add('hidden');
      document.getElementById('loginButton').classList.remove('hidden');
      document.getElementById('showRegisterButton').classList.remove('hidden');
      document.getElementById('registerButton').classList.add('hidden');
      document.getElementById('backToLoginButton').classList.add('hidden');
      setRegisterMessage('', '');
    }

    function showRegisterForm() {
      authMode = 'register';
      document.getElementById('authTitle').textContent = '회원가입';
      document.getElementById('userSummary').textContent = '학번, 이름, 비밀번호와 프로필 사진을 입력하세요.';
      document.getElementById('studentIdField').style.gridColumn = '';
      document.getElementById('studentNameField').classList.remove('hidden');
      document.getElementById('avatarField').classList.remove('hidden');
      document.getElementById('loginButton').classList.add('hidden');
      document.getElementById('showRegisterButton').classList.add('hidden');
      document.getElementById('registerButton').classList.remove('hidden');
      document.getElementById('backToLoginButton').classList.remove('hidden');
      setRegisterMessage('', '');
    }

    function register() {
      setRegisterMessage('회원가입 중입니다.', 'ok');
      buildSignupPayload(function(payload) {
        showLoadingModal('회원가입 중...', '플레이어 데이터를 만드는 중...');
        google.script.run
          .withSuccessHandler(function(response) {
            hideLoadingModal();
            saveAuthToken(response.authToken);
            saveCurrentState(response.user);
            warmupGameDataSilently();
            setRegisterMessage('회원가입되었습니다.', 'ok');
            renderCurrentUser(response.user);
          })
          .withFailureHandler(function(error) {
            hideLoadingModal();
            setRegisterMessage(error.message, 'error');
          })
          .registerPlayer(payload);
      }, function(message) {
        setRegisterMessage(message, 'error');
      });
    }

    function login() {
      setRegisterMessage('로그인 중입니다.', 'ok');
      showLoadingModal('로그인 중...', '플레이어 정보를 확인하는 중...');
      google.script.run
        .withSuccessHandler(function(response) {
          hideLoadingModal();
          saveAuthToken(response.authToken);
          saveCurrentState(response.user);
          warmupGameDataSilently();
          setRegisterMessage('로그인되었습니다.', 'ok');
          renderCurrentUser(response.user);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setRegisterMessage(error.message, 'error');
        })
        .loginPlayer(getAuthFormPayload());
    }

    function showGameStartMessage() {
      if (!currentState || !currentState.player) {
        setMainMessage('먼저 로그인해 주세요.', 'error');
        return;
      }
      var startedAt = Date.now();
      pendingGameStartAt = startedAt;
      showLoadingModal('전투를 준비하는 중...', '게임 시작 조건을 확인하는 중...');
      google.script.run
        .withSuccessHandler(function(summary) {
          if (summary && summary.hasActiveRun) {
            hideLoadingModal();
            showResumeRunModal(summary.run);
            return;
          }
          startRunFromMenu(startedAt, false);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setMainMessage(error && error.message ? error.message : '게임 시작 조건을 확인하지 못했습니다.', 'error');
        })
        .getActiveRunSummary(currentState.player.playerId, getAuthToken());
    }

    function startRunFromMenu(startedAt, restart) {
      showLoadingModal(
        restart ? '새 게임을 준비하는 중...' : '전투를 준비하는 중...',
        restart ? '이전 진행을 포기하고 처음부터 시작합니다.' : '전투 데이터를 불러오는 중...'
      );
      google.script.run
        .withSuccessHandler(function() {
          transitionToBattlePage(startedAt || Date.now());
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          hideResumeRunModal();
          setMainMessage(error && error.message ? error.message : '게임을 시작하지 못했습니다.', 'error');
        })[restart ? 'restartRun' : 'startRun'](currentState.player.playerId, getAuthToken());
    }

    function showResumeRunModal(run) {
      pendingResumeRun = run || null;
      var modal = document.getElementById('resumeRunModal');
      var summary = document.getElementById('resumeRunSummary');
      var floor = Number(run && run.currentFloor || 1);
      var stage = Number(run && run.currentStage || 1);
      var displayParts = getDisplayFloorParts(floor);
      var displayFloor = displayParts.floorLabel;
      var stageName = getStageDisplayName(run && run.stageName);
      var hp = Number(run && run.currentHp || 0);
      var shield = Number(run && run.currentShield || 0);
      summary.innerHTML = [
        '<strong>' + escapeHtml(displayFloor + ' ' + (stageName || displayParts.areaLabel) + ' ' + stage + '스테이지') + '</strong>',
        '<span>HP ' + escapeHtml(hp) + (shield > 0 ? ' / 보호막 ' + escapeHtml(shield) : '') + '</span>'
      ].join('<br>');
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
    }

    function getDisplayFloorParts(progressFloor) {
      var floor = Number(progressFloor || 1);
      var displays = {
        1: { floorLabel: '5층', areaLabel: '옥상' },
        2: { floorLabel: '4층', areaLabel: '1학년 교실층' },
        3: { floorLabel: '3층', areaLabel: '3학년 교실층' },
        4: { floorLabel: '2층', areaLabel: '2학년 교실층' },
        5: { floorLabel: '1층', areaLabel: '현관 앞' },
      };
      return displays[floor] || { floorLabel: floor + '층', areaLabel: '' };
    }

    function getStageDisplayName(stageName) {
      var name = String(stageName || '').trim();
      if (/^\d+층\s*\d+스테이지$/.test(name)) {
        return '';
      }
      return name;
    }

    function hideResumeRunModal() {
      var modal = document.getElementById('resumeRunModal');
      if (!modal) return;
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
    }

    function continuePreviousRun() {
      hideResumeRunModal();
      startRunFromMenu(pendingGameStartAt || Date.now(), false);
    }

    function abandonPreviousRunAndStart() {
      hideResumeRunModal();
      startRunFromMenu(pendingGameStartAt || Date.now(), true);
    }

    function transitionToBattlePage(startedAt) {
      var elapsed = Date.now() - Number(startedAt || Date.now());
      var waitMs = Math.max(0, 650 - elapsed);
      window.setTimeout(function() {
        var modal = document.getElementById('loadingModal');
        document.getElementById('loadingTitle').textContent = '전투 화면으로 이동 중...';
        document.getElementById('loadingText').textContent = '잠시 후 전투가 시작됩니다.';
        modal.classList.add('page-transition');
        window.setTimeout(function() {
          goToPage('battle');
        }, 720);
        window.setTimeout(function() {
          if (document.visibilityState !== 'hidden') {
            modal.classList.remove('page-transition');
            document.getElementById('loadingTitle').textContent = '전투 화면으로 이동 중...';
            document.getElementById('loadingText').textContent = '이동이 지연되면 새로고침 후 다시 시도해 주세요.';
          }
        }, 2200);
      }, waitMs);
    }

    function showLeaderboardMessage() {
      goToPage('leaderboard');
    }

    function showMyInfo() {
      goToPage('mypage');
    }

    function goToPage(page) {
      var baseUrl = getNavigationBaseUrl();
      if (!baseUrl) {
        hideLoadingModal();
        setMainMessage('웹앱 이동 주소를 확인하지 못했습니다. 현재 배포 URL로 다시 접속해 주세요.', 'error');
        return;
      }
      var separator = baseUrl.indexOf('?') === -1 ? '?' : '&';
      var nextUrl = baseUrl + separator + 'page=' + encodeURIComponent(page);
      try {
        window.top.location.assign(nextUrl);
      } catch (error) {
        window.location.assign(nextUrl);
      }
    }

    function getNavigationBaseUrl() {
      var candidates = [
        String(window.location && window.location.href || ''),
        String(document.referrer || ''),
        String(WEB_APP_URL || ''),
      ];
      try {
        candidates.unshift(String(window.top && window.top.location && window.top.location.href || ''));
      } catch (error) {}

      for (var i = 0; i < candidates.length; i += 1) {
        var cleanUrl = sanitizeWebAppBaseUrl(candidates[i]);
        if (cleanUrl) {
          return cleanUrl;
        }
      }
      return '';
    }

    function sanitizeWebAppBaseUrl(url) {
      var cleanUrl = String(url || '').split('#')[0].split('?')[0].replace(/\/+$/, '');
      if (/^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/(?:exec|dev)$/.test(cleanUrl)) {
        return cleanUrl;
      }
      return '';
    }

    function getAuthFormPayload() {
      return {
        studentId: document.getElementById('studentId').value,
        studentName: document.getElementById('studentName').value,
        password: document.getElementById('password').value,
      };
    }

    function buildSignupPayload(onSuccess, onFailure) {
      var payload = getAuthFormPayload();
      var input = document.getElementById('avatarFile');
      var file = input && input.files && input.files[0];
      if (!file) {
        onSuccess(payload);
        return;
      }
      if (!/^image\/(png|jpeg|webp)$/.test(file.type)) {
        onFailure('지원하지 않는 이미지 형식입니다.');
        return;
      }
      resizeImageFile(file, 240, function(dataUrl) {
        payload.avatarDataUrl = dataUrl;
        onSuccess(payload);
      }, onFailure);
    }

    function resizeImageFile(file, maxSize, onSuccess, onFailure) {
      var reader = new FileReader();
      reader.onerror = function() {
        onFailure('프로필 사진을 읽지 못했습니다.');
      };
      reader.onload = function(event) {
        var image = new Image();
        image.onerror = function() {
          onFailure('프로필 사진을 불러오지 못했습니다.');
        };
        image.onload = function() {
          var scale = Math.min(1, maxSize / Math.max(image.width, image.height));
          var width = Math.max(1, Math.round(image.width * scale));
          var height = Math.max(1, Math.round(image.height * scale));
          var canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          var context = canvas.getContext('2d');
          context.drawImage(image, 0, 0, width, height);
          onSuccess(canvas.toDataURL('image/jpeg', 0.78));
        };
        image.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }

    function getAuthToken() {
      try {
        return sessionStorage.getItem('learningRpgAuthToken') || '';
      } catch (error) {
        return '';
      }
    }

    function saveAuthToken(authToken) {
      try {
        sessionStorage.setItem('learningRpgAuthToken', authToken);
      } catch (error) {}
    }

    function saveCurrentState(state) {
      try {
        sessionStorage.setItem('learningRpgCurrentState', JSON.stringify(state || null));
      } catch (error) {
        // Ignore storage failures.
      }
    }

    function getCachedCurrentState() {
      try {
        return JSON.parse(sessionStorage.getItem('learningRpgCurrentState') || 'null');
      } catch (error) {
        return null;
      }
    }

    function toggle(id, show) {
      document.getElementById(id).classList.toggle('active', show);
    }

    function setMainMessage(message, type) {
      var element = document.getElementById('mainMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function setRegisterMessage(message, type) {
      var element = document.getElementById('registerMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function showLoadingModal(title, text) {
      document.getElementById('loadingModal').classList.remove('page-transition');
      document.getElementById('loadingTitle').textContent = title || '로딩 중...';
      document.getElementById('loadingText').textContent = text || '데이터를 불러오는 중...';
      document.getElementById('loadingModal').classList.add('active');
    }

    function hideLoadingModal() {
      document.getElementById('loadingModal').classList.remove('active', 'page-transition');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
