        return /^사용 가능 횟수/.test(useLimitText) ? useLimitText : '사용 가능 횟수: ' + useLimitText;
      }
      var cooldownText = String(skill && skill.cooldownText || '').trim();
      if (isSkillUseLimitText(cooldownText)) {
        return /^사용 가능 횟수/.test(cooldownText) ? cooldownText : '사용 가능 횟수: ' + cooldownText;
      }
      var conditions = safeJsonParseClient(skill && (skill.conditionJson || skill.conditionsJson || skill.conditions), {});
      if (conditions.perStageLimit) {
        return '사용 가능 횟수: 스테이지 ' + Number(conditions.perStageLimit || 0) + '회';
      }
      if (conditions.perBattleLimit) {
        return '사용 가능 횟수: 전투 ' + Number(conditions.perBattleLimit || 0) + '회';
      }
      return '';
    }

    function getSkillCooldownDisplayText(skill) {
      var cooldownText = String(skill && skill.cooldownText || '').trim();
      if (isSkillUseLimitText(cooldownText)) return '';
      if (cooldownText) return cooldownText;
      var cooldown = parseClientPositiveNumber(skill && skill.cooldown);
      return cooldown > 0 ? '쿨타임 ' + cooldown + '턴' : '쿨타임 없음';
    }

    function parseClientPositiveNumber(value) {
      if (value === '' || value === null || value === undefined) return 0;
      var match = String(value).match(/-?\d+(?:\.\d+)?/);
      return Math.max(0, Math.round(Number(match ? match[0] : value || 0)));
    }

    function applyOptimisticMonsterDamage(battle, targetId, damage, actionType, skill, simultaneousGroupId) {
      var target = findOptimisticTargetMonster(battle, targetId);
      if (!target) return;
      var critical = rollClientCriticalDamage(battle, damage);
      var totalDamage = applyClientOutgoingItemDamageModifiers(battle, critical.damage, {
        actionType: actionType || 'attack',
        skill: skill,
      });
      var shieldDamage = Math.min(Number(target.shield || 0), totalDamage);
      var hpDamage = totalDamage - shieldDamage;
      target.shield = Math.max(0, Number(target.shield || 0) - shieldDamage);
      target.currentHp = Math.max(0, Number(target.currentHp || 0) - hpDamage);
      battle.lastTurnEvents.push({
        actor: 'player',
        type: actionType || 'attack',
        skillId: skill && skill.skillId || '',
        targetMonsterId: target.instanceId || target.monsterId,
        targetName: target.name,
        damage: totalDamage,
        shieldDamage: shieldDamage,
        hpDamage: hpDamage,
        isCritical: critical.isCritical,
        criticalMultiplier: critical.multiplier,
        simultaneousGroupId: simultaneousGroupId || '',
        message: critical.isCritical
          ? (skill && skill.name ? skill.name + ' 치명타! ' + totalDamage + ' 피해!' : target.name + '에게 치명타! ' + totalDamage + ' 피해를 주었습니다.')
          : (skill && skill.name ? skill.name + '! ' + target.name + '에게 ' + totalDamage + ' 피해!' : target.name + '에게 ' + totalDamage + ' 피해를 주었습니다.'),
      });
    }

    function applyClientOutgoingItemDamageModifiers(battle, damage, context) {
      var modifiers = battle && battle.player && battle.player.itemModifiers || {};
      var next = Math.max(0, Number(damage || 0));
      var percent = Number(modifiers.damageDealtPercent || 0);
      var actionType = String(context && context.actionType || '');
      if (actionType === 'attack') {
        percent += Number(modifiers.basicAttackDamagePercent || 0);
      }
      if (actionType === 'skill') {
        percent += Number(modifiers.skillDamagePercent || 0);
        (modifiers.skillExtraDamage || []).forEach(function(rule) {
          if (doesClientSkillMatchItemTrigger(context && context.skill, rule)) {
            next += Number(rule.value || 0);
          }
        });
      }
      return Math.max(0, Math.round(next * (1 + (percent / 100))));
    }

    function doesClientSkillMatchItemTrigger(skill, rule) {
      if (!skill || !rule) return false;
      if (rule.skillId && String(skill.skillId || '') === String(rule.skillId || '')) return true;
      if (rule.skillName && String(skill.name || '') === String(rule.skillName || '')) return true;
      if (rule.skillTag && normalizeSkillTags(skill.tags).indexOf(String(rule.skillTag || '')) !== -1) return true;
      return false;
    }

    function rollClientCriticalDamage(battle, damage) {
      var baseDamage = Math.max(0, Math.round(Number(damage || 0)));
      var stats = getClientEffectiveStats(battle && battle.player || {});
      var criticalRate = Math.max(0, Number(stats.criticalRate || 0));
      var criticalDamage = Math.max(100, Number(stats.criticalDamage || 100));
      var isCritical = baseDamage > 0 && criticalRate > 0 && Math.random() * 100 < criticalRate;
      var multiplier = isCritical ? criticalDamage / 100 : 1;
      return {
        damage: isCritical ? Math.max(0, Math.round(baseDamage * multiplier)) : baseDamage,
        isCritical: isCritical,
        multiplier: multiplier,
      };
    }

    function getAliveOptimisticMonsters(battle) {
      return (battle && battle.monsters || []).filter(function(monster) {
        return Number(monster.currentHp || 0) > 0;
      });
    }

    function findOptimisticTargetMonster(battle, targetId) {
      var monsters = battle.monsters || [];
      return monsters.filter(function(monster) {
        return Number(monster.currentHp || 0) > 0 && ((monster.instanceId || monster.monsterId) === targetId || monster.monsterId === targetId);
      })[0] || getFirstAliveMonster(battle);
    }

    function applyOptimisticPlayerDamage(battle, damage) {
      var totalDamage = Math.max(0, Math.round(Number(damage || 0)));
      var shieldBefore = Number(battle.player.shield || 0);
      var shieldDamage = Math.min(shieldBefore, totalDamage);
      var hpDamage = totalDamage - shieldDamage;
      battle.player.shield = Math.max(0, shieldBefore - shieldDamage);
      battle.player.hp = Math.max(0, Number(battle.player.hp || 0) - hpDamage);
      return { damage: totalDamage, shieldDamage: shieldDamage, hpDamage: hpDamage };
    }

    function getVictoryRewardKey(view) {
      view = view || currentView || {};
      var battle = view.battle || {};
      return [view.runId || '', battle.battleId || '', battle.stage && battle.stage.stageId || ''].join(':');
    }

    function buildDummyVictoryRewardView() {
      return {
        currencyAmount: 12,
        choices: [
          { rewardId: 'dummy_attack', type: 'stat', targetId: 'attack', value: 2, description: '공격 +2', detailDescription: '기본 공격과 공격 스킬 피해가 증가합니다.' },
          { rewardId: 'dummy_hp', type: 'stat', targetId: 'hp', value: 10, description: '최대 체력 +10', detailDescription: '최대 체력이 증가하고 현재 체력이 함께 회복됩니다.' },
          { rewardId: 'dummy_skill', type: 'skill', targetId: 'skill_basic_slash', value: 1, description: '스킬 획득: 깊게 베기', detailDescription: '강한 피해를 주는 공격 스킬을 획득합니다.' },
        ],
        regenAmount: 5,
        currentHpAfterRegen: 35,
        maxHpAfterRegen: 100,
      };
    }

    function preloadVictoryRewardChoices(view) {
      view = view || currentView;
      if (!view || !view.battle || view.battle.status !== 'victory') return null;
      var key = getVictoryRewardKey(view);
      if (!key) return null;
      if (victoryRewardPreload && victoryRewardPreload.key === key) {
        return victoryRewardPreload;
      }
      if (isDummyMode || view.runId === 'dummy-run') {
        victoryRewardPreload = { key: key, loading: false, rewardView: buildDummyVictoryRewardView(), error: null };
        return victoryRewardPreload;
      }

      var preload = { key: key, loading: true, rewardView: null, error: null };
      victoryRewardPreload = preload;
      google.script.run
        .withSuccessHandler(function(rewardView) {
          if (victoryRewardPreload !== preload) return;
          preload.loading = false;
          preload.rewardView = rewardView;
        })
        .withFailureHandler(function(error) {
          if (victoryRewardPreload !== preload) return;
          preload.loading = false;
          preload.error = error || { message: '보상 선택지를 불러오지 못했습니다.' };
        })
        .previewRewardChoicesForStageResult(buildStageResultPayload(view), getAuthToken());
      return preload;
    }

    function openRewardAfterVictory() {
      if (!currentView || !currentView.battle || currentView.battle.status !== 'victory') return;
      preloadVictoryRewardChoices(currentView);
      if (victoryRewardFlowStarted) {
        if (victoryRewardRecoveryComplete) showPreparedVictoryReward();
        return;
      }

      victoryRewardFlowStarted = true;
      var recovery = presentStageClearRegen();
      if (recovery.alreadyApplied) {
        victoryRewardRecoveryComplete = true;
        showPreparedVictoryReward();
        return;
      }
      pushLog(recovery.amount > 0
        ? '체력이 ' + recovery.amount + ' 재생되었습니다.'
        : '체력이 모두 차 있어 재생되지 않았습니다.');
      waitForBattleLogAdvance().then(function() {
        victoryRewardRecoveryComplete = true;
        showPreparedVictoryReward();
      });
    }

    function showPreparedVictoryReward() {
      if (victoryRewardDisplayStarted) return;
      var preload = preloadVictoryRewardChoices(currentView);
      if (!preload) return;
      if (preload.rewardView) {
        victoryRewardDisplayStarted = true;
        currentRewardView = preload.rewardView;
        ensureClientRewardState(preload.rewardView);
        renderRewardChoices(preload.rewardView);
        commitStageResultIfNeeded(null, function(error) {
          document.getElementById('rewardMessage').textContent = error.message || '전투 결과 저장에 실패했습니다.';
          document.getElementById('rewardMessage').className = 'message error';
        }, { silent: true });
        return;
      }
      if (preload.loading) {
        if (!preload.waitingMessageShown) {
          preload.waitingMessageShown = true;
          pushLog('보상 준비 중...', { instant: true });
        }
        window.setTimeout(showPreparedVictoryReward, 120);
        return;
      }
      pushLog(preload.error && preload.error.message || '보상 선택지를 불러오지 못했습니다.');
    }

    function ensureClientRewardState(rewardView) {
      if (!currentView) return;
      currentView.stageState = currentView.stageState || {};
      currentView.stageState.reward = {
        stageId: rewardView.stageId,
        rewardGroupId: rewardView.rewardGroupId,
        choices: rewardView.choices || [],
        selectedRewardId: '',
        currencyGranted: false,
        currencyAmount: Number(rewardView.currencyAmount || 0),
        floorRestChoice: !!rewardView.floorRestChoice,
        intermissionStage: rewardView.intermissionStage || null,
        stageClearRegenApplied: true,
        regenAmount: Number(rewardView.regenAmount || 0),
        currentHpAfterRegen: Number(rewardView.currentHpAfterRegen || 0),
        maxHpAfterRegen: Number(rewardView.maxHpAfterRegen || 0),
        createdAt: new Date().toISOString(),
      };
      saveLocalBattleCheckpoint();
    }

    function buildStageResultPayload(view) {
      view = view || currentView;
      if (!view) return {};
      if (!view.stageState && currentView && currentView.stageState) {
        view.stageState = currentView.stageState;
      }
      getClientUsedQuestionIds(view);
      return {
        runId: view.runId,
        battle: view.battle,
        answerLogs: pendingStageAnswerLogs.slice(),
        stageState: view.stageState || {},
      };
    }

    function commitStageResultIfNeeded(onSuccess, onFailure, options) {
      options = options || {};
      if (!currentView || !currentView.battle || currentView.battle.status === 'active') {
        if (onSuccess) onSuccess(currentView);
        return;
      }
      if (isDummyMode || currentView.runId === 'dummy-run') {
        if (onSuccess) onSuccess(currentView);
        return;
      }
      var commitKey = [
        currentView.runId,
        currentView.battle.battleId || '',
        currentView.battle.status || '',
      ].join(':');
      if (stageResultCommittedKey === commitKey) {
        if (onSuccess) onSuccess(currentView);
        return;
      }
      if (stageResultCommitInFlight) {
        if (onSuccess) stageResultCommitCallbacks.push(onSuccess);
        if (onFailure) stageResultCommitFailureCallbacks.push(onFailure);
        return;
      }

      stageResultCommitInFlight = true;
      if (onSuccess) stageResultCommitCallbacks.push(onSuccess);
      if (onFailure) stageResultCommitFailureCallbacks.push(onFailure);
      if (!options.silent) {
        showLoadingModal('전투 결과 저장 중...', '스테이지 결과를 기록하는 중...');
      }
      google.script.run
        .withSuccessHandler(function(view) {
          var callbacks = stageResultCommitCallbacks.slice();
          stageResultCommitCallbacks = [];
          stageResultCommitFailureCallbacks = [];
          stageResultCommitInFlight = false;
          stageResultCommittedKey = commitKey;
          pendingStageAnswerLogs = [];
          clearLocalBattleCheckpoint(currentView && currentView.runId);
          if (view && view.battle) {
            currentView = normalizeBattleView(view);
            resetBattleQuestionCacheFromView(currentView, battleQuestionCache);
          }
          callbacks.forEach(function(callback) {
            callback(currentView);
          });
        })
        .withFailureHandler(function(error) {
          var failureCallbacks = stageResultCommitFailureCallbacks.slice();
          stageResultCommitCallbacks = [];
          stageResultCommitFailureCallbacks = [];
          stageResultCommitInFlight = false;
          if (failureCallbacks.length) {
            failureCallbacks.forEach(function(callback) {
              callback(error);
            });
            return;
          }
          pushLog(error.message || '전투 결과 저장에 실패했습니다.');
        })
        .commitStageResult(buildStageResultPayload(), getAuthToken());
    }

    function renderRewardChoices(rewardView) {
      selectedRewardId = '';
      rewardSelectionApplying = false;
      var regenAmount = Number(rewardView.regenAmount || 0);
      if (rewardView.intermissionStage) {
        renderBattleBackground(rewardView.intermissionStage);
      }
      animateStageClearRegen(rewardView);
      var rewardContainer = document.getElementById('rewardChoices');
      var rewardTitle = document.getElementById('rewardTitle');
      var rewardSubtitle = document.querySelector('.reward-clear-header p');
      if (rewardTitle) {
        rewardTitle.textContent = rewardView.intermissionRewardOnly ? '보상' : (rewardView.floorRestChoice ? '층 정비' : '스테이지 클리어');
      }
      if (rewardSubtitle) {
        rewardSubtitle.textContent = rewardView.intermissionRewardOnly ? '보상을 확인하세요' : (rewardView.floorRestChoice ? '휴식하거나 보상을 하나 고르세요' : '보상을 고르세요');
      }
      rewardContainer.innerHTML = rewardView.choices.map(function(reward) {
        var iconUrl = getRewardIconUrl(reward.type);
        var rarity = normalizeRewardRarity(reward.rarity);
        var title = reward.displayTitle || getRewardDisplayTitle(reward.type);
        var name = reward.description || reward.rewardId;
        var detailCard = renderRewardDetailCard(reward, rarity, name);
        var rarityBadge = reward.type === 'rest' ? '회복' : (reward.rarityLabel || getRewardRarityLabel(rarity));
        return '<button class="reward-choice-card rarity-' + escapeHtml(rarity) + '" data-reward-id="' + escapeHtml(reward.rewardId) + '">' +
          renderRewardRarityGems(rarity) +
          '<span class="reward-choice-heading">' + escapeHtml(title) + '</span>' +
          '<span class="reward-rarity-badge">' + escapeHtml(rarityBadge) + '</span>' +
          '<span class="reward-choice-icon-wrap">' +
            '<img class="reward-choice-icon" src="' + escapeHtml(iconUrl) + '" alt="" onerror="this.remove();">' +
          '</span>' +
          '<span class="reward-choice-body">' +
            '<strong>' + escapeHtml(name) + '</strong>' +
          '</span>' +
          detailCard +
        '</button>';
      }).join('');
      Array.prototype.forEach.call(rewardContainer.querySelectorAll('.reward-choice-card'), function(button) {
        button.addEventListener('click', function() {
          selectRewardCandidate(button.getAttribute('data-reward-id'));
        });
      });
      fitRewardCardText();
      var confirmButton = document.getElementById('rewardConfirmButton');
      if (confirmButton) {
        confirmButton.disabled = true;
        confirmButton.textContent = '확인';
      }
      var rewardModal = document.getElementById('rewardModal');
      document.getElementById('rewardMessage').textContent = '보상 하나를 선택하세요.';
      document.getElementById('rewardMessage').className = 'message';
      rewardModal.classList.remove('reward-applying');
      rewardModal.classList.add('active');
      rewardModal.classList.add('stage-clear-reward-overlay');
      rewardModal.classList.toggle('floor-rest-reward-overlay', !!rewardView.floorRestChoice);
      rewardModal.setAttribute('aria-hidden', 'false');
      window.requestAnimationFrame(function() {
        spawnStageClearBurst();
      });
    }

    function renderRewardRarityGems(rarity) {
      var config = {
        common: { count: 1, label: '일반' },
        uncommon: { count: 2, label: '드문' },
        rare: { count: 3, label: '희귀' },
        epic: { count: 4, label: '영웅' },
        legendary: { count: 5, label: '전설' },
        unique: { count: 6, label: '고유' },
      }[normalizeRewardRarity(rarity)] || { count: 1, label: '일반' };
      var gems = [];
      for (var i = 0; i < config.count; i += 1) {
        gems.push('<span class="reward-rarity-gem" aria-hidden="true"></span>');
      }
      return '<span class="reward-rarity-gems" aria-label="' + escapeHtml(config.label + ' 등급') + '">' + gems.join('') + '</span>';
    }

    function chooseFloorIntermissionAction(actionType) {
      if (!isFloorIntermissionView(currentView) || stageIntroPlaying || rewardSelectionApplying || isBattleResultLoading()) {
        pushLog('지금은 행동할 수 없습니다.');
        return;
      }
      setBattleInputLocked(true);
      setPlayerTurn(false);
      loadFloorIntermissionRewardView(function(rewardView) {
        if (actionType === 'rest') {
          var restChoice = getFloorIntermissionChoice(rewardView, 'rest');
          if (!restChoice) {
            setBattleInputLocked(false);
            setPlayerTurn(true);
            pushLog('휴식 보상을 찾을 수 없습니다.');
            return;
          }
          playFloorRestEffect(restChoice);
          currentRewardView = rewardView;
          window.setTimeout(function() {
            selectRewardChoice(restChoice.rewardId);
          }, 520);
          return;
        }

        var rewardChoices = getFloorIntermissionRewardChoices(rewardView);
        if (!rewardChoices.length) {
          setBattleInputLocked(false);
          setPlayerTurn(true);
          pushLog('보상 선택지를 찾을 수 없습니다.');
          return;
        }
        currentRewardView = Object.assign({}, rewardView, {
          floorRestChoice: false,
          intermissionRewardOnly: false,
          choices: rewardChoices,
        });
        renderRewardChoices(currentRewardView);
      }, function(error) {
        setBattleInputLocked(false);
        setPlayerTurn(true);
        pushLog(error.message || '정비 선택지를 불러오지 못했습니다.');
      });
    }

    function loadFloorIntermissionRewardView(onSuccess, onFailure) {
      var existing = getCurrentFloorIntermissionRewardView();
      if (existing && existing.choices && existing.choices.length) {
        onSuccess(existing);
        return;
      }
      var loading = startDelayedLoadingModal('정비 선택지 준비 중...', '휴식과 보상을 확인하는 중...');
      google.script.run
        .withSuccessHandler(function(rewardView) {
          finishDelayedLoadingModal(loading);
          currentRewardView = rewardView;
          ensureClientRewardState(rewardView);
          onSuccess(rewardView);
        })
        .withFailureHandler(function(error) {
          finishDelayedLoadingModal(loading);
          if (onFailure) onFailure(error);
        })
        .previewRewardChoicesForStageResult(buildStageResultPayload(), getAuthToken());
    }

    function getCurrentFloorIntermissionRewardView() {
      if (currentRewardView && currentRewardView.floorRestChoice) {
        return currentRewardView;
      }
      var rewardState = currentView && currentView.stageState && currentView.stageState.reward;
      if (!rewardState || !rewardState.floorRestChoice || !rewardState.choices || !rewardState.choices.length) {
        return null;
      }
      return {
        runId: currentView.runId,
        stageId: rewardState.stageId,
        rewardGroupId: rewardState.rewardGroupId,
        choices: rewardState.choices,
        currencyAmount: Number(rewardState.currencyAmount || 0),
        floorRestChoice: true,
        intermissionStage: rewardState.intermissionStage || (currentView.battle && currentView.battle.stage),
        regenAmount: Number(rewardState.regenAmount || 0),
        currentHpAfterRegen: Number(rewardState.currentHpAfterRegen || currentView.battle.player.hp || 0),
        maxHpAfterRegen: Number(rewardState.maxHpAfterRegen || currentView.battle.player.maxHp || 0),
      };
    }

    function getFloorIntermissionChoice(rewardView, type) {
      return (rewardView && rewardView.choices || []).filter(function(choice) {
        return choice && choice.type === type;
      })[0] || null;
    }

    function getFloorIntermissionRewardChoices(rewardView) {
      var choices = (rewardView && rewardView.choices || []).filter(function(choice) {
        return choice && choice.type !== 'rest';
      });
      if (choices.length === 1 && choices[0].type === 'rewardClaim' && choices[0].claimReward) {
        return [choices[0].claimReward];
      }
      return choices.filter(function(choice) {
        return choice.type !== 'rewardClaim';
      });
    }

    function playFloorRestEffect(restChoice) {
      var player = currentView && currentView.battle && currentView.battle.player;
      if (!player) return;
      var nextHp = Number(restChoice.currentHpAfterRest || player.hp || 0);
      var maxHp = Number(restChoice.maxHpAfterRest || player.maxHp || 1);
      var amount = Math.max(0, Number(restChoice.healAmount || 0));
      player.hp = Math.max(0, Math.min(maxHp, nextHp));
      player.maxHp = maxHp;
      renderPlayerHud(player);
      playBattleSound('buff');
      animatePlayerStatusEffect('buff');
      if (amount > 0) {
        spawnFloatingText(document.getElementById('playerHpText') || document.getElementById('playerDamageAnchor'), '+' + amount, 'heal-green');
      }
      pushLog(amount > 0 ? '휴식을 취해 체력을 회복했습니다.' : '휴식을 취했습니다.');
    }

    function fitRewardCardText() {
      Array.prototype.forEach.call(document.querySelectorAll('.reward-choice-heading, .reward-choice-body strong'), function(element) {
        var baseSize = Number(window.getComputedStyle(element).fontSize.replace('px', '')) || 20;
        var minSize = element.classList.contains('reward-choice-heading') ? 16 : 10;
        element.style.fontSize = baseSize + 'px';
        var size = baseSize;
        while (element.scrollWidth > element.clientWidth && size > minSize) {
          size -= 1;
          element.style.fontSize = size + 'px';
        }
      });
    }

    function renderDifficultyStars(difficulty) {
      var count = Math.max(1, Math.min(MAX_QUESTION_DIFFICULTY, Math.round(Number(difficulty || 1))));
      var stars = '';
      for (var i = 0; i < count; i += 1) {
        stars += '<span class="difficulty-star">&#9733;</span>';
      }

    function renderRewardDetailCard(reward, rarity, fallbackName) {

        : (reward.type === 'rest'
          ? '회복 / HP +' + escapeHtml(reward.healAmount || 0)

    function renderSkillUpgradeCompareDetailCard(reward, rarity, fallbackName) {

    function animateStageClearRegen(rewardView) {
      presentStageClearRegen(rewardView);
    }

    function presentStageClearRegen(rewardView) {
      var player = currentView && currentView.battle && currentView.battle.player;
      if (!player) return { amount: 0, applied: false };
      var key = getVictoryRewardKey(currentView);
      if (key && victoryRegenPresentationKey === key) {
        return { amount: 0, applied: false };
      }

      var maxHp = Math.max(1, Number(rewardView && rewardView.maxHpAfterRegen || player.maxHp || player.stats && player.stats.hp || 1));
      var currentHp = Math.max(0, Number(player.hp || 0));
      var savedReward = currentView && currentView.stageState && currentView.stageState.reward || {};
      var savedHpAfterRegen = Number(savedReward.currentHpAfterRegen || 0);
      if (!rewardView && savedReward.stageClearRegenApplied && savedHpAfterRegen > 0 && currentHp === savedHpAfterRegen) {
        victoryRegenPresentationKey = key;
        return { amount: 0, applied: false, alreadyApplied: true };
      }
      var configuredRegen = Math.max(0, Math.round(Number(player.stats && player.stats.hpRegen || 0)));
      var amount = rewardView
        ? Math.max(0, Number(rewardView.regenAmount || 0))
        : Math.max(0, Math.min(configuredRegen, maxHp - currentHp));
      var nextHp = rewardView
        ? Math.max(0, Math.min(maxHp, Number(rewardView.currentHpAfterRegen || currentHp)))
        : Math.max(0, Math.min(maxHp, currentHp + amount));

      victoryRegenPresentationKey = key;
      player.hp = nextHp;
      player.maxHp = maxHp;
      renderPlayerHud(player);
      if (amount > 0) {
        animatePlayerStatusEffect('buff');
        spawnFloatingText(document.getElementById('playerHpText') || document.getElementById('playerDamageAnchor'), '+' + amount, 'heal-green');
      }
      return { amount: amount, applied: true };
    }

    function formatRewardMeta(reward) {

      if (reward.type === 'stat') {

      }
      if (reward.type === 'skill') {
        return typeLabel + ' / NEW';
      }
      if (reward.type === 'skillUpgrade') {
        return typeLabel + (value ? ' / LV +' + value : '');
      }
      if (reward.type === 'item') {
        return typeLabel + (value ? ' / x' + value : '');
      }
      if (reward.type === 'rest') {
        return typeLabel + ' / HP +' + (reward.healAmount || 0);

    function selectRewardCandidate(rewardId) {

    function selectRewardChoice(rewardId) {
      rewardSelectionApplying = true;
      var rewardModal = document.getElementById('rewardModal');
      var confirmButton = document.getElementById('rewardConfirmButton');
      if (confirmButton) {
        confirmButton.disabled = true;
        confirmButton.textContent = '적용 중...';

      Array.prototype.forEach.call(document.querySelectorAll('.reward-choice-card'), function(card) {
        card.disabled = true;
      });
      rewardModal.classList.add('reward-applying');
      document.getElementById('rewardMessage').textContent = '보상을 적용하는 중...';
      document.getElementById('rewardMessage').className = 'message ok';
      var scorePreviewSummary = currentRewardView && currentRewardView.scorePreviewSummary;
      var showPreviewScoreModal = shouldShowScoreModal(scorePreviewSummary);
      if (isDummyMode || currentView.runId === 'dummy-run') {
        window.setTimeout(function() {
          rewardModal.classList.remove('active');
          rewardModal.classList.remove('stage-clear-reward-overlay');
          rewardModal.classList.remove('floor-rest-reward-overlay');
          rewardModal.classList.remove('reward-applying');
          rewardSelectionApplying = false;
          pushLog('데모 보상을 선택했습니다.');
        }, 260);
        return;
      }
      if (showPreviewScoreModal) {
        rewardModal.classList.remove('active');
        rewardModal.classList.remove('stage-clear-reward-overlay');
        rewardModal.classList.remove('floor-rest-reward-overlay');
        rewardModal.classList.remove('reward-applying');
        showScoreModal(scorePreviewSummary, null, { awaitFinalResponse: true });
      }
      window.setTimeout(function() {
        var rewardLoading = null;
        if (!showPreviewScoreModal) {
          rewardLoading = startDelayedLoadingModal('로딩 중...', '1/2 전투 결과와 보상을 저장하는 중...', {
            progress: 8,
          });
        }
        commitStageResultIfNeeded(function() {
          if (!showPreviewScoreModal) {
            updateDelayedLoadingModal(rewardLoading, {
              text: '2/2 보상을 적용하고 다음 스테이지를 준비하는 중...',
              progress: 38,
            });
          }
          google.script.run
            .withSuccessHandler(function(response) {
              if (!showPreviewScoreModal) {
                updateDelayedLoadingModal(rewardLoading, {
                  text: '완료',
                  progress: 100,
                });
              }
              window.setTimeout(function() {
                logRewardDebugTimings(response);
                if (!showPreviewScoreModal) {
                  finishDelayedLoadingModal(rewardLoading);
                }
                rewardSelectionApplying = false;
                rewardModal.classList.remove('active');
                rewardModal.classList.remove('stage-clear-reward-overlay');
                rewardModal.classList.remove('floor-rest-reward-overlay');
                rewardModal.classList.remove('reward-applying');
                if (showPreviewScoreModal) {
                  finishPreviewScoreModalAfterReward(response);
                  return;
                }
                if (response && response.cleared) {
                  handleRewardSelectionResponse(response);
                  return;
                }
                if (shouldShowScoreModal(response && response.scoreSummary)) {
                  showScoreModal(response.scoreSummary, response);
                  return;
                }
                handleRewardSelectionResponse(response);
              }, 120);
            })
            .withFailureHandler(function(error) {
              finishDelayedLoadingModal(rewardLoading);
              rewardSelectionApplying = false;
              rewardModal.classList.remove('reward-applying');
              if (showPreviewScoreModal) {
                closeScoreModal();
                scoreModalAwaitingFinalResponse = false;
                pendingScoreModalResponse = null;
                rewardModal.classList.add('active');
                rewardModal.classList.add('stage-clear-reward-overlay');
              }
              if (confirmButton) {
                confirmButton.disabled = false;
                confirmButton.textContent = '확인';
              }
              Array.prototype.forEach.call(document.querySelectorAll('.reward-choice-card'), function(card) {
                card.disabled = false;
              });
              document.getElementById('rewardMessage').textContent = error.message;
              document.getElementById('rewardMessage').className = 'message error';
            })
            .selectReward(currentView.runId, rewardId, getAuthToken(), currentRewardView);
        }, function(error) {
          finishDelayedLoadingModal(rewardLoading);
          rewardSelectionApplying = false;
          rewardModal.classList.remove('reward-applying');
          if (showPreviewScoreModal) {
            closeScoreModal();
            scoreModalAwaitingFinalResponse = false;
            pendingScoreModalResponse = null;
            rewardModal.classList.add('active');
            rewardModal.classList.add('stage-clear-reward-overlay');
          }
          if (confirmButton) {
            confirmButton.disabled = false;
            confirmButton.textContent = '확인';
          }
          Array.prototype.forEach.call(document.querySelectorAll('.reward-choice-card'), function(card) {
            card.disabled = false;
          });
          document.getElementById('rewardMessage').textContent = error.message || '전투 결과 저장에 실패했습니다.';
          document.getElementById('rewardMessage').className = 'message error';
        }, { silent: true });
      }, 260);
    }

    function finishPreviewScoreModalAfterReward(response) {
      if (response && shouldShowScoreModal(response.scoreSummary)) {
        var finalSummary = normalizeClientScoreSummary(response.scoreSummary, response);
        response.scoreSummary = finalSummary;
        if (getScoreSummaryDisplaySignature(finalSummary) !== getScoreSummaryDisplaySignature(currentScoreModalSummary)) {
          showScoreModal(finalSummary, response);
          return;
        }
        pendingScoreModalResponse = response;
        scoreModalAwaitingFinalResponse = false;
        preloadNextBattleAfterReward(response);
        updateScoreModalConfirmButton();
        return;
      }
      closeScoreModal();
      scoreModalAwaitingFinalResponse = false;
      pendingScoreModalResponse = null;
      handleRewardSelectionResponse(response);
    }

    function shouldShowScoreModal(scoreSummary) {
      return !!scoreSummary && Number(scoreSummary.scoreDelta || 0) > 0;
    }

    function logRewardDebugTimings(response) {
      var timings = response && response.debugTimings;
      if (!timings) return;
      if (window.console && console.debug) {
        console.debug('reward timings', timings);
      }
    }

    function formatMsShort(ms) {
      return (Number(ms || 0) / 1000).toFixed(1) + 's';
    }

    var SCORE_BREAKDOWN_COMPONENT_KEYS = [
      'answerScore',
      'monsterScore',
      'questionReactionScore',
      'stageScore',
      'floorBaseScore',
      'floorSpeedScore',
      'clearBonus',
      'unclassifiedScore'
    ];

    function positiveScoreNumber(value) {
      var number = Number(value || 0);
      return isFinite(number) ? Math.max(0, Math.round(number)) : 0;
    }

    function getClientScoreComponentTotal(summary) {
      return SCORE_BREAKDOWN_COMPONENT_KEYS.reduce(function(total, key) {
        return total + positiveScoreNumber(summary && summary[key]);
      }, 0);
    }

    function getScoreSummaryDisplaySignature(summary) {
      summary = summary || {};
      return ['previousScore', 'scoreDelta', 'totalScore']
        .concat(SCORE_BREAKDOWN_COMPONENT_KEYS)
        .map(function(key) {
          return positiveScoreNumber(summary[key]);
        })
        .join('|');
    }

    function normalizeClientScoreSummary(summary, response) {
      summary = Object.assign({}, summary || {});
      response = response || {};
      var currentTotal = positiveScoreNumber(currentView && currentView.score);
      var responseTotal = positiveScoreNumber(response.score || response.totalScore || response.run && response.run.score);
      var totalScore = positiveScoreNumber(summary.totalScore || responseTotal || currentTotal);
      var scoreDelta = positiveScoreNumber(summary.scoreDelta);
      var previousScore = summary.previousScore !== undefined && summary.previousScore !== null && summary.previousScore !== ''
        ? positiveScoreNumber(summary.previousScore)
        : Math.max(0, totalScore - scoreDelta);

      if (scoreDelta <= 0) {
        var inferredDelta = Math.max(0, totalScore - previousScore);
        scoreDelta = inferredDelta;
      }
      if (scoreDelta > 0 && totalScore < previousScore + scoreDelta) {
        totalScore = previousScore + scoreDelta;
      }

      summary.totalScore = totalScore;
      summary.scoreDelta = scoreDelta;
      summary.previousScore = previousScore;

      var knownTotal = getClientScoreComponentTotal(summary);
      if (scoreDelta > knownTotal) {
        summary.unclassifiedScore = positiveScoreNumber(summary.unclassifiedScore) + (scoreDelta - knownTotal);
      }
      return summary;
    }

    function showScoreModal(scoreSummary, response, options) {
      options = options || {};
      response = response || {};
      var summary = normalizeClientScoreSummary(scoreSummary, response);
      response.scoreSummary = summary;
      pendingScoreModalResponse = response || null;
      scoreModalAwaitingFinalResponse = !!options.awaitFinalResponse;
      currentScoreModalSummary = summary;
      var detailed = !!summary.showDetailedBreakdown;
      clearScoreAnimation();
      scoreAnimationDone = false;
      var confirmButton = document.getElementById('scoreModalConfirmButton');
      if (confirmButton) {
        confirmButton.disabled = true;
        confirmButton.textContent = '확인';
      }
      var scoreDeltaRow = document.getElementById('scoreDeltaText').closest('.score-total-row');
      var scoreTotalRow = document.getElementById('scoreTotalText').closest('.score-total-row');
      if (scoreDeltaRow) scoreDeltaRow.classList.remove('score-revealed');
      if (scoreTotalRow) scoreTotalRow.classList.remove('score-revealed');
      document.getElementById('scoreDeltaText').textContent = '+0점';
      document.getElementById('scoreTotalText').textContent = '0점';
      var rows = buildScoreBreakdownRows(summary, detailed).filter(function(row) {
        return Number(row.value || 0) > 0;
      });
      document.getElementById('scoreBreakdown').innerHTML = rows.map(function(row) {
        return '<div class="score-breakdown-row score-breakdown-pending" data-score-value="' + escapeHtml(row.value) + '">' +
          '<span>' + escapeHtml(row.label) + '</span>' +
          '<b>+0점</b>' +
        '</div>';
      }).join('');
      if (detailed) {
        var metaRows = buildScoreMetaRows(summary);
        if (metaRows.length) {
          document.getElementById('scoreBreakdown').insertAdjacentHTML('beforeend', metaRows.map(function(row) {
            return '<div class="score-breakdown-row score-breakdown-note">' +
              '<span>' + escapeHtml(row.label) + '</span>' +
              '<b>' + escapeHtml(row.value) + '</b>' +
            '</div>';
          }).join(''));
        }
      }
      var modal = document.getElementById('scoreModal');
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
      preloadNextBattleAfterReward(response);
      queueScoreAnimation(function() {
        animateScoreSequence(summary);
      }, 260);
    }

    function confirmScoreModal() {
      if (!scoreAnimationDone) {
        finishScoreAnimationNow();
        return;
      }
      if (scoreModalAwaitingFinalResponse) {
        updateScoreModalConfirmButton();
        return;
      }
      var response = pendingScoreModalResponse;
      pendingScoreModalResponse = null;
      closeScoreModal();
      currentScoreModalSummary = null;
      if (response && response.outcomeFinal) {
        completeOutcomeScoreDetails();
        return;
      }
      handleRewardSelectionResponse(response);
    }

    function buildScoreBreakdownRows(summary, detailed) {
      summary = normalizeClientScoreSummary(summary, { outcomeFinal: detailed });
      var rows = [
        { label: '몬스터 처치', value: Number(summary.monsterScore || 0) },
        { label: '문제 평가', value: Number(summary.questionReactionScore || 0) },
        { label: '스테이지 클리어', value: Number(summary.stageScore || 0) },
        { label: '층 클리어 기본', value: Number(summary.floorBaseScore || 0) },
        { label: '층 속도 보너스', value: Number(summary.floorSpeedScore || 0) },
        { label: '탈출 보너스', value: Number(summary.clearBonus || 0) },
      ];
      if (detailed && Number(summary.floorScore || 0) > 0) {
        rows.push({ label: '층 클리어 합계', value: Number(summary.floorScore || 0) });
      }
      rows = rows.filter(function(row) {
        return positiveScoreNumber(row && row.value) > 0;
      });
      if (positiveScoreNumber(summary.unclassifiedScore) > 0) {
        rows.push({
          label: detailed ? '누적 점수 반영' : '기타 점수',
          value: positiveScoreNumber(summary.unclassifiedScore),
        });
      }
      if (!rows.length && positiveScoreNumber(summary.scoreDelta) > 0) {
        rows.push({
          label: detailed ? '누적 점수 반영' : '획득 점수',
          value: positiveScoreNumber(summary.scoreDelta),
        });
      }
      return rows;
    }

    function buildScoreMetaRows(summary) {
      var rows = [];
      if (summary.floorClearTimeMs || summary.floorTargetTimeMs) {
        rows.push({ label: '층 클리어 시간', value: formatDuration(summary.floorClearTimeMs || 0) });
        rows.push({ label: '층 목표 시간', value: formatDuration(summary.floorTargetTimeMs || 0) });
      }
      if ((summary.floorClearTimeMs || summary.floorTargetTimeMs || summary.floorScore) && summary.floorSpeedMultiplier !== undefined && summary.floorSpeedMultiplier !== null) {
        rows.push({ label: '속도 보너스 비율', value: Math.round(Number(summary.floorSpeedMultiplier || 0) * 100) + '%' });
      }
      return rows;
    }

    function animateScoreSequence(summary) {
      var rows = Array.prototype.slice.call(document.querySelectorAll('#scoreBreakdown .score-breakdown-row[data-score-value]'));
      var index = 0;

      function nextRow() {
        if (index >= rows.length) {
          revealScoreTotals(summary);
          return;
        }
        var row = rows[index];
        var target = Number(row.getAttribute('data-score-value') || 0);
        row.classList.remove('score-breakdown-pending');
        row.classList.add('score-breakdown-active');
        animateScoreNumber(row.querySelector('b'), 0, target, 640, function(value) {
          return '+' + formatScore(value);
        }, function() {
          row.classList.remove('score-breakdown-active');
          row.classList.add('score-breakdown-complete');
          index += 1;
          queueScoreAnimation(nextRow, 240);
        });
      }

      nextRow();
    }

    function revealScoreTotals(summary) {
      var delta = Number(summary && summary.scoreDelta || 0);
      var total = Number(summary && summary.totalScore || 0);
      var previous = Math.max(0, Number(summary && summary.previousScore !== undefined ? summary.previousScore : total - delta));
      var deltaRow = document.getElementById('scoreDeltaText').closest('.score-total-row');
      var totalRow = document.getElementById('scoreTotalText').closest('.score-total-row');
      if (deltaRow) {
        deltaRow.classList.add('score-revealed');
      }
      animateScoreNumber(document.getElementById('scoreDeltaText'), 0, delta, 420, function(value) {
        return '+' + formatScore(value);
      }, function() {
        queueScoreAnimation(function() {
          if (totalRow) {
            totalRow.classList.add('score-revealed');
          }
          animateScoreNumber(document.getElementById('scoreTotalText'), previous, total, 560, formatScore, function() {
            scoreAnimationDone = true;
            updateScoreModalConfirmButton(true);

    }

    function animateScoreNumber(element, from, to, durationMs, formatter, onDone) {
      if (!element) {
        if (onDone) onDone();
        return;
      }
      var start = Date.now();
      var startValue = Number(from || 0);
      var endValue = Number(to || 0);
      var duration = Math.max(1, Number(durationMs || 1));
      function tick() {
        var elapsed = Date.now() - start;
        var progress = Math.min(1, elapsed / duration);
        var eased = 1 - Math.pow(1 - progress, 3);
        var value = Math.round(startValue + ((endValue - startValue) * eased));
        element.textContent = formatter ? formatter(value) : String(value);
        if (progress < 1) {
          var frameId = window.requestAnimationFrame(tick);
          scoreAnimationTimers.push({ type: 'frame', id: frameId });
          return;
        }
        element.textContent = formatter ? formatter(endValue) : String(endValue);
        if (onDone) onDone();
      }
      tick();
    }

    function queueScoreAnimation(callback, delayMs) {
      var timerId = window.setTimeout(callback, Math.max(0, Number(delayMs || 0)));
      scoreAnimationTimers.push({ type: 'timeout', id: timerId });
      return timerId;
    }

    function clearScoreAnimation() {
      scoreAnimationTimers.forEach(function(timer) {
        if (!timer) return;
        if (timer.type === 'frame') {
          window.cancelAnimationFrame(timer.id);
        } else {
          window.clearTimeout(timer.id);
        }
      });
      scoreAnimationTimers = [];
    }

    function getNextBattlePreloadKey(response) {
      response = response || {};
      var run = response.run || {};

      if (!runId) {

    function resetNextBattlePreload() {
      nextBattlePreloadKey = '';
      nextBattlePreloadLoading = false;
      nextBattlePreloadView = null;
      nextBattlePreloadError = null;
      nextBattlePreloadStartedAt = 0;
      nextBattlePreloadRequestId += 1;
    }

    function preloadNextBattleAfterReward(response) {
      response = response || {};
      if (!response.nextBattlePending) {
        return;
      }
      var runId = response.runId || (response.run && response.run.runId) || (currentView && currentView.runId);
      var key = getNextBattlePreloadKey(response);
      if (!runId || !key) {
        return;
      }
      if (nextBattlePreloadKey === key && (nextBattlePreloadLoading || nextBattlePreloadView)) {
        return;
      }
      resetNextBattlePreload();
      var requestId = nextBattlePreloadRequestId;
      nextBattlePreloadKey = key;
      nextBattlePreloadLoading = true;
      nextBattlePreloadStartedAt = performance.now();
      google.script.run
        .withSuccessHandler(function(view) {
          if (requestId !== nextBattlePreloadRequestId) {
            return;
          }
          nextBattlePreloadLoading = false;
          nextBattlePreloadView = view || null;
          nextBattlePreloadError = null;
        })
        .withFailureHandler(function(error) {
          if (requestId !== nextBattlePreloadRequestId) {
            return;
          }
          nextBattlePreloadLoading = false;
          nextBattlePreloadError = error || { message: '다음 전투 준비에 실패했습니다.' };
        })
        .prepareNextBattleAfterReward(runId, getAuthToken());
    }

    function consumePreloadedNextBattle(response) {
      var key = getNextBattlePreloadKey(response);
      if (!key || nextBattlePreloadKey !== key) {
        return false;
      }
      if (nextBattlePreloadView) {
        var view = nextBattlePreloadView;
        var startedAt = nextBattlePreloadStartedAt || performance.now();
        if (!view.battle && !(view.showReward && view.rewardView)) {
          resetNextBattlePreload();
          return false;
        }
        resetNextBattlePreload();
        return applyPreparedNextBattleView(view, startedAt);
      }
      if (nextBattlePreloadLoading) {
        resetNextBattlePreload();
        return false;
      }
      if (nextBattlePreloadError) {
        resetNextBattlePreload();
      }
      return false;
    }

      if (view && view.showReward && view.rewardView) {

        return true;
      }
      if (!view || !view.battle) {
        finishDelayedLoadingModal(loadingHandle);
        pushLog('다음 전투 데이터를 아직 불러오지 못했습니다. 다시 시도해 주세요.');

      clearLocalBattleCheckpoint(currentView.runId);

    function loadNextBattleAfterReward(response, retryCount) {
      response = response || {};
      retryCount = Number(retryCount || 0);
      var runId = response.runId || (response.run && response.run.runId) || (currentView && currentView.runId);
      if (!runId) {
        pushLog('다음 전투를 준비할 런을 찾을 수 없습니다.');
        return;
      }
      if (!retryCount && consumePreloadedNextBattle(response)) {
        return;
      }
      var nextBattleLoadStartedAt = performance.now();
      var nextBattleLoading = startDelayedLoadingModal('로딩 중...', '1/3 새 전투 데이터를 요청하는 중...', {
        progress: retryCount ? 12 : 10,
      });
      google.script.run
        .withSuccessHandler(function(view) {
          updateDelayedLoadingModal(nextBattleLoading, {
            text: '2/3 전투 데이터를 받았습니다.',
            progress: 70,
          });
          if (view && view.showReward && view.rewardView) {
            finishDelayedLoadingModal(nextBattleLoading);
            handleRewardSelectionResponse(view);
            return;
          }
          if (!view || !view.battle) {
            if (retryCount < 1) {
              updateDelayedLoadingModal(nextBattleLoading, {
                text: '전투 데이터가 비어 있어 한 번 더 요청합니다.',
                progress: 35,
              });
              finishDelayedLoadingModal(nextBattleLoading);
              loadNextBattleAfterReward(Object.assign({}, response, view || {}), retryCount + 1);
              return;
            }
            finishDelayedLoadingModal(nextBattleLoading);
            pushLog('다음 전투 데이터를 아직 불러오지 못했습니다. 다시 시도해 주세요.');
            return;
          }
          applyPreparedNextBattleView(view, nextBattleLoadStartedAt, nextBattleLoading);
        })
        .withFailureHandler(function(error) {
          finishDelayedLoadingModal(nextBattleLoading);
          pushLog(error.message || '다음 전투 준비에 실패했습니다.');
        })
        .prepareNextBattleAfterReward(runId, getAuthToken());
    }

    function handleRewardSelectionResponse(response) {
      response = response || {};
      if (isStandaloneRewardViewResponse(response)) {
        response = {
          showReward: true,
          runId: response.runId || (currentView && currentView.runId) || '',
          rewardView: response,
          stageState: {
            reward: response,
          },
        };
      }
      if (response.scoreSummary && response.scoreSummary.totalScore !== undefined && currentView) {
        currentView.score = Number(response.scoreSummary.totalScore || currentView.score || 0);
        response.score = Number(response.scoreSummary.totalScore || response.score || 0);
      }
      if (response.cleared) {
        pushLog('탈출에 성공했습니다.');
        setPlayerTurn(false);
        showEscapeSuccessSequence(response);
        return;
      }
      if (response.showReward && response.rewardView) {
        currentView = normalizeBattleView(response);
        resetBattleQuestionCacheFromView(currentView, []);
        currentRewardView = response.rewardView;
        ensureClientRewardState(response.rewardView);
        clearLocalBattleCheckpoint(currentView.runId);
        resetStageCommitState();
        currentRewardView = response.rewardView;
        renderBattle(currentView);
        playBattleSound('nextStage');
        startFloorIntermissionEntrance();
        return;
      }
      if (response.nextBattlePending) {
        loadNextBattleAfterReward(response);
        return;
      }
      currentView = normalizeBattleView(response);
      resetBattleQuestionCacheFromView(currentView, []);
      clearLocalBattleCheckpoint(currentView.runId);
      resetStageCommitState();
      renderBattle(currentView);
      playBattleSound('nextStage');

    function applyMonsterDamageDelta(monsterId, hpDamage, shieldDamage) {
      var slot = document.querySelector('[data-monster-id="' + cssEscape(monsterId) + '"]');

      var nextWidth = Math.max(0, Math.min(100, Math.round((current / visualMax) * 100))) + '%';
      var shieldWidth = Math.max(0, Math.min(100, Math.round((shield / visualMax) * 100))) + '%';
      if (lag) lag.style.width = fill.style.width || lag.style.width;
      text.textContent = shield > 0 ? current + ' + ' + shield + ' / ' + max : current + ' / ' + max;

    function spawnStarBurst(anchor, options) {
      var layer = getStarBurstLayer();
      if (!layer) return;
      var config = options || {};
      var rect = anchor && anchor.getBoundingClientRect ? anchor.getBoundingClientRect() : null;
      var originX = rect && rect.width ? rect.left + (rect.width / 2) : window.innerWidth / 2;
      var originY = rect && rect.height ? rect.top + (rect.height / 2) : window.innerHeight * 0.42;
      var count = Math.max(1, Number(config.count || 24));
      var durationMs = Math.max(240, Number(config.durationMs || 900));
      for (var i = 0; i < count; i += 1) {
        var angle = (Math.PI * 2 * i / count) + ((Math.random() - 0.5) * 0.72);
        var distance = randomBetween_(Number(config.spreadMin || 40), Number(config.spreadMax || 120));
        var particle = document.createElement('span');
        particle.className = 'star-particle ' + (config.className || '');
        particle.textContent = '★';
        particle.style.left = originX + 'px';
        particle.style.top = originY + 'px';
        var tx = Math.cos(angle) * distance;
        var ty = Math.sin(angle) * distance;
        var rot = randomBetween_(-220, 220);
        particle.style.setProperty('--tx', tx + 'px');
        particle.style.setProperty('--ty', ty + 'px');
        particle.style.setProperty('--tx-mid', (tx * 0.86) + 'px');
        particle.style.setProperty('--ty-mid', (ty * 0.86) + 'px');
        particle.style.setProperty('--rot', rot + 'deg');
        particle.style.setProperty('--rot-mid', (rot * 0.82) + 'deg');
        particle.style.setProperty('--rot-pop', (rot * 0.12) + 'deg');
        particle.style.setProperty('--duration', durationMs + 'ms');
        particle.style.setProperty('--delay', randomBetween_(0, 90) + 'ms');
        particle.style.fontSize = randomBetween_(Number(config.sizeMin || 12), Number(config.sizeMax || 22)) + 'px';
        layer.appendChild(particle);
        removeParticleAfter_(particle, durationMs + 220);
      }
    }

      element.textContent = '';
      var index = 0;
      var step = function() {
        if (!battleLogTyping) return;

        element.textContent = text.slice(0, index);
        if (index >= text.length) {
          clearBattleLogTyping();
          element.classList.remove('typing');
          battleLogTyping = false;
          renderBattleLogText(element, text, battleLogRenderOptions);
          return;
        }
        battleLogTypingTimer = window.setTimeout(step, 24);

    function buildOutcomeContext(kind, response) {
      var battle = currentView && currentView.battle ? currentView.battle : {};
      response = response || {};
      var scoreSummary = response.scoreSummary || buildCurrentOutcomeScoreSummary();

      return {

        response: response,
        scoreSummary: scoreSummary,

    function buildCurrentOutcomeScoreSummary() {
      var total = Number(currentView && currentView.score || 0);
      var scoreState = currentView && currentView.stageState && currentView.stageState.scoreState || {};
      var battle = currentView && currentView.battle || {};
      var battleId = String(battle.battleId || '');
      var monsterScore = battleId && scoreState.monsterScoreBattleId === battleId
        ? Number(scoreState.monsterScore || 0)
        : Number(battle.monsterScoreState && battle.monsterScoreState.monsterScore || 0);
      var questionReactionScore = battleId && scoreState.questionReactionScoreBattleId === battleId
        ? Number(scoreState.questionReactionScore || 0)
        : Number(battle.questionReactionScoreState && battle.questionReactionScoreState.score || 0);
      var scoreDelta = monsterScore + questionReactionScore;
      return {
        previousScore: Math.max(0, total - scoreDelta),
        answerScore: 0,
        monsterScore: monsterScore,
        questionReactionScore: questionReactionScore,
        stageScore: 0,
        floorBaseScore: 0,
        floorSpeedScore: 0,
        floorScore: 0,
        floorClearTimeMs: 0,
        floorTargetTimeMs: 0,
        floorSpeedMultiplier: 0,
        clearBonus: 0,
        scoreDelta: scoreDelta,
        totalScore: total,
      };
    }

      var lastMessage = context.kind === 'escape'

        : (battle.lastMessage || '전투가 종료되었습니다.');
      var rewardName = response.selectedReward && (response.selectedReward.description || response.selectedReward.displayTitle || response.selectedReward.rewardId) || '';
      return '' +
        '<div class="defeat-result-row"><span>스테이지</span><strong>' + escapeHtml(formatCompactStage(stage)) + '</strong></div>' +
        '<div class="defeat-result-row"><span>처치한 몬스터</span><strong>' + escapeHtml(totalDefeatedCount) + '</strong></div>' +
        '<div class="defeat-result-row"><span>이번 점수</span><strong>' + escapeHtml(formatScore(scoreSummary.scoreDelta || 0)) + '</strong></div>' +

    function skippableAutoDelay(ms) {
      return new Promise(function(resolve) {
        var settled = false;
        var timerId = window.setTimeout(finish, Math.max(0, Number(ms || 0)));
        activeAutoDelayResolver = finish;

        function finish() {
          if (settled) return;
          settled = true;
          window.clearTimeout(timerId);
          if (activeAutoDelayResolver === finish) {
            activeAutoDelayResolver = null;
          }
          resolve();
        }
      });
    }

        window.clearInterval(loadingTimerId);
      }
      loadingTimerId = window.setInterval(updateLoadingElapsed, 100);
      document.getElementById('loadingModal').classList.add('active');
    }

    function startDelayedLoadingModal(title, text, options, delayMs) {
      var state = {
        title: title,
        text: text,
        options: Object.assign({}, options || {}),
        shown: false,
        cancelled: false,
        timerId: null,
      };
      state.timerId = window.setTimeout(function() {
        if (state.cancelled) return;
        state.shown = true;
        showLoadingModal(state.title, state.text, state.options);
      }, Math.max(0, Number(delayMs !== undefined ? delayMs : DELAYED_LOADING_MODAL_MS)));
      return state;
    }

    function updateDelayedLoadingModal(state, options) {
      if (!state || state.cancelled) return;
      options = options || {};
      if (options.title !== undefined) {
        state.title = options.title;
      }
      if (options.text !== undefined) {
        state.text = options.text;
      }
      state.options = Object.assign({}, state.options || {}, options);
      if (state.shown) {
        updateLoadingModal(options);
      }
    }

    function finishDelayedLoadingModal(state) {
      if (!state || state.cancelled) return;
      state.cancelled = true;
      if (state.timerId) {
        window.clearTimeout(state.timerId);
        state.timerId = null;
      }
      if (state.shown) {
        updateLoadingModal({ progress: 100 });
        var sessionId = loadingSessionId;
        var visibleMs = loadingStartedAt ? performance.now() - loadingStartedAt : LOADING_MIN_VISIBLE_MS;
        var waitMs = Math.max(0, LOADING_MIN_VISIBLE_MS - visibleMs);
        loadingHideTimerId = window.setTimeout(function() {
          loadingHideTimerId = null;
          if (sessionId === loadingSessionId) {
            hideLoadingModal();
          }
        }, waitMs);
      }
    }

    function hideLoadingModal() {
      loadingSessionId += 1;
      if (loadingHideTimerId) {
        window.clearTimeout(loadingHideTimerId);
        loadingHideTimerId = null;
      }
      if (loadingTimerId) {
        window.clearInterval(loadingTimerId);
        loadingTimerId = null;
      }
      document.getElementById('loadingModal').classList.remove('active');
    }

    function updateLoadingModal(options) {
      options = options || {};
      if (options.title !== undefined) {
        document.getElementById('loadingTitle').textContent = options.title;
      }
      if (options.text !== undefined) {
        document.getElementById('loadingText').textContent = options.text;
      }
      if (options.progress !== undefined) {
        setLoadingProgress(options.progress);
      }
      if (options.activeStep !== undefined || options.doneStep !== undefined) {
        if (options.doneStep !== undefined && loadingStepItems[options.doneStep]) {
          loadingStepItems[options.doneStep].status = 'done';
        }
        if (options.activeStep !== undefined) {
          loadingStepItems.forEach(function(step, index) {
            if (index < options.activeStep && step.status !== 'done') step.status = 'done';
            if (index === options.activeStep) step.status = 'active';
            if (index > options.activeStep && step.status !== 'done') step.status = '';
          });
        }
        renderLoadingSteps();
      }
      updateLoadingElapsed();
    }

    function setLoadingProgress(progress) {
      var percent = Math.max(0, Math.min(100, Math.round(Number(progress || 0))));
      var fill = document.getElementById('loadingProgressFill');
      var text = document.getElementById('loadingProgressText');
      if (fill) fill.style.width = percent + '%';
      if (text) text.textContent = percent + '%';
    }

    function updateLoadingElapsed() {
      var element = document.getElementById('loadingElapsedText');
      if (!element || !loadingStartedAt) return;
      element.textContent = ((performance.now() - loadingStartedAt) / 1000).toFixed(1) + 's';
    }

    function renderLoadingSteps() {
      var list = document.getElementById('loadingSteps');
      if (!list) return;
      if (!loadingStepItems.length) {
        list.classList.add('hidden');
        list.innerHTML = '';
        return;
      }
      list.classList.remove('hidden');
      list.innerHTML = loadingStepItems.map(function(step) {
        return '<li class="' + escapeHtml(step.status || '') + '">' + escapeHtml(step.text || '') + '</li>';
      }).join('');
    }

    function cssEscape(value) {
      if (window.CSS && window.CSS.escape) {
        return window.CSS.escape(String(value || ''));
      }
      return String(value || '').replace(/"/g, '\\"');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    init();
  </script>
</body>
</html>
