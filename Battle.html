    function renderAnswerArea(question) {
      var area = document.getElementById('questionAnswerArea');
      if (question.type === 'shortAnswer') {
        area.innerHTML = '<input id="shortAnswerInput" placeholder="정답 입력">';
        var input = document.getElementById('shortAnswerInput');
        if (input) {
          input.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.isComposing) {
              event.preventDefault();
              event.stopPropagation();
              shortAnswerEnterSubmitLock = true;
              submitQuestionAnswer();
            }
          });
          window.setTimeout(function() {
            input.focus();
          }, 0);
        }
        return;
      }
      var choices = [
        { value: '1', text: question.choice1 },
        { value: '2', text: question.choice2 },
        { value: '3', text: question.choice3 },
        { value: '4', text: question.choice4 },
      ];
      shuffleArray(choices);
      area.innerHTML = choices.map(function(choice, index) {
        return '<label class="question-choice" data-choice-value="' + escapeHtml(choice.value) + '">' +
          '<input type="radio" name="questionChoice" value="' + escapeHtml(choice.value) + '"> ' +
          String(index + 1) + '. ' + escapeHtml(choice.text || '') +
        '</label>';
      }).join('');

      Array.prototype.forEach.call(area.querySelectorAll('.question-choice'), function(label) {
        label.addEventListener('click', function() {
          if (label.querySelector('input').disabled) return;
          Array.prototype.forEach.call(area.querySelectorAll('.question-choice'), function(item) {
            item.classList.remove('selected');
          });
          label.classList.add('selected');
          label.querySelector('input').checked = true;
        });
      });
    }

    function renderQuestionMetadata(question) {
      var metadata = document.getElementById('questionMetadata');
      if (!metadata) return;
      metadata.innerHTML = '';
      var chipCount = 0;
      function addChip(label, value) {
        value = String(value || '').trim();
        if (!value) return;
        var chip = document.createElement('span');
        chip.className = 'question-meta-chip';
        var labelElement = document.createElement('b');
        labelElement.textContent = label;
        chip.appendChild(labelElement);
        chip.appendChild(document.createTextNode(value));
        metadata.appendChild(chip);
        chipCount += 1;
      }
      addChip('과목', question && question.subject);
      addChip('단원', question && question.unit);
      normalizeSkillTags(question && question.tags).forEach(function(tag) {
        addChip('#', tag);
      });
      metadata.classList.toggle('hidden', !chipCount);
    }

    function renderQuestionReactionView(question, disabled) {
      var safeQuestion = question || {};
      safeQuestion.myReaction = safeQuestion.myReaction || '';
      updateQuestionReactionView(safeQuestion);
      var hasQuestionId = !!String(safeQuestion.questionId || '').trim();
      var likeButton = document.getElementById('questionLikeButton');
      var dislikeButton = document.getElementById('questionDislikeButton');
      var alreadyReacted = !!safeQuestion.myReaction;
      if (likeButton) likeButton.disabled = !!disabled || !hasQuestionId || alreadyReacted;
      if (dislikeButton) dislikeButton.disabled = !!disabled || !hasQuestionId || alreadyReacted;
    }

    function chooseQuestionReaction(reaction) {
      if (!currentQuestionView || !currentQuestionView.question || questionReactionSaving) return;
      var question = currentQuestionView.question;
      var questionId = String(question.questionId || '').trim();
      if (!questionId || questionId === 'dummy-question') return;
      if (question.myReaction) {
        setQuestionReactionButtonsDisabled(false);
        document.getElementById('questionMessage').textContent = '이미 이 문제에 반응했습니다.';
        document.getElementById('questionMessage').className = 'message';
        return;
      }

      var previousReaction = question.myReaction || '';
      var nextReaction = reaction;
      questionReactionSaving = true;
      setQuestionReactionButtonsDisabled(true);
      applyOptimisticQuestionReaction(question, previousReaction, nextReaction);
      updateQuestionReactionView(question);
      showQuestionReactionScorePop(nextReaction, 10);

      google.script.run
        .withSuccessHandler(function(result) {
          questionReactionSaving = false;
          question.likeCount = Number(result && result.likeCount || 0);
          question.dislikeCount = Number(result && result.dislikeCount || 0);
          question.myReaction = result && result.myReaction || '';
          applyQuestionReactionScoreResult(result);
          if (isCurrentQuestionId(questionId)) {
            setQuestionReactionButtonsDisabled(false);
            updateQuestionReactionView(question);
            document.getElementById('questionMessage').textContent = result && result.alreadyReacted
              ? '이미 이 문제에 반응했습니다.'
              : '현재 점수 ' + formatScore(currentView ? currentView.score || 0 : result && result.totalScore || 0);
            document.getElementById('questionMessage').className = 'message ok';
          }
        })
        .withFailureHandler(function(error) {
          questionReactionSaving = false;
          applyOptimisticQuestionReaction(question, nextReaction, previousReaction);
          if (isCurrentQuestionId(questionId)) {
            setQuestionReactionButtonsDisabled(false);
            updateQuestionReactionView(question);
            document.getElementById('questionMessage').textContent = error.message || '반응 저장에 실패했습니다.';
            document.getElementById('questionMessage').className = 'message error';
          }
        })
        .setQuestionReaction(questionId, nextReaction, getAuthToken(), currentView && currentView.runId || '');
    }

    function applyQuestionReactionScoreResult(result) {
      if (!result) return;
      var delta = Number(result.scoreDelta || 0);
      var totalScore = Number(result.totalScore || 0);
      if (currentView && (delta > 0 || totalScore > 0)) {
        currentView.score = totalScore > 0 ? totalScore : Number(currentView.score || 0) + delta;
      }
      if (delta > 0) {
        addQuestionReactionScoreToCurrentBattle(delta);
      }
      var statsPanel = document.getElementById('battleStatsPanel');
      if (statsPanel && !statsPanel.classList.contains('hidden')) {
        showBattleStats();
      }
    }

    function addQuestionReactionScoreToCurrentBattle(delta) {
      if (!currentView || !currentView.battle || Number(delta || 0) <= 0) return;
      var battleId = String(currentView.battle.battleId || '');
      var state = currentView.battle.questionReactionScoreState || {};
      if (state.battleId && battleId && String(state.battleId) !== battleId) {
        state = {};
      }
      state.battleId = String(state.battleId || battleId);
      state.score = Number(state.score || 0) + Number(delta || 0);
      currentView.battle.questionReactionScoreState = state;
      currentView.stageState = currentView.stageState || {};
      currentView.stageState.scoreState = currentView.stageState.scoreState || {};
      currentView.stageState.scoreState.questionReactionScoreBattleId = state.battleId;
      currentView.stageState.scoreState.questionReactionScore = Number(state.score || 0);
    }

    function showQuestionReactionScorePop(reaction, scoreDelta) {
      var button = document.getElementById(reaction === 'dislike' ? 'questionDislikeButton' : 'questionLikeButton');
      if (!button || Number(scoreDelta || 0) <= 0) return;
      var pop = document.createElement('span');
      pop.className = 'reaction-score-pop';
      pop.textContent = '+' + formatScore(scoreDelta);
      button.appendChild(pop);
      window.setTimeout(function() {
        if (pop && pop.parentNode) {
          pop.parentNode.removeChild(pop);
        }
      }, 950);
    }

    function isCurrentQuestionId(questionId) {
      return String(currentQuestionView && currentQuestionView.question && currentQuestionView.question.questionId || '') === String(questionId || '');
    }

    function applyOptimisticQuestionReaction(question, previousReaction, nextReaction) {
      var likeCount = Number(question.likeCount || 0);
      var dislikeCount = Number(question.dislikeCount || 0);
      if (previousReaction === 'like') likeCount -= 1;
      if (previousReaction === 'dislike') dislikeCount -= 1;
      if (nextReaction === 'like') likeCount += 1;
      if (nextReaction === 'dislike') dislikeCount += 1;
      question.likeCount = Math.max(0, likeCount);
      question.dislikeCount = Math.max(0, dislikeCount);
      question.myReaction = nextReaction || '';
    }

    function updateQuestionReactionView(question) {
      var safeQuestion = question || {};
      var likeButton = document.getElementById('questionLikeButton');
      var dislikeButton = document.getElementById('questionDislikeButton');
      var likeCount = document.getElementById('questionLikeCount');
      var dislikeCount = document.getElementById('questionDislikeCount');
      if (likeCount) likeCount.textContent = Number(safeQuestion.likeCount || 0);
      if (dislikeCount) dislikeCount.textContent = Number(safeQuestion.dislikeCount || 0);
      if (likeButton) likeButton.classList.toggle('selected', safeQuestion.myReaction === 'like');
      if (dislikeButton) dislikeButton.classList.toggle('selected', safeQuestion.myReaction === 'dislike');
    }

    function setQuestionReactionButtonsDisabled(disabled) {
      var question = currentQuestionView && currentQuestionView.question || {};
      var hasQuestionId = !!String(question.questionId || '').trim() && question.questionId !== 'dummy-question';
      var alreadyReacted = !!question.myReaction;
      var likeButton = document.getElementById('questionLikeButton');
      var dislikeButton = document.getElementById('questionDislikeButton');
      if (likeButton) likeButton.disabled = !!disabled || !hasQuestionId || alreadyReacted;
      if (dislikeButton) dislikeButton.disabled = !!disabled || !hasQuestionId || alreadyReacted;
    }

    function hideQuestionGiveUpButton() {
      var button = document.getElementById('questionGiveUpButton');
      if (!button) return;
      button.classList.add('hidden');
      button.disabled = false;
    }

    function showQuestionGiveUpButton() {
      var question = currentQuestionView && currentQuestionView.question || {};
      if (question.type !== 'shortAnswer') return;
      var button = document.getElementById('questionGiveUpButton');
      if (!button) return;
      button.classList.remove('hidden');
      button.disabled = false;
    }

    function shuffleArray(items) {
      for (var i = items.length - 1; i > 0; i -= 1) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = items[i];
        items[i] = items[j];
        items[j] = temp;
      }
      return items;
    }

    function tickQuestionTimer() {
      if (!currentQuestionView) return;
      if (currentQuestionView.efficiencyLocked) {
        updateQuestionEfficiencyMeter(currentQuestionView.lockedEfficiency || MIN_ANSWER_EFFICIENCY);
        return;
      }
      var maxMs = Number(currentQuestionView.maxMs || 10000);
      var elapsedMs = Date.now() - questionStartedAt;
      var remainingMs = Math.max(0, maxMs - elapsedMs);
      var efficiency = calculateTimedEfficiency(remainingMs, maxMs);
      document.getElementById('questionRemainingTime').textContent = formatSecond(remainingMs);
      updateQuestionEfficiencyMeter(efficiency);
    }

    function calculateTimedEfficiency(remainingMs, maxMs) {
      var maxEfficiency = getQuestionMaxAnswerEfficiency();
      var ratio = Math.max(0, Math.min(1, Number(remainingMs || 0) / Math.max(1, Number(maxMs || 1))));
      if (ratio >= 0.5) {
        return 1 + ((ratio - 0.5) * ((maxEfficiency - 1) / 0.5));
      }
      return MIN_ANSWER_EFFICIENCY + (ratio * ((1 - MIN_ANSWER_EFFICIENCY) / 0.5));
    }

    function getQuestionMaxAnswerEfficiency() {
      return Math.max(1, Number(currentQuestionView && currentQuestionView.maxAnswerEfficiency || MAX_ANSWER_EFFICIENCY));
    }

    function updateQuestionEfficiencyMeter(efficiency) {
      var normalizedEfficiency = Math.max(0, Number(efficiency || 0));
      var maxEfficiency = getQuestionMaxAnswerEfficiency();
      var percent = Math.round(normalizedEfficiency * 100);
      var fill = document.getElementById('questionEfficiencyFill');
      var meter = document.getElementById('questionEfficiencyMeter');
      var percentText = document.getElementById('questionEfficiencyPercent');
      var actionValueText = document.getElementById('questionEfficiencyActionValue');
      var actionValue = calculateQuestionActionActualValue(normalizedEfficiency);
      percentText.textContent = percent + '%';
      actionValueText.textContent = '(' + actionValue + ')';
      meter.dataset.efficiency = String(normalizedEfficiency);
      meter.setAttribute('aria-label', '효율 ' + percent + '퍼센트, 행동 수치 ' + actionValue);
      fill.style.width = Math.round(Math.max(0, Math.min(1, normalizedEfficiency / Math.max(0.01, maxEfficiency))) * 100) + '%';
      fill.classList.remove('efficiency-high', 'efficiency-mid', 'efficiency-low');
      fill.classList.add(percent <= 50 ? 'efficiency-low' : (percent <= 100 ? 'efficiency-mid' : 'efficiency-high'));
    }

    function calculateQuestionActionActualValue(efficiency) {
      var battle = currentView && currentView.battle || {};
      var player = battle.player || {};
      var actionType = String(currentQuestionView && currentQuestionView.actionType || 'attack').toLowerCase();
      var normalizedEfficiency = Math.max(0, Number(efficiency || 0));

      if (actionType === 'guard') {
        return Math.max(0, Math.round((CLIENT_BASE_GUARD_SHIELD + getClientEffectiveStat(player, 'defense')) * normalizedEfficiency));
      }

      if (actionType === 'skill') {
        var skill = findAvailableSkill(currentQuestionView && currentQuestionView.skillId || '') || {};
        var skillType = String(skill.type || 'damage').toLowerCase();
        var metrics = getSkillDisplayMetrics(skill);
        if (skillType === 'shield') {
          return Math.max(0, Math.round(Number(metrics.shield || 0) * normalizedEfficiency));
        }
        if (skillType === 'heal') {
          return Math.max(0, Math.round(Number(metrics.heal || 0) * normalizedEfficiency));
        }
        if (skillType === 'buff' || skillType === 'debuff') {
          return parseClientPositiveNumber(metrics.effectValue);
        }
        var perHitDamage = Math.max(0, Math.round(Number(metrics.damage || 0) * normalizedEfficiency));
        perHitDamage = applyClientOutgoingItemDamageModifiers(battle, perHitDamage, { actionType: 'skill', skill: skill });
        return perHitDamage * Math.max(1, Number(metrics.hitCount || 1));
      }

      var attack = getClientEffectiveStat(player, 'attack') || 10;
      var damage = Math.max(0, Math.round(attack * normalizedEfficiency));
      return applyClientOutgoingItemDamageModifiers(battle, damage, { actionType: 'attack' });
    }

    function resetQuestionEfficiencyFeedback() {
      var meter = document.getElementById('questionEfficiencyMeter');
      if (!meter) return;
      meter.classList.remove('efficiency-correct', 'efficiency-penalty');
      meter.removeAttribute('data-efficiency');
      meter.querySelectorAll('.efficiency-damage-pop').forEach(function(pop) {
        pop.remove();
      });
    }

    function animateQuestionEfficiencyCorrect() {
      var meter = document.getElementById('questionEfficiencyMeter');
      if (!meter) return;
      meter.classList.remove('efficiency-correct', 'efficiency-penalty');
      void meter.offsetWidth;
      meter.classList.add('efficiency-correct');
    }

    function animateQuestionEfficiencyPenalty(previousEfficiency, nextEfficiency) {
      var meter = document.getElementById('questionEfficiencyMeter');
      if (!meter) return;
      var lostPercent = Math.max(0, Math.round((Number(previousEfficiency || 0) - Number(nextEfficiency || 0)) * 100));
      meter.classList.remove('efficiency-correct', 'efficiency-penalty');
      void meter.offsetWidth;
      meter.classList.add('efficiency-penalty');
      if (lostPercent <= 0) return;
      var pop = document.createElement('span');
      pop.className = 'efficiency-damage-pop';
      pop.textContent = '-' + lostPercent + '%';
      meter.appendChild(pop);
      window.setTimeout(function() {
        if (pop.parentNode) pop.parentNode.removeChild(pop);
      }, 950);
    }

    function calculateWrongEfficiency(wrongCount) {
      var count = Math.max(1, Number(wrongCount || 1));
      return Math.max(0, MIN_ANSWER_EFFICIENCY - (EXTRA_WRONG_EFFICIENCY_PENALTY * (count - 1)));
    }

    function submitQuestionAnswer() {
      if (!currentQuestionView) return;
      if (currentQuestionView.resultHolding) {
        requestQuestionResultProceed();
        return;
      }
      var answer = getSelectedAnswer(currentQuestionView.question);
      if (!answer.selectedAnswer && !answer.selectedAnswerText) {
        document.getElementById('questionMessage').textContent = '답을 선택하거나 입력하세요.';
        document.getElementById('questionMessage').className = 'message error';
        return;
      }

      var elapsedMs = Date.now() - questionStartedAt;
      var canCheckOnClient = hasClientAnswer(currentQuestionView.question);
      var isCorrect = canCheckOnClient ? isClientCorrectAnswer(currentQuestionView.question, answer) : true;

      if (!isCorrect) {
        clearInterval(questionTimerId);
        var efficiencyMeter = document.getElementById('questionEfficiencyMeter');
        var previousEfficiency = Number(efficiencyMeter && efficiencyMeter.dataset.efficiency || calculateTimedEfficiency(Math.max(0, Number(currentQuestionView.maxMs || 10000) - elapsedMs), currentQuestionView.maxMs));
        wrongCountAfterTimeout += 1;
        currentQuestionView.efficiencyLocked = true;
        currentQuestionView.lockedEfficiency = calculateWrongEfficiency(wrongCountAfterTimeout);
        updateQuestionEfficiencyMeter(currentQuestionView.lockedEfficiency);
        animateQuestionEfficiencyPenalty(previousEfficiency, currentQuestionView.lockedEfficiency);
        markSelectedAnswerResult(false);
        showQuestionGiveUpButton();
        document.getElementById('questionMessage').textContent = wrongCountAfterTimeout === 1 ? '오답입니다. 효율이 50%로 고정됩니다.' : '오답입니다. 효율이 10% 감소했습니다.';
        document.getElementById('questionMessage').className = 'message error';
        return;
      }

      clearInterval(questionTimerId);
      var finalEfficiency = currentQuestionView.efficiencyLocked
        ? Number(currentQuestionView.lockedEfficiency || 0)
        : applyClientQuestionCorrectEfficiencyModifiers(calculateTimedEfficiency(Math.max(0, Number(currentQuestionView.maxMs || 10000) - elapsedMs), currentQuestionView.maxMs), currentQuestionView);
      updateQuestionEfficiencyMeter(finalEfficiency);
      animateQuestionEfficiencyCorrect();
      document.getElementById('questionSubmitButton').disabled = true;
      hideQuestionGiveUpButton();
      setQuestionInputsDisabled(true);
      setBattleInputLocked(true);
      markSelectedAnswerResult(true);
      document.getElementById('questionMessage').textContent = '정답입니다.';
      document.getElementById('questionMessage').className = 'message ok';
      startQuestionResultHold();
      var actionTypeForSubmit = currentQuestionView.actionType;
      var skillIdForSubmit = currentQuestionView.skillId || '';
      var targetIdForSubmit = currentQuestionView.targetId || '';

      if (currentQuestionView.isDummy) {
        var dummyActionType = currentQuestionView.actionType;
        window.setTimeout(function() {
          receiveQuestionTurnView(buildDummyNextView(dummyActionType));
        }, 450);
        return;
      }

      var answerPayload = {
        runId: currentView.runId,
        authToken: getAuthToken(),
        questionId: currentQuestionView.question.questionId,
        selectedAnswer: answer.selectedAnswer,
        selectedChoiceIndex: answer.selectedChoiceIndex,
        selectedAnswerText: answer.selectedAnswerText,
        elapsedMs: elapsedMs,
        wrongCountAfterTimeout: wrongCountAfterTimeout,
        actionType: currentQuestionView.actionType,
        skillId: currentQuestionView.skillId || '',
        targetId: currentQuestionView.targetId || '',
        maxMs: currentQuestionView.maxMs,
        finalDifficulty: currentQuestionView.finalDifficulty,
        isOtherPlayerQuestion: !!currentQuestionView.isOtherPlayerQuestion,
        fallbackReason: currentQuestionView.fallbackReason || '',
        giveUp: false,
      };

      submitQuestionAnswerOnServer(answerPayload, actionTypeForSubmit, skillIdForSubmit, targetIdForSubmit);
    }

    function giveUpCurrentQuestion() {
      if (!currentQuestionView || currentQuestionView.resultHolding) return;
      var question = currentQuestionView.question || {};
      if (question.type !== 'shortAnswer') return;

      clearInterval(questionTimerId);
      var efficiencyMeter = document.getElementById('questionEfficiencyMeter');
      var previousEfficiency = Number(efficiencyMeter && efficiencyMeter.dataset.efficiency || 0);
      currentQuestionView.giveUp = true;
      currentQuestionView.efficiencyLocked = true;
      currentQuestionView.lockedEfficiency = 0;
      updateQuestionEfficiencyMeter(0);
      animateQuestionEfficiencyPenalty(previousEfficiency, 0);
      document.getElementById('questionSubmitButton').disabled = true;
      var giveUpButton = document.getElementById('questionGiveUpButton');
      if (giveUpButton) {
        giveUpButton.disabled = true;
      }
      setQuestionInputsDisabled(true);
      setBattleInputLocked(true);
      showGivenUpAnswerInInput(question);
      document.getElementById('questionMessage').textContent = '문제를 포기했습니다.';
      document.getElementById('questionMessage').className = 'message error';
      startQuestionResultHold();

      var answerPayload = {
        runId: currentView.runId,
        authToken: getAuthToken(),
        questionId: question.questionId,
        selectedAnswer: '',
        selectedChoiceIndex: '',
        selectedAnswerText: '',
        elapsedMs: Math.max(0, Date.now() - questionStartedAt),
        wrongCountAfterTimeout: wrongCountAfterTimeout,
        actionType: currentQuestionView.actionType,
        skillId: currentQuestionView.skillId || '',
        targetId: currentQuestionView.targetId || '',
        maxMs: currentQuestionView.maxMs,
        finalDifficulty: currentQuestionView.finalDifficulty,
        isOtherPlayerQuestion: !!currentQuestionView.isOtherPlayerQuestion,
        fallbackReason: currentQuestionView.fallbackReason || '',
        giveUp: true,
      };

      submitQuestionAnswerOnServer(answerPayload, currentQuestionView.actionType, currentQuestionView.skillId || '', currentQuestionView.targetId || '');
    }

    function showGivenUpAnswerInInput(question) {
      var input = document.getElementById('shortAnswerInput');
      if (!input) return;
      var answerText = getQuestionAnswerDisplayText(question);
      input.value = '정답: ' + answerText;
      input.classList.add('answer-revealed');
      input.setAttribute('aria-label', '정답 ' + answerText);
    }

    function submitQuestionAnswerOnServer(answerPayload, actionTypeForSubmit, skillIdForSubmit, targetIdForSubmit) {
      var nextView = buildOptimisticNextViewFromQuestion();
      if (!nextView) {
        pendingQuestionTurnError = new Error('전투 결과를 계산할 수 없습니다.');
        requestQuestionResultProceed();
        return;
      }
      pendingStageAnswerLogs.push(buildPendingStageAnswerLog(answerPayload, nextView));
      receiveQuestionTurnView(nextView);
    }

    function buildPendingStageAnswerLog(answerPayload, nextView) {
      var questionView = currentQuestionView || {};
      var question = questionView.question || {};
      var battle = nextView && nextView.battle || currentView && currentView.battle || {};
      return {
        questionId: answerPayload.questionId,
        playerId: currentView && currentView.playerId || '',
        creatorId: question.creatorId || '',
        creatorName: question.creatorName || '',
        runId: currentView && currentView.runId || '',
        battleId: battle.battleId || currentView && currentView.battle && currentView.battle.battleId || '',
        floor: battle.stage && battle.stage.floor || '',
        stage: battle.stage && battle.stage.stage || '',
        actionType: answerPayload.actionType,
        skillId: answerPayload.skillId || '',
        targetId: answerPayload.targetId || '',
        selectedAnswer: answerPayload.selectedAnswer,
        selectedChoiceIndex: answerPayload.selectedChoiceIndex,
        selectedAnswerText: answerPayload.selectedAnswerText,
        elapsedMs: answerPayload.elapsedMs,
        maxTimeMs: answerPayload.maxMs,
        finalDifficulty: answerPayload.finalDifficulty,
        isOtherPlayerQuestion: !!answerPayload.isOtherPlayerQuestion,
        fallbackReason: answerPayload.fallbackReason || '',
        wrongCountAfterTimeout: answerPayload.wrongCountAfterTimeout,
        giveUp: !!answerPayload.giveUp,
      };
    }

    function startQuestionResultHold() {
      resetQuestionResultHold(false);
      if (!currentQuestionView) return;
      var requiresManualProceed = isShortAnswerCorrectResult(currentQuestionView);
      currentQuestionView.resultHolding = true;
      pendingQuestionTurnView = null;
      pendingQuestionTurnError = null;
      pendingServerTurnView = null;
      pendingQuestionTurnIsOptimistic = false;
      questionResultProceedRequested = false;
      pendingTurnResolutionActive = true;
      pendingTurnResolutionLoading = false;
      if (questionResultHoldTimerId) {
        window.clearTimeout(questionResultHoldTimerId);
        questionResultHoldTimerId = null;
      }
      if (questionResultSkipTimerId) {
        window.clearTimeout(questionResultSkipTimerId);
        questionResultSkipTimerId = null;
      }
      var hold = document.getElementById('questionResultHold');
      var fill = document.getElementById('questionResultHoldFill');
      var button = document.getElementById('questionSubmitButton');
      if (hold) {
        hold.classList.add('hidden');
        hold.setAttribute('aria-hidden', 'true');
      }
      if (fill) {
        fill.style.transition = 'none';
        fill.style.width = '100%';
      }
      if (button) {
        button.disabled = false;
        button.textContent = '확인';
        if (requiresManualProceed) {
          button.focus();
        }
      }
      if (requiresManualProceed) {
        return;
      }
      questionResultHoldTimerId = window.setTimeout(requestQuestionResultProceed, QUESTION_RESULT_AUTO_CLOSE_MS);
    }

    function receiveQuestionTurnView(view) {
      var normalizedView = normalizeBattleView(view);
      if (currentQuestionView && currentQuestionView.resultHolding && !questionResultProceedRequested) {
        pendingQuestionTurnView = normalizedView;
        pendingQuestionTurnIsOptimistic = false;
        return;
      }
      if (pendingQuestionTurnIsOptimistic) {
        pendingServerTurnView = normalizedView;
        if (pendingTurnResolutionLoading || (!isAnimatingTurn && !currentQuestionView)) {
          applyPendingServerTurnSync();
        }
        return;
      }
      if (pendingTurnResolutionActive && !currentQuestionView) {
        hideLoadingModal();
        pendingQuestionTurnView = null;
        pendingQuestionTurnError = null;
        pendingServerTurnView = null;
        pendingQuestionTurnIsOptimistic = false;
        pendingTurnResolutionActive = false;
        pendingTurnResolutionLoading = false;
        setBattleInputLocked(true);
        playTurnSequence(normalizedView);
        return;
      }
      pendingQuestionTurnView = normalizedView;
      pendingQuestionTurnIsOptimistic = false;
      if (questionResultProceedRequested || pendingTurnResolutionLoading) {
        continueAfterQuestionResult();
      }
    }

    function requestQuestionResultProceed() {
      if (!pendingTurnResolutionActive && (!currentQuestionView || !currentQuestionView.resultHolding)) return;
      questionResultProceedRequested = true;
      var button = document.getElementById('questionSubmitButton');
      if (button) {
        button.disabled = true;
        button.textContent = '진행 중...';
      }
      if (pendingQuestionTurnError) {
        hideLoadingModal();
        resetQuestionResultHold();
        setBattleInputLocked(false);
        setQuestionInputsDisabled(false);
        if (button) {
          button.disabled = false;
          button.textContent = '확인';
        }
        document.getElementById('questionMessage').textContent = pendingQuestionTurnError.message;
        document.getElementById('questionMessage').className = 'message error';
        pendingQuestionTurnError = null;
        return;
      }
      if (pendingQuestionTurnView) {
        continueAfterQuestionResult();
        return;
      }
      resetQuestionResultHold(false);
      closeQuestionModal(false);
      pendingTurnResolutionLoading = true;
      setBattleInputLocked(true);
      pushLog('전투 결과를 기다리는 중입니다.', { instant: true });
    }

    function continueAfterQuestionResult() {
      var nextView = pendingQuestionTurnView;
      if (!nextView) return;
      hideLoadingModal();
      resetQuestionResultHold(false);
      closeQuestionModal(false);
      setBattleInputLocked(true);
      pendingQuestionTurnView = null;
      pendingQuestionTurnError = null;
      if (!pendingQuestionTurnIsOptimistic) {
        pendingTurnResolutionActive = false;
      }
      pendingTurnResolutionLoading = false;
      pendingQuestionTurnIsOptimistic = false;
      window.setTimeout(function() {
        playTurnSequence(nextView);
      }, QUESTION_ACTION_START_DELAY_MS);
    }

    function applyPendingServerTurnSync() {
      if (!pendingServerTurnView) return false;
      hideLoadingModal();
      hideTurnSyncSpinner();
      currentView = normalizeBattleView(pendingServerTurnView);
      resetBattleQuestionCacheFromView(currentView, battleQuestionCache);
      pendingServerTurnView = null;
      pendingQuestionTurnView = null;
      pendingQuestionTurnError = null;
      pendingQuestionTurnIsOptimistic = false;
      pendingTurnResolutionActive = false;
      pendingTurnResolutionLoading = false;
      saveLocalBattleCheckpoint();
      if (!isAnimatingTurn && !currentQuestionView) {
        renderBattle(currentView);
        if (currentView.battle.status === 'victory') {
          openRewardAfterVictory();
        } else if (currentView.battle.status === 'defeat') {
          showDefeatSequence();
        } else {
          setPlayerTurn(true);
        }
      }
      return true;
    }

    function resetQuestionResultHold(clearPending) {
      if (questionResultHoldTimerId) {
        window.clearTimeout(questionResultHoldTimerId);
        questionResultHoldTimerId = null;
      }
      if (questionResultSkipTimerId) {
        window.clearTimeout(questionResultSkipTimerId);
        questionResultSkipTimerId = null;
      }
      var hold = document.getElementById('questionResultHold');
      var fill = document.getElementById('questionResultHoldFill');
      if (hold) {
        hold.classList.add('hidden');
        hold.setAttribute('aria-hidden', 'true');
      }
      if (fill) {
        fill.style.transition = 'none';
        fill.style.width = '100%';
      }
      if (currentQuestionView) {
        currentQuestionView.resultHolding = false;
      }
      questionResultProceedRequested = false;
      if (clearPending !== false) {
        pendingQuestionTurnView = null;
        pendingQuestionTurnError = null;
        pendingServerTurnView = null;
        pendingQuestionTurnIsOptimistic = false;
        pendingTurnResolutionActive = false;
        pendingTurnResolutionLoading = false;
      }
    }

    function hasClientAnswer(question) {
      return question && question.answer !== undefined && question.answer !== null && question.answer !== '';
    }

    function isShortAnswerCorrectResult(questionView) {
      var question = questionView && questionView.question || {};
      return question.type === 'shortAnswer' && !questionView.giveUp;
    }

    function getQuestionAnswerDisplayText(question) {
      question = question || {};
      var answer = String(question.answer == null ? '' : question.answer).trim();
      if (answer) return answer;
      var aliases = safeJsonParseClient(question.answerAliases, []);
      return String(aliases[0] || '').trim() || '정답 정보 없음';
    }

    function isClientCorrectAnswer(question, answer) {
      var answerNormalizer = question.type === 'shortAnswer'
        ? normalizeClientShortAnswer
        : normalizeClientAnswer;
      var expected = answerNormalizer(question.answer);
      var aliases = safeJsonParseClient(question.answerAliases, []).map(answerNormalizer);
      var candidates = [
        answerNormalizer(answer.selectedAnswer),
        answerNormalizer(answer.selectedChoiceIndex),
        answerNormalizer(answer.selectedAnswerText),
      ].filter(Boolean);
      if (question.type === 'multipleChoice') {
        var expectedChoice = Number(question.answer);
        if (expectedChoice >= 1 && expectedChoice <= 4 && String(expectedChoice) === String(answer.selectedChoiceIndex)) {
          return true;
        }
      }
      return candidates.some(function(candidate) {
        return candidate === expected || aliases.indexOf(candidate) !== -1;
      });
    }

    function markSelectedAnswerResult(isCorrect) {
      var selectedLabel = document.querySelector('.question-choice.selected');
      if (!selectedLabel) {
        if (isCorrect) {
          spawnAnswerCorrectBurst(document.getElementById('shortAnswerInput'));
        }
        return;
      }
      selectedLabel.classList.add(isCorrect ? 'answer-correct' : 'answer-wrong');
      if (isCorrect) {
        spawnAnswerCorrectBurst(selectedLabel);
      }
      if (!isCorrect) {
        selectedLabel.classList.remove('selected');
        var input = selectedLabel.querySelector('input');
        if (input) {
          input.checked = false;
          input.disabled = true;
        }
      }
    }

    function setQuestionInputsDisabled(disabled) {
      var area = document.getElementById('questionAnswerArea');
      if (!area) return;
      Array.prototype.forEach.call(area.querySelectorAll('input, button, select, textarea'), function(control) {
        control.disabled = !!disabled;
      });
      Array.prototype.forEach.call(area.querySelectorAll('.question-choice'), function(label) {
        label.classList.toggle('disabled-choice', !!disabled);
      });
    }

    function setBattleInputLocked(locked) {
      var shouldLock = !!locked || isBattleResultLoading();
      ['attackActionButton', 'guardActionButton', 'skillToggleButton', 'passTurnButton', 'battleMenuButton'].forEach(function(id) {
        var button = document.getElementById(id);
        if (button) button.disabled = shouldLock;
      });
      Array.prototype.forEach.call(document.querySelectorAll('.skill-button, .skill-cancel-button'), function(button) {
        if (button.classList.contains('skill-button')) {
          button.disabled = shouldLock || button.getAttribute('data-skill-disabled') === 'true';
          return;
        }
        button.disabled = shouldLock;
      });
    }

    function shouldLockBattleInput() {
      if (isBattleResultLoading()) return true;
      if (!isPlayerTurn || isAnimatingTurn || stageIntroPlaying) return true;
      if (currentQuestionView) return true;
      return false;
    }

    function isBattleResultLoading() {
      return !!(pendingTurnResolutionActive || pendingTurnResolutionLoading || questionResultProceedRequested);
    }

    function updateBattleInputLockState() {
      setBattleInputLocked(shouldLockBattleInput());
    }

    function safeJsonParseClient(value, fallback) {
      if (!value) return fallback;
      try {
        return JSON.parse(value);
      } catch (error) {
        return fallback;
      }
    }

    function normalizeClientAnswer(value) {
      return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function normalizeClientShortAnswer(value) {
      return normalizeClientAnswer(value).replace(/\s+/g, '');
    }

    async function playTurnSequence(nextView) {
      cancelTargetSelection();
      isAnimatingTurn = true;
      setBattleInputLocked(true);
      setPlayerTurn(false);
      if (nextView && nextView.battle && nextView.battle.status === 'victory') {
        preloadVictoryRewardChoices(nextView);
      }
      var events = (nextView.battle.lastTurnEvents || []).slice();
      var consumedSimultaneousEvents = {};

      for (var i = 0; i < events.length; i += 1) {
        if (consumedSimultaneousEvents[i]) {
          continue;
        }
        var event = events[i];
        if (event.actor === 'effect') {
          var effectEventMessage = event.message || '';
          if (event.target === 'monster') {
            event.targetMonsterId = event.targetMonsterId || getFirstAliveMonsterId(currentView && currentView.battle);
            await animatePlayerAttack(event.targetMonsterId);
            await skippableAutoDelay(ATTACK_EFFECT_DELAY_MS);
            pushLog(effectEventMessage);
            await animateMonsterHit(event.targetMonsterId, event.damage, event.hpDamage, event.shieldDamage, event.isCritical);
            await waitForBattleLogAdvance();
          } else if (event.target === 'player') {
            pushLog(effectEventMessage);
            animatePlayerHit(event.damage, event.hpDamage || event.damage, event.shieldDamage, event.isCritical);
            await waitForBattleLogAdvance();
          } else {
            pushLog(effectEventMessage);
            await waitForBattleLogAdvance();
          }
        }
        if (event.actor === 'player') {
          if (event.simultaneousGroupId && (event.type === 'attack' || event.type === 'skill')) {
            var simultaneousEvents = collectSimultaneousEvents(events, i, consumedSimultaneousEvents);
            if (simultaneousEvents.length > 1) {
              await playSimultaneousMonsterHits(simultaneousEvents);
              await waitForBattleLogAdvance();
              continue;
            }
          }
          var playerEventMessage = event.message || 'Player action!';
          if (event.type === 'attack' || event.type === 'skill') {
            event.targetMonsterId = event.targetMonsterId || getFirstAliveMonsterId(currentView && currentView.battle);
            await animatePlayerAttack(event.targetMonsterId);
            pushLog(playerEventMessage);
            await animateMonsterHit(event.targetMonsterId, event.damage, event.hpDamage, event.shieldDamage, event.isCritical);
          } else if (event.type === 'guard') {
            pushLog(playerEventMessage);
            animatePlayerShield(event.shield);
          } else if ((event.type === 'debuff' || event.type === 'buff') && event.targetMonsterId) {
            pushLog(playerEventMessage);
            animateMonsterStatusEffect(event.targetMonsterId, event.type);
          } else if (event.type === 'buff' || event.type === 'debuff') {
            pushLog(playerEventMessage);
            animatePlayerStatusEffect(event.type);
          } else {
            pushLog(playerEventMessage);
          }
          await waitForBattleLogAdvance();
        }
      }

      var monsterEvents = events.filter(function(event) { return event.actor === 'monster'; });
      if (monsterEvents.length) {
        showTurnBanner('몬스터 턴');
        pushLog('몬스터 턴 시작');
        await holdBattleMessage();
        await skippableAutoDelay(MONSTER_TURN_START_DELAY_MS);
        for (var j = 0; j < monsterEvents.length; j += 1) {
          var monsterEvent = monsterEvents[j];
          var monsterEventMessage = monsterEvent.message || '몬스터의 행동!';
          if (monsterEvent.type === 'guard') {
            pushLog(monsterEventMessage);
            await holdBattleMessage();
            applyMonsterShieldDelta(monsterEvent.monsterId, monsterEvent.shield || 0);
            animateMonsterShield(monsterEvent.monsterId);
          } else if (monsterEvent.type === 'buff') {
            pushLog(monsterEventMessage);
            animateMonsterStatusEffect(monsterEvent.monsterId, 'buff');
            await holdBattleMessage();
          } else if (monsterEvent.type === 'debuff') {
            pushLog(monsterEventMessage);
            animatePlayerStatusEffect('debuff');
            await holdBattleMessage();
          } else if (Number(monsterEvent.damage || monsterEvent.shieldDamage || monsterEvent.hpDamage || 0) > 0) {
            await animateMonsterAttack(monsterEvent.monsterId);
            pushLog(monsterEventMessage, { instant: true });
            animatePlayerHit(monsterEvent.damage || 0, monsterEvent.hpDamage || 0, monsterEvent.shieldDamage || 0, monsterEvent.isCritical);
          } else {
            pushLog(monsterEventMessage);
            await holdBattleMessage();
          }
          await skippableAutoDelay(BATTLE_STEP_DELAY_MS);
        }
        pushLog('몬스터 턴 종료');
        await holdBattleMessage();
        await skippableAutoDelay(MONSTER_TURN_END_DELAY_MS);
      }

      currentView = normalizeBattleView(nextView);
      resetBattleQuestionCacheFromView(currentView, battleQuestionCache);
      renderBattle(currentView);
      if (pendingServerTurnView && applyPendingServerTurnSync()) {
        renderBattle(currentView);
      }
      saveLocalBattleCheckpoint();
      if (pendingTurnResolutionActive && pendingQuestionTurnIsOptimistic && !pendingServerTurnView) {
        showTurnSyncSpinner();
        isAnimatingTurn = false;
        setBattleInputLocked(true);
        setPlayerTurn(false);
        return;
      }
      isAnimatingTurn = false;
      setBattleInputLocked(false);
      if (pendingTurnResolutionActive && !pendingServerTurnView && currentView.battle.status === 'victory') {
        pendingTurnResolutionLoading = true;
        setBattleInputLocked(true);
        showLoadingModal('전투 결과 저장 중...', '보상을 준비하는 중...');
        return;
      }
      if (currentView.battle.status === 'victory') {
        passTurnLogPending = false;
        openRewardAfterVictory();
        return;
      }
      if (currentView.battle.status === 'defeat') {
        passTurnLogPending = false;
        setPlayerTurn(false);
        pushLog('쓰러졌습니다.');
        showDefeatSequence();
        return;
      }
      if (monsterEvents.length) {
        showTurnBanner('내 턴');
      }
      setPlayerTurn(true);
      if (passTurnLogPending) {
        passTurnLogPending = false;
        pushLog('턴을 종료했습니다.', { instant: true });
      }
    }

    function collectSimultaneousEvents(events, startIndex, consumedMap) {
      var event = events[startIndex] || {};
      var groupId = event.simultaneousGroupId || '';
      if (!groupId) return [event];
      var group = [];
      for (var i = startIndex; i < events.length; i += 1) {
        var candidate = events[i];
        if (!candidate || candidate.simultaneousGroupId !== groupId || candidate.actor !== event.actor || candidate.type !== event.type) {
          continue;
        }
        consumedMap[i] = true;
        group.push(candidate);
      }
      return group;
    }

    async function playSimultaneousMonsterHits(events) {
      var targets = events.map(function(event) {
        event.targetMonsterId = event.targetMonsterId || getFirstAliveMonsterId(currentView && currentView.battle);
        return event.targetMonsterId;
      }).filter(Boolean);
      for (var i = 0; i < targets.length; i += 1) {
        await animatePlayerAttack(targets[i]);
      }
      var message = events[0] && events[0].message || '광역 공격!';
      pushLog(message);
      await Promise.all(events.map(function(event) {
        return animateMonsterHit(event.targetMonsterId, event.damage, event.hpDamage, event.shieldDamage, event.isCritical);
      }));
    }

    function buildDummyNextView(actionType) {
      var nextView = JSON.parse(JSON.stringify(currentView));
      var battle = nextView.battle;
      battle.lastTurnEvents = [];
      if (actionType === 'guard') {
        battle.player.shield = Number(battle.player.shield || 0) + 8;
        battle.lastTurnEvents.push({ actor: 'player', type: 'guard', shield: 8, message: '수비로 방어막 8을 만들었습니다.' });
      } else {
        var target = findOptimisticTargetMonster(battle, currentQuestionView && currentQuestionView.targetId || '') || getFirstAliveMonster(battle);
        if (target) {
          var totalDamage = 10;
          var shieldDamage = Math.min(Number(target.shield || 0), totalDamage);
          var hpDamage = totalDamage - shieldDamage;
          target.shield = Math.max(0, Number(target.shield || 0) - shieldDamage);
          target.currentHp = Math.max(0, Number(target.currentHp || 0) - hpDamage);
          battle.lastTurnEvents.push({ actor: 'player', type: actionType === 'skill' ? 'skill' : 'attack', targetMonsterId: target.instanceId, damage: totalDamage, shieldDamage: shieldDamage, hpDamage: hpDamage, message: target.name + '에게 ' + totalDamage + ' 피해!' });
        }
      }
      if (!getFirstAliveMonster(battle)) {
        battle.status = 'victory';
        battle.lastMessage = '몬스터를 처치했습니다.';
        return nextView;
      }
      battle.status = 'active';
      battle.lastMessage = '내 턴입니다. 행동을 선택하세요.';
      return nextView;
    }

    function buildDummyPassTurnView() {
      var nextView = JSON.parse(JSON.stringify(currentView));
      var battle = nextView.battle;
      battle.lastTurnEvents = [];
      battle.player.currentActionPoint = 0;
      battle.monsters.forEach(function(monster) {
        if (Number(monster.currentHp || 0) <= 0 || battle.player.hp <= 0) return;
        var damage = Number(monster.attack || 0);
        var shieldDamage = Math.min(Number(battle.player.shield || 0), damage);
        var hpDamage = damage - shieldDamage;
        battle.player.shield = Math.max(0, Number(battle.player.shield || 0) - shieldDamage);
        battle.player.hp = Math.max(0, Number(battle.player.hp || 0) - hpDamage);
        battle.lastTurnEvents.push({ actor: 'monster', type: 'attack', monsterId: monster.instanceId, monsterName: monster.name, damage: damage, shieldDamage: shieldDamage, hpDamage: hpDamage, message: monster.name + '의 공격!' });
      });
      battle.player.shield = 0;
      battle.status = battle.player.hp <= 0 ? 'defeat' : 'active';
      battle.turn = Number(battle.turn || 1) + 1;
      battle.player.currentActionPoint = battle.status === 'active' ? Number(battle.player.maxActionPoint || 3) : 0;
      battle.lastMessage = battle.status === 'defeat' ? '몬스터의 공격으로 쓰러졌습니다.' : '턴을 종료했습니다.';
      return nextView;
    }

    function buildClientPassTurnView() {
      var nextView = JSON.parse(JSON.stringify(currentView));
      var battle = nextView.battle || {};
      battle.lastTurnEvents = [];
      normalizeClientActionPoints(battle.player);
      battle.player.currentActionPoint = 0;

      (battle.monsters || []).forEach(function(monster) {
        monster.shield = 0;
      });

      if (!getFirstAliveMonster(battle)) {
        battle.status = 'victory';
        battle.lastMessage = '몬스터를 처치했습니다.';
        return normalizeBattleView(nextView);
      }

      (battle.monsters || []).forEach(function(monster) {
        if (Number(monster.currentHp || 0) <= 0 || Number(battle.player.hp || 0) <= 0) return;
        if (hasClientEffect(monster, 'debuff_stun') || hasClientEffect(monster, 'debuff_freeze')) {
          battle.lastTurnEvents.push({
            actor: 'monster',
            type: 'skip',
            monsterId: monster.instanceId || monster.monsterId,
            monsterName: monster.name,
            message: monster.name + '은 행동할 수 없습니다.',
          });
          return;
        }
        applyClientTimedEffectDamage(monster, 'onAction', battle, 'monster');
        if (Number(monster.currentHp || 0) <= 0) return;
        var intent = monster.intent || {};
        monster.intent = null;
        var actionType = String(intent.actionType || 'attack');
        var intentValue = getClientIntentValue(intent);
        if (actionType === 'guard') {
          var shield = Math.max(0, Math.round(intentValue || calculateClientMonsterGuardShield(monster)));
          monster.shield = Number(monster.shield || 0) + shield;
          battle.lastTurnEvents.push({
            actor: 'monster',
            type: 'guard',
            monsterId: monster.instanceId || monster.monsterId,
            monsterName: monster.name,
            shield: shield,
            message: monster.name + '이 방어 태세를 취했습니다.',
          });
          return;
        }
        if (actionType === 'skill') {
          var skillType = String(intent.skillType || '').toLowerCase();
          if (skillType === 'shield') {
            var skillShield = Math.max(0, Math.round(intentValue || (Number(intent.skillBaseValue || 0) + getClientEffectiveStat(monster, 'defense'))));
            monster.shield = Number(monster.shield || 0) + skillShield;
            applyClientMonsterSkillEffect(monster, intent);
            battle.lastTurnEvents.push({
              actor: 'monster',
              type: 'guard',
              skillId: intent.skillId || '',
              monsterId: monster.instanceId || monster.monsterId,
              monsterName: monster.name,
              shield: skillShield,
              message: monster.name + '이 ' + (intent.skillName || '스킬') + ' 사용!',
            });
            return;
          }
          if (skillType === 'heal') {
            var heal = Math.max(0, Math.round(intentValue || 0));
            monster.currentHp = Math.min(Number(monster.maxHp || 1), Number(monster.currentHp || 0) + heal);
            battle.lastTurnEvents.push({
              actor: 'monster',
              type: 'heal',
              skillId: intent.skillId || '',
              monsterId: monster.instanceId || monster.monsterId,
              monsterName: monster.name,
              heal: heal,
              message: monster.name + '이 ' + (intent.skillName || '스킬') + ' 사용!',
            });
            return;
          }
          if (skillType === 'buff' || skillType === 'debuff') {
            var effectTarget = skillType === 'buff' ? monster : battle.player;
            applyClientMonsterSkillEffect(effectTarget, intent);
            battle.lastTurnEvents.push({
              actor: 'monster',
              type: skillType,
              skillId: intent.skillId || '',
              monsterId: monster.instanceId || monster.monsterId,
              monsterName: monster.name,
              damage: 0,
              message: monster.name + '이 ' + (intent.skillName || '스킬') + ' 사용!',
            });
            return;
          }
        }

        var damage = Math.max(0, Math.round(intentValue || getClientEffectiveStat(monster, 'attack') || 0));
        var hitCount = actionType === 'skill'
          ? Math.max(1, Math.round(Number(intent.hitCount || intent.skillHitCount || 1)))
          : 1;
        for (var hitIndex = 0; hitIndex < hitCount && Number(battle.player.hp || 0) > 0; hitIndex += 1) {
          var result = applyOptimisticPlayerDamage(battle, damage);
          battle.lastTurnEvents.push({
            actor: 'monster',
            type: actionType === 'skill' ? 'skill' : 'attack',
            skillId: intent.skillId || '',
            monsterId: monster.instanceId || monster.monsterId,
            monsterName: monster.name,
            damage: result.damage,
            shieldDamage: result.shieldDamage,
            hpDamage: result.hpDamage,
            hitIndex: hitIndex + 1,
            hitCount: hitCount,
            message: actionType === 'skill' && intent.skillName
              ? monster.name + '이 ' + intent.skillName + ' 사용!'
              : monster.name + '의 공격!',
          });
        }
      });

      battle.player.shield = 0;
      applyClientTimedEffectDamage(battle.player, 'turnEnd', battle, 'player');
      (battle.monsters || []).forEach(function(monster) {
        applyClientTimedEffectDamage(monster, 'turnEnd', battle, 'monster');
        decrementClientTurnEffects(monster);
      });
      decrementClientTurnEffects(battle.player);
      battle.turn = Number(battle.turn || 1) + 1;
      battle.status = Number(battle.player.hp || 0) <= 0 ? 'defeat' : 'active';
      if (!getFirstAliveMonster(battle)) {
        battle.status = 'victory';
      }
      battle.player.currentActionPoint = battle.status === 'active' ? Number(battle.player.maxActionPoint || 3) : 0;
      if (battle.status === 'active') {
        decrementClientSkillCooldowns(battle);
        applyClientTimedEffectDamage(battle.player, 'turnStart', battle, 'player');
        (battle.monsters || []).forEach(function(monster) {
          applyClientTimedEffectDamage(monster, 'turnStart', battle, 'monster');
        });
        if (Number(battle.player.hp || 0) <= 0) {
          battle.status = 'defeat';
        } else if (!getFirstAliveMonster(battle)) {
          battle.status = 'victory';
        }
      }
      if (battle.status === 'active') {
        battle.usedSkillTagsThisTurn = [];
        battle.usedSkillCountByTagThisTurn = {};
        assignClientMonsterIntents(battle);
      }
      refreshClientSkillAvailabilityForLocks(nextView);
      battle.lastMessage = battle.status === 'defeat'
        ? '몬스터의 공격으로 쓰러졌습니다.'
        : (battle.status === 'victory' ? '몬스터를 처치했습니다.' : '내 턴입니다. 행동을 선택하세요.');
      return normalizeBattleView(nextView);
    }

    function decrementClientSkillCooldowns(battle) {
      if (!battle) return;
      battle.skillCooldowns = battle.skillCooldowns || {};
      battle.skillCooldownStartedTurns = battle.skillCooldownStartedTurns || {};
      var currentTurn = Number(battle.turn || 1);
      Object.keys(battle.skillCooldowns).forEach(function(skillId) {
        var startedTurn = Number(battle.skillCooldownStartedTurns[skillId] || 0);
        if (startedTurn && currentTurn <= startedTurn + 1) {
          return;
        }
        battle.skillCooldowns[skillId] = Math.max(0, Number(battle.skillCooldowns[skillId] || 0) - 1);
        if (Number(battle.skillCooldowns[skillId] || 0) <= 0) {
          delete battle.skillCooldownStartedTurns[skillId];
        }
      });
    }

    function refreshClientSkillAvailabilityForLocks(view) {
      if (!view || !view.battle || !Array.isArray(view.availableSkills)) return;
      view.availableSkills = view.availableSkills.map(function(skill) {
        return updateClientSkillAvailabilityForLocks(skill, view.battle);
      });
    }

    function assignClientMonsterIntents(battle) {
      var rules = currentView && currentView.monsterAiRules || [];
      (battle.monsters || []).forEach(function(monster) {
        syncClientStatusBuckets(monster);
        if (Number(monster.currentHp || 0) <= 0) {
          monster.intent = null;
          return;
        }
        monster.intent = buildClientMonsterIntent(monster, battle, rules);
      });
    }

    function buildClientMonsterIntent(monster, battle, rules) {
      var candidates = (rules || []).filter(function(rule) {
        return isClientMonsterAiRuleAllowed(monster, battle, rule);
      });
      if (!candidates.length) {
        candidates = [{ actionType: 'attack', probability: 100, skillId: '', intentIcon: 'sword', intentTextTemplate: '' }];
      }
      var rule = pickWeightedClientAiRule(candidates);
      var actionType = normalizeClientMonsterActionType(rule.actionType, rule.skillId);
      var value = calculateClientMonsterIntentValue(monster, rule, actionType);
      return {
        actionType: actionType,
        skillId: rule.skillId || '',
        skillType: rule.skillType || '',
        skillName: rule.skillName || '',
        skillBaseValue: Number(rule.skillBaseValue || 0),
        skillHitCount: calculateClientMonsterSkillHitCount(monster, rule),
        hitCount: calculateClientMonsterSkillHitCount(monster, rule),
        skillRule: rule.skillRule || {},
        skillEffectChance: rule.skillEffectChance,
        skillEffect: rule.skillEffect || null,
        intentIcon: rule.intentIcon || 'sword',
        intentTextTemplate: rule.intentTextTemplate || '',
        value: value,
        intentText: buildClientMonsterIntentText(monster, rule, actionType, value),
      };
    }

    function isClientMonsterAiRuleAllowed(monster, battle, rule) {
      rule = rule || {};
      var conditions = safeJsonParseClient(rule.conditionJson, {});
      var aiAllowed = !rule.aiId || rule.aiId === monster.aiId;
      var bossAllowed = !conditions.bossOnly || monster.type === 'boss' || monster.type === 'finalBoss';
      var hpPercent = getClientHpPercent(monster);
      var hpBelowAllowed = !conditions.hpBelowPercent || hpPercent < Number(conditions.hpBelowPercent);
      var hpAboveAllowed = !conditions.hpAbovePercent || hpPercent > Number(conditions.hpAbovePercent);
      var turnMin = conditions.turnMin || conditions.afterTurn;
      var turnAllowed = !turnMin || Number(battle.turn || 1) >= Number(turnMin);
      var turnMaxAllowed = !conditions.turnMax || Number(battle.turn || 1) <= Number(conditions.turnMax);
      var actionType = normalizeClientMonsterActionType(rule.actionType, rule.skillId);
      var skillAllowed = isClientMonsterSkillAllowed(monster, rule, actionType);
      return aiAllowed && bossAllowed && hpBelowAllowed && hpAboveAllowed && turnAllowed && turnMaxAllowed && skillAllowed;
    }

    function getClientHpPercent(target) {
      var maxHp = Math.max(1, Number(target && (target.maxHp || target.hp) || 1));
