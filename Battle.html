  <?!= include_('UiLoadingModal'); ?>

  <script>
    var WEB_APP_URL = '<?= getWebAppUrl_() ?>';
    var ASSET_BASE_URL = '<?= getAssetBaseUrl_() ?>';
    var currentView = null;
    var currentQuestionView = null;
    var questionStartedAt = 0;
    var questionTimerId = null;
    var isDummyMode = false;
    var isPlayerTurn = true;
    var wrongCountAfterTimeout = 0;
    var isAnimatingTurn = false;
    var skillPanelOpen = false;
    var battleQuestionCache = [];
    var BATTLE_STEP_DELAY_MS = 800;
    var MESSAGE_HOLD_MS = 800;
    var defeatSequenceStarted = false;
    var stageIntroPlaying = false;
    var battleLogTypingTimer = null;
    var battleLogFullText = '';
    var battleLogRenderOptions = {};
    var battleLogTyping = false;
    var stageNarrationQueue = [];
    var stageNarrationIndex = -1;
    var stageNarrationActive = false;
    var stageNarrationComplete = null;
    var activeAutoDelayResolver = null;

    var dummyView = {
      runId: 'dummy-run',
      playerId: 'dummy-player',
      currency: 0,
      battle: {
        status: 'active',
        turn: 1,
        lastMessage: '전투 시작!',
        lastTurnEvents: [],
        stage: { stageId: 'floor_1_stage_1', name: '1층 1스테이지', floor: 1, stage: 1, baseDifficulty: 1, rewardGroupId: 'reward_group_default' },
        player: { hp: 30, maxHp: 30, shield: 0, stats: { attack: 8, defense: 3 }, buffs: [], debuffs: [] },
        monsters: [
          { instanceId: 'dummy_1', monsterId: 'dummy_1', name: '옥상 그림자', currentHp: 24, maxHp: 24, shield: 0, attack: 5, buffs: [], debuffs: [] },
          { instanceId: 'dummy_2', monsterId: 'dummy_2', name: '그림자 문제', currentHp: 18, maxHp: 18, shield: 0, attack: 4, buffs: [], debuffs: [] },
        ],
        pendingAction: null,
      },
      stageState: { otherStudentQuestionShown: false, fallbackEvents: [] },
      availableSkills: [
        { skillId: 'skill_basic_slash', name: '깊게 베기', type: 'damage', target: 'enemy', level: 1, available: true, unavailableReason: '', description: '큰 피해를 준다.', previewText: '피해 18 x 효율', cooldownText: '스테이지 3회' },
        { skillId: 'skill_guard_focus', name: '집중 방어', type: 'shield', target: 'self', level: 1, available: true, unavailableReason: '', description: '방어막을 만든다.', previewText: '방어막 28 x 효율', cooldownText: '스테이지 2회' },
      ],
    };

    var dummyQuestion = {
      actionType: 'attack',
      maxMs: 10000,
      finalDifficulty: 1,
      isOtherPlayerQuestion: true,
      question: {
        questionId: 'dummy-question',
        type: 'multipleChoice',
        prompt: '다음 중 현재 전투에서 가능한 행동은?',
        choice1: '공격',
        choice2: '상점 열기',
        choice3: '보상 3개 선택',
        choice4: '장비 강화',
        answer: '1',
        answerAliases: '[]',
        creatorName: '김OO',
      },
    };

    function init() {
      setupBattleUi();
      showLoadingModal('전투를 준비하는 중...', '진행 중인 전투를 확인하는 중...');
      google.script.run
        .withSuccessHandler(function(view) {
          hideLoadingModal();
          isDummyMode = false;
          currentView = normalizeBattleView(view);
          battleQuestionCache = (currentView.questionCache || []).slice();
          renderBattle(currentView);
          if (currentView.battle.status === 'victory') {
            finishBattleStartFade();
            openRewardAfterVictory();
          } else if (currentView.battle.status === 'defeat') {
            finishBattleStartFade();
            showDefeatSequence();
          } else {
            playStageEntranceIntro();
          }
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          isDummyMode = true;
          currentView = normalizeBattleView(dummyView);
          renderBattle(currentView);
          pushLog(error.message || '데모 UI로 전투 화면을 표시합니다.');
          playStageEntranceIntro();
        })
        .getBattleView(getAuthToken());
    }

    function setupBattleUi() {
      if (window.location.search.indexOf('debug=1') !== -1) {
        document.querySelector('.battle-debug-controls').classList.add('active');
      }
      bindHoverTooltips();
      bindBattleLogReveal();
      renderActionMode();
      if (!document.getElementById('battleStartFade')) {
        var fade = document.createElement('div');
        fade.id = 'battleStartFade';
        fade.className = 'battle-start-fade active';
        document.body.appendChild(fade);
      }
    }

    function finishBattleStartFade() {
      var fade = document.getElementById('battleStartFade');
      if (!fade) return;
      window.setTimeout(function() {
        fade.classList.remove('active');
      }, 260);
    }

    function playStageEntranceIntro() {
      if (!currentView || !currentView.battle || currentView.battle.status !== 'active') {
        finishBattleStartFade();
        return;
      }

      stageIntroPlaying = true;
      setBattleInputLocked(true);
      setPlayerTurn(false);
      var shell = document.getElementById('battleShell');
      var overlay = document.getElementById('stageIntroOverlay');
      var title = getStageEntranceTitle(currentView.battle.stage || {});
      document.getElementById('stageIntroFloor').textContent = title.floorLine;
      document.getElementById('stageIntroArea').textContent = title.areaLine;

      if (shell) {
        shell.classList.add('stage-entrance-playing');
        shell.classList.remove('stage-entrance-dialogue', 'stage-entrance-monsters');
      }
      if (overlay) {
        overlay.classList.remove('fade-away', 'title-visible');
        overlay.classList.add('active');
        overlay.setAttribute('aria-hidden', 'false');
      }
      finishBattleStartFade();

      window.setTimeout(function() {
        if (overlay) overlay.classList.add('title-visible');
      }, 360);

      window.setTimeout(function() {
        if (overlay) overlay.classList.add('fade-away');
      }, 2500);

      window.setTimeout(function() {
        if (overlay) {
          overlay.classList.remove('active', 'title-visible', 'fade-away');
          overlay.setAttribute('aria-hidden', 'true');
        }
        beginStageEntranceNarration();
      }, 3700);
    }

    function beginStageEntranceNarration() {
      var shell = document.getElementById('battleShell');
      var lines = getStageEntranceNarrationLines();
      if (!lines.length) {
        window.setTimeout(revealStageEntranceMonsters, 650);
        return;
      }
      if (shell) {
        shell.classList.add('stage-entrance-dialogue');
      }
      startManualNarration(lines, revealStageEntranceMonsters);
    }

    function getStageEntranceNarrationLines() {
      var stage = currentView && currentView.battle ? currentView.battle.stage || {} : {};
      var lines = [];
      if (Number(stage.floor || 0) === 1 && Number(stage.stage || 0) === 1) {
        lines.push(
          { text: '눈을 떠보니 학교 옥상이다 .', sparkleDot: true },
          { text: '일단 여기서 나가야겠다.' },
          { text: '눈앞에 무언가 나타났다!' }
        );
      }
      if (hasPlayerGhostEncounter()) {
        lines.push({ text: '탈출하지 못한 억울한 원혼이 나타났다!' });
      }
      return lines;
    }

    function hasPlayerGhostEncounter() {
      var stageStateGhost = currentView && currentView.stageState && currentView.stageState.playerGhost;
      var battleGhost = currentView && currentView.battle && currentView.battle.playerGhost;
      return !!(stageStateGhost || battleGhost);
    }

    function startManualNarration(lines, onComplete) {
      stageNarrationQueue = (lines || []).slice();
      stageNarrationIndex = -1;
      stageNarrationActive = true;
      stageNarrationComplete = onComplete || null;
      advanceManualNarration();
    }

    function advanceManualNarration() {
      if (!stageNarrationActive) return;
      stageNarrationIndex += 1;
      if (stageNarrationIndex >= stageNarrationQueue.length) {
        finishManualNarration();
        return;
      }
      var line = stageNarrationQueue[stageNarrationIndex] || {};
      pushLog(line.text || '', { sparkleDot: !!line.sparkleDot });
    }

    function finishManualNarration() {
      var complete = stageNarrationComplete;
      stageNarrationActive = false;
      stageNarrationQueue = [];
      stageNarrationIndex = -1;
      stageNarrationComplete = null;
      if (complete) {
        complete();
      }
    }

    function revealStageEntranceMonsters() {
      var shell = document.getElementById('battleShell');
      if (shell) {
        shell.classList.remove('stage-entrance-dialogue');
        shell.classList.add('stage-entrance-monsters');
      }
      window.setTimeout(function() {
        stageIntroPlaying = false;
        if (shell) {
          shell.classList.remove('stage-entrance-playing', 'stage-entrance-dialogue', 'stage-entrance-monsters');
        }
        setBattleInputLocked(false);
        setPlayerTurn(true);
      }, 1200);
    }

    function getStageEntranceTitle(stage) {
      var parts = getDisplayFloorParts(stage.floor);
      return {
        floorLine: parts.floorLabel + ' , 스테이지 ' + Number(stage.stage || 1),
        areaLine: parts.areaLabel,
      };
    }

    function getDisplayFloorParts(progressFloor) {
      var floor = Number(progressFloor || 1);
      var displays = {
        1: { floorLabel: '5층', areaLabel: '옥상' },
        2: { floorLabel: '4층', areaLabel: '1학년 교실층' },
        3: { floorLabel: '3층', areaLabel: '3학년 교실층' },
        4: { floorLabel: '2층', areaLabel: '2학년 교실층' },
        5: { floorLabel: '1층', areaLabel: '특별실/현관' },
      };
      return displays[floor] || { floorLabel: floor + '층', areaLabel: '' };
    }

    function bindHoverTooltips() {
      var tooltip = document.getElementById('hoverTooltip');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.id = 'hoverTooltip';
        tooltip.className = 'hover-tooltip';
        tooltip.setAttribute('aria-hidden', 'true');
        document.body.appendChild(tooltip);
      }
      var statTooltip = document.getElementById('statHoverTooltip');
      if (!statTooltip) {
        statTooltip = document.createElement('div');
        statTooltip.id = 'statHoverTooltip';
        statTooltip.className = 'hover-tooltip stat-hover-tooltip';
        statTooltip.setAttribute('aria-hidden', 'true');
        document.body.appendChild(statTooltip);
      }
      document.addEventListener('mousemove', function(event) {
        if (tooltip.getAttribute('aria-hidden') !== 'true') {
          tooltip.style.left = (event.clientX + 14) + 'px';
          tooltip.style.top = (event.clientY + 14) + 'px';
        }
        if (statTooltip.getAttribute('aria-hidden') !== 'true') {
          statTooltip.style.left = (event.clientX + 22) + 'px';
          statTooltip.style.top = (event.clientY + 78) + 'px';
        }
      });
      document.addEventListener('mouseover', function(event) {
        var target = event.target.closest && event.target.closest('[data-tooltip]');
        if (!target) return;
        var text = target.getAttribute('data-tooltip');
        if (!text) return;
        tooltip.textContent = text;
        tooltip.setAttribute('aria-hidden', 'false');
        tooltip.classList.add('active');
        var statText = target.getAttribute('data-stat-tooltip');
        if (statText) {
          statTooltip.textContent = statText;
          statTooltip.setAttribute('aria-hidden', 'false');
          statTooltip.classList.add('active');
        } else {
          statTooltip.setAttribute('aria-hidden', 'true');
          statTooltip.classList.remove('active');
        }
      });
      document.addEventListener('mouseout', function(event) {
        if (event.target.closest && event.target.closest('[data-tooltip]')) {
          tooltip.setAttribute('aria-hidden', 'true');
          tooltip.classList.remove('active');
          statTooltip.setAttribute('aria-hidden', 'true');
          statTooltip.classList.remove('active');
        }
      });
    }

    function normalizeBattleView(view) {
      var battle = view.battle;
      if (!battle.monsters || !battle.monsters.length) {
        battle.monsters = battle.monster ? [battle.monster] : [];
      }
      battle.monsters = battle.monsters.slice(0, 3);
      battle.monster = getFirstAliveMonster(battle) || battle.monsters[0] || null;
      battle.player.maxHp = Number(battle.player.maxHp || battle.player.stats.hp || 1);
      battle.player.shield = Number(battle.player.shield || 0);
      view.questionCache = view.questionCache || [];
      return view;
    }

    function renderBattle(view) {
      view = normalizeBattleView(view);
      var battle = view.battle;
      renderBattleBackground(battle.stage);
      renderMonsters(battle.monsters);
      renderPlayerHud(battle.player);
      renderSkills(view.availableSkills || []);
      renderActionTooltips(battle.player);
      pushLog(battle.lastMessage || '전투 시작!');
      setPlayerTurn(isPlayerTurn && battle.status === 'active');
    }

    function renderSkills(skills) {
      var panel = document.getElementById('skillPanel');
      if (!skills.length) {
        panel.innerHTML = '<div class="skill-empty">보유 스킬 없음</div><button class="secondary skill-cancel-button" type="button" onclick="closeSkillPanel()">취소</button>';
        return;
      }
      panel.innerHTML = skills.map(function(skill) {
        var disabled = skill.available ? '' : ' disabled';
        var reason = skill.unavailableReason || skill.description || '';
        var cooldown = skill.cooldownText || (skill.cooldown ? '쿨타임 ' + skill.cooldown + '턴' : '쿨타임 없음');
        var description = skill.description || '';
        var tooltip = skill.name + '\n' + cooldown + '\n' + (skill.previewText || '') + '\n' + (reason || description);
        return '<button class="skill-button" data-skill-id="' + escapeHtml(skill.skillId) + '" data-tooltip="' + escapeHtml(tooltip) + '"' + disabled + '>' +
          '<span>' + escapeHtml(skill.name) + '</span>' +
          '<small>Lv.' + escapeHtml(skill.level || 1) + ' / ' + escapeHtml(cooldown) + '</small>' +
          '<small class="skill-preview">' + escapeHtml(skill.previewText || '') + '</small>' +
          '<small class="skill-description">' + escapeHtml(description) + '</small>' +
        '</button>';
      }).join('') + '<button class="secondary skill-cancel-button" type="button" onclick="closeSkillPanel()">취소</button>';

      Array.prototype.forEach.call(panel.querySelectorAll('.skill-button'), function(button) {
        button.addEventListener('click', function() {
          chooseSkill(button.getAttribute('data-skill-id'));
        });
      });
    }

    function renderActionTooltips(player) {
      var stats = (player && player.stats) || {};
      var attack = Math.max(0, Math.round(Number(stats.attack || 0)));
      var defense = Math.max(0, Math.round(10 + Number(stats.defense || 0)));
      document.getElementById('attackActionButton').setAttribute('data-tooltip', '문제를 풀고 효율에 따라 약 ' + attack + ' 피해를 입힙니다.');
      document.getElementById('guardActionButton').setAttribute('data-tooltip', '문제를 풀고 효율에 따라 약 ' + defense + ' 방어막을 생성합니다.');
      document.getElementById('skillToggleButton').setAttribute('data-tooltip', '보유 스킬 목록을 엽니다.');
    }

    function toggleSkillPanel() {
      skillPanelOpen = !skillPanelOpen;
      renderActionMode();
    }

    function closeSkillPanel() {
      skillPanelOpen = false;
      renderActionMode();
    }

    function renderActionMode() {
      var panel = document.getElementById('actionPanel');
      if (!panel) return;
      panel.classList.toggle('skill-select-mode', skillPanelOpen);
      document.getElementById('skillPanel').classList.toggle('hidden', !skillPanelOpen);
    }

    function renderMonsters(monsters) {
      var layer = document.getElementById('monsterLayer');
      layer.innerHTML = monsters.map(function(monster, index) {
        var hp = Number(monster.currentHp || 0);
        var maxHp = Math.max(1, Number(monster.maxHp || 1));
        var shield = Math.max(0, Number(monster.shield || 0));
        var visualMax = Math.max(maxHp, hp + shield);
        var hpPercent = Math.max(0, Math.min(100, Math.round((hp / visualMax) * 100)));
        var shieldPercent = Math.max(0, Math.min(100, Math.round((shield / visualMax) * 100)));
        return '<article class="monster-slot monster-slot-' + monsters.length + ' monster-count-' + monsters.length + '" data-monster-id="' + escapeHtml(monster.instanceId || monster.monsterId) + '">' +
          '<div class="monster-hp-text">' + (shield > 0 ? hp + ' + ' + shield + ' / ' + maxHp : hp + ' / ' + maxHp) + '</div>' +
          '<div class="thin-hp-bar monster-hp-bar"><span class="hp-lag" style="width:' + hpPercent + '%"></span><span class="hp-current" style="width:' + hpPercent + '%"></span><span class="monster-shield-fill" style="left:' + hpPercent + '%; width:' + shieldPercent + '%"></span></div>' +
          renderStatusIcons(monster) +
          renderMonsterIntent(monster.intent) +
          renderMonsterSprite(monster, index) +
        '</article>';
      }).join('');
    }

    function bindBattleLogReveal() {
      var logBox = document.querySelector('.battle-log-compact');
      if (!logBox) return;
      logBox.addEventListener('click', function() {
        if (battleLogTyping) {
          revealBattleLog();
          return;
        }
        if (stageNarrationActive) {
          advanceManualNarration();
          return;
        }
        if (isAnimatingTurn) {
          skipCurrentAutoDelay();
        }
      });
    }

    function renderBattleBackground(stage) {
      var fallback = document.querySelector('.battle-background-fallback');
      if (!fallback) return;
      fallback.classList.remove('has-battle-image');
      fallback.style.backgroundImage = '';
      var url = getBattleBackgroundUrl(stage);
      if (!url) return;

      var image = new Image();
      image.onload = function() {
        fallback.classList.add('has-battle-image');
        fallback.style.backgroundImage = 'url("' + cssUrlEscape(url) + '")';
      };
      image.onerror = function() {
        fallback.classList.remove('has-battle-image');
        fallback.style.backgroundImage = '';
      };
      image.src = url;
    }

    function getBattleBackgroundUrl(stage) {
      if (!ASSET_BASE_URL || !stage) return '';
      var floor = Number(stage.floor || 1);
      var stageNumber = Number(stage.stage || 1);
      var imageStage = stageNumber >= 5 ? 5 : (stageNumber >= 3 ? 3 : 1);
      return ASSET_BASE_URL + '/Resources/Background/Battle/' + floor + '-' + imageStage + '.png';
    }

    function getMonsterImageUrl(monster, state) {
      if (!ASSET_BASE_URL || !monster || !monster.monsterId || monster.avatarType === 'photo') {
        return '';
      }
      var assetMonsterId = monster.monsterId === 'monster_training_dummy' ? 'monster_shadow_problem' : monster.monsterId;
      return ASSET_BASE_URL + '/Resources/Monsters/' + encodeURIComponent(assetMonsterId) + '/' + state + '.png';
    }

    function cssUrlEscape(value) {
      return String(value || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function renderMonsterSprite(monster, index) {
      var name = monster.name || ('MONSTER ' + (index + 1));
      var className = 'monster-sprite-placeholder compact-monster';
      if (monster.avatarType === 'photo' && monster.avatarKey) {
        className += ' player-ghost-photo';
        return '<div class="' + className + '" data-monster-key="' + escapeHtml(monster.monsterId || 'placeholder') + '">' +
          '<img src="' + escapeHtml(monster.avatarKey) + '" alt="' + escapeHtml(name) + '">' +
          '<span>' + escapeHtml(name) + '</span>' +
        '</div>';
      }
      var idleUrl = getMonsterImageUrl(monster, 'Idle');
      if (idleUrl) {
        return '<div class="' + className + ' monster-image-sprite" data-monster-key="' + escapeHtml(monster.monsterId || 'placeholder') + '" data-idle-src="' + escapeHtml(idleUrl) + '" data-attack-src="' + escapeHtml(getMonsterImageUrl(monster, 'Attack')) + '" data-hit-src="' + escapeHtml(getMonsterImageUrl(monster, 'Hit')) + '">' +
          '<img class="monster-art" src="' + escapeHtml(idleUrl) + '" alt="' + escapeHtml(name) + '" onerror="handleMonsterImageError(this);">' +
          '<span>' + escapeHtml(name) + '</span>' +
        '</div>';
      }
      return '<div class="' + className + '" data-monster-key="' + escapeHtml(monster.monsterId || 'placeholder') + '">' +
        '<span>' + escapeHtml(name) + '</span>' +
      '</div>';
    }

    function handleMonsterImageError(image) {
      if (!image) return;
      var target = image.closest('.compact-monster');
      if (!target) return;
      var idleSrc = target.dataset.idleSrc || '';
      var failedSrc = image.getAttribute('src') || '';
      target.classList.remove('monster-state-attack', 'monster-state-hit');
      if (idleSrc && failedSrc !== idleSrc) {
        image.src = idleSrc;
        return;
      }
      target.classList.add('monster-image-missing');
      image.remove();
    }

    function renderMonsterIntent(intent) {
      var view = intent || { intentIcon: 'sword', intentText: '행동 대기' };
      var icon = view.intentIcon || 'sword';
      var text = view.intentText || view.intentTextTemplate || '행동 대기';
      return '<div class="monster-intent" title="' + escapeHtml(text) + '">' +
        '<span class="monster-intent-text">' + escapeHtml(text) + '</span>' +
      '</div>';
    }

    function intentIconLabel(icon) {
      var labels = { sword: 'ATK', shield: 'DEF', drop: 'DBF', skill: 'SKL', heal: 'HEAL' };
      return labels[icon] || icon || 'ACT';
    }

    function renderStatusIcons(monster) {
      var statuses = []
        .concat(Number(monster.shield || 0) > 0 ? [{ type: 'buff shield-status', label: '🛡', tooltip: '방어막 ' + Number(monster.shield || 0) }] : [])
        .concat((monster.buffs || []).map(function(status) { return buildStatusView(status, 'buff'); }))
        .concat((monster.debuffs || []).map(function(status) { return buildStatusView(status, 'debuff'); }));
      if (!statuses.length) return '';
      return '<div class="status-row monster-status-row">' + statuses.map(function(status) {
        var statTooltip = status.statTooltip ? ' data-stat-tooltip="' + escapeHtml(status.statTooltip) + '"' : '';
        return '<span class="status-icon ' + escapeHtml(status.type) + '" data-tooltip="' + escapeHtml(status.tooltip) + '"' + statTooltip + '>' + escapeHtml(status.label) + '</span>';
      }).join('') + '</div>';
    }

    function buildStatusView(status, type) {
      var icon = getStatusIcon(status.effectId || status.id || status.statKey || status.name, type);
      var tooltip = buildStatusTooltip(status, type);
      return {
        type: type,
        label: status.icon || icon,
        tooltip: tooltip.main,
        statTooltip: tooltip.stat,
      };
    }

    function buildStatusTooltip(status, type) {
      var name = status.name || status.effectId || (type === 'buff' ? '버프' : '디버프');
      var description = buildStatusDescription(status, type);
      var duration = status.remainingTurns ? '\n지속: ' + status.remainingTurns + '턴' : '';
      var stack = Number(status.stacks || 1) > 1 ? '\n중첩: ' + Number(status.stacks || 1) : '';
      return {
        main: name + '\n' + description + duration + stack,
        stat: buildStatusStatTooltip(status),
      };
    }

    function buildStatusDescription(status, type) {
      var id = status.effectId || '';
      var value = getStatusTotalValue(status);
      var amount = Math.abs(value);
      if (id === 'debuff_bleed') return '행동할 때마다 ' + amount + ' 피해를 받습니다.';
      if (id === 'debuff_poison') return '턴 종료 시 ' + amount + ' 피해를 받습니다.';
      if (id === 'debuff_freeze') return '행동할 수 없습니다. 공격받으면 추가 피해와 함께 해제됩니다.';
      if (id === 'debuff_burn') return '턴 시작 시 ' + amount + ' 피해를 받습니다.';
      if (id === 'debuff_stun') return '1턴 동안 행동할 수 없습니다.';

      var statLabel = getStatLabel(status.statKey);
      if (status.effectType === 'percent') {
        return statLabel + '이 ' + amount + '% ' + (value < 0 ? '감소합니다.' : '증가합니다.');
      }
      if (status.statKey === 'questionTime') {
        return '문제 풀이 제한시간이 ' + amount + '초 ' + (value < 0 ? '감소합니다.' : '증가합니다.');
      }
      if (status.statKey === 'questionDifficulty') {
        return '문제 난이도가 ' + amount + ' ' + (value < 0 ? '감소합니다.' : '증가합니다.');
      }
      if (status.statKey) {
        return statLabel + '이 ' + amount + ' ' + (value < 0 ? '감소합니다.' : '증가합니다.');
      }
      return status.description || (type === 'buff' ? '이로운 효과입니다.' : '해로운 효과입니다.');
    }

    function buildStatusStatTooltip(status) {
      if (!status.statKey || status.statKey === 'hp' || status.statKey === 'action') return '';
      var label = getStatLabel(status.statKey);
      var value = Math.abs(getStatusTotalValue(status));
      var descriptions = {
        attack: '공격 시 피해량의 기준값입니다.',
        criticalRate: '치명타가 발생할 확률입니다.',
        criticalDamage: '치명타 발생 시 피해 배율입니다.',
        evasion: '공격을 회피할 확률입니다.',
        hpRegen: '회복 효과의 기준값입니다.',
        questionTime: '문제 풀이 제한시간에 영향을 줍니다.',
        questionDifficulty: '출제되는 문제 난이도에 영향을 줍니다.',
      };
      if (status.statKey === 'defense') {
        if (status.effectType === 'percent') {
          return label + '\n방어막 수치가 ' + value + '% ' + (Number(status.value || 0) < 0 ? '감소합니다.' : '증가합니다.');
        }
        return label + '\n방어막 수치가 ' + value + '만큼 ' + (Number(status.value || 0) < 0 ? '감소합니다.' : '증가합니다.');
      }
      return label + '\n' + (descriptions[status.statKey] || '전투 계산에 사용되는 능력치입니다.');
    }

    function getStatusTotalValue(status) {
      return Number(status.value || 0) * Math.max(1, Number(status.stacks || 1));
    }

    function getStatLabel(statKey) {
      var labels = {
        attack: '공격력',
        defense: '방어력',
        criticalRate: '치명타 확률',
        criticalDamage: '치명타 피해',
        evasion: '회피율',
        hpRegen: '회복력',
        questionTime: '제한시간',
        questionDifficulty: '문제 난이도',
      };
      return labels[statKey] || statKey || '효과';
    }

    function getStatusIcon(key, type) {
      var icons = {
        debuff_bleed: 'BLD',
        debuff_poison: 'PSN',
        debuff_freeze: 'FRZ',
        debuff_burn: 'BRN',
        debuff_stun: 'STN',
        debuff_weak: 'WEK',
        debuff_corrosion: 'DEF-',
        debuff_dazed: 'TIME-',
        debuff_foolish: '?',
        buff_power: 'ATK+',
        buff_hard: 'DEF+',
        buff_focus: 'CRT+',
        buff_smart: 'Q-',
        buff_wisdom: 'TIME+',
        attack: 'ATK',
        defense: 'DEF',
        criticalRate: 'CRT',
        questionTime: 'TIME',
        questionDifficulty: '?',
      };
      return icons[key] || (type === 'buff' ? 'UP' : 'DN');
    }

    function renderPlayerHud(player) {
      var hp = Math.max(0, Number(player.hp || 0));
      var maxHp = Math.max(1, Number(player.maxHp || 1));
      var shield = Math.max(0, Number(player.shield || 0));
      var visualMax = Math.max(maxHp, hp + shield);
      var hpPercent = Math.round((hp / visualMax) * 100) + '%';
      document.getElementById('playerHpFill').style.width = hpPercent;
      document.getElementById('playerHpLagFill').style.width = hpPercent;
      document.getElementById('playerShieldFill').style.left = hpPercent;
      document.getElementById('playerShieldFill').style.width = Math.round((shield / visualMax) * 100) + '%';
      document.getElementById('playerHpText').textContent = shield > 0 ? hp + ' + ' + shield + ' / ' + maxHp : hp + ' / ' + maxHp;
      document.querySelector('.player-compact-panel').classList.toggle('player-shielded', shield > 0);
      renderPlayerStatuses(player);
    }

    function renderPlayerStatuses(player) {
      var row = document.getElementById('playerStatusRow');
      var statuses = []
        .concat((player.buffs || []).map(function(status) { return buildStatusView(status, 'buff'); }))
        .concat((player.debuffs || []).map(function(status) { return buildStatusView(status, 'debuff'); }));
      row.innerHTML = statuses.map(function(status) {
        var statTooltip = status.statTooltip ? ' data-stat-tooltip="' + escapeHtml(status.statTooltip) + '"' : '';
        return '<span class="status-icon ' + escapeHtml(status.type) + '" data-tooltip="' + escapeHtml(status.tooltip) + '"' + statTooltip + '>' + escapeHtml(status.label) + '</span>';
      }).join('');
    }

    function setPlayerTurn(active) {
      isPlayerTurn = !!active;
      document.getElementById('actionPanel').classList.toggle('disabled-actions', !active || isAnimatingTurn);
      updateBattleHudMode();
      if (active && !isAnimatingTurn) {
        pushLog('내 턴입니다. 행동을 선택하세요.', { instant: true });
      }
    }

    function updateBattleHudMode() {
      var hud = document.querySelector('.battle-hud');
      if (!hud) return;
      var cinematicMode = !!stageIntroPlaying;
      var enemyTurnMode = !cinematicMode && (!isPlayerTurn || isAnimatingTurn);
      var narrationMode = cinematicMode || enemyTurnMode;
      hud.classList.toggle('narration-mode', narrationMode);
      hud.classList.toggle('cinematic-mode', cinematicMode);
      hud.classList.toggle('enemy-turn-mode', enemyTurnMode);
      if (!narrationMode) {
        revealBattleLog();
      }
    }

    function chooseAction(actionType) {
      if (!isPlayerTurn || isAnimatingTurn) {
        pushLog('지금은 행동할 수 없습니다.');
        return;
      }
      closeSkillPanel();
      if (isDummyMode || !currentView || currentView.runId === 'dummy-run') {
        openDummyQuestionModal(actionType);
        return;
      }
      var cachedQuestionView = takeCachedQuestionView(actionType, '', '');
      if (cachedQuestionView) {
        openQuestionModal(cachedQuestionView, false);
        return;
      }
      showLoadingModal('문제를 고르는 중...', '현재 스테이지 난이도에 맞는 문제를 찾는 중...');
      google.script.run
        .withSuccessHandler(function(questionView) {
          hideLoadingModal();
          openQuestionModal(questionView, false);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          pushLog(error.message);
        })
        .selectQuestionForAction(currentView.playerId, currentView.runId, actionType, 0, getAuthToken());
    }

    function chooseSkill(skillId) {
      if (!isPlayerTurn || isAnimatingTurn) {
        pushLog('지금은 행동할 수 없습니다.');
        return;
      }
      closeSkillPanel();
      var target = getFirstAliveMonster(currentView.battle);
      var targetId = target ? (target.instanceId || target.monsterId) : '';
      if (isDummyMode || !currentView || currentView.runId === 'dummy-run') {
        openDummyQuestionModal('skill', skillId, targetId);
        return;
      }
      var cachedQuestionView = takeCachedQuestionView('skill', skillId, targetId);
      if (cachedQuestionView) {
        openQuestionModal(cachedQuestionView, false);
        return;
      }
      showLoadingModal('스킬 문제를 고르는 중...', '스킬 조건과 문제 난이도를 계산하는 중...');
      google.script.run
        .withSuccessHandler(function(questionView) {
          hideLoadingModal();
          openQuestionModal(questionView, false);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          pushLog(error.message);
        })
        .useSkill(currentView.runId, skillId, targetId, { authToken: getAuthToken() });
    }

    function takeCachedQuestionView(actionType, skillId, targetId) {
      battleQuestionCache = battleQuestionCache || [];
      if (!battleQuestionCache.length && currentView && currentView.questionCache && currentView.questionCache.length) {
        battleQuestionCache = currentView.questionCache.slice();
      }
      if (!battleQuestionCache.length) return null;

      var questionView = JSON.parse(JSON.stringify(battleQuestionCache.shift()));
      questionView.actionType = actionType || 'attack';
      questionView.skillId = skillId || '';
      questionView.targetId = targetId || '';
      questionView.isCachedQuestion = true;
      if (questionView.actionType === 'skill') {
        applySkillDifficultyBonusToQuestionView(questionView, skillId);
      }
      return questionView;
    }

    function applySkillDifficultyBonusToQuestionView(questionView, skillId) {
      var skill = findAvailableSkill(skillId);
      var bonus = Number(skill && skill.difficultyBonus || 0);
      if (!bonus) return questionView;
      var nextDifficulty = Math.max(1, Math.min(10, Number(questionView.finalDifficulty || 1) + bonus));
      var addedMs = Math.max(0, nextDifficulty - Number(questionView.finalDifficulty || 1)) * 2000;
      questionView.finalDifficulty = nextDifficulty;
      questionView.maxMs = Number(questionView.maxMs || 10000) + addedMs;
      return questionView;
    }

    function findAvailableSkill(skillId) {
      return ((currentView && currentView.availableSkills) || []).filter(function(skill) {
        return skill.skillId === skillId;
      })[0] || null;
    }

    function openDummyQuestionModal(actionType, skillId, targetId) {
      var questionView = JSON.parse(JSON.stringify(dummyQuestion));
      questionView.actionType = actionType || 'attack';
      questionView.skillId = skillId || '';
      questionView.targetId = targetId || '';
      openQuestionModal(questionView, true);
    }

    function openQuestionModal(questionView, dummy) {
      currentQuestionView = questionView;
      currentQuestionView.isDummy = !!dummy;
      questionStartedAt = Date.now();
      wrongCountAfterTimeout = 0;
      clearInterval(questionTimerId);
      document.getElementById('questionSubmitButton').disabled = false;
      setQuestionInputsDisabled(false);

      var question = questionView.question;
      document.getElementById('questionTitle').textContent = actionLabel(questionView.actionType) + ' 문제';
      document.getElementById('questionPrompt').textContent = question.prompt;
      document.getElementById('questionDifficulty').textContent = questionView.finalDifficulty || '-';
      document.getElementById('questionMaxTime').textContent = formatSecond(questionView.maxMs);
      document.getElementById('questionCreatorBadge').textContent = '출제자: ' + (question.creatorName || '알 수 없음');
      document.getElementById('questionCreatorBadge').style.visibility = (questionView.isOtherPlayerQuestion || question.creatorId) ? 'visible' : 'hidden';
      document.getElementById('questionMessage').textContent = '';
      renderAnswerArea(question);
      document.getElementById('questionModal').classList.add('active');
      document.getElementById('questionModal').setAttribute('aria-hidden', 'false');
      tickQuestionTimer();
      questionTimerId = setInterval(tickQuestionTimer, 100);
    }

    function renderAnswerArea(question) {
      var area = document.getElementById('questionAnswerArea');
      if (question.type === 'shortAnswer') {
        area.innerHTML = '<input id="shortAnswerInput" placeholder="정답 입력">';
        return;
      }
      var choices = [
        { value: '1', text: question.choice1 },
        { value: '2', text: question.choice2 },
        { value: '3', text: question.choice3 },
        { value: '4', text: question.choice4 },
      ];
      shuffleArray(choices);
      area.innerHTML = choices.map(function(choice, index) {
        return '<label class="question-choice" data-choice-value="' + escapeHtml(choice.value) + '">' +
          '<input type="radio" name="questionChoice" value="' + escapeHtml(choice.value) + '"> ' +
          String(index + 1) + '. ' + escapeHtml(choice.text || '') +
        '</label>';
      }).join('');

      Array.prototype.forEach.call(area.querySelectorAll('.question-choice'), function(label) {
        label.addEventListener('click', function() {
          if (label.querySelector('input').disabled) return;
          Array.prototype.forEach.call(area.querySelectorAll('.question-choice'), function(item) {
            item.classList.remove('selected');
          });
          label.classList.add('selected');
          label.querySelector('input').checked = true;
        });
      });
    }

    function shuffleArray(items) {
      for (var i = items.length - 1; i > 0; i -= 1) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = items[i];
        items[i] = items[j];
        items[j] = temp;
      }
      return items;
    }

    function tickQuestionTimer() {
      if (!currentQuestionView) return;
      if (currentQuestionView.efficiencyLocked) {
        updateQuestionEfficiencyMeter(currentQuestionView.lockedEfficiency || 0.5);
        return;
      }
      var maxMs = Number(currentQuestionView.maxMs || 10000);
      var elapsedMs = Date.now() - questionStartedAt;
      var remainingMs = Math.max(0, maxMs - elapsedMs);
      var efficiency = calculateTimedEfficiency(remainingMs, maxMs);
      document.getElementById('questionRemainingTime').textContent = formatSecond(remainingMs);
      updateQuestionEfficiencyMeter(efficiency);
    }

    function calculateTimedEfficiency(remainingMs, maxMs) {
      var ratio = Math.max(0, Math.min(1, Number(remainingMs || 0) / Math.max(1, Number(maxMs || 1))));
      if (ratio >= 0.5) {
        return 1 + ((ratio - 0.5) * 0.5);
      }
      return 0.5 + ratio;
    }

    function updateQuestionEfficiencyMeter(efficiency) {
      var normalizedEfficiency = Math.max(0, Number(efficiency || 0));
      document.getElementById('questionEfficiencyText').textContent = Math.round(normalizedEfficiency * 100) + '%';
      document.getElementById('questionEfficiencyFill').style.width = Math.round(Math.min(1, normalizedEfficiency / 1.25) * 100) + '%';
    }

    function calculateWrongEfficiency(wrongCount) {
      var count = Math.max(1, Number(wrongCount || 1));
      return Math.max(0, 0.5 - (0.1 * (count - 1)));
    }

    function submitQuestionAnswer() {
      if (!currentQuestionView) return;
      var answer = getSelectedAnswer(currentQuestionView.question);
      if (!answer.selectedAnswer && !answer.selectedAnswerText) {
        document.getElementById('questionMessage').textContent = '답을 선택하거나 입력하세요.';
        document.getElementById('questionMessage').className = 'message error';
        return;
      }

      var elapsedMs = Date.now() - questionStartedAt;
      var canCheckOnClient = hasClientAnswer(currentQuestionView.question);
      var isCorrect = canCheckOnClient ? isClientCorrectAnswer(currentQuestionView.question, answer) : true;

      if (!isCorrect) {
        clearInterval(questionTimerId);
        wrongCountAfterTimeout += 1;
        currentQuestionView.efficiencyLocked = true;
        currentQuestionView.lockedEfficiency = calculateWrongEfficiency(wrongCountAfterTimeout);
        updateQuestionEfficiencyMeter(currentQuestionView.lockedEfficiency);
        markSelectedAnswerResult(false);
        document.getElementById('questionMessage').textContent = wrongCountAfterTimeout === 1 ? '오답입니다. 효율이 50%로 고정됩니다.' : '오답입니다. 효율이 10% 감소했습니다.';
        document.getElementById('questionMessage').className = 'message error';
        return;
      }

      clearInterval(questionTimerId);
      document.getElementById('questionSubmitButton').disabled = true;
      setQuestionInputsDisabled(true);
      setBattleInputLocked(true);
      markSelectedAnswerResult(true);
      document.getElementById('questionMessage').textContent = '정답입니다.';
      document.getElementById('questionMessage').className = 'message ok';

      if (currentQuestionView.isDummy) {
        var dummyActionType = currentQuestionView.actionType;
        window.setTimeout(function() {
          closeQuestionModal();
          setBattleInputLocked(false);
          playTurnSequence(buildDummyNextView(dummyActionType));
        }, 450);
        return;
      }

      var runner = google.script.run
        .withSuccessHandler(function(view) {
          closeQuestionModal();
          playTurnSequence(normalizeBattleView(view));
        })
        .withFailureHandler(function(error) {
          document.getElementById('questionSubmitButton').disabled = false;
          setQuestionInputsDisabled(false);
          setBattleInputLocked(false);
          document.getElementById('questionMessage').textContent = error.message;
          document.getElementById('questionMessage').className = 'message error';
        });

      var answerPayload = {
        runId: currentView.runId,
        authToken: getAuthToken(),
        questionId: currentQuestionView.question.questionId,
        selectedAnswer: answer.selectedAnswer,
        selectedChoiceIndex: answer.selectedChoiceIndex,
        selectedAnswerText: answer.selectedAnswerText,
        elapsedMs: elapsedMs,
        wrongCountAfterTimeout: wrongCountAfterTimeout,
        actionType: currentQuestionView.actionType,
        skillId: currentQuestionView.skillId || '',
        targetId: currentQuestionView.targetId || '',
        maxMs: currentQuestionView.maxMs,
        finalDifficulty: currentQuestionView.finalDifficulty,
        isOtherPlayerQuestion: !!currentQuestionView.isOtherPlayerQuestion,
        fallbackReason: currentQuestionView.fallbackReason || '',
      };

      window.setTimeout(function() {
        if (currentQuestionView && currentQuestionView.actionType === 'skill') {
          runner.useSkill(currentView.runId, currentQuestionView.skillId, currentQuestionView.targetId, answerPayload);
        } else {
          runner.submitActionAnswer(answerPayload);
        }
      }, 350);
    }

    function hasClientAnswer(question) {
      return question && question.answer !== undefined && question.answer !== null && question.answer !== '';
    }

    function isClientCorrectAnswer(question, answer) {
      var expected = normalizeClientAnswer(question.answer);
      var aliases = safeJsonParseClient(question.answerAliases, []).map(normalizeClientAnswer);
      var candidates = [
        normalizeClientAnswer(answer.selectedAnswer),
        normalizeClientAnswer(answer.selectedChoiceIndex),
        normalizeClientAnswer(answer.selectedAnswerText),
      ].filter(Boolean);
      if (question.type === 'multipleChoice') {
        var expectedChoice = Number(question.answer);
        if (expectedChoice >= 1 && expectedChoice <= 4 && String(expectedChoice) === String(answer.selectedChoiceIndex)) {
          return true;
        }
      }
      return candidates.some(function(candidate) {
        return candidate === expected || aliases.indexOf(candidate) !== -1;
      });
    }

      if (!selectedLabel) return;

      if (!isCorrect) {

    function safeJsonParseClient(value, fallback) {

    function normalizeClientAnswer(value) {

    async function playTurnSequence(nextView) {
      isAnimatingTurn = true;
      setBattleInputLocked(true);
      setPlayerTurn(false);
      var events = (nextView.battle.lastTurnEvents || []).slice();

      for (var i = 0; i < events.length; i += 1) {
        var event = events[i];
        if (event.actor === 'effect') {
          pushLog(event.message || '');
          await holdBattleMessage();
          if (event.target === 'monster') {
            await animatePlayerAttack(event.targetMonsterId);
            await skippableAutoDelay(BATTLE_STEP_DELAY_MS);
            animateMonsterHit(event.targetMonsterId, event.damage, event.hpDamage, event.shieldDamage);
          } else if (event.target === 'player') {
            animatePlayerHit(event.damage, event.hpDamage || event.damage, event.shieldDamage);
          }
          await skippableAutoDelay(BATTLE_STEP_DELAY_MS);
        }
        if (event.actor === 'player') {
          pushLog(event.message || '플레이어의 행동!', { instant: true });
          if (event.type === 'attack' || event.type === 'skill') {
            await animatePlayerAttack(event.targetMonsterId);
            animateMonsterHit(event.targetMonsterId, event.damage, event.hpDamage, event.shieldDamage);
          } else if (event.type === 'guard') {
            animatePlayerShield(event.shield);
          } else if ((event.type === 'debuff' || event.type === 'buff') && event.targetMonsterId) {
            animateMonsterEffect(event.targetMonsterId, event.effectName || 'EFFECT');
          }
          await skippableAutoDelay(BATTLE_STEP_DELAY_MS);
        }
      }

      var monsterEvents = events.filter(function(event) { return event.actor === 'monster'; });
      if (monsterEvents.length) {
        pushLog('몬스터 턴 시작');
        await holdBattleMessage();
        for (var j = 0; j < monsterEvents.length; j += 1) {
          var monsterEvent = monsterEvents[j];
          pushLog(monsterEvent.message || '몬스터의 행동!');
          await holdBattleMessage();
          if (monsterEvent.type === 'guard') {
            applyMonsterShieldDelta(monsterEvent.monsterId, monsterEvent.shield || 0);
            animateMonsterShield(monsterEvent.monsterId);
          } else if (Number(monsterEvent.damage || monsterEvent.shieldDamage || monsterEvent.hpDamage || 0) > 0) {
            await animateMonsterAttack(monsterEvent.monsterId);
            await skippableAutoDelay(BATTLE_STEP_DELAY_MS);
            animatePlayerHit(monsterEvent.damage || 0, monsterEvent.hpDamage || 0, monsterEvent.shieldDamage || 0);
          }
          await skippableAutoDelay(BATTLE_STEP_DELAY_MS);
        }
        pushLog('몬스터 턴 종료');
        await holdBattleMessage();
      }

      currentView = normalizeBattleView(nextView);
      battleQuestionCache = (currentView.questionCache || battleQuestionCache || []).slice();
      renderBattle(currentView);
      isAnimatingTurn = false;
      setBattleInputLocked(false);
      if (currentView.battle.status === 'victory') {
        pushLog('스테이지 클리어!, 보상을 준비중입니다...');
        openRewardAfterVictory();
        return;
      }
      if (currentView.battle.status === 'defeat') {
        setPlayerTurn(false);
        pushLog('쓰러졌습니다.');
        showDefeatSequence();
        return;
      }
      setPlayerTurn(true);
    }

    function buildDummyNextView(actionType) {
      var nextView = JSON.parse(JSON.stringify(currentView));
      var battle = nextView.battle;
      battle.lastTurnEvents = [];
      if (actionType === 'guard') {
        battle.player.shield = 8;
        battle.lastTurnEvents.push({ actor: 'player', type: 'guard', shield: 8, message: '수비로 방어막 8을 만들었다.' });
      } else {
        var target = getFirstAliveMonster(battle);
        if (target) {
          var totalDamage = 10;
          var shieldDamage = Math.min(Number(target.shield || 0), totalDamage);
          var hpDamage = totalDamage - shieldDamage;
          target.shield = Math.max(0, Number(target.shield || 0) - shieldDamage);
          target.currentHp = Math.max(0, Number(target.currentHp || 0) - hpDamage);
          battle.lastTurnEvents.push({ actor: 'player', type: actionType === 'skill' ? 'skill' : 'attack', targetMonsterId: target.instanceId, damage: totalDamage, shieldDamage: shieldDamage, hpDamage: hpDamage, message: target.name + '에게 ' + totalDamage + ' 피해!' });
        }
      }
      if (!getFirstAliveMonster(battle)) {
        battle.status = 'victory';
        battle.lastMessage = '몬스터를 처치했습니다.';
        return nextView;
      }
      battle.monsters.forEach(function(monster) {
        if (Number(monster.currentHp || 0) <= 0 || battle.player.hp <= 0) return;
        var damage = Number(monster.attack || 0);
        var shieldDamage = Math.min(Number(battle.player.shield || 0), damage);
        var hpDamage = damage - shieldDamage;
        battle.player.shield = Math.max(0, Number(battle.player.shield || 0) - shieldDamage);
        battle.player.hp = Math.max(0, Number(battle.player.hp || 0) - hpDamage);
        battle.lastTurnEvents.push({ actor: 'monster', type: 'attack', monsterId: monster.instanceId, monsterName: monster.name, damage: damage, shieldDamage: shieldDamage, hpDamage: hpDamage, message: monster.name + '의 공격!' });
      });
      battle.status = battle.player.hp <= 0 ? 'defeat' : 'active';
      battle.lastMessage = battle.status === 'defeat' ? '몬스터의 공격으로 쓰러졌습니다.' : '몬스터의 턴이 끝났습니다.';
      return nextView;
    }

      var rewardContainer = document.getElementById('rewardChoices');

    function formatRewardMeta(reward) {
      var typeLabel = getRewardTypeLabel(reward.type);
      var value = Number(reward.value || 0);
      if (reward.type === 'stat') {
        return typeLabel + ' / ' + getRewardTargetLabel(reward.targetId) + (value ? ' +' + value : '');
      }
      if (reward.type === 'skill') {
        return typeLabel + ' / NEW';
      }
      if (reward.type === 'skillUpgrade') {
        return typeLabel + (value ? ' / LV +' + value : '');
      }
      if (reward.type === 'item') {
        return typeLabel + (value ? ' / x' + value : '');
      }
      return typeLabel;
    }

      var labels = {

      await skippableAutoDelay(BATTLE_STEP_DELAY_MS);
    }

    async function animateMonsterAttack(monsterId) {
      var target = document.querySelector('[data-monster-id="' + cssEscape(monsterId) + '"] .compact-monster');
      if (!target) return;
      target.classList.remove('monster-lunge');
      setMonsterSpriteState(target, 'attack');

    function animateMonsterHit(monsterId, damage, hpDamage, shieldDamage) {
      var target = document.querySelector('[data-monster-id="' + cssEscape(monsterId) + '"] .compact-monster');
      if (!target) return;
      var visibleHpDamage = hpDamage === undefined || hpDamage === null ? Number(damage || 0) : Number(hpDamage || 0);
      var visibleShieldDamage = Number(shieldDamage || 0);
      applyMonsterDamageDelta(monsterId, visibleHpDamage, shieldDamage || 0);
      if (visibleHpDamage <= 0 && visibleShieldDamage <= 0) return;
      target.classList.remove('monster-hit', 'monster-hit-red', 'monster-hit-white');
      setMonsterSpriteState(target, 'hit');
      void target.offsetWidth;
      target.classList.add('monster-hit');
      target.classList.add(visibleHpDamage > 0 ? 'monster-hit-red' : 'monster-hit-white');
      var hpAnchor = target.closest('.monster-slot');
      spawnFloatingDamage(hpAnchor && hpAnchor.querySelector('.monster-hp-text') || target, visibleHpDamage > 0 ? visibleHpDamage : visibleShieldDamage, 'damage-white');
      var hitDuration = Math.min(900, Math.max(650, BATTLE_STEP_DELAY_MS));
      window.setTimeout(function() {
        target.classList.remove('monster-hit', 'monster-hit-red', 'monster-hit-white');
        resetMonsterSpriteState(target);
      }, hitDuration);
    }

    function setMonsterSpriteState(target, state) {

      var src = target.dataset[attr] || target.dataset.idleSrc || '';
      if (!src) return;
      target.classList.remove('monster-image-missing');
      image.src = src;
      target.classList.toggle('monster-state-attack', state === 'attack');
      target.classList.toggle('monster-state-hit', state === 'hit');
    }

    function resetMonsterSpriteState(target) {
      if (!target) return;
      var image = target.querySelector('.monster-art');
      if (image && target.dataset.idleSrc) {
        image.src = target.dataset.idleSrc;
      }
      target.classList.remove('monster-state-attack', 'monster-state-hit');

    function animatePlayerShield(shield) {

      renderPlayerHud({
        hp: Number(player.hp || 0),

    function applyMonsterDamageDelta(monsterId, hpDamage, shieldDamage) {
      var slot = document.querySelector('[data-monster-id="' + cssEscape(monsterId) + '"]');
      if (!slot) return;
      var text = slot.querySelector('.monster-hp-text');
      var fill = slot.querySelector('.monster-hp-bar > .hp-current');
      var lag = slot.querySelector('.monster-hp-bar > .hp-lag');
      var shieldFill = slot.querySelector('.monster-shield-fill');
      if (!text || !fill) return;
      var match = text.textContent.match(/(\d+)(?:\s*\+\s*(\d+))?\s*\/\s*(\d+)/);
      if (!match) return;
      var current = Math.max(0, Number(match[1] || 0) - Number(hpDamage || 0));
      var shield = Math.max(0, Number(match[2] || 0) - Number(shieldDamage || 0));
      var max = Math.max(1, Number(match[3] || 1));
      var visualMax = Math.max(max, current + shield);
      var nextWidth = Math.max(0, Math.min(100, Math.round((current / visualMax) * 100))) + '%';
      var shieldWidth = Math.max(0, Math.min(100, Math.round((shield / visualMax) * 100))) + '%';
      if (lag) lag.style.width = fill.style.width || lag.style.width;
      text.textContent = shield > 0 ? current + ' + ' + shield + ' / ' + max : current + ' / ' + max;
      fill.style.width = nextWidth;
      if (shieldFill) {
        shieldFill.style.left = nextWidth;
        shieldFill.style.width = shieldWidth;
      }
      if (lag) {
        window.setTimeout(function() { lag.style.width = nextWidth; }, 160);
      }
    }

    function applyMonsterShieldDelta(monsterId, shieldAmount) {
      var slot = document.querySelector('[data-monster-id="' + cssEscape(monsterId) + '"]');
      if (!slot) return;
      var text = slot.querySelector('.monster-hp-text');
      if (!text) return;
      var match = text.textContent.match(/(\d+)(?:\s*\+\s*(\d+))?\s*\/\s*(\d+)/);
      if (!match) return;
      var current = Number(match[1] || 0);
      var shield = Math.max(0, Number(match[2] || 0) + Number(shieldAmount || 0));
      var max = Math.max(1, Number(match[3] || 1));
      renderMonsters((currentView.battle.monsters || []).map(function(monster) {
        if ((monster.instanceId || monster.monsterId) === monsterId || monster.monsterId === monsterId) {
          return Object.assign({}, monster, { currentHp: current, shield: shield, maxHp: max });
        }
        return monster;
      }));
    }

    function applyPlayerDamageDelta(hpDamage, shieldDamage) {
      var text = document.getElementById('playerHpText');
      var match = text && text.textContent.match(/(\d+)(?:\s*\+\s*(\d+))?\s*\/\s*(\d+)/);
      if (!match) return;
      var hp = Number(match[1] || 0);
      var shield = Number(match[2] || 0);
      var max = Math.max(1, Number(match[3] || 1));
      var visualMaxBefore = Math.max(max, hp + shield);
      var previousWidth = Math.round((hp / visualMaxBefore) * 100) + '%';
      shield = Math.max(0, shield - Number(shieldDamage || 0));
      hp = Math.max(0, hp - Number(hpDamage || 0));
      var player = currentView && currentView.battle ? currentView.battle.player : {};
      renderPlayerHud({ hp: hp, maxHp: max, shield: shield, stats: player.stats || {}, buffs: player.buffs || [], debuffs: player.debuffs || [] });
      var lag = document.getElementById('playerHpLagFill');
      var fill = document.getElementById('playerHpFill');
      if (lag && fill) {
        var nextWidth = fill.style.width;
        lag.style.width = previousWidth;
        window.setTimeout(function() { lag.style.width = nextWidth; }, 160);
      }
    }

    function spawnShieldEffect(anchor) {
      if (!anchor) return;
      var rect = anchor.getBoundingClientRect();
      var layer = document.getElementById('floatingLayer');
      var layerRect = layer.getBoundingClientRect();
      var element = document.createElement('div');
      element.className = 'shield-effect';
      element.innerHTML = '<span>DEF</span>';
      element.style.left = (rect.left + (rect.width / 2) - layerRect.left) + 'px';
      element.style.top = (rect.top + (rect.height / 2) - layerRect.top) + 'px';
      layer.appendChild(element);
      window.setTimeout(function() {
        if (element.parentNode) element.parentNode.removeChild(element);
      }, 1900);
    }

    function spawnFloatingDamage(anchor, damage, className) {
      var amount = Math.max(0, Number(damage || 0));
      spawnFloatingText(anchor, amount > 0 ? '-' + amount : '0', className);
    }

    function spawnFloatingText(anchor, text, className) {
      if (!anchor) return;
      var rect = anchor.getBoundingClientRect();
      var layer = document.getElementById('floatingLayer');
      var layerRect = layer.getBoundingClientRect();
      var element = document.createElement('div');
      element.className = 'floating-damage ' + className;
      element.textContent = String(text || '');
      element.style.left = (rect.left + (rect.width / 2) - layerRect.left) + 'px';
      element.style.top = (rect.top - layerRect.top - 8) + 'px';
      layer.appendChild(element);
      window.setTimeout(function() {
        if (element.parentNode) element.parentNode.removeChild(element);
      }, 1900);
    }

    function getSelectedAnswer(question) {

        return { selectedAnswer: input ? input.value.trim() : '', selectedChoiceIndex: '', selectedAnswerText: input ? input.value.trim() : '' };
      }
      var checked = document.querySelector('input[name="questionChoice"]:checked');
      return {
        selectedAnswer: checked ? checked.value : '',
        selectedChoiceIndex: checked ? checked.value : '',
        selectedAnswerText: checked ? checked.parentElement.textContent.replace(/^\s*\d+\.\s*/, '').trim() : '',
      };
    }

    function getFirstAliveMonster(battle) {
      return (battle.monsters || []).filter(function(monster) {
        return Number(monster.currentHp || 0) > 0;
      })[0] || null;

      currentQuestionView = null;
      document.getElementById('questionModal').classList.remove('active');
      document.getElementById('questionModal').setAttribute('aria-hidden', 'true');

    function toggleTurnForTest() {
      if (isAnimatingTurn) return;
      setPlayerTurn(!isPlayerTurn);
      pushLog(isPlayerTurn ? '내 턴입니다. 행동을 선택하세요.' : '몬스터 턴입니다. 행동 버튼은 유지됩니다.');
    }

    function openLoadingForTest() {
      showLoadingModal('로딩 중...', '전투를 준비하는 중...');
      window.setTimeout(hideLoadingModal, 900);
    }

    function pushLog(message, options) {
      var element = document.getElementById('battleLog');
      if (!element) return;
      var text = String(message || '');
      battleLogFullText = text;
      battleLogRenderOptions = options || {};
      clearBattleLogTyping();
      if ((options && options.instant) || !shouldTypeBattleLog()) {
        battleLogTyping = false;
        element.classList.remove('typing');
        renderBattleLogText(element, text, battleLogRenderOptions);
        return;
      }

      battleLogTyping = true;
      element.classList.add('typing');
      element.classList.remove('sparkle-line');
      element.textContent = '';
      var index = 0;
      var step = function() {
        if (!battleLogTyping) return;
        index += 1;
        element.textContent = text.slice(0, index);
        if (index >= text.length) {
          clearBattleLogTyping();
          element.classList.remove('typing');
          battleLogTyping = false;
          renderBattleLogText(element, text, battleLogRenderOptions);
          return;
        }
        battleLogTypingTimer = window.setTimeout(step, 24);
      };
      battleLogTypingTimer = window.setTimeout(step, 24);
    }

    function shouldTypeBattleLog() {
      return !isPlayerTurn || isAnimatingTurn || stageIntroPlaying;
    }

    function revealBattleLog() {
      var element = document.getElementById('battleLog');
      if (!element) return;
      if (!battleLogTyping) return;
      clearBattleLogTyping();
      battleLogTyping = false;
      element.classList.remove('typing');
      renderBattleLogText(element, battleLogFullText, battleLogRenderOptions);
    }

    function clearBattleLogTyping() {
      if (battleLogTypingTimer) {
        window.clearTimeout(battleLogTypingTimer);
        battleLogTypingTimer = null;
      }
    }

    function renderBattleLogText(element, text, options) {
      var sparkleDot = !!(options && options.sparkleDot);
      element.classList.toggle('sparkle-line', sparkleDot);
      if (sparkleDot && /\.$/.test(text)) {
        element.innerHTML = escapeHtml(text.slice(0, -1)) + '<span class="sparkle-dot">.</span>';
        return;
      }
      element.textContent = text;
    }

    function actionLabel(actionType) {
      if (actionType === 'skill') return '스킬';
      return actionType === 'guard' ? '수비' : '공격';
    }

    function formatSecond(ms) {
      return (Math.max(0, Number(ms || 0)) / 1000).toFixed(1) + '초';
    }

    function formatDisplayStage(progressFloor, stage) {
      var parts = getDisplayFloorParts(progressFloor);
      return parts.floorLabel + ' ' + parts.areaLabel + ' ' + Number(stage || 1) + '스테이지';
    }

    function showDefeatSequence() {
      if (defeatSequenceStarted) return;
      defeatSequenceStarted = true;
      setBattleInputLocked(true);
      setPlayerTurn(false);
      closeQuestionModal();

      var shell = document.getElementById('battleShell');
      var overlay = document.getElementById('defeatOverlay');
      var result = document.getElementById('defeatResult');
      var homeButton = document.getElementById('defeatHomeButton');
      if (!overlay || !result || !homeButton) return;

      if (shell) {
        shell.classList.add('battle-defeat-fade');
      }
      result.classList.remove('active');
      homeButton.classList.add('hidden');
      result.innerHTML = buildDefeatResultHtml();

      window.setTimeout(function() {
        overlay.classList.add('active');
        overlay.setAttribute('aria-hidden', 'false');
      }, 700);

      window.setTimeout(function() {
        result.classList.add('active');
      }, 1700);

      window.setTimeout(function() {
        homeButton.classList.remove('hidden');
      }, 2400);
    }

    function buildDefeatResultHtml() {
      var battle = currentView && currentView.battle ? currentView.battle : {};
      var stage = battle.stage || {};
      var monsters = battle.monsters || [];
      var defeatedCount = monsters.filter(function(monster) {
        return Number(monster.currentHp || 0) <= 0;
      }).length;
      var aliveCount = monsters.length - defeatedCount;
      var player = battle.player || {};
      var lastMessage = battle.lastMessage || '전투가 종료되었습니다.';
      return '' +
        '<div class="defeat-result-row"><span>도달 지점</span><strong>' + escapeHtml(formatDisplayStage(stage.floor, stage.stage)) + '</strong></div>' +
        '<div class="defeat-result-row"><span>진행 턴</span><strong>' + escapeHtml(battle.turn || 1) + '턴</strong></div>' +
        '<div class="defeat-result-row"><span>플레이어 HP</span><strong>' + escapeHtml(player.hp || 0) + ' / ' + escapeHtml(player.maxHp || '-') + '</strong></div>' +
        '<div class="defeat-result-row"><span>처치한 몬스터</span><strong>' + defeatedCount + ' / ' + monsters.length + '</strong></div>' +
        '<div class="defeat-result-row"><span>남은 몬스터</span><strong>' + aliveCount + '</strong></div>' +
        '<p class="defeat-last-message">' + escapeHtml(lastMessage) + '</p>';
    }

    function delay(ms) {
      return new Promise(function(resolve) {
        window.setTimeout(resolve, ms);
      });
    }

    function holdBattleMessage() {
      return skippableAutoDelay(MESSAGE_HOLD_MS);
    }

    function skippableAutoDelay(ms) {
      return new Promise(function(resolve) {
        var settled = false;
        var timerId = window.setTimeout(finish, Math.max(0, Number(ms || 0)));
        activeAutoDelayResolver = finish;

        function finish() {
          if (settled) return;
          settled = true;
          window.clearTimeout(timerId);
          if (activeAutoDelayResolver === finish) {
            activeAutoDelayResolver = null;
          }
          resolve();
        }
      });
    }

    function skipCurrentAutoDelay() {
      if (!activeAutoDelayResolver) return false;
      activeAutoDelayResolver();
      return true;
    }

    function goHome() {
      window.top.location.href = WEB_APP_URL + '?skipIntro=1';
    }

    function getAuthToken() {
      return sessionStorage.getItem('learningRpgAuthToken') || '';
    }

    function showLoadingModal(title, text) {
      document.getElementById('loadingTitle').textContent = title || '로딩 중...';
      document.getElementById('loadingText').textContent = text || '데이터를 불러오는 중...';
      document.getElementById('loadingModal').classList.add('active');
    }

    function hideLoadingModal() {
      document.getElementById('loadingModal').classList.remove('active');
    }

    function cssEscape(value) {
      if (window.CSS && window.CSS.escape) {
        return window.CSS.escape(String(value || ''));
      }
      return String(value || '').replace(/"/g, '\\"');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    init();
  </script>
</body>
</html>
