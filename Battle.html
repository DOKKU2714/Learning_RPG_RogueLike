    function init() {
      setupBattleUi();
      var initialView = consumeInitialBattleView();
      if (initialView) {
        loadInitialBattleView(initialView);
        return;
      }
      showLoadingModal('로딩 중...', '진행 중인 전투를 확인하는 중...');
      google.script.run
        .withSuccessHandler(function(view) {
          hideLoadingModal();
          loadInitialBattleView(view);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          isDummyMode = true;
          currentView = normalizeBattleView(dummyView);
          applyBattleClientConfig(currentView.clientConfig);
          renderBattle(currentView);
          pushLog(error.message || '데모 UI로 전투 화면을 표시합니다.');
          startBattleEntrance();
        })
        .getBattleView(getAuthToken(), getSelectedWorkbookId());
    }

    function consumeInitialBattleView() {
      try {
        var raw = sessionStorage.getItem(INITIAL_BATTLE_VIEW_KEY);
        sessionStorage.removeItem(INITIAL_BATTLE_VIEW_KEY);
        if (!raw) return null;
        var cached = JSON.parse(raw);
        if (!cached || !cached.view || !cached.view.battle) return null;
        if (Date.now() - Number(cached.savedAt || 0) > INITIAL_BATTLE_VIEW_MAX_AGE_MS) return null;
        if (String(cached.workbookId || '') !== String(getSelectedWorkbookId() || '')) return null;
        return cached.view;
      } catch (error) {
        return null;
      }
    }

    function loadInitialBattleView(view) {
      isDummyMode = false;
      currentView = normalizeBattleView(view);
      resetStageCommitState();
      restoreLocalBattleCheckpoint();
      applyBattleClientConfig(currentView.clientConfig);
      resetBattleQuestionCacheFromView(currentView, []);
      preloadMissingBattleQuestionCache();
      renderBattle(currentView);
      if (isFloorIntermissionView(currentView)) {
        startFloorIntermissionEntrance();
      } else if (currentView.battle.status === 'victory') {
        finishBattleStartFade();
        openRewardAfterVictory();
      } else if (currentView.battle.status === 'defeat') {
        finishBattleStartFade();
        showDefeatSequence();
      } else {
        startBattleEntrance();
      }
    }

    function setupBattleUi() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      syncSoundToggleButton();
      applyGlobalSoundPreference();
      if (window.location.search.indexOf('debug=1') !== -1) {
        document.querySelector('.battle-debug-controls').classList.add('active');
      }
      bindHoverTooltips();
      bindBattleLogReveal();
      var actionPanel = document.getElementById('actionPanel');
      combatActionPanelHtml = actionPanel ? actionPanel.innerHTML : '';
      renderActionMode();
      if (!document.getElementById('battleStartFade')) {
        var fade = document.createElement('div');
        fade.id = 'battleStartFade';
        fade.className = 'battle-start-fade active';
        document.body.appendChild(fade);
      }
    }

    function applyBattleClientConfig(config) {
      config = config || {};
      if (config.questionResultHoldMs !== undefined && config.questionResultHoldMs !== '') {
        QUESTION_RESULT_HOLD_MS = Math.max(1400, Math.min(5000, Math.round(Number(config.questionResultHoldMs || QUESTION_RESULT_HOLD_MS))));
      }
      if (config.questionActionStartDelayMs !== undefined && config.questionActionStartDelayMs !== '') {
        QUESTION_ACTION_START_DELAY_MS = Math.max(0, Math.min(2000, Math.round(Number(config.questionActionStartDelayMs || QUESTION_ACTION_START_DELAY_MS))));
      }
      if (config.minAnswerEfficiency !== undefined && config.minAnswerEfficiency !== '') {
        MIN_ANSWER_EFFICIENCY = Math.max(0, Math.min(1, Number(config.minAnswerEfficiency || MIN_ANSWER_EFFICIENCY)));
      }

    function bindHoverTooltips() {
      var activeTooltipTarget = null;
      var tooltip = document.getElementById('hoverTooltip');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.id = 'hoverTooltip';
        tooltip.className = 'hover-tooltip';
        tooltip.setAttribute('aria-hidden', 'true');
        document.body.appendChild(tooltip);
      }
      var statTooltip = document.getElementById('statHoverTooltip');
      if (!statTooltip) {
        statTooltip = document.createElement('div');
        statTooltip.id = 'statHoverTooltip';
        statTooltip.className = 'hover-tooltip stat-hover-tooltip';
        statTooltip.setAttribute('aria-hidden', 'true');
        document.body.appendChild(statTooltip);
      }
      document.addEventListener('mousemove', function(event) {
        if (activeTooltipTarget && !document.body.contains(activeTooltipTarget)) {
          hideHoverTooltips();
          activeTooltipTarget = null;
          return;
        }
        if (tooltip.getAttribute('aria-hidden') !== 'true') {
          positionHoverTooltip(tooltip, activeTooltipTarget, event, 0);
        }
        if (statTooltip.getAttribute('aria-hidden') !== 'true') {
          positionHoverTooltip(statTooltip, activeTooltipTarget, event, 1);
        }
      });
      document.addEventListener('mouseover', function(event) {
        var target = event.target.closest && event.target.closest('[data-tooltip]');
        if (!target) return;
        var text = target.getAttribute('data-tooltip');
        if (!text) return;
        activeTooltipTarget = target;
        tooltip.textContent = text;
        tooltip.setAttribute('aria-hidden', 'false');
        tooltip.classList.add('active');
        var statText = target.getAttribute('data-stat-tooltip');
        if (statText) {
          statTooltip.textContent = statText;
          statTooltip.setAttribute('aria-hidden', 'false');
          statTooltip.classList.add('active');
        } else {
          statTooltip.setAttribute('aria-hidden', 'true');
          statTooltip.classList.remove('active');
        }
        window.requestAnimationFrame(function() {
          positionHoverTooltip(tooltip, activeTooltipTarget, event, 0);
          if (statTooltip.getAttribute('aria-hidden') !== 'true') {
            positionHoverTooltip(statTooltip, activeTooltipTarget, event, 1);
          }
        });
      });
      document.addEventListener('mouseout', function(event) {
        if (event.target.closest && event.target.closest('[data-tooltip]')) {
          activeTooltipTarget = null;
          tooltip.setAttribute('aria-hidden', 'true');
          tooltip.classList.remove('active');
          statTooltip.setAttribute('aria-hidden', 'true');
          statTooltip.classList.remove('active');
        }
      });

      function hideHoverTooltips() {
        tooltip.setAttribute('aria-hidden', 'true');
        tooltip.classList.remove('active');
        statTooltip.setAttribute('aria-hidden', 'true');
        statTooltip.classList.remove('active');
      }
    }

    function positionHoverTooltip(tooltip, target, event, stackIndex) {
      if (!tooltip) return;
      var placement = target && target.getAttribute && target.getAttribute('data-tooltip-placement');
      if (placement === 'above') {
        var rect = target.getBoundingClientRect();
        var width = tooltip.offsetWidth || 220;
        var height = tooltip.offsetHeight || 40;
        var left = rect.left + (rect.width / 2) - (width / 2);
        var top = rect.top - height - 10 - (Number(stackIndex || 0) * (height + 6));
        tooltip.style.left = Math.max(8, Math.min(window.innerWidth - width - 8, left)) + 'px';
        tooltip.style.top = Math.max(8, top) + 'px';
        return;
      }
      tooltip.style.left = ((event && event.clientX || 0) + (stackIndex ? 22 : 14)) + 'px';
      tooltip.style.top = ((event && event.clientY || 0) + (stackIndex ? 78 : 14)) + 'px';
    }

    function hideActiveHoverTooltips() {
      ['hoverTooltip', 'statHoverTooltip'].forEach(function(id) {
        var tooltip = document.getElementById(id);
        if (!tooltip) return;
        tooltip.setAttribute('aria-hidden', 'true');

    function normalizeBattleView(view) {
      view = view || {};
      view.score = Number(view.score || 0);
      if ((!view.battle || !view.battle.stage) && view.rewardView && view.rewardView.intermissionStage) {
        view.battle = buildClientFloorIntermissionBattle(view.rewardView.intermissionStage, view.rewardView);
      }
      if (!view.battle) {
        return view;
      }
      var battle = view.battle;
      battle.stage = battle.stage || null;
      battle.player = battle.player || {};
      battle.player.stats = battle.player.stats || {};
      if (!battle.monsters || !battle.monsters.length) {
        battle.monsters = battle.monster ? [battle.monster] : [];
      }
      battle.monsters = battle.monsters.slice(0, 3);
      battle.monsters.forEach(function(monster) {
        syncClientStatusBuckets(monster);
      });
      battle.monster = getFirstAliveMonster(battle) || battle.monsters[0] || null;
      battle.player.maxHp = Number(battle.player.maxHp || battle.player.stats.hp || 1);
      battle.player.shield = Number(battle.player.shield || 0);
      syncClientStatusBuckets(battle.player);
      normalizeClientActionPoints(battle.player);
      battle.skillCooldowns = battle.skillCooldowns || {};
      battle.skillCooldownStartedTurns = battle.skillCooldownStartedTurns || {};
      battle.skillUseCounts = battle.skillUseCounts || {};
      view.stageState = view.stageState || {};
      view.stageState.scoreState = view.stageState.scoreState || {};
      var usageStageId = String(battle.stage && battle.stage.stageId || '');
      if (usageStageId && view.stageState.usedQuestionStageId !== usageStageId) {
        view.stageState.usedQuestionIds = [];
        battle.usedQuestionIds = [];
        view.stageState.usedQuestionStageId = usageStageId;
      }
      view.stageState.usedQuestionIds = mergeClientQuestionIds(view.stageState.usedQuestionIds, battle.usedQuestionIds);
      battle.usedQuestionIds = view.stageState.usedQuestionIds.slice();
      view.questionCache = view.questionCache || [];
      view.reusableQuestionCache = getReusableQuestionCacheForView(view);
      view.questionCache = filterQuestionCacheByUsed(view.reusableQuestionCache.slice(), view.stageState.usedQuestionIds);
      view.monsterAiRules = view.monsterAiRules || [];
      refreshClientSkillAvailabilityForLocks(view);
      return view;
    }

    function mergeClientQuestionIds(existing, incoming) {
      var seen = {};
      var merged = [];
      function add(questionId) {
        questionId = String(questionId || '');
        if (!questionId || seen[questionId]) return;
        seen[questionId] = true;
        merged.push(questionId);
      }
      (existing || []).forEach(add);
      (incoming || []).forEach(add);
      return merged;
    }

    function getClientUsedQuestionIds(view) {
      view = view || currentView || {};
      var battle = view.battle || {};
      view.stageState = view.stageState || {};
      var usageStageId = String(battle.stage && battle.stage.stageId || view.stageState.stageId || '');
      if (usageStageId && view.stageState.usedQuestionStageId !== usageStageId) {
        view.stageState.usedQuestionIds = [];
        battle.usedQuestionIds = [];
        view.stageState.usedQuestionStageId = usageStageId;
      }
      view.stageState.usedQuestionIds = mergeClientQuestionIds(view.stageState.usedQuestionIds, battle.usedQuestionIds);
      battle.usedQuestionIds = view.stageState.usedQuestionIds.slice();
      return view.stageState.usedQuestionIds;
    }

    function getQuestionViewId(questionView) {
      return String(questionView && questionView.question && questionView.question.questionId || '');
    }

    function filterQuestionCacheByUsed(cache, usedQuestionIds) {
      var source = cache || [];
      var used = {};
      (usedQuestionIds || []).forEach(function(questionId) {
        questionId = String(questionId || '');
        if (questionId) used[questionId] = true;
      });
      var filtered = source.filter(function(questionView) {
        return !used[getQuestionViewId(questionView)];
      });
      return filtered;
    }

    function getReusableQuestionCacheForView(view) {
      view = view || currentView || {};
      var cache = view.reusableQuestionCache && view.reusableQuestionCache.length
        ? view.reusableQuestionCache
        : view.questionCache || [];
      return cache.slice();
    }

    function resetBattleQuestionCacheFromView(view, fallbackCache) {
      view = view || currentView || {};
      var reusable = getReusableQuestionCacheForView(view);
      if (reusable.length) {
        reusableQuestionCache = reusable.slice();
        view.reusableQuestionCache = reusable.slice();
      }
      var source = view.questionCache && view.questionCache.length
        ? view.questionCache
        : reusableQuestionCache.length ? reusableQuestionCache : fallbackCache || [];
      battleQuestionCache = filterQuestionCacheByUsed(source.slice(), getClientUsedQuestionIds(view));
    }

    function markClientQuestionUsed(questionId, view) {
      questionId = String(questionId || '');
      if (!questionId) return;
      view = view || currentView;
      if (!view) return;
      var usedQuestionIds = getClientUsedQuestionIds(view);
      if (usedQuestionIds.indexOf(questionId) === -1) {
        usedQuestionIds.push(questionId);
      }
      if (view.battle) {
        view.battle.usedQuestionIds = usedQuestionIds.slice();
      }
      var reusable = getReusableQuestionCacheForView(view);
      if (reusable.length) {
        reusableQuestionCache = reusable.slice();
        view.reusableQuestionCache = reusable.slice();
      }
      view.questionCache = filterQuestionCacheByUsed((reusable.length ? reusable : view.questionCache).slice(), usedQuestionIds);
      battleQuestionCache = filterQuestionCacheByUsed(battleQuestionCache, usedQuestionIds);
    }

    function buildClientFloorIntermissionBattle(stage, rewardView) {
      var previousPlayer = currentView && currentView.battle && currentView.battle.player || {};
      var maxHp = Number(rewardView && rewardView.maxHpAfterRegen || previousPlayer.maxHp || previousPlayer.stats && previousPlayer.stats.hp || 1);
      var hp = Number(rewardView && rewardView.currentHpAfterRegen || previousPlayer.hp || maxHp);
      return {
        battleId: 'client_intermission_' + String(stage && stage.stageId || Date.now()),
        status: 'victory',
        turn: 1,
        stage: {
          stageId: stage && stage.stageId || '',
          floor: Number(stage && stage.floor || 1),
          stage: Number(stage && stage.stage || 6),
          name: stage && stage.name || (Number(stage && stage.floor || 1) + '층 정비 구역'),
          rewardGroupId: rewardView && rewardView.rewardGroupId || '',
        },
        player: Object.assign({}, previousPlayer, {
          hp: Math.max(1, Math.min(maxHp, hp)),
          maxHp: maxHp,
          shield: 0,
          currentActionPoint: 0,
        }),
        monsters: [],
        monster: null,
        pendingAction: null,
        lastMessage: '이곳은 아무도 없습니다. 행동을 선택하세요',
        lastTurnEvents: [],
      };
    }

    function normalizeClientActionPoints(player) {
      if (!player) return player;
      player.baseMaxActionPoint = Math.max(0, Number(player.baseMaxActionPoint || 3));
      player.maxActionPoint = Math.max(0, Number(player.maxActionPoint || player.baseMaxActionPoint || 3));
      player.currentActionPoint = Math.max(0, Math.min(player.maxActionPoint, Number(player.currentActionPoint !== undefined && player.currentActionPoint !== '' ? player.currentActionPoint : player.maxActionPoint)));
      return player;
    }

    function renderBattle(view) {
      view = normalizeBattleView(view);
      var battle = view.battle;
      if (!battle || !battle.stage) {
        if (!view.nextBattlePending && !view.showReward && !view.rewardView) {
          pushLog('전투 화면 데이터가 아직 준비되지 않았습니다.');
        }
        return;
      }
      battle.player = battle.player || {};
      battle.monsters = battle.monsters || [];
      renderBattleBackground(battle.stage);
      renderMonsters(battle.monsters);
      renderPlayerHud(battle.player);
      if (isFloorIntermissionBattle(battle)) {
        renderFloorIntermissionActions();
      } else {
        renderCombatActions();
        renderSkills(view.availableSkills || []);
        renderActionTooltips(battle.player);
      }
      if (!isDefaultPlayerTurnPrompt(battle.lastMessage)) {
        pushLog(battle.lastMessage || '전투 시작!');
      }
      setPlayerTurn(isFloorIntermissionBattle(battle) ? isPlayerTurn : (isPlayerTurn && battle.status === 'active'));
      updateBattleInputLockState();
    }

    function isDefaultPlayerTurnPrompt(message) {
      return String(message || '').trim() === '내 턴입니다. 행동을 선택하세요.';
    }

    function renderSkills(skills) {
      var panel = document.getElementById('skillPanel');
      if (!skills.length) {
        panel.innerHTML = '<div class="skill-empty">보유 스킬 없음</div><button class="secondary skill-cancel-button" type="button" onclick="closeSkillPanel()">취소</button>';
        updateZeroCostSkillAttention(false);
        return;
      }
      var currentActionPoint = getCurrentActionPoint();
      var hasUsableZeroCostSkill = false;
      panel.innerHTML = skills.map(function(skill) {
        var apCost = getSkillActionPointCost(skill);
        var hasAp = hasClientActionPoint(apCost);
        var canUseNow = isClientSkillAvailableNow(skill, hasAp);
        var isDisabled = !canUseNow || !hasAp;
        var shouldHighlightZeroCostSkill = currentActionPoint <= 0 && apCost === 0 && !isDisabled;
        hasUsableZeroCostSkill = hasUsableZeroCostSkill || shouldHighlightZeroCostSkill;
        var disabled = isDisabled ? ' disabled' : '';
        var reason = !hasAp ? '행동력이 부족합니다.' : (!canUseNow ? skill.unavailableReason : (skill.description || ''));
        var cooldown = getSkillCooldownDisplayText(skill);
        var useLimitText = getSkillUseLimitText(skill);
        var difficultyBonusText = getSkillDifficultyBonusText(skill);
        var description = skill.description || '';
        var rarity = getRewardRarityLabel(skill.rarity || 'common');
        var rarityClass = normalizeRewardRarity(skill.rarity);
        var reasonText = reason || description || '';
        var detailDescription = buildSkillDetailDescription(skill, description || reasonText || '-');
        return '<button class="skill-button rarity-' + escapeHtml(rarityClass) + (shouldHighlightZeroCostSkill ? ' zero-cost-skill-attention' : '') + '" data-skill-id="' + escapeHtml(skill.skillId) + '" data-skill-disabled="' + escapeHtml(isDisabled ? 'true' : 'false') + '" data-unavailable-reason="' + escapeHtml(reason || '') + '"' + disabled + '>' +
          '<span class="skill-button-name">' + escapeHtml(skill.name) + '</span>' +
          '<span class="skill-ap-badge">' + escapeHtml(apCost) + '</span>' +
          '<span class="skill-detail-card rarity-' + escapeHtml(rarityClass) + '" aria-hidden="true">' +
            '<span class="skill-detail-header">' +
              '<strong class="skill-detail-name">' + escapeHtml(skill.name) + '</strong>' +
              '<span class="skill-detail-line skill-detail-ap-line">행동력 <em class="skill-detail-ap-inline">' + escapeHtml(apCost) + '</em> 소비</span>' +
            '</span>' +
            '<span class="skill-detail-meta">' + escapeHtml(rarity) + ' / Lv.' + escapeHtml(skill.level || 1) + '</span>' +
            '<span class="skill-detail-description">' + detailDescription + '</span>' +
            (difficultyBonusText ? '<span class="' + escapeHtml(getSkillDifficultyBonusClass(skill)) + '">' + escapeHtml(difficultyBonusText) + '</span>' : '') +
            (useLimitText ? '<span class="skill-detail-line">' + escapeHtml(useLimitText) + '</span>' : '') +
            (cooldown ? '<span class="skill-detail-line">' + escapeHtml(cooldown) + '</span>' : '') +
          '</span>' +
        '</button>';
      }).join('') + '<button class="secondary skill-cancel-button" type="button" onclick="closeSkillPanel()">취소</button>';

      updateZeroCostSkillAttention(hasUsableZeroCostSkill);

      Array.prototype.forEach.call(panel.querySelectorAll('.skill-button'), function(button) {
        button.addEventListener('click', function() {
          chooseSkill(button.getAttribute('data-skill-id'));
        });
      });
    }

    function updateZeroCostSkillAttention(shouldHighlight) {
      var skillToggleButton = document.getElementById('skillToggleButton');
      if (!skillToggleButton) return;
      skillToggleButton.classList.toggle('zero-cost-skill-attention', !!shouldHighlight);
      skillToggleButton.setAttribute('aria-label', shouldHighlight ? '스킬, 행동력 0으로 사용 가능한 스킬 있음' : '스킬');
    }

    function normalizeSkillTags(tags) {
      if (Array.isArray(tags)) {
        return tags.map(function(tag) {
          return String(tag || '').trim();
        }).filter(Boolean);
      }
      var value = String(tags || '').trim();
      if (!value) return [];
      try {
        var parsed = JSON.parse(value);
        if (Array.isArray(parsed)) {
          return normalizeSkillTags(parsed);
        }
      } catch (error) {
        // Plain comma-separated tags are also accepted.
      }
      return value.split(',').map(function(tag) {
        return tag.trim();
      }).filter(Boolean);
    }

    function renderActionTooltips(player) {
      if (!document.getElementById('attackActionButton')) return;
      var stats = getClientEffectiveStats(player);
      var attack = Math.max(0, Math.round(Number(stats.attack || 0)));
      var defense = Math.max(0, Math.round(CLIENT_BASE_GUARD_SHIELD + Number(stats.defense || 0)));
      var attackPreview = document.getElementById('attackActionPreviewValue');
      var guardPreview = document.getElementById('guardActionPreviewValue');
      if (attackPreview) attackPreview.textContent = attack;
      if (guardPreview) guardPreview.textContent = defense;
      document.getElementById('attackActionButton').removeAttribute('data-tooltip');
      document.getElementById('guardActionButton').removeAttribute('data-tooltip');
      document.getElementById('skillToggleButton').setAttribute('data-tooltip', '보유 스킬 목록을 엽니다.');
    }

    function formatEffectiveStat(baseStats, effectiveStats, statKey, suffix) {
      var base = Number(baseStats && baseStats[statKey] || 0);
      var effective = Number(effectiveStats && effectiveStats[statKey] || 0);
      var rounded = Math.round(effective * 10) / 10;
      var delta = Math.round((effective - base) * 10) / 10;
      var unit = suffix || '';
      if (!delta) return rounded + unit;
      return rounded + unit + ' (' + (delta > 0 ? '+' : '') + delta + unit + ')';
    }

    function toggleSkillPanel() {
      cancelTargetSelection();
      skillPanelOpen = !skillPanelOpen;

      panel.setAttribute('data-action-mode', 'combat');

      if (!panel || panel.getAttribute('data-action-mode') === 'floor-intermission') return;
      panel.className = 'action-panel compact-actions floor-intermission-actions';

        '<button id="floorRewardButton" type="button" onclick="chooseFloorIntermissionAction(\'reward\')">보상</button>';

    function renderMonsters(monsters) {
      var layer = document.getElementById('monsterLayer');
      monsters = (monsters || []).filter(function(monster) {
        return Number(monster.currentHp || 0) > 0;
      });
      layer.innerHTML = monsters.map(function(monster, index) {
        var monsterId = monster.instanceId || monster.monsterId;
        var selectable = pendingTargetSelection ? ' target-selectable' : '';
        var hp = Number(monster.currentHp || 0);
        var maxHp = Math.max(1, Number(monster.maxHp || 1));
        var shield = Math.max(0, Number(monster.shield || 0));
        var visualMax = Math.max(maxHp, hp + shield);
        var hpPercent = Math.max(0, Math.min(100, Math.round((hp / visualMax) * 100)));
        var shieldPercent = Math.max(0, Math.min(100, Math.round((shield / visualMax) * 100)));
        return '<article class="monster-slot monster-slot-' + monsters.length + ' monster-count-' + monsters.length + selectable + '" data-monster-id="' + escapeHtml(monsterId) + '" data-tooltip="' + (pendingTargetSelection ? '대상 선택: ' + escapeHtml(monster.name || '몬스터') : '') + '" data-tooltip-placement="' + (pendingTargetSelection ? 'above' : '') + '">' +
          '<div class="monster-hp-text">' + (shield > 0 ? hp + ' + ' + shield + ' / ' + maxHp : hp + ' / ' + maxHp) + '</div>' +
          '<div class="thin-hp-bar monster-hp-bar"><span class="hp-lag" style="width:' + hpPercent + '%"></span><span class="hp-current" style="width:' + hpPercent + '%"></span><span class="monster-shield-fill" style="left:' + hpPercent + '%; width:' + shieldPercent + '%"></span></div>' +
          renderStatusIcons(monster) +
          renderMonsterIntent(monster.intent) +
          renderMonsterSprite(monster, index) +
          '<div class="monster-display-name">' + escapeHtml(monster.name || ('MONSTER ' + (index + 1))) + '</div>' +
        '</article>';
      }).join('');
      bindMonsterTargetClicks();
    }

    function bindMonsterTargetClicks() {
      Array.prototype.forEach.call(document.querySelectorAll('.monster-slot'), function(slot) {
        slot.addEventListener('click', function() {
          if (!pendingTargetSelection || shouldLockBattleInput()) return;
          var targetId = slot.getAttribute('data-monster-id') || '';
          if (targetId) {
            completeTargetSelection(targetId);
          }
        });
      });
    }

    function bindBattleLogReveal() {
      var logBox = document.querySelector('.battle-log-compact');
      if (!logBox) return;
      logBox.addEventListener('click', function() {
        if (advanceDescriptionByInput()) return;
        if (isAnimatingTurn) {
          skipCurrentAutoDelay();
        }
      });
    }

    function advanceDescriptionByInput() {
      if (battleLogTyping) {
        revealBattleLog();
        return true;
      }
      if (stageNarrationActive) {
        advanceManualNarration();
        return true;
      }
      if (advanceBattleLogManually()) {
        return true;
      }
      if (isAnimatingTurn && activeAutoDelayResolver) {
        skipCurrentAutoDelay();
        return true;
      }
      return false;
    }

    function renderBattleBackground(stage) {
      var fallback = document.querySelector('.battle-background-fallback');
      if (!fallback) return;
      fallback.classList.remove('has-battle-image');
      fallback.style.backgroundImage = '';
      var urls = getBattleBackgroundUrlCandidates(stage);
      if (!urls.length) return;

      var image = new Image();
      var index = 0;
      image.onload = function() {
        fallback.classList.add('has-battle-image');
        fallback.style.backgroundImage = 'url("' + cssUrlEscape(image.src) + '")';
      };
      image.onerror = function() {
        index += 1;
        if (index < urls.length) {
          image.src = urls[index];
          return;
        }
      };
      image.src = urls[index];
    }

    function getBattleBackgroundUrlCandidates(stage) {
      if (!ASSET_BASE_URL || !stage) return [];
      var floor = Number(stage.floor || 1);
      var stageNumber = Number(stage.stage || 1);
      var imageStage = stageNumber >= 5 ? 5 : (stageNumber >= 3 ? 3 : 1);
      var displayFloor = getDisplayFloorNumberForAsset(floor);
      var floors = uniqueClientValues([floor, displayFloor]);
      var stages = uniqueClientValues([stageNumber, imageStage]);
      var urls = [];
      floors.forEach(function(floorValue) {
        stages.forEach(function(stageValue) {
          urls.push(ASSET_BASE_URL + '/Resources/Background/Battle/' + floorValue + '-' + stageValue + '.png');
          urls.push(ASSET_BASE_URL + '/resources/stage_' + floorValue + '-' + stageValue + '.png');
          urls.push(ASSET_BASE_URL + '/Resources/stage_' + floorValue + '-' + stageValue + '.png');
          urls.push(ASSET_BASE_URL + '/resources/' + floorValue + '-' + stageValue + '.png');
        });
      });
      return uniqueClientValues(urls);
    }

    function getDisplayFloorNumberForAsset(progressFloor) {
      var floor = Number(progressFloor || 1);
      return Math.max(1, 6 - floor);
    }

    function uniqueClientValues(values) {
      var seen = {};
      return (values || []).filter(function(value) {
        var key = String(value);
        if (seen[key]) return false;
        seen[key] = true;
        return value !== '' && value !== null && value !== undefined;
      });
    }

    function getBattleSoundUrls(soundKey) {
      var path = BATTLE_SOUND_FILES[soundKey] || '';
      if (!ASSET_BASE_URL || !path) return [];
      var normalizedPath = path.replace(/^\/+/, '');
      var paths = /\.(?:wav|mp3|ogg)(?:[?#].*)?$/i.test(normalizedPath)
        ? [normalizedPath]
        : BATTLE_SOUND_EXTENSIONS.map(function(extension) {
            return normalizedPath + '.' + extension;
          });
      return paths.map(function(candidate) {
        return ASSET_BASE_URL.replace(/\/+$/, '') + '/' + candidate;
      });
    }

    function getBattleSound(soundKey, onReady) {
      if (typeof onReady !== 'function') return;
      if (typeof Audio === 'undefined') {
        onReady(null);
        return;
      }
      if (!battleSoundCache[soundKey]) {
        if (battleSoundResolveCallbacks[soundKey]) {
          battleSoundResolveCallbacks[soundKey].push(onReady);
          return;
        }
        battleSoundResolveCallbacks[soundKey] = [onReady];
        resolveBattleSoundCandidate(soundKey, getBattleSoundUrls(soundKey), 0);
        return;
      }
      onReady(battleSoundCache[soundKey]);
    }

    function resolveBattleSoundCandidate(soundKey, urls, index) {
      if (index >= urls.length) {
        finishBattleSoundResolution(soundKey, null);
        return;
      }
      var audio = new Audio(urls[index]);
      var settled = false;
      audio.preload = 'auto';
      function handleReady() {
        if (settled) return;
        settled = true;
        battleSoundCache[soundKey] = audio;
        finishBattleSoundResolution(soundKey, audio);
      }
      function handleError() {
        if (settled) return;
        settled = true;
        resolveBattleSoundCandidate(soundKey, urls, index + 1);
      }
      audio.addEventListener('loadeddata', handleReady, { once: true });
      audio.addEventListener('canplay', handleReady, { once: true });
      audio.addEventListener('error', handleError, { once: true });
      try {
        audio.load();
      } catch (error) {
        handleError();
      }
    }

    function finishBattleSoundResolution(soundKey, audio) {
      var callbacks = battleSoundResolveCallbacks[soundKey] || [];
      delete battleSoundResolveCallbacks[soundKey];
      callbacks.forEach(function(callback) {
        callback(audio);
      });
    }

    function playBattleSound(soundKey) {
      if (!isSoundEnabled()) return;
      getBattleSound(soundKey, function(baseAudio) {
        playResolvedBattleSound(soundKey, baseAudio);
      });
    }

    function playBattleSoundsTogether(soundKeys) {
      if (!isSoundEnabled()) return;
      var keys = (soundKeys || []).filter(Boolean);
      if (!keys.length) return;
      var resolved = new Array(keys.length);
      var remaining = keys.length;
      keys.forEach(function(soundKey, index) {
        getBattleSound(soundKey, function(baseAudio) {
          resolved[index] = baseAudio;
          remaining -= 1;
          if (remaining > 0 || !isSoundEnabled()) return;
          resolved.forEach(function(audio, resolvedIndex) {
            playResolvedBattleSound(keys[resolvedIndex], audio);
          });
        });
      });
    }

    function playResolvedBattleSound(soundKey, baseAudio) {
      if (!baseAudio) return;
      var audio = baseAudio.cloneNode ? baseAudio.cloneNode(true) : new Audio(baseAudio.src);
      audio.volume = 0.75;
      audio.muted = !isSoundEnabled();
      activeBattleSounds.push(audio);
      audio.addEventListener('ended', function() {
        removeActiveBattleSound(audio);
      });
      audio.addEventListener('error', function() {
        removeActiveBattleSound(audio);
      }, { once: true });
      var playPromise = audio.play();
      if (playPromise && playPromise.catch) {
        playPromise.catch(function() {
          queuePendingBattleSound(soundKey);
          removeActiveBattleSound(audio);
        });
      }
    }

    function playBattleHitSound(isCritical) {
      if (isCritical) {
        playBattleSoundsTogether(['hitCrit', 'hitCrit2', 'hitCrit3']);
        return;
      }
      playBattleSoundsTogether(['hitDefault', 'hitDefault2', 'hitDefault3']);
    }

    function preloadBattleSounds() {
      if (!isSoundEnabled()) return;
      Object.keys(BATTLE_SOUND_FILES).forEach(function(soundKey) {
        getBattleSound(soundKey, function() {});
      });
    }

    function queuePendingBattleSound(soundKey) {
      if (!soundKey || pendingBattleSoundKeys.indexOf(soundKey) !== -1) return;
      pendingBattleSoundKeys.push(soundKey);
      if (pendingBattleSoundKeys.length > 4) {
        pendingBattleSoundKeys.shift();
      }
    }

    function flushPendingBattleSounds() {
      if (!isSoundEnabled() || !pendingBattleSoundKeys.length) return;
      var soundKeys = pendingBattleSoundKeys.slice();
      pendingBattleSoundKeys = [];
      soundKeys.forEach(function(soundKey) {
        playBattleSound(soundKey);
      });
    }

    function removeActiveBattleSound(audio) {
      activeBattleSounds = activeBattleSounds.filter(function(candidate) {
        return candidate !== audio;
      });
    }

    function isSoundEnabled() {
      try {
        return localStorage.getItem(SOUND_ENABLED_KEY) === '1';
      } catch (error) {
        return false;
      }
    }

    function setSoundEnabled(enabled, options) {
      options = options || {};
      try {
        localStorage.setItem(SOUND_ENABLED_KEY, enabled ? '1' : '0');
      } catch (error) {}
      syncSoundToggleButton();
      applyGlobalSoundPreference();
      notifySoundPreferenceChanged(options);
    }

    function toggleSoundEnabled() {
      setSoundEnabled(!isSoundEnabled(), { userInitiated: true });
    }

    function syncSoundToggleButton() {
      var button = document.getElementById('battleSoundToggleButton');
      if (!button) return;
      var enabled = isSoundEnabled();
      button.classList.toggle('sound-muted', !enabled);
      button.setAttribute('aria-pressed', enabled ? 'true' : 'false');
      button.setAttribute('aria-label', enabled ? '소리 켜짐' : '소리 꺼짐');
      button.title = enabled ? '소리 켜짐' : '소리 꺼짐';
    }

    function applyGlobalSoundPreference() {
      var enabled = isSoundEnabled();
      Array.prototype.forEach.call(document.querySelectorAll('audio, video'), function(media) {
        if (media.dataset.soundPreviousVolume === undefined) {
          media.dataset.soundPreviousVolume = String(media.volume);
        }
        media.muted = !enabled;
        media.volume = enabled ? Number(media.dataset.soundPreviousVolume || 1) : 0;
      });
      Object.keys(battleSoundCache).forEach(function(soundKey) {
        if (battleSoundCache[soundKey]) {
          battleSoundCache[soundKey].muted = !enabled;
          battleSoundCache[soundKey].volume = enabled ? 0.75 : 0;
        }
      });
      activeBattleSounds = activeBattleSounds.filter(function(audio) {
        if (!audio) return false;
        audio.muted = !enabled;
        audio.volume = enabled ? 0.75 : 0;
        if (!enabled) {
          try {
            audio.pause();
            audio.currentTime = 0;
          } catch (error) {}
          return false;
        }
        return !audio.ended;
      });
      if (enabled) {
        preloadBattleSounds();
        flushPendingBattleSounds();
      } else {
        pendingBattleSoundKeys = [];
      }
    }

    function notifySoundPreferenceChanged(options) {
      options = options || {};
      try {
        window.dispatchEvent(new CustomEvent('learningRpgSoundPreferenceChanged', {
          detail: { enabled: isSoundEnabled(), userInitiated: !!options.userInitiated }
        }));
      } catch (error) {}
    }

    function playStatusSound(type) {
      playBattleSound(type === 'debuff' ? 'debuff' : 'buff');
    }

    function getMonsterImageUrl(monster, state) {
      if (!ASSET_BASE_URL || !monster || !monster.monsterId || monster.avatarType === 'photo') {
        return '';
      }
      var assetMonsterId = monster.monsterId === 'monster_training_dummy' ? 'monster_shadow_problem' : monster.monsterId;
      return ASSET_BASE_URL + '/Resources/Monsters/' + encodeURIComponent(assetMonsterId) + '/' + state + '.png';
    }

    function getActionIntentIconUrl(intent) {
      if (!ASSET_BASE_URL) return '';
      var key = String(intent && (intent.intentIcon || intent.actionType || '') || '').toLowerCase();
      var fileName = 'Action_Attack.png';
      if (key === 'shield' || key === 'guard' || key === 'block') {
        fileName = 'Action_Block.png';
      } else if (key === 'buff' || key === 'heal') {
        fileName = 'Action_Buff.png';
      } else if (key === 'drop' || key === 'debuff') {

      }
      return ASSET_BASE_URL + '/Resources/Actions/' + fileName;

    function getRewardIconUrl(type) {
      if (!ASSET_BASE_URL) return '';
      var files = {
        stat: 'Reward_Stat.png',
        skill: 'Reward_Skill.png',
        skillUpgrade: 'Reward_Skill_Upgrade.png',
        item: 'Reward_Item.png',
        rest: 'Reward_Stat.png',
        rewardClaim: 'Reward_Item.png',
      };
      return ASSET_BASE_URL + '/Resources/Reward/' + (files[type] || 'Reward_Stat.png');
    }

    function cssUrlEscape(value) {
      return String(value || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function renderMonsterSprite(monster, index) {
      var name = monster.name || ('MONSTER ' + (index + 1));
      var className = 'monster-sprite-placeholder compact-monster';
      var monsterType = String(monster.type || '').toLowerCase();
      var monsterId = String(monster.monsterId || '').toLowerCase();
      if (monsterType === 'boss' || monsterType === 'finalboss' || monsterId.indexOf('boss_') === 0) {
        className += ' boss-monster';
      }
      if (monster.avatarType === 'photo' && monster.avatarKey) {
        className += ' player-ghost-photo';
        return '<div class="' + className + '" data-monster-key="' + escapeHtml(monster.monsterId || 'placeholder') + '">' +
          '<img src="' + escapeHtml(monster.avatarKey) + '" alt="' + escapeHtml(name) + '">' +
        '</div>';
      }
      var idleUrl = getMonsterImageUrl(monster, 'Idle');
      if (idleUrl) {
        return '<div class="' + className + ' monster-image-sprite" data-monster-key="' + escapeHtml(monster.monsterId || 'placeholder') + '" data-idle-src="' + escapeHtml(idleUrl) + '" data-attack-src="' + escapeHtml(getMonsterImageUrl(monster, 'Attack')) + '" data-hit-src="' + escapeHtml(getMonsterImageUrl(monster, 'Hit')) + '" data-death-src="' + escapeHtml(getMonsterImageUrl(monster, 'Death')) + '">' +
          '<img class="monster-art" src="' + escapeHtml(idleUrl) + '" alt="' + escapeHtml(name) + '" onerror="handleMonsterImageError(this);">' +
        '</div>';
      }
      return '<div class="' + className + '" data-monster-key="' + escapeHtml(monster.monsterId || 'placeholder') + '">' +
      '</div>';
    }

    function handleMonsterImageError(image) {
      if (!image) return;
      var target = image.closest('.compact-monster');
      if (!target) return;
      var idleSrc = target.dataset.idleSrc || '';
      var failedSrc = image.getAttribute('src') || '';
      target.classList.remove('monster-state-attack', 'monster-state-hit', 'monster-state-death');
      if (idleSrc && failedSrc !== idleSrc) {
        image.src = idleSrc;
        return;
      }
      target.classList.add('monster-image-missing');
      image.remove();
    }

    function renderMonsterIntent(intent) {
      var view = intent || { intentIcon: 'sword', intentText: 'Waiting' };
      var text = String(view.intentText || view.intentTextTemplate || 'Waiting').replace(/Expected\s*/g, '');
      var valueMatch = text.match(/(\d+)/);
      var numericValue = view.value !== undefined && view.value !== ''
        ? Math.max(0, Math.round(Number(view.value || 0)))
        : (valueMatch ? valueMatch[1] : '');
      var hitCount = Math.max(1, Math.round(Number(view.hitCount || view.skillHitCount || 1)));
      var isMultiHitDamage = String(view.actionType || '').toLowerCase() === 'skill'
        && String(view.skillType || '').toLowerCase() === 'damage'
        && hitCount > 1;
      var badgeText = numericValue === '' ? '' : String(numericValue) + (isMultiHitDamage ? 'x' + hitCount : '');
      var valueBadge = badgeText ? '<em class="monster-intent-value">' + escapeHtml(badgeText) + '</em>' : '';
      var iconUrl = getActionIntentIconUrl(view);
      var iconHtml = iconUrl ? '<img class="monster-intent-icon" src="' + escapeHtml(iconUrl) + '" alt="" onerror="this.remove();">' : '<span class="monster-intent-icon-fallback">' + escapeHtml(intentIconLabel(view.intentIcon || view.actionType || 'sword')) + '</span>';
      return '<div class="monster-intent" data-tooltip="' + escapeHtml(text) + '" aria-label="' + escapeHtml(text) + '">' +
        iconHtml +
        valueBadge +
      '</div>';
    }

    function intentIconLabel(icon) {
      var labels = { sword: 'ATK', shield: 'DEF', drop: 'DBF', skill: 'SKL', heal: 'HEAL' };
      return labels[icon] || icon || 'ACT';
    }

    function renderStatusIcons(monster) {
      var groupedStatuses = getDisplayStatusGroups(monster);
      var statuses = []
        .concat(Number(monster.shield || 0) > 0 ? [{ type: 'buff shield-status', label: 'DEF', tooltip: '방어막 ' + Number(monster.shield || 0) }] : [])
        .concat(groupedStatuses.buffs.map(function(status) { return buildStatusView(status, 'buff'); }))
        .concat(groupedStatuses.debuffs.map(function(status) { return buildStatusView(status, 'debuff'); }));
      if (!statuses.length) return '';
      return '<div class="status-row monster-status-row">' + statuses.map(function(status) {
        var statTooltip = status.statTooltip ? ' data-stat-tooltip="' + escapeHtml(status.statTooltip) + '"' : '';
        var turns = status.remainingTurns ? '<em class="status-turns">' + escapeHtml(status.remainingTurns) + '</em>' : '';
        return '<span class="status-icon ' + escapeHtml(status.type) + '" data-tooltip="' + escapeHtml(status.tooltip) + '"' + statTooltip + '>' + escapeHtml(status.label) + turns + '</span>';
      }).join('') + '</div>';
    }

    function getDisplayStatusGroups(target) {
      var groups = { buffs: [], debuffs: [] };
      if (!target) return groups;
      syncClientStatusBuckets(target);
      var seen = {};

      function addStatus(status, fallbackCategory) {
        if (!status) return;
        var category = getDisplayStatusCategory(status, fallbackCategory);
        if (category !== 'buff' && category !== 'debuff') return;
        var key = category + ':' + String(status.effectId || status.id || status.name || groups.buffs.length + groups.debuffs.length);
        var next = Object.assign({}, status, { category: category });
        if (seen[key]) {
          Object.assign(seen[key], next);
          return;
        }
        seen[key] = next;
        if (category === 'buff') {
          groups.buffs.push(next);
        } else {
          groups.debuffs.push(next);
        }
      }

      (target.effects || []).forEach(function(status) { addStatus(status, ''); });
      (target.buffs || []).forEach(function(status) { addStatus(status, 'buff'); });
      (target.debuffs || []).forEach(function(status) { addStatus(status, 'debuff'); });
      return groups;
    }

    function getDisplayStatusCategory(status, fallbackCategory) {
      var category = String(status && status.category || fallbackCategory || '').toLowerCase();
      var effectId = String(status && (status.effectId || status.id) || '');
      if (!category && /^buff_/i.test(effectId)) {
        category = 'buff';
      }
      if (!category && /^debuff_/i.test(effectId)) {
        category = 'debuff';
      }
      return category;
    }

    function buildStatusView(status, type) {
      var icon = getStatusIcon(status.effectId || status.id || status.statKey || status.name, type);
      var tooltip = buildStatusTooltip(status, type);
      return {
        type: type,
        label: status.icon || icon,
        tooltip: tooltip.main,
        statTooltip: tooltip.stat,
        remainingTurns: status.remainingTurns || '',
      };
    }

    function buildStatusTooltip(status, type) {
      var name = status.name || status.effectId || (type === 'buff' ? 'Buff' : 'Debuff');
      var hasCustomDescription = !!String(status.description || '').trim();
      var description = buildStatusDescription(status, type);
      var duration = status.remainingTurns ? '\nTurns: ' + status.remainingTurns : '';
      var stack = Number(status.stacks || 1) > 1 ? '\n중첩: ' + Number(status.stacks || 1) : '';
      return {
        main: name + '\n' + description + duration + stack,
        stat: hasCustomDescription ? '' : buildStatusStatTooltip(status),
      };
    }

    function buildStatusDescription(status, type) {
      var id = status.effectId || '';
      var value = getStatusTotalValue(status);
      var amount = Math.abs(value);
      var customDescription = String(status.description || '').trim();
      if (customDescription) {
        return renderStatusDescriptionTemplate(status, customDescription);
      }
      if (id === 'debuff_bleed') return '행동할 때마다 ' + amount + ' 피해를 받습니다.';
      if (id === 'debuff_poison') return '턴 종료 시 ' + amount + ' 피해를 받습니다.';
      if (id === 'debuff_freeze') return '행동할 수 없습니다. 공격받으면 추가 피해와 함께 해제됩니다.';
      if (id === 'debuff_burn') return '턴 시작 시 ' + amount + ' 피해를 받습니다.';
      if (id === 'debuff_stun') return '1턴 동안 행동할 수 없습니다.';

      var statLabel = getStatLabel(status.statKey);
      if (status.effectType === 'percent') {
        return statLabel + '이 ' + amount + '% ' + (value < 0 ? '감소합니다.' : '증가합니다.');
      }
      if (status.statKey === 'questionTime') {
        return '문제 제한시간이 ' + amount + '초 ' + (value < 0 ? '감소합니다.' : '증가합니다.');
      }
      if (status.statKey === 'questionDifficulty') {
        return '문제 난이도가 ' + amount + ' ' + (value < 0 ? '감소합니다.' : '증가합니다.');
      }
      if (status.statKey) {
        return statLabel + '이 ' + amount + ' ' + (value < 0 ? '감소합니다.' : '증가합니다.');
      }
      return status.description || (type === 'buff' ? '이로운 효과입니다.' : '해로운 효과입니다.');
    }

    function renderStatusDescriptionTemplate(status, template) {
      var total = getStatusTotalValue(status);
      var amount = Math.abs(total);
      var baseValue = Math.abs(Number(status.value || 0));
      var stacks = Math.max(1, Number(status.stacks || 1));
      var turns = status.remainingTurns || '';
      var statLabel = getStatLabel(status.statKey);
      var direction = total < 0 ? '감소' : '증가';
      var suffix = status.effectType === 'percent' ? '%' : '';
      return String(template || '')
        .replace(/\{total\}/g, amount + suffix)
        .replace(/\{amount\}/g, amount + suffix)
        .replace(/\{value\}/g, baseValue + suffix)
        .replace(/\{stacks\}/g, stacks)
        .replace(/\{turns\}/g, turns)
        .replace(/\{stat\}/g, statLabel)
        .replace(/\{direction\}/g, direction)
        .replace(/\bn\b/g, amount + suffix)
        .replace(/\bN\b/g, turns || amount + suffix);
    }

    function buildStatusStatTooltip(status) {
      if (!status.statKey || status.statKey === 'hp' || status.statKey === 'action') return '';
      var label = getStatLabel(status.statKey);
      var value = Math.abs(getStatusTotalValue(status));
      var descriptions = {
        attack: '공격 시 피해량의 기준값입니다.',
        criticalRate: '치명타가 발생할 확률입니다.',
        criticalDamage: '치명타 발생 시 피해 배율입니다.',
        evasion: '공격을 회피할 확률입니다.',
        accuracy: '공격이 명중할 확률의 기준값입니다.',
        hpRegen: '회복 효과의 기준값입니다.',
        questionTime: '문제 풀이 제한시간에 영향을 줍니다.',
        questionDifficulty: '출제되는 문제 난이도에 영향을 줍니다.',
      };
      if (status.statKey === 'defense') {
        if (status.effectType === 'percent') {
          return label + '\n받는 피해와 방어막 수치가 ' + value + '% ' + (Number(status.value || 0) < 0 ? '감소합니다.' : '증가합니다.');
        }
        return label + '\n받는 피해와 방어막 수치가 ' + value + '만큼 ' + (Number(status.value || 0) < 0 ? '불리해집니다.' : '유리해집니다.');
      }
      return label + '\n' + (descriptions[status.statKey] || '전투 계산에 사용되는 능력치입니다.');
    }

    function getStatusTotalValue(status) {
      return Number(status.value || 0) * Math.max(1, Number(status.stacks || 1));
    }

    function getStatLabel(statKey) {
      var labels = {
        attack: '공격력',
        defense: '방어력',
        criticalRate: '치명타 확률',
        criticalDamage: '치명타 피해',
        evasion: '회피율',
        accuracy: '명중률',
        hp: '최대 체력',
        hpRegen: '회복력',
        action: '행동력',
        questionTime: '제한시간',
        questionDifficulty: '문제 난이도',
      };
      return labels[statKey] || statKey || '효과';
    }

    function getStatusIcon(key, type) {
      var icons = {
        debuff_bleed: 'BLD',
        debuff_poison: 'PSN',
        debuff_freeze: 'FRZ',
        debuff_burn: 'BRN',
        debuff_stun: 'STN',
        debuff_weak: 'WEK',
        debuff_corrosion: 'DEF-',
        debuff_dazed: 'TIME-',
        debuff_foolish: '?',
        buff_power: 'ATK+',
        buff_hard: 'DEF+',
        buff_focus: 'CRT+',
        buff_smart: 'Q-',
        buff_wisdom: 'TIME+',
        attack: 'ATK',
        defense: 'DEF',
        criticalRate: 'CRT',
        questionTime: 'TIME',
        questionDifficulty: '?',
      };
      return icons[key] || (type === 'buff' ? 'UP' : 'DN');
    }

    function renderPlayerHud(player) {
      normalizeClientActionPoints(player);
      var hp = Math.max(0, Number(player.hp || 0));
      var maxHp = Math.max(1, Number(player.maxHp || 1));
      var shield = Math.max(0, Number(player.shield || 0));
      var visualMax = Math.max(maxHp, hp + shield);
      var hpPercent = Math.round((hp / visualMax) * 100) + '%';
      document.getElementById('playerHpFill').style.width = hpPercent;
      document.getElementById('playerHpLagFill').style.width = hpPercent;
      document.getElementById('playerShieldFill').style.left = hpPercent;
      document.getElementById('playerShieldFill').style.width = Math.round((shield / visualMax) * 100) + '%';
      document.getElementById('playerHpText').textContent = shield > 0 ? hp + ' + ' + shield + ' / ' + maxHp : hp + ' / ' + maxHp;
      document.querySelector('.player-compact-panel').classList.toggle('player-shielded', shield > 0);
      renderActionPointGauges(player);
      renderPlayerStatuses(player);
    }

    function renderActionPointGauges(player) {
      var current = Math.max(0, Number(player && player.currentActionPoint || 0));
      var max = Math.max(0, Number(player && player.maxActionPoint || player && player.baseMaxActionPoint || 3));
      var icons = '';
      for (var i = 0; i < max; i += 1) {
        icons += '<span class="ap-dot">' + (i < current ? '●' : '○') + '</span>';
      }
      var html = '<span class="ap-label">행동력</span><span class="ap-icons">' + icons + '</span><strong>' + current + ' / ' + max + '</strong>';
      ['actionPanelApGauge'].forEach(function(id) {
        var element = document.getElementById(id);
        if (element) element.innerHTML = html;
      });
      var passTurnButton = document.getElementById('passTurnButton');
      if (passTurnButton) {
        var shouldHighlightPassTurn = current <= 0;
        passTurnButton.classList.toggle('pass-turn-attention', shouldHighlightPassTurn);
        passTurnButton.setAttribute('aria-label', shouldHighlightPassTurn ? '행동력 0, 턴 종료' : '턴 종료');
      }
    }

    function getCurrentActionPoint() {
      var player = currentView && currentView.battle ? currentView.battle.player : null;
      normalizeClientActionPoints(player);
      return Number(player && player.currentActionPoint || 0);
    }

    function getSkillActionPointCost(skill) {
      return Math.max(0, Math.min(3, Number(skill && skill.actionPointCost !== undefined && skill.actionPointCost !== '' ? skill.actionPointCost : 1)));
    }

    function getSkillDifficultyBonusText(skill) {
      var bonus = Number(skill && skill.difficultyBonus || 0);
      if (!bonus) return '';
      return '문제 난이도 ' + (bonus > 0 ? '+' : '') + bonus;
    }

    function getSkillDifficultyBonusClass(skill) {
      var bonus = Number(skill && skill.difficultyBonus || 0);
      return 'skill-detail-line' + (bonus > 0 ? ' skill-detail-difficulty-penalty' : '');
    }

    function hasClientActionPoint(cost) {
      return getCurrentActionPoint() >= Number(cost || 0);
    }

    function hasClientActionPointForBattle(battle, cost) {
      var player = battle && battle.player ? battle.player : null;
      normalizeClientActionPoints(player);
      return Number(player && player.currentActionPoint || 0) >= Number(cost || 0);
    }

    function isClientSkillAvailableNow(skill, hasApOverride) {
      if (!skill) return false;
      if (skill.available) return true;
      var hasAp = hasApOverride !== undefined ? !!hasApOverride : hasClientActionPoint(getSkillActionPointCost(skill));
      return hasAp && skill.unavailableReasonType === 'actionPoint';
    }

    function toggleBattleMenu() {
      if (isBattleResultLoading()) return;
      var panel = document.getElementById('battleMenuPanel');
      var willOpen = panel.classList.contains('hidden');
      panel.classList.toggle('hidden', !willOpen);
      panel.setAttribute('aria-hidden', willOpen ? 'false' : 'true');
      if (!willOpen) {
        document.getElementById('battleStatsPanel').classList.add('hidden');
      }
    }

    function closeBattleMenu() {
      var panel = document.getElementById('battleMenuPanel');
      panel.classList.add('hidden');
      panel.setAttribute('aria-hidden', 'true');
      document.getElementById('battleStatsPanel').classList.add('hidden');
    }

    function showBattleItems() {
      closeBattleMenu();
      var modal = document.getElementById('itemModal');
      var grid = document.getElementById('itemModalGrid');
      var message = document.getElementById('itemModalMessage');
      var items = getOwnedItemDetailsForModal();
      if (!items.length) {
        grid.innerHTML = '<div class="item-empty">보유 중인 아이템이 없습니다.</div>';
        message.textContent = '';
      } else {
        grid.innerHTML = items.map(function(item) {
          return renderOwnedItemCard(item);
        }).join('');
        message.textContent = '아이템에 마우스를 올리면 상세 효과를 볼 수 있습니다.';
      }
      message.className = 'message';
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeItemModal() {
      var modal = document.getElementById('itemModal');
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
    }

    function getOwnedItemDetailsForModal() {
      var player = currentView && currentView.battle && currentView.battle.player || {};
      var details = Array.isArray(player.itemDetails) ? player.itemDetails.slice() : [];
      if (details.length) {
        return details;
      }
      return (Array.isArray(player.items) ? player.items : []).map(function(item) {
        var itemId = typeof item === 'string' ? item : (item && (item.itemId || item.id) || '');
        return {
          itemId: itemId,
          id: itemId,
          name: itemId || '알 수 없는 아이템',
          rarity: 'common',
          rarityLabel: '일반',
          effectSummary: '',
          description: '',
          count: item && item.count || 1,
        };
      }).filter(function(item) {
        return item.itemId || item.name;
      });
    }

    function renderOwnedItemCard(item) {
      var rarity = normalizeRewardRarity(item.rarity);
      var rarityLabel = item.rarityLabel || getRewardRarityLabel(rarity);
      var count = Math.max(1, Number(item.count || 1));
      var effectHtml = buildItemEffectDescription(item);
      var flavorHtml = item.description
        ? '<span class="item-flavor-text">' + escapeHtml(item.description) + '</span>'
        : '';
      return '<article class="item-card rarity-' + escapeHtml(rarity) + '" tabindex="0">' +
        '<span class="item-card-body">' +
          '<strong>' + escapeHtml(item.name || item.itemId || '아이템') + '</strong>' +
          '<span class="item-card-rarity">' + escapeHtml(rarityLabel) + '</span>' +
        '</span>' +
        '<span class="reward-detail-card item-detail-card rarity-' + escapeHtml(rarity) + '" aria-hidden="true">' +
          '<span class="skill-detail-header">' +
            '<strong class="skill-detail-name">' + escapeHtml(item.name || item.itemId || '아이템') + '</strong>' +
          '</span>' +
          '<span class="skill-detail-meta">' + escapeHtml(rarityLabel) + (count > 1 ? ' / 보유 ' + escapeHtml(count) + '개' : '') + '</span>' +
          '<span class="skill-detail-description">' + effectHtml + '</span>' +
          flavorHtml +
        '</span>' +
      '</article>';
    }

    function buildItemEffectDescription(item) {
      var summary = String(item && item.effectSummary || '').trim();
      if (!summary) {
        return '-';
      }
      return summary.split(/\s*\/+\s*|\n+/).map(function(line) {
        return String(line || '').trim();
      }).filter(Boolean).map(function(line) {
        return '- ' + escapeHtml(line);
      }).join('<br>');
    }

    function showBattleStats() {
      var panel = document.getElementById('battleStatsPanel');
      var player = currentView && currentView.battle ? currentView.battle.player || {} : {};
      var stats = player.stats || {};
      var effectiveStats = getClientEffectiveStats(player);
      var rows = [
        ['체력', (player.hp || 0) + ' / ' + (player.maxHp || stats.hp || '-')],
        ['방어막', player.shield || 0],
        ['행동력', (player.currentActionPoint || 0) + ' / ' + (player.maxActionPoint || player.baseMaxActionPoint || 3)],
        ['공격력', formatEffectiveStat(stats, effectiveStats, 'attack', '')],
        ['방어력', formatEffectiveStat(stats, effectiveStats, 'defense', '')],
        ['명중률', formatEffectiveStat(stats, effectiveStats, 'accuracy', '%')],
        ['회피율', formatEffectiveStat(stats, effectiveStats, 'evasion', '%')],
        ['치명타 확률', formatEffectiveStat(stats, effectiveStats, 'criticalRate', '%')],
        ['치명타 피해', formatEffectiveStat(stats, effectiveStats, 'criticalDamage', '%')],
        ['화폐', currentView ? Number(currentView.currency || 0) : 0],
        ['점수', formatScore(currentView ? Number(currentView.score || 0) : 0)],
      ];
      panel.innerHTML = '<strong>현재 스탯</strong>' + rows.map(function(row) {
        return '<div class="battle-stat-row"><span>' + escapeHtml(row[0]) + '</span><b>' + escapeHtml(row[1]) + '</b></div>';
      }).join('');
      panel.classList.remove('hidden');
    }

    function reloadBattleData() {
      closeBattleMenu();
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        pushLog('서버 연결을 사용할 수 없습니다.');
        return;
      }
      showLoadingModal('데이터 다시 불러오는 중...', '시트 데이터 캐시를 비우고 전투 데이터를 갱신하는 중...');
      google.script.run
        .withSuccessHandler(function() {
          google.script.run
            .withSuccessHandler(function(view) {
              hideLoadingModal();
              isDummyMode = false;
              currentView = normalizeBattleView(view);
              applyBattleClientConfig(currentView.clientConfig);
              resetBattleQuestionCacheFromView(currentView, []);
              renderBattle(currentView);
              pushLog('데이터를 다시 불러왔습니다.');
            })
            .withFailureHandler(function(error) {
              hideLoadingModal();
              pushLog(error && error.message ? error.message : '전투 데이터 갱신에 실패했습니다.');
            })
            .getBattleView(getAuthToken(), getSelectedWorkbookId());
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          pushLog(error && error.message ? error.message : '데이터 다시 불러오기에 실패했습니다.');
        })
        .clearRuntimeCaches();
    }

    function surrenderBattle() {
      closeBattleMenu();
      if (!currentView || !currentView.battle || currentView.battle.status !== 'active') {
        return;
      }
      setBattleInputLocked(true);
      setPlayerTurn(false);
      if (isDummyMode || currentView.runId === 'dummy-run') {
        currentView.battle.player.hp = 0;
        currentView.battle.status = 'defeat';
        currentView.battle.lastMessage = '전투를 포기했습니다.';
        renderBattle(currentView);
        showDefeatSequence({ skipCommit: true });
        return;
      }

    function chooseSkill(skillId) {
      if (!isPlayerTurn || isAnimatingTurn || isBattleResultLoading()) {
        pushLog('지금은 행동할 수 없습니다.');
        return;

      if (handlePendingTurnResolutionBeforeAction()) return;
      closeSkillPanel();
      refreshClientSkillAvailabilityForLocks(currentView);

      if (!selectedSkill) {
        pushLog('스킬 정보를 찾을 수 없습니다.');
        return;
      }
      if (!isClientSkillAvailableNow(selectedSkill)) {
        pushLog(selectedSkill.unavailableReason || '지금은 사용할 수 없는 스킬입니다.');
        return;
      }
      var actionPointCost = getSkillActionPointCost(selectedSkill);
      if (!hasClientActionPoint(actionPointCost)) {
        pushLog('행동력이 부족합니다.');
        return;
      }
      if (shouldChooseTargetForSkill(selectedSkill)) {
        beginTargetSelection({ actionType: 'skill', skillId: skillId });
        return;
      }
      var target = skillNeedsEnemyTarget(selectedSkill) ? getFirstAliveMonster(currentView.battle) : null;
      var targetId = target ? (target.instanceId || target.monsterId) : '';
      startSkillQuestion(skillId, targetId);

    function startSkillQuestion(skillId, targetId) {
      cancelTargetSelection(false);
      if (isDummyMode || !currentView || currentView.runId === 'dummy-run') {

    function shouldChooseTargetForAction() {
      return getAliveClientMonsters().length > 1;
    }

    function shouldChooseTargetForSkill(skill) {
      return skillNeedsEnemyTarget(skill) && getAliveClientMonsters().length > 1;
    }

    function skillNeedsEnemyTarget(skill) {
      if (!skill) return true;
      if (skillTargetsAllEnemies(skill)) return false;
      if (skillTargetsRandomEnemies(skill)) return false;
      return String(skill.target || 'enemy').toLowerCase() !== 'self';
    }

    function skillTargetsAllEnemies(skill) {
      if (!skill) return false;
      var target = String(skill.target || '').toLowerCase();
      if (target === 'allenemies' || target === 'all_enemies' || target === 'all-enemies' || target === 'enemies') {
        return true;
      }
      var rule = safeJsonParseClient(skill.effectJson || skill.effectRule || skill.ruleJson, {});
      var targetMode = String(rule && rule.targetMode || '').toLowerCase();
      return targetMode === 'allenemies' || targetMode === 'all_enemies' || targetMode === 'all-enemies';
    }

    function skillTargetsRandomEnemies(skill) {
      if (!skill) return false;
      var target = String(skill.target || '').toLowerCase();
      if (target === 'randomenemy' || target === 'random_enemy' || target === 'random-enemy' || target === 'randomenemies' || target === 'random_enemies' || target === 'random-enemies') {
        return true;
      }
      var rule = safeJsonParseClient(skill.effectJson || skill.effectRule || skill.ruleJson, {});
      var targetMode = String(rule && rule.targetMode || '').toLowerCase();
      return targetMode === 'randomenemy' || targetMode === 'random_enemy' || targetMode === 'random-enemy'
        || targetMode === 'randomenemies' || targetMode === 'random_enemies' || targetMode === 'random-enemies';
    }

    function getMonsterRuntimeId(monster) {
      return String(monster && (monster.instanceId || monster.monsterId) || '');
    }

    function getAliveMonstersFromBattle(battle) {
      return (battle && battle.monsters || []).filter(function(monster) {
        return Number(monster && monster.currentHp || 0) > 0;
      });
    }

    function pickRandomAliveMonsterFromBattle(battle, usedTargetIds) {
      var alive = getAliveMonstersFromBattle(battle);
      if (!alive.length) return null;
      return alive[Math.floor(Math.random() * alive.length)];
    }

    function getAliveClientMonsters() {
      var battle = currentView && currentView.battle || {};
      return (battle.monsters || []).filter(function(monster) {
        return Number(monster.currentHp || 0) > 0;
      });
    }

    function passTurn() {

    function startPassTurnServerSync() {
      pendingTurnResolutionActive = true;
      pendingTurnResolutionLoading = true;
      pendingQuestionTurnIsOptimistic = true;
      pendingServerTurnView = null;
      google.script.run
        .withSuccessHandler(function(view) {
          pendingServerTurnView = normalizeBattleView(view);
          if (!isAnimatingTurn) {
            applyPendingServerTurnSync();
            renderBattle(currentView);
            saveLocalBattleCheckpoint();
          }
        })
        .withFailureHandler(function(error) {
          pendingTurnResolutionActive = false;
          pendingTurnResolutionLoading = false;
          pendingQuestionTurnIsOptimistic = false;
          pendingServerTurnView = null;
          hideTurnSyncSpinner();
          hideLoadingModal();

    function handlePendingTurnResolutionBeforeAction() {
      if (!pendingTurnResolutionActive) return false;
      if (pendingQuestionTurnError) {
        pushLog(pendingQuestionTurnError.message || '전투 결과 처리 중 오류가 발생했습니다.');
        pendingQuestionTurnError = null;
        pendingTurnResolutionActive = false;
        pendingTurnResolutionLoading = false;
        setBattleInputLocked(false);
        return true;
      }
      if (pendingQuestionTurnView) {
        continueAfterQuestionResult();
        return true;
      }
      if (pendingServerTurnView) {
        applyPendingServerTurnSync();
        return false;
      }
      showTurnSyncSpinner();
      pendingTurnResolutionLoading = true;
      setBattleInputLocked(true);
      showLoadingModal('전투 결과 계산 중...', '이전 행동 결과를 마무리하는 중...');
      return true;
    }

    function takeCachedQuestionView(actionType, skillId, targetId) {
      var targetDifficulty = getClientRequiredQuestionDifficulty(actionType, skillId);
      battleQuestionCache = battleQuestionCache || [];
      battleQuestionCache = filterQuestionCacheByUsed(battleQuestionCache, getClientUsedQuestionIds(currentView));
      battleQuestionCache = filterQuestionCacheByDifficulty(battleQuestionCache, targetDifficulty);
      if (!battleQuestionCache.length && currentView && currentView.questionCache && currentView.questionCache.length) {
        battleQuestionCache = filterQuestionCacheByUsed(currentView.questionCache.slice(), getClientUsedQuestionIds(currentView));
        battleQuestionCache = filterQuestionCacheByDifficulty(battleQuestionCache, targetDifficulty);
      }
      if (!battleQuestionCache.length && reusableQuestionCache.length) {
        battleQuestionCache = filterQuestionCacheByUsed(reusableQuestionCache.slice(), getClientUsedQuestionIds(currentView));
        battleQuestionCache = filterQuestionCacheByDifficulty(battleQuestionCache, targetDifficulty);
      }
      if (!battleQuestionCache.length) return null;

      var questionView = JSON.parse(JSON.stringify(battleQuestionCache.shift()));
      markClientQuestionUsed(getQuestionViewId(questionView), currentView);
      questionView.actionType = actionType || 'attack';
      questionView.skillId = skillId || '';
      questionView.targetId = targetId || '';
      questionView.isCachedQuestion = true;
      questionView.finalDifficulty = targetDifficulty;
      return questionView;
    }

    function requestQuestionFromServer(actionType, skillId, targetId) {
      if (!currentView || !currentView.runId || currentView.runId === 'dummy-run') return;
      var skill = skillId ? findAvailableSkill(skillId) : null;
      var difficultyBonus = Number(skill && skill.difficultyBonus || 0);
      var loading = startDelayedLoadingModal('문제 준비 중...', '현재 난이도에 맞는 문제를 고르는 중...', { hideProgress: true });
      google.script.run
        .withSuccessHandler(function(questionView) {
          finishDelayedLoadingModal(loading);
          openQuestionModal(normalizeServerQuestionView(questionView, actionType, skillId, targetId), false);
        })
        .withFailureHandler(function(error) {
          finishDelayedLoadingModal(loading);
          pushLog(error.message || '현재 난이도에서 사용할 수 있는 문제가 없습니다.');
        })
        .selectQuestionForAction(currentView.playerId, currentView.runId, actionType || 'attack', difficultyBonus, getAuthToken(), targetId || '', skillId || '');
    }

    function normalizeServerQuestionView(questionView, actionType, skillId, targetId) {
      questionView = questionView || {};
      questionView.actionType = questionView.actionType || actionType || 'attack';
      questionView.skillId = questionView.skillId || skillId || '';
      questionView.targetId = questionView.targetId || targetId || '';
      return questionView;
    }

    function filterQuestionCacheByDifficulty(cache, targetDifficulty) {
      var required = Number(targetDifficulty || 0);
      if (!required) return cache || [];
      return (cache || []).filter(function(questionView) {
        var questionDifficulty = Number(questionView && questionView.question && questionView.question.difficulty || 0);
        var finalDifficulty = Number(questionView && questionView.finalDifficulty || 0);
        return questionDifficulty === required && finalDifficulty === required;
      });
    }

    function getClientRequiredQuestionDifficulty(actionType, skillId) {
      var battle = currentView && currentView.battle || {};
      var stage = battle.stage || {};
      var value = Number(stage.baseDifficulty || 1);
      if (stage.bossMonsterId) value += 1;
      if (actionType === 'skill') {
        var skill = findAvailableSkill(skillId);
        value += Number(skill && skill.difficultyBonus || 0);
      }
      value += Number(battle.player && battle.player.itemModifiers && battle.player.itemModifiers.questionDifficulty || 0);
      value += getClientQuestionDifficultyEffectDelta();
      value = Math.max(1, Math.min(MAX_QUESTION_DIFFICULTY, Math.round(value)));
      var min = Number(stage.minDifficulty || 1);
      var max = Number(stage.maxDifficulty || MAX_QUESTION_DIFFICULTY);
      if (min > max) min = max;
      return Math.max(min, Math.min(max, value));
    }

    function getClientQuestionDifficultyEffectDelta() {
      var effects = currentView && currentView.battle && currentView.battle.player && currentView.battle.player.effects || [];
      return effects.reduce(function(total, effect) {
        if (!effect || effect.effectId === 'debuff_foolish') return total;
        if (effect.statKey !== 'questionDifficulty' || effect.effectType !== 'flat') return total;
        return total + Number(effect.value || 0) * Math.max(1, Number(effect.stacks || 1));
      }, 0);
    }

    function refillQuestionCacheAndOpen(actionType, skillId, targetId) {
      if (!currentView || !currentView.runId || currentView.runId === 'dummy-run') {
        return;
      }
      if (questionCacheRefillInFlight) {
        pushLog('문제 묶음을 다시 불러오는 중입니다.');
        return;
      }
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        pushLog('서버 연결을 사용할 수 없어 문제를 다시 불러오지 못했습니다.');
        return;
      }

      questionCacheRefillInFlight = true;
      var loading = startDelayedLoadingModal('문제를 다시 불러오는 중...', '현재 난이도 범위의 문제 풀을 갱신하는 중...', { hideProgress: true });
      google.script.run
        .withSuccessHandler(function(questionCache) {
          questionCacheRefillInFlight = false;
          finishDelayedLoadingModal(loading);
          var cache = Array.isArray(questionCache) ? questionCache : [];
          currentView.reusableQuestionCache = cache.slice();
          currentView.questionCache = cache.slice();
          resetBattleQuestionCacheFromView(currentView, cache);
          var questionView = takeCachedQuestionView(actionType, skillId || '', targetId || '');
          if (questionView) {
            openQuestionModal(questionView, false);
            return;
          }
          requestQuestionFromServer(actionType, skillId || '', targetId || '');
        })
        .withFailureHandler(function(error) {
          questionCacheRefillInFlight = false;
          finishDelayedLoadingModal(loading);
          pushLog(error && error.message ? error.message : '문제 묶음을 다시 불러오지 못했습니다.');
        })
        .preloadBattleQuestions(currentView.runId, getAuthToken());
    }

    function preloadMissingBattleQuestionCache() {
      if (!currentView || !currentView.runId || currentView.runId === 'dummy-run') return;
      if (battleQuestionCache && battleQuestionCache.length) return;
      if (questionCacheRefillInFlight) return;
      if (typeof google === 'undefined' || !google.script || !google.script.run) return;
      questionCacheRefillInFlight = true;
      google.script.run
        .withSuccessHandler(function(questionCache) {
          questionCacheRefillInFlight = false;
          var cache = Array.isArray(questionCache) ? questionCache : [];
          if (!cache.length || !currentView) return;
          currentView.reusableQuestionCache = cache.slice();
          currentView.questionCache = cache.slice();
          resetBattleQuestionCacheFromView(currentView, cache);
        })
        .withFailureHandler(function() {
          questionCacheRefillInFlight = false;
        })
        .preloadBattleQuestions(currentView.runId, getAuthToken());
    }

    function applySkillDifficultyBonusToQuestionView(questionView, skillId) {
      var skill = findAvailableSkill(skillId);
      var bonus = Number(skill && skill.difficultyBonus || 0);
      if (!bonus) return questionView;
      var nextDifficulty = Math.max(1, Math.min(MAX_QUESTION_DIFFICULTY, Number(questionView.finalDifficulty || 1) + bonus));
      var question = questionView.question || {};
      var typeMultiplier = question.type === 'shortAnswer' ? SHORT_ANSWER_TIME_MULTIPLIER : 1;
      var addedMs = Math.max(0, nextDifficulty - Number(questionView.finalDifficulty || 1)) * 2000 * typeMultiplier;
      questionView.finalDifficulty = nextDifficulty;
      questionView.maxMs = Math.round(Number(questionView.maxMs || 10000) + addedMs);
      return questionView;
    }

    function findAvailableSkill(skillId) {
      return ((currentView && currentView.availableSkills) || []).filter(function(skill) {
        return skill.skillId === skillId;
      })[0] || null;
    }

    function openDummyQuestionModal(actionType, skillId, targetId) {

      questionView.actionType = actionType || 'attack';
      questionView.skillId = skillId || '';

      resetQuestionResultHold();
      resetQuestionEfficiencyFeedback();
