<!DOCTYPE html>
<html lang="ko">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include_('UiStyles'); ?>
  <style>
    .leaderboard-shell {
      width: min(980px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 24px 0;
    }

    .leaderboard-table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .leaderboard-table {
      width: 100%;
      min-width: 680px;
      border-collapse: collapse;
    }

    .leaderboard-table th,
    .leaderboard-table td {
      border-bottom: 1px solid rgba(180, 180, 180, 0.24);
      padding: 11px 10px;
      text-align: left;
      white-space: nowrap;
    }

    .leaderboard-table th {
      color: var(--muted);
      font-weight: 400;
    }

    .leaderboard-rank {
      width: 72px;
      color: var(--accent);
      font-weight: 800;
    }

    .leaderboard-empty {
      padding: 18px 0 4px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="leaderboard-shell fade-in">
    <section class="rpg-panel">
      <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
        <div>
          <p class="muted">LEADERBOARD</p>
          <h1 id="leaderboardTitle" class="rpg-title">Leaderboard</h1>
        </div>
        <div class="inline-actions">
          <button class="secondary" onclick="loadLeaderboard()">새로고침</button>
          <button class="secondary" onclick="goHome()">메인</button>
        </div>
      </div>
      <div id="leaderboardMessage" class="message"></div>
    </section>

    <section class="rpg-panel">
      <div id="leaderboardContent" class="leaderboard-table-wrap">
        <p class="leaderboard-empty">Loading leaderboard...</p>
      </div>
    </section>
  </main>

  <?!= include_('UiLoadingModal'); ?>

  <script>
    var WEB_APP_URL = '<?= getWebAppUrl_() ?>';
    var SELECTED_WORKBOOK_ID_KEY = 'learningRpgSelectedWorkbookId';
    var SELECTED_WORKBOOK_NAME_KEY = 'learningRpgSelectedWorkbookName';

    document.addEventListener('DOMContentLoaded', loadLeaderboard);

    function loadLeaderboard() {
      setMessage('');
      var workbookId = getSelectedWorkbookId();
      var workbookName = getSelectedWorkbookName();
      setLeaderboardTitle(workbookName);

      if (!workbookId) {
        renderLeaderboard([]);
        setMessage('\uB9AC\uB354\uBCF4\uB4DC\uB97C \uBCF4\uB824\uBA74 \uBA3C\uC800 \uBA54\uC778 \uD654\uBA74\uC5D0\uC11C \uBB38\uC81C\uC9D1\uC744 \uC120\uD0DD\uD574 \uC8FC\uC138\uC694.', 'error');
        return;
      }

      showLoadingModal('\uB9AC\uB354\uBCF4\uB4DC \uB85C\uB529 \uC911...', '\uD604\uC7AC \uBB38\uC81C\uC9D1\uC758 \uC21C\uC704\uB97C \uBD88\uB7EC\uC624\uB294 \uC911...');
      google.script.run
        .withSuccessHandler(function(rows) {
          hideLoadingModal();
          renderLeaderboard(rows || []);
        })
        .withFailureHandler(function(error) {
          hideLoadingModal();
          setMessage(error.message || '\uB9AC\uB354\uBCF4\uB4DC\uB97C \uBD88\uB7EC\uC624\uC9C0 \uBABB\uD588\uC2B5\uB2C8\uB2E4.', 'error');
          renderLeaderboard([]);
        })
        .getLeaderboard(workbookId);
    }

    function renderLeaderboard(rows) {
      var container = document.getElementById('leaderboardContent');
      if (!rows.length) {
        container.innerHTML = '<p class="leaderboard-empty">\uD45C\uC2DC\uD560 \uC21C\uC704 \uB370\uC774\uD130\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.</p>';
        return;
      }

      container.innerHTML =
        '<table class="leaderboard-table">' +
          '<thead><tr>' +
            '<th>\uC21C\uC704</th>' +
            '<th>\uC774\uB984</th>' +
            '<th>\uC810\uC218</th>' +
            '<th>\uCD5C\uACE0 \uC9C4\uD589\uB3C4</th>' +
            '<th>\uD074\uB9AC\uC5B4 \uC2DC\uAC04</th>' +
            '<th>\uC815\uB2F5\uB960</th>' +
          '</tr></thead>' +
          '<tbody>' + rows.map(function(row) {
            return '<tr>' +
              '<td class="leaderboard-rank">' + Number(row.rank || 0) + '</td>' +
              '<td>' + escapeHtml(row.displayName || '-') + '</td>' +
              '<td><strong>' + escapeHtml(row.scoreText || '0\uC810') + '</strong></td>' +
              '<td>' + escapeHtml(row.progressText || '-') + '</td>' +
              '<td>' + escapeHtml(row.clearTimeText || '\uC5C6\uC74C') + '</td>' +
              '<td>' + escapeHtml(row.accuracyText || '0%') + '</td>' +
            '</tr>';
          }).join('') + '</tbody>' +
        '</table>';
    }

    function getSelectedWorkbookId() {
      try {
        return String(sessionStorage.getItem(SELECTED_WORKBOOK_ID_KEY) || '').trim();
      } catch (error) {
        return '';
      }
    }

    function getSelectedWorkbookName() {
      try {
        return String(sessionStorage.getItem(SELECTED_WORKBOOK_NAME_KEY) || '').trim();
      } catch (error) {
        return '';
      }
    }

    function setLeaderboardTitle(workbookName) {
      document.getElementById('leaderboardTitle').textContent = workbookName ? workbookName + ' \uB9AC\uB354\uBCF4\uB4DC' : '\uB9AC\uB354\uBCF4\uB4DC';
    }

    function setMessage(message, type) {
      var element = document.getElementById('leaderboardMessage');
      element.textContent = message || '';
      element.className = 'message ' + (type || '');
    }

    function goHome() {
      showLoadingModal('\uBA54\uC778 \uD654\uBA74\uC73C\uB85C \uC774\uB3D9 \uC911...', '\uC7A0\uC2DC\uB9CC \uAE30\uB2E4\uB824 \uC8FC\uC138\uC694.');
      navigateTop(WEB_APP_URL + '?page=index&skipIntro=1');
    }

    function navigateTop(url) {
      var link = document.createElement('a');
      link.href = url;
      link.target = '_top';
      link.rel = 'noopener';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function showLoadingModal(title, text) {
      document.getElementById('loadingTitle').textContent = title || '\uB85C\uB529 \uC911...';
      document.getElementById('loadingText').textContent = text || '\uB370\uC774\uD130\uB97C \uBD88\uB7EC\uC624\uB294 \uC911...';
      document.getElementById('loadingModal').classList.add('active');
    }

    function hideLoadingModal() {
      document.getElementById('loadingModal').classList.remove('active');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
